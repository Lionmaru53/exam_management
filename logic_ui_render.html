<script>
window.onload = function() {
  const testLineId = "U1234567890abcdef";
  google.script.run
    .withSuccessHandler(renderApp)
    .getInitialData(testLineId);
};

function renderApp(data) {
  if (data.error) {
    document.getElementById('loading').innerText = "エラー: " + data.error;
    return;
  }

  document.getElementById('loading').style.display = "none";
  document.getElementById('app').style.display = "block";

  // 日付文字列から「年」を抽出
  const examYear = data.currentExam.start_date ? data.currentExam.start_date.split('-')[0] : '----';

  // 学年を特定（生徒情報、もしくは最初の教科から取得）
  const grade = data.student.grade || (data.subjects.length > 0 ? data.subjects[0].grade : '-');

  // ヘッダー生成
  document.getElementById('header').innerHTML = `
    <div class="exam-header-container">
      <h2 class="exam-title">${examYear}年 ${grade}年 ${data.currentExam.test_name}</h2>
      <p class="exam-subtitle">(${data.student.school_name} ${data.student.school_course_name})</p>
      <p class="student-name">生徒: ${data.student.name} さん</p>
    </div>
  `;

  // 1. 教科をジャンルごとにグループ化
  const groupedSubjects = data.subjects.reduce((acc, sub) => {
    const key = sub.genre_name;
    if (!acc[key]) acc[key] = [];
    acc[key].push(sub);
    return acc;
  }, {});

  // 2. ジャンルごとにHTMLを生成
  let listHtml = "";
  for (const genreName in groupedSubjects) {
    listHtml += `
      <div class="genre-container">
        <h3 class="genre-title">${genreName}</h3>
        <div class="subject-grid">
      `;


    groupedSubjects[genreName].forEach(sub => {
      const s = data.scores.find(x => x.subject_id === sub.subject_id) || {};
      listHtml += `
        <div class="subject-card">
          <span class="subject-label">${sub.subject_name}</span>
          <div class="stack-group">
            <div class="stack-item"><span>点数</span> <select id="s_${sub.subject_id}">${createOptions(0, 100, s.score)}</select></div>
            <div class="stack-item"><span>学年順位</span> <select id="gr_${sub.subject_id}">${createOptions(1, 400, s.grade_rank)}</select></div>
            <div class="stack-item"><span>クラス順位</span> <select id="cr_${sub.subject_id}">${createOptions(1, 100, s.class_rank)}</select></div>
          </div>
        </div>
      `;
    });
    listHtml += `</div></div>`;
  }
  document.getElementById('subject-list').innerHTML = listHtml;

  // フッター（ボタン）生成
  document.getElementById('footer').innerHTML = `
    <button id="submitBtn" class="btn-save" onclick="handleSave('${data.student.student_id}', '${data.currentExam.exam_id}')">
      一括保存する
    </button>
  `;
}

/**
 * 0〜100点、1〜400位の選択肢を生成するヘルパー関数
 */
function createOptions(start, end, selectedValue) {
  let options = '<option value="">未</option>'; // 未入力状態を許容
  for (let i = start; i <= end; i++) {
    const selected = (i == selectedValue) ? 'selected' : '';
    options += `<option value="${i}" ${selected}>${i}</option>`;
  }
  return options;
}



</script>
