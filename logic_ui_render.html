<script>
/**
 * 16進数の色文字列をRGBAに変換する
 * @param {string} hex - #RRGGBB形式の色コード
 * @param {number} alpha - 透明度 (0-1)
 * @returns {string} rgba(r, g, b, a) 形式の文字列
 */
function hexToRgba(hex, alpha = 0.1) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function getGenreColor(genreName, alpha = 0.08) {
  const palette = {
    '数学': '#dbeafe',
    '英語': '#fed7aa',
    '国語': '#bbf7d0',
    '理科': '#fbcfe8',
    '社会': '#fde68a',
    'その他': '#f8fafc'
  };
  const hex = palette[genreName] || '#f8fafc';
  return hexToRgba(hex, alpha);
}

/**
 * テスト用のLine IDを使用して、サーバーから初期データを取得し、UIを構築する関数を呼び出す
 */
window.onload = function() {
  const testLineId = 'U1234567890abcdef';
  google.script.run
    .withSuccessHandler(renderApp)
    .getInitialData(testLineId);
};

let scoreOptionsCache = "";
let rankOptionsCache = "";

function prepareOptions() {
  scoreOptionsCache = '<option value="" disabled selected hidden>点数</option>';
  for (let i = 100; i >= 0; i--) {
    scoreOptionsCache += `<option value="${i}">${i}</option>`;
  }
  rankOptionsCache = '<option value="" disabled selected hidden>順位</option>';
  for (let i = 1; i <= 400; i++) {
    rankOptionsCache += `<option value="${i}">${i}</option>`;
  }
}

function getOptionsHtml(cache, selectedValue) {
  if (selectedValue === undefined || selectedValue === null || selectedValue === "") {
    return cache;
  }
  cache = cache.replace('disabled selected hidden', 'selected');
  cache = cache.replace(`value="${selectedValue}"`, `value="${selectedValue}" selected`);
  return cache;
}

/**
 * 受け取ったデータを元にUIを構築する関数
 * @param {Object} data - サーバーから受け取る初期データ
 */
function renderApp(data) {
  console.log('Received data:', data);
  if (data.error) {
    document.getElementById('loading').innerText = 'エラー: ' + data.error;
    return;
  }

  prepareOptions();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  const grade = data.student.grade || (data.subjects.length > 0 ? data.subjects[0].grade : '-');

  document.getElementById('header').innerHTML = `
    <div class="exam-header-container">
      <h2 class="exam-title">${grade}年</h2>
      <p class="student-name">${data.student.name} さん</p>
      <p class="exam-subtitle">(${data.student.school_name} ${data.student.school_course_name})</p>
    </div>
  `;

  const examTabs = data.examTabs || [{
    ...data.currentExam,
    subjects: data.subjects,
    scores: data.scores
  }];

  let listHtml = `
    <div class="subject-tab-wrap">
      <div class="tab-nav">
  `;

  examTabs.forEach((exam, index) => {
    listHtml += `
      <button type="button" class="tab-button${index === 0 ? ' active' : ''}" data-exam-id="${exam.exam_id}" onclick="switchExamTab('${exam.exam_id}')">
        ${exam.test_name}
      </button>
    `;
  });

  listHtml += `
      </div>
      <div class="tab-content">
  `;

  examTabs.forEach((exam, examIndex) => {
    const groupedSubjects = exam.subjects.reduce((acc, sub) => {
      const genre = sub.genre_name || 'その他';
      if (!acc[genre]) acc[genre] = { rows: [] };
      acc[genre].rows.push(sub);
      return acc;
    }, {});

    listHtml += `
      <div class="tab-panel" data-exam-id="${exam.exam_id}" style="display: ${examIndex === 0 ? 'block' : 'none'};">
        <div class="subject-table-container">
          <table class="subject-table">
            <thead>
              <tr>
                <th colspan="5" class="test-name-header">${exam.test_name}</th>
              </tr>
              <tr>
                <th>教科</th>
                <th>科目</th>
                <th>点数</th>
                <th>学年順位</th>
                <th>クラス順位</th>
              </tr>
            </thead>
            <tbody>
    `;

    Object.keys(groupedSubjects).forEach(genreName => {
      const group = groupedSubjects[genreName];
      const rowCount = group.rows.length;
      const rowBackground = getGenreColor(genreName, 0.12);

      group.rows.forEach((sub, index) => {
        const s = exam.scores.find(x => x.subject_id === sub.subject_id) || {};
        const sOpt = getOptionsHtml(scoreOptionsCache, s.score);
        const grOpt = getOptionsHtml(rankOptionsCache, s.grade_rank);
        const crOpt = getOptionsHtml(rankOptionsCache, s.class_rank);

        listHtml += `
          <tr style="background-color: ${rowBackground};">
            ${index === 0 ? `<td class="genre-cell" rowspan="${rowCount}" style="background-color: ${rowBackground};">${genreName}</td>` : ''}
            <td>${sub.subject_name}</td>
            <td><select id="s_${exam.exam_id}_${sub.subject_id}">${sOpt}</select></td>
            <td><select id="gr_${exam.exam_id}_${sub.subject_id}">${grOpt}</select></td>
            <td><select id="cr_${exam.exam_id}_${sub.subject_id}">${crOpt}</select></td>
          </tr>
        `;
      });
    });

    listHtml += `
            </tbody>
          </table>
          <div class="tab-footer">
            <button type="button" class="btn-save" onclick="handleSave('${data.student.student_id}', '${exam.exam_id}', this)">
              一括保存する
            </button>
          </div>
        </div>
      </div>
    `;
  });

  listHtml += `
      </div>
    </div>
  `;

  document.getElementById('subject-list').innerHTML = listHtml;
  document.getElementById('footer').innerHTML = ``;
}

function switchExamTab(examId) {
  document.querySelectorAll('.tab-button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.examId === examId);
  });
  document.querySelectorAll('.tab-panel').forEach(panel => {
    panel.style.display = panel.dataset.examId === examId ? 'block' : 'none';
  });
}
</script>
