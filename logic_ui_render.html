<script>
/**
 * 16進数の色文字列をRGBAに変換する
 * @param {string} hex - #RRGGBB形式の色コード
 * @param {number} alpha - 透明度 (0-1)
 * @returns {string} rgba(r, g, b, a) 形式の文字列
 */
function hexToRgba(hex, alpha = 0.1) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

/**
テスト用のLine IDを使用して、サーバーから初期データを取得し、UIを構築する関数を呼び出す
*/
window.onload = function() {
  const testLineId = "U1234567890abcdef";
  google.script.run
    .withSuccessHandler(renderApp)
    .getInitialData(testLineId);
};

let scoreOptionsCache = "";
let rankOptionsCache = "";

function prepareOptions() {
  scoreOptionsCache = '<option value="">未</option>';
  for (let i = 0; i <= 100; i++) {
    scoreOptionsCache += `<option value="${i}">${i}</option>`;
  }
  rankOptionsCache = '<option value="">未</option>';
  for (let i = 1; i <= 400; i++) {
    rankOptionsCache += `<option value="${i}">${i}</option>`;
  }
}

/**
 * 受け取ったデータを元にUIを構築する関数
 * @param {Object} data - サーバーから受け取る初期データ
 */
function renderApp(data) {
  // デバッグ用ログ
  //console.log("Received data:", data);
  if (data.error) {
    document.getElementById('loading').innerText = "エラー: " + data.error;
    return;
  }

  document.getElementById('loading').style.display = "none";
  document.getElementById('app').style.display = "block";

  // 日付文字列から「年」を抽出
  const examYear = data.currentExam.start_date ? data.currentExam.start_date.split('-')[0] : '----';

  // 学年を特定（生徒情報、もしくは最初の教科から取得）
  const grade = data.student.grade || (data.subjects.length > 0 ? data.subjects[0].grade : '-');

  // ヘッダー生成
  document.getElementById('header').innerHTML = `
    <div class="exam-header-container">
      <h2 class="exam-title">${examYear}年 ${grade}年 ${data.currentExam.test_name}</h2>
      <p class="exam-subtitle">(${data.student.school_name} ${data.student.school_course_name})</p>
      <p class="student-name">生徒: ${data.student.name} さん</p>
    </div>
  `;

  // 1. 教科をジャンルごとにグループ化
  const groupedSubjects = data.subjects.reduce((acc, sub) => {
    const key = sub.genre_name;
    if (!acc[key]) acc[key] = { subjects: [], genre_id: sub.genre_id, color: sub.color };
    acc[key].subjects.push(sub);
    return acc;
  }, {});

  //console.log("Grouped subjects:", groupedSubjects); // デバッグ用ログ

  // 2. ジャンルごとにHTMLを生成
  let listHtml = "";
  for (const genreName in groupedSubjects) {
    const genre = groupedSubjects[genreName];
    const borderColor = genre.color || '#000000';
    const backgroundColor = hexToRgba(genre.color || '#f8f9fa', 0.01);
    const textColor = genre.color || '#000000';
    listHtml += `
      <div class="genre-container" style="border-color: ${borderColor}; background-color: ${backgroundColor}">
        <h3 class="genre-title" style="color: ${textColor}; border-bottom-color: ${borderColor}">${genreName}</h3>
        <div class="subject-grid">
      `;

    // ジャンル内の教科をカード形式で表示
    genre.subjects.forEach(sub => {
      const s = data.scores.find(x => x.subject_id === sub.subject_id) || {};
      
      const s0pt = scoreOptionsCache.replace(`value="${s.score}"`, `value="${s.score}" selected`);
      const gr0pt = rankOptionsCache.replace(`value="${s.grade_rank}"`, `value="${s.grade_rank}" selected`);
      const cr0pt = rankOptionsCache.replace(`value="${s.class_rank}"`, `value="${s.class_rank}" selected`);
      
      listHtml += `
        <div class="subject-card">
          <span class="subject-label">${sub.subject_name}</span>
          <div class="stack-group">
            <div class="stack-item"><span>点数</span> <select id="s_${sub.subject_id}">${s0pt}</select></div>
            <div class="stack-item"><span>学年順位</span> <select id="gr_${sub.subject_id}">${gr0pt}</select></div>
            <div class="stack-item"><span>クラス順位</span> <select id="cr_${sub.subject_id}">${cr0pt}</select></div>
          </div>
        </div>
      `;
    });
    listHtml += `</div></div>`;
  }
  document.getElementById('subject-list').innerHTML = listHtml;

  // フッター（ボタン）生成
  document.getElementById('footer').innerHTML = `
    <button id="submitBtn" class="btn-save" onclick="handleSave('${data.student.student_id}', '${data.currentExam.exam_id}')">
      一括保存する
    </button>
  `;
}

/**
 * 0〜100点、1〜400位の選択肢を生成するヘルパー関数
 */
function createOptions(start, end, selectedValue) {
  let options = '<option value="">未</option>'; // 未入力状態を許容
  for (let i = start; i <= end; i++) {
    const selected = (i == selectedValue) ? 'selected' : '';
    options += `<option value="${i}" ${selected}>${i}</option>`;
  }
  return options;
}

</script>
