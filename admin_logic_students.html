<script>
  let masterData = null; // 学校やコースのマスターデータを格納

  function formatGradeLabel(grade) {
    if (grade === 1 || grade === '1' || grade === '高1') return '高1';
    if (grade === 2 || grade === '2' || grade === '高2') return '高2';
    if (grade === 3 || grade === '3' || grade === '高3') return '高3';
    if (grade != null && grade !== '') return String(grade);
    return '未設定';
  }

  /**
   * 生徒管理セクションの読み込み
   */
  function loadSection(type) {
    const content = document.getElementById('admin-content');
    content.innerHTML = '<p>読み込み中...</p>';

    if (!masterData) {
    google.script.run.withSuccessHandler(function (json) {
      masterData = json; // マスターデータを保存;
      console.log("取得したマスターデータ:", masterData);
      if (type === 'students') {
        renderStudentManager(masterData);
      } else if (type === 'exams') {
        renderExamManager(masterData);
      } else if (type === 'patterns') {
        renderPatternManager(masterData);
      }
    }).getAdminInitialData(); // 初期データを取得してから描画
    } else {
      // 既にマスターデータがある場合はそれを使って描画
      if (type === 'students') {
        renderStudentManager(masterData);
      } else if (type === 'exams') {
        renderExamManager(masterData);
      } else if (type === 'patterns') {
        renderPatternManager(masterData);
      }
    }
  }

  const gradeOptions = ['高1', '高2', '高3'];
  let editingStudentId = null;
  let addingStudentGrade = null;

  function normalizeGradeId(grade) {
      return String(grade || '').replace(/[^-]/g, '_').replace(/[^-\w-]/g, '_');
  }

  function renderGradeRadioGroup(name, selectedGrade) {
    return gradeOptions.map(grade => {
      const checked = grade === selectedGrade ? ' checked' : '';
      return `<label style="margin-right: 8px;"><input type="radio" name="${name}" value="${grade}"${checked}> ${grade}</label>`;
    }).join('');
  }

  function renderStudentManager(data) {
    const content = document.getElementById('admin-content');

    const studentsByGrade = data.students.reduce((acc, st) => {
      const gradeKey = formatGradeLabel(st.grade);
      if (!acc[gradeKey]) acc[gradeKey] = [];
      acc[gradeKey].push(st);
      return acc;
    }, {});

    gradeOptions.forEach(grade => {
      if (!studentsByGrade[grade]) {
        studentsByGrade[grade] = [];
      }
    });

    const extraGrades = Object.keys(studentsByGrade).filter(key => !gradeOptions.includes(key)).sort();
    const gradeKeys = [...gradeOptions, ...extraGrades];

    const schoolOptionsHtml = selectedSchool => data.schools.map(s => `
            <option value="${s.school_name}"${s.school_name === selectedSchool ? ' selected' : ''}>${s.abbreviation || s.school_name}</option>`).join('');
    const courseOptionsHtml = selectedCourse => data.schoolCourses.map(c => `
            <option value="${c.school_course_id}"${c.school_course_id === selectedCourse ? ' selected' : ''}>${c.school_course_name}</option>`).join('');

    let html = `
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h3>生徒マスター管理</h3>
    </div>`;

    gradeKeys.forEach(gradeKey => {
      const students = studentsByGrade[gradeKey] || [];
      students.sort((a, b) => (String(a.student_id) || '').localeCompare(String(b.student_id) || ''));

      html += `
      <div style="margin-top: 20px;">
        <h4 style="margin-bottom: 8px;">${gradeKey}</h4>
        <table border="1" style="width:100%; border-collapse: collapse; background:white;">
          <tr style="background:#eee;">
            <th>ID</th><th>氏名</th><th>読み</th><th>学校</th><th>コース</th><th>学年</th><th>操作</th>
          </tr>`;

      students.forEach(st => {
        if (editingStudentId === String(st.student_id)) {
          html += `
          <tr id="edit-row-${st.student_id}">
            <td>${st.student_id}</td>
            <td><input type="text" class="edit-name" value="${st.name || ''}" style="width:100%;" /></td>
            <td><input type="text" class="edit-pronunciation" value="${st.pronunciation || st.reading || ''}" style="width:100%;" /></td>
            <td><select class="edit-school" style="width:100%;">${schoolOptionsHtml(st.school_name)}</select></td>
            <td><select class="edit-course" style="width:100%;">${courseOptionsHtml(st.school_course_id)}</select></td>
            <td>${renderGradeRadioGroup('edit-grade-' + st.student_id, formatGradeLabel(st.grade))}</td>
            <td>
              <button class="save-btn" onclick="saveEditedStudent('${st.student_id}')">更新</button>
              <button onclick="cancelEdit()">キャンセル</button>
            </td>
          </tr>`;
        } else {
          const school = data.schools.find(s => s.school_name === st.school_name);
          const course = data.schoolCourses.find(c => c.school_course_id === st.school_course_id);
          html += `
          <tr>
            <td>${st.student_id}</td>
            <td>${st.name}</td>
            <td>${st.pronunciation || st.reading || '-'}</td>
            <td>${school ? school.abbreviation || school.school_name : '-'}</td>
            <td>${course ? course.school_course_name : '-'}</td>
            <td>${formatGradeLabel(st.grade)}</td>
            <td>
              <button onclick="startEditStudent('${st.student_id}')">編集</button>
            </td>
          </tr>`;
        }
      });

      const normalizedGrade = normalizeGradeId(gradeKey);
      if (addingStudentGrade === gradeKey) {
        html += `
          <tr id="new-row-${normalizedGrade}">
            <td><input type="text" class="new-id" style="width:100%;" /></td>
            <td><input type="text" class="new-name" style="width:100%;" /></td>
            <td><input type="text" class="new-pronunciation" style="width:100%;" /></td>
            <td><select class="new-school" style="width:100%;">${schoolOptionsHtml('')}</select></td>
            <td><select class="new-course" style="width:100%;">${courseOptionsHtml('')}</select></td>
            <td>${gradeKey}</td>
            <td>
              <button class="save-btn" onclick="saveNewStudent('${gradeKey}')">追加</button>
              <button onclick="cancelAdd()">キャンセル</button>
            </td>
          </tr>`;
      } else {
        html += `
          <tr>
            <td colspan="7" style="text-align:center; padding:12px; background:#fafafa;">
              <button onclick="startAddStudent('${gradeKey}')" style="background:#007bff; color:white; padding:6px 12px; border:none; border-radius:3px;">+ 新規追加</button>
            </td>
          </tr>`;
      }

      html += `
        </table>
      </div>`;
    });

    content.innerHTML = html;
  }

  function startEditStudent(studentId) {
    editingStudentId = String(studentId);
    addingStudentGrade = null;
    renderStudentManager(masterData);
  }

  function cancelEdit() {
    editingStudentId = null;
    renderStudentManager(masterData);
  }

  function startAddStudent(grade) {
    addingStudentGrade = grade;
    editingStudentId = null;
    renderStudentManager(masterData);
  }

  function cancelAdd() {
    addingStudentGrade = null;
    renderStudentManager(masterData);
  }

  function saveEditedStudent(studentId) {
    const row = document.getElementById('edit-row-' + studentId);
    if (!row) return;

    const name = row.querySelector('.edit-name').value.trim();
    const reading = row.querySelector('.edit-pronunciation').value.trim();
    const schoolId = row.querySelector('.edit-school').value;
    const courseId = row.querySelector('.edit-course').value;
    const grade = row.querySelector('input[name="edit-grade-' + studentId + '"]:checked')?.value;

    if (!name || !schoolId || !courseId || !grade) {
      showMessage('全ての項目を入力してください', 'error');
      return;
    }

    const btn = row.querySelector('.save-btn');
    if (btn) btn.disabled = true;

    const studentData = {
      student_id: studentId,
      name: name,
      pronunciation: reading,
      school_name: schoolId,
      school_course_id: courseId,
      grade: grade
    };

    google.script.run
      .withSuccessHandler(function (response) {
        if (btn) btn.disabled = false;
        if (response.success) {
          showMessage('生徒情報が正常に更新されました。', 'success');
          const index = masterData.students.findIndex(s => s.student_id === studentData.student_id);
          if (index !== -1) {
            masterData.students[index] = studentData;
          } else {
            masterData.students.push(studentData);
          }
          editingStudentId = null;
          renderStudentManager(masterData);
        } else {
          showMessage(response.error, 'error');
        }
      })
      .updateStudentMaster(studentData);
  }

  function saveNewStudent(grade) {
    const normalizedGrade = normalizeGradeId(grade);
    const row = document.getElementById('new-row-' + normalizedGrade);
    if (!row) return;

    const studentId = row.querySelector('.new-id').value.trim();
    const name = row.querySelector('.new-name').value.trim();
    const pronunciation = row.querySelector('.new-pronunciation').value.trim();
    const schoolId = row.querySelector('.new-school').value;
    const courseId = row.querySelector('.new-course').value;

    if (!studentId || !name || !schoolId || !courseId) {
      showMessage('全ての項目を入力してください', 'error');
      return;
    }

    const btn = row.querySelector('.save-btn');
    if (btn) btn.disabled = true;

    const studentData = {
      student_id: studentId,
      name: name,
      pronunciation: pronunciation,
      school_name: schoolId,
      school_course_id: courseId,
      grade: grade
    };

    google.script.run
      .withSuccessHandler(function (response) {
        if (btn) btn.disabled = false;
        if (response.success) {
          showMessage('生徒情報が正常に追加されました。', 'success');
          masterData.students.push(studentData);
          addingStudentGrade = null;
          renderStudentManager(masterData);
        } else {
          showMessage(response.error, 'error');
        }
      })
      .updateStudentMaster(studentData);
  }

</script>
