name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Create config.js from secrets
        env:
          LIFF_ID: ${{ secrets.LIFF_ID }}
          GAS_URL: ${{ secrets.GAS_URL }}
        run: |
          echo "const LIFF_ID = '${LIFF_ID}';" >  docs/config.js
          echo "const GAS_URL  = '${GAS_URL}';" >> docs/config.js

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - id: deployment
        uses: actions/deploy-pages@v4
