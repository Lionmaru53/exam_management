<!doctype html>
<html>

<head>
  <base target="_top" />
  <?!= include('common_stylesheet'); ?>
  <?!= include('admin_stylesheet'); ?>
</head>

<body>
  <div id="status-message"></div>

  <div id="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-label" id="loading-label">読み込み中...</div>
  </div>

  <div id="admin-top-bar">
    <div id="admin-header" class="admin-header">
      <div class="admin-header-left-wrap">
        <div class="admin-header-left admin-header-home" onclick="loadSection('dashboard')" title="ダッシュボードへ">
          <div class="admin-header-logo" id="admin-header-logo">
            <img src="https://www.wasedazemi.com/assets/img/logo-white.svg" alt="ロゴ">
          </div>
          <span class="admin-header-title">定期テスト回収システム</span>
        </div>
        <div class="demo-btn-wrap" id="demo-btn-wrap">
          <button class="demo-trigger-btn" onclick="toggleDemoDropdown(event)">生徒入力画面デモ ▾</button>
          <div class="demo-dropdown" id="demo-dropdown" style="display:none;">
            <button class="demo-dropdown-item" onclick="openDemoScreen('first_g1')">初回画面（高1）</button>
            <button class="demo-dropdown-item" onclick="openDemoScreen('first_g2')">初回画面（高2）</button>
            <button class="demo-dropdown-item" onclick="openDemoScreen('returning')">2回目以降画面</button>
          </div>
        </div>
      </div>
      <div class="admin-header-right">
        <div id="admin-header-name" class="admin-header-name"></div>
        <div id="admin-header-email" class="admin-header-email"></div>
        <span class="admin-version-badge"><?!= appVersion ?> <span class="admin-build-tag">(build <?!= gasBuild.replace('v','') ?>)</span></span>
      </div>
    </div>
    <nav class="admin-nav" id="admin-nav"></nav>
  </div>

  <div id="admin-content">
    <h3>読み込み中...</h3>
  </div>

  <div id="pattern-modal" class="modal-backdrop" onclick="if (event.target === this) closeModal()">
    <div class="modal-card"></div>
  </div>

  <div id="score-detail-modal" class="modal-backdrop" style="display:none" onclick="if (event.target === this) _scCloseDetail()">
    <div class="modal-card"></div>
  </div>

  <div id="sc-student-modal" class="modal-backdrop" style="display:none" onclick="if(event.target===this)_scCloseStudentModal()">
    <div class="modal-card" style="max-width:860px;width:95vw;max-height:90vh;display:flex;flex-direction:column;padding:0;overflow:hidden;">
      <div id="sc-student-modal-header" style="padding:16px 20px;border-bottom:1px solid #e5e5ea;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
        <strong id="sc-student-modal-title" style="font-size:1rem;"></strong>
        <button onclick="_scCloseStudentModal()" style="background:none;border:none;font-size:1.4rem;cursor:pointer;color:#8e8e93;padding:0 4px;">×</button>
      </div>
      <div style="display:flex;flex:1;overflow:hidden;">
        <div id="sc-student-modal-left" style="flex:1;overflow-y:auto;padding:16px;border-right:1px solid #e5e5ea;"></div>
        <div id="sc-student-modal-right" style="width:280px;flex-shrink:0;padding:16px;display:flex;flex-direction:column;align-items:center;gap:12px;overflow-y:auto;"></div>
      </div>
      <div style="padding:12px 20px;border-top:1px solid #e5e5ea;display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;">
        <button class="btn-cancel-admin" onclick="_scCloseStudentModal()">キャンセル</button>
        <button class="btn-save-admin" onclick="_scSaveStudentModal()">保存する</button>
      </div>
    </div>
  </div>

  <?!= include('common_showMessage'); ?>
  <?!= include('common_genre_colors'); ?>
  <?!= include('admin_logic_dashboard'); ?>
  <?!= include('admin_logic_exams'); ?>
  <?!= include('admin_logic_patterns'); ?>
  <?!= include('admin_logic_import'); ?>
  <?!= include('admin_logic_admin_users'); ?>
  <?!= include('admin_logic_branches'); ?>
  <?!= include('admin_logic_bugs'); ?>
  <?!= include('admin_logic_subject_master'); ?>
  <?!= include('admin_logic_announcements'); ?>
  <?!= include('admin_logic_students'); ?>
  <?!= include('admin_logic_scores'); ?>
  <?!= include('admin_logic_demo'); ?>

  <script>
    window.masterData     = {};
    window.adminContext   = { role: '', cram_id: '', email: '' };
    window.currentSection = 'dashboard';
    window.selectedCramId = '';  // 操作対象の校舎 cram_id

    var _loadingMsgTimer = null;

    // ---- ローディング ----
    window.setLoading = function (active, messages, intervalMs) {
      const overlay = document.getElementById('loading-overlay');
      const label   = document.getElementById('loading-label');
      if (!overlay) return;

      if (_loadingMsgTimer) {
        clearInterval(_loadingMsgTimer);
        _loadingMsgTimer = null;
      }

      if (active) {
        const msgs = Array.isArray(messages) ? messages : [messages || '処理中...'];
        if (label) label.textContent = msgs[0];
        overlay.classList.add('active');

        if (msgs.length > 1) {
          var idx = 0;
          _loadingMsgTimer = setInterval(function () {
            idx = Math.min(idx + 1, msgs.length - 1);
            if (label) label.textContent = msgs[idx];
          }, intervalMs || 2500);
        }
      } else {
        overlay.classList.remove('active');
      }
    };

    // ---- ナビゲーション ----
    function _renderNav(role) {
      const tabs = [
        { section: 'dashboard', label: 'トップ' },
        { section: 'students',  label: '①生徒一覧' },
        { section: 'scores',    label: '②得点一覧' },
        { section: 'patterns',  label: '③試験管理' },
        { section: 'exams',     label: '④日程管理' },
        { section: 'import',    label: '⑤生徒インポート' }
      ];
      const nav = document.getElementById('admin-nav');
      let navHtml = '<div class="admin-nav-row">'
        + '<div id="branch-selector-wrap" class="branch-selector-nav"></div>'
        + tabs.map(t =>
            `<button data-section="${t.section}" onclick="loadSection('${t.section}')">${t.label}</button>`
          ).join('')
        + '</div>';
      if (role === 'master') {
        const masterTabs = [
          { section: 'announcements', label: 'お知らせ管理' },
          { section: 'bugReports',    label: '不具合報告' },
          { section: 'adminUsers',    label: '管理者管理' },
          { section: 'branches',      label: '校舎管理' },
          { section: 'subjectMaster', label: '科目管理' }
        ];
        navHtml += '<div class="admin-nav-row admin-nav-row--sub">'
          + masterTabs.map(t =>
              `<button data-section="${t.section}" onclick="loadSection('${t.section}')">${t.label}</button>`
            ).join('')
          + '</div>';
      }
      nav.innerHTML = navHtml;
      nav.style.display = 'flex';
      document.getElementById('admin-content').style.display = '';

      // ヘッダーにログイン情報を反映
      const ctx = window.adminContext;
      const headerEl    = document.getElementById('admin-header');
      const headerName  = document.getElementById('admin-header-name');
      const headerEmail = document.getElementById('admin-header-email');
      if (headerName)  headerName.textContent  = ctx.name  || '';
      if (headerEmail) headerEmail.textContent = ctx.email || '';
      if (headerEl)    headerEl.style.display  = 'flex';

    }

    // ---- データ取得 ----
    window.refreshMasterData = function (callback) {
      google.script.run
        .withSuccessHandler(function (data) {
          if (data && !data.error) {
            window.masterData     = data;
            window.adminContext   = data.adminContext   || window.adminContext;
            window.selectedCramId = data.selectedCramId || window.selectedCramId;
            _renderNav(window.adminContext.role);
            _renderBranchSelector();
            if (typeof callback === 'function') callback();
          } else {
            var content = document.getElementById('admin-content');
            var msg = (data && data.error) || 'データの取得に失敗しました。';
            if (content) {
              var p = document.createElement('p');
              p.style.cssText = 'padding:32px; color:#c00;';
              p.textContent = msg;
              content.innerHTML = '';
              content.appendChild(p);
            }
          }
          setLoading(false);
        })
        .withFailureHandler(function (err) {
          const msg = (err && err.message) ? err.message : JSON.stringify(err);
          console.error('[refreshMasterData] failure:', err);
          showMessage('エラー: ' + msg, 'error');
          setLoading(false);
        })
        .getAdminInitialData(window.selectedCramId);
    };

    // ---- 校舎セレクター（master / branch_admin 全員に表示）----
    function _renderBranchSelector() {
      const el   = document.getElementById('branch-selector-wrap');
      if (!el) return;
      const role = window.adminContext.role;
      if (role !== 'master' && role !== 'branch_admin') { el.innerHTML = ''; return; }

      const branches = Array.isArray(window.masterData.branches) ? window.masterData.branches : [];
      const activeBranches = branches.filter(b =>
        b.is_active === true || String(b.is_active) === '1' || String(b.is_active) === 'true'
      );

      let html = '<label class="branch-selector-label">校舎:</label>';
      html += '<select id="branch-select" class="branch-selector-select" onchange="_onBranchChange()">';
      html += '<option value="">— 選択 —</option>';
      activeBranches.forEach(b => {
        const selected = window.selectedCramId === b.cram_id ? 'selected' : '';
        html += `<option value="${b.cram_id}" ${selected}>${b.branch_name || b.cram_id}</option>`;
      });
      html += '</select>';
      el.innerHTML = html;
    }

    window._onBranchChange = function () {
      const sel = document.getElementById('branch-select');
      window.selectedCramId = sel ? sel.value : '';
      setLoading(true, '読み込み中...');
      window.refreshMasterData(() => window.loadSection(window.currentSection));
    };

    // ---- セクション切り替え ----
    window.loadSection = function (section) {
      const valid = ['students', 'scores', 'patterns', 'exams', 'import', 'adminUsers', 'branches', 'dashboard', 'bugReports', 'subjectMaster', 'announcements'];
      window.currentSection = valid.includes(section) ? section : 'students';

      const overlay = document.getElementById('loading-overlay');
      const content = document.getElementById('admin-content');
      if (overlay && overlay.classList.contains('active')) {
        window.renderSection(window.currentSection);
        return;
      }
      if (content) content.classList.add('section-fading');
      setTimeout(function () {
        window.renderSection(window.currentSection);
        if (content) content.classList.remove('section-fading');
      }, 120);
    };

    window.renderSection = function (section) {
      // アクティブタブを更新
      document.querySelectorAll('.admin-nav button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.section === section);
      });

      const renderers = {
        dashboard:  function () { window.renderDashboardManager(); },
        patterns:   function () { window.renderPatternManager(window.masterData); },
        exams:      function () { window.renderExamManager(window.masterData); },
        scores:     function () { window.renderScoreManager(); },
        students:   function () { window.renderStudentManager(); },
        import:     function () { window.renderImportManager(); },
        adminUsers:    function () { window.renderAdminUserManager(); },
        branches:      function () { window.renderBranchManager(); },
        bugReports:    function () { window.renderBugReportManager(); },
        subjectMaster: function () { window.renderSubjectMasterManager(); },
        announcements: function () { window.renderAnnouncementManager(); }
      };
      (renderers[section] || renderers.students)();
    };

    // ---- 学校名表示ヘルパー（「高等学校」「高校」サフィックスを除去）----
    window._shortSchoolName = function (name) {
      return (name || '').replace(/(高等学校|高校)$/, '').trim();
    };

    // ---- 教科表示名ヘルパー ----
    window._resolveDisplayName = function (schoolName, subjectId) {
      const aliases = (window.masterData && window.masterData.schoolSubjectAliases) || [];
      const hit = aliases.find(function (a) {
        return a.school_name === schoolName && a.subject_id === subjectId;
      });
      if (hit && hit.display_name) return hit.display_name;
      const subj = ((window.masterData && window.masterData.subjects) || [])
        .find(function (s) { return s.subject_id === subjectId; });
      return subj ? subj.subject_name : subjectId;
    };

    window.closeModal = function () {
      const modal = document.getElementById('pattern-modal');
      if (modal) modal.style.display = 'none';
    };

    // ページロード時に自動でデータ取得
    setLoading(true, '管理画面を準備中...');
    window.refreshMasterData(function() { window.loadSection('dashboard'); });
  </script>
</body>

</html>
