<style>

  #loading-overlay {
    display: none;
    position: fixed;

    z-index: 9000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    animation: overlay-fade-in 0.18s ease forwards;
  }

    display: flex;
  }
  @keyframes overlay-fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* スピナー */
  .loading-spinner {
    width: 46px;
    height: 46px;
    border: 5px solid #e0e0e0;
    border-top-color: #007bff;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-label {
    font-size: 0.88rem;
    font-weight: bold;
    color: #555;
    letter-spacing: 0.04em;
  }

  /* コンテンツのタブ切り替えフェード */
  #admin-content {
    transition: opacity 0.12s ease;
  }
  #admin-content.section-fading {
    opacity: 0;
    pointer-events: none;
  }

  /* 処理中のボタン全般 */
  .admin-loading button,
  .admin-loading input {
    pointer-events: none;
    opacity: 0.55;
  }
