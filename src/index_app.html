<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <?!= include('common_stylesheet'); ?>
  <?!= include('app_stylesheet'); ?>
  <?!= include('common_showMessage'); ?>
</head>
<body>
  <? if (isDemoMode) { ?>
  <div class="demo-banner">📋 デモモード — 入力・保存は実際のデータに反映されません</div>
  <? } ?>
  <div id="status-message"></div>
  <div id="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-label" id="loading-label">読み込み中...</div>
  </div>
  <div id="ann-overlay" class="ann-overlay" onclick="closeAnnouncementPanel()"></div>
  <div id="ann-panel" class="ann-panel" role="dialog" aria-label="お知らせ">
    <div class="ann-panel-header">
      <span class="ann-panel-title">お知らせ</span>
      <button class="ann-panel-close" onclick="closeAnnouncementPanel()" aria-label="閉じる">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="ann-list" class="ann-list"></div>
  </div>
  <div id="app">
    <header id="header"></header>
    <main id="subject-list"></main>
    <footer id="footer"></footer>
  </div>

  <?!= include('common_genre_colors'); ?>
  <?!= include('logic_ui_render'); ?>
  <?!= include('logic_ui_action'); ?>
  <?!= include('logic_ui_upload'); ?>

  <script>
    window._APP_VERSION = '<?!= appVersion ?>';
    window._GAS_BUILD   = '<?!= gasBuild ?>';
    window.onload = function() {
      renderApp(<?!= appData ?>);
    };
  </script>

  <div id="dirty-bar" class="dirty-bar" role="alert">
    <p class="dirty-bar-msg">入力が終わったら必ず保存してください</p>
    <div class="dirty-bar-actions">
      <button class="dirty-bar-btn dirty-bar-cancel" onclick="cancelEdits()">取り消す</button>
      <button class="dirty-bar-btn dirty-bar-save" onclick="saveCurrentTab()">保存する</button>
    </div>
  </div>
  <div id="menu-overlay" class="menu-overlay" onclick="closeMenuPanel()"></div>
  <div id="menu-panel" class="menu-panel" role="dialog" aria-label="メニュー">
    <div class="menu-panel-header">
      <span class="menu-panel-title">メニュー</span>
      <button class="menu-panel-close" onclick="closeMenuPanel()" aria-label="閉じる">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="menu-panel-content" class="menu-panel-content"></div>
  </div>
  <nav id="bottom-nav" role="navigation" aria-label="メインメニュー">
    <button class="bottom-nav-item active" onclick="bottomNavGoScores()" id="bnav-scores">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      <span>得点入力</span>
    </button>
    <button class="bottom-nav-item" onclick="bottomNavGoPhotos()" id="bnav-photos">
      <span class="bnav-icon-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <span class="photo-nav-badge" id="photo-nav-badge" style="display:none"></span>
      </span>
      <span>成績表画像</span>
    </button>
    <button class="bottom-nav-item" onclick="toggleAnnouncementPanel()" id="bnav-ann">
      <span class="bnav-icon-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </span>
      <span>お知らせ</span>
    </button>
    <button class="bottom-nav-item" onclick="toggleMenuPanel()" id="bnav-menu">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
      <span>メニュー</span>
    </button>
  </nav>
</body>
</html>
