<script>
// ---- 状態変数 ----
var _exYear      = new Date().getFullYear();
var _exMonth     = new Date().getMonth() + 1;
var _exActiveTab = '';
var _exRowStore  = [];  // [{ school }] — onclick インデックス用
var _exDragState = null; // { rowIdx, startDate, endDate } | null
var _exPeriodMap = {};   // "school||termTestId||year" → { startDate, endDate }

// ---- エントリーポイント ----

function renderExamManager(masterData) {
  _exBuildPeriodMap(masterData);
  if (!_exActiveTab) {
    var tt = masterData.termTests || [];
    if (tt.length > 0) _exActiveTab = String(tt[0].term_test_id || '').trim();
  }
  _exRerender(masterData);
  if (!_exGlobalListenerAttached) {
    document.addEventListener('mouseup', _exMouseup);
    _exGlobalListenerAttached = true;
  }
}

var _exGlobalListenerAttached = false;

window.renderExamManager = renderExamManager;

// ---- キャッシュ構築 ----

function _exBuildPeriodMap(masterData) {
  _exPeriodMap = {};
  var periods = masterData.examPeriods || [];
  periods.forEach(function(p) {
    if (p.school_course || p.grade || p.sub_course) return; // school-level 以外はスキップ
    var key = String(p.school_name || '').trim()
            + '||' + String(p.term_test_id || '').trim()
            + '||' + String(p.year || '');
    _exPeriodMap[key] = { startDate: String(p.start_date || ''), endDate: String(p.end_date || '') };
  });
}

// ---- 再描画 ----

function _exRerender(masterData) {
  var content = document.getElementById('admin-content');
  if (!content) return;
  content.innerHTML = _exBuildHtml(masterData);
}

function _exBuildHtml(masterData) {
  var termTests = masterData.termTests || [];
  var patterns  = masterData.patterns  || [];

  // 学校名一覧（patterns から）
  var schoolSet = {};
  patterns.forEach(function(p) {
    var sn = String(p.school_name || '').trim();
    if (sn) schoolSet[sn] = true;
  });
  var schools = Object.keys(schoolSet);

  var html = '<h3>試験日程管理</h3>';
  html += '<p class="tab-desc">'
       + '試験区分を選択し、学校ごとの実施期間をドラッグで設定します。'
       + '<span id="ex-save-ind" class="ex-save-ind"></span>'
       + '</p>';

  if (termTests.length === 0) {
    html += '<p class="ex-empty">試験区分が登録されていません（term_tests_master シートを確認してください）。</p>';
    return html;
  }

  if (schools.length === 0) {
    html += '<p class="ex-empty">学校が登録されていません（生徒インポートまたはパターン管理から追加してください）。</p>';
    return html;
  }

  // ---- タブ ----
  html += '<div class="ex-tab-bar">';
  termTests.forEach(function(tt) {
    var tid     = String(tt.term_test_id || '').trim();
    var label   = String(tt.test_name   || tid);
    var isActive = tid === _exActiveTab;
    html += '<button class="ex-tab' + (isActive ? ' ex-tab-active' : '') + '"'
          + ' onclick="_exSelectTab(\'' + tid + '\')">'
          + _esc(label) + '</button>';
  });
  html += '</div>';

  // ---- 月ナビゲーション ----
  var yearSel = '<select id="ex-year-sel" onchange="_exChangeYear()">';
  var curYear = new Date().getFullYear();
  for (var y = curYear - 1; y <= curYear + 2; y++) {
    yearSel += '<option value="' + y + '"' + (y === _exYear ? ' selected' : '') + '>' + y + '年</option>';
  }
  yearSel += '</select>';

  html += '<div class="ex-month-nav">'
        + yearSel
        + '<button class="ex-nav-btn" onclick="_exPrevMonth()">&#8592;</button>'
        + '<span class="ex-month-label">' + _exYear + '年' + _exMonth + '月</span>'
        + '<button class="ex-nav-btn" onclick="_exNextMonth()">&#8594;</button>'
        + '</div>';

  // ---- 表示日付列の構築（前月末7日 + 当月全日 + 翌月頭7日）----
  var dates = _exGetDisplayDates();

  // ---- ガントテーブル ----
  _exRowStore = [];

  html += '<div class="ex-gantt-scroll">';
  html += '<table class="ex-gantt-table" id="ex-gantt-table">';

  // ヘッダー行1: 日付
  html += '<thead>';
  html += '<tr>';
  html += '<th class="ex-gantt-label ex-gantt-header-label"></th>';
  dates.forEach(function(d) {
    var isAdj = _exIsAdjacentMonth(d);
    var isWE  = _exIsWeekend(d);
    var day   = parseInt(d.split('-')[2], 10);
    var cls   = 'ex-gantt-hd-cell'
              + (isAdj ? ' ex-gantt-adj' : '')
              + (isWE  ? ' ex-gantt-weekend' : '');
    html += '<th class="' + cls + '">' + day + '</th>';
  });
  html += '<th class="ex-gantt-act-header"></th>';
  html += '</tr>';

  // ヘッダー行2: 曜日
  var DOW = ['日','月','火','水','木','金','土'];
  html += '<tr>';
  html += '<th class="ex-gantt-label ex-gantt-header-label"></th>';
  dates.forEach(function(d) {
    var isAdj = _exIsAdjacentMonth(d);
    var isWE  = _exIsWeekend(d);
    var dow   = new Date(d).getDay();
    var cls   = 'ex-gantt-dow-cell'
              + (isAdj ? ' ex-gantt-adj' : '')
              + (isWE  ? ' ex-gantt-weekend' : '');
    html += '<th class="' + cls + '">' + DOW[dow] + '</th>';
  });
  html += '<th class="ex-gantt-act-header"></th>';
  html += '</tr>';
  html += '</thead>';

  // データ行
  html += '<tbody>';
  schools.forEach(function(school) {
    var rowIdx = _exRowStore.push({ school: school }) - 1;
    var key    = school + '||' + _exActiveTab + '||' + _exYear;
    var period = _exPeriodMap[key] || null;

    html += '<tr class="ex-gantt-row" id="ex-row-' + rowIdx + '">';
    html += '<td class="ex-gantt-label ex-gantt-school-label">' + _esc(_shortSchoolName(school)) + '</td>';

    dates.forEach(function(d) {
      var isFilled  = period && d >= period.startDate && d <= period.endDate;
      var isPreview = false;
      if (_exDragState && _exDragState.rowIdx === rowIdx) {
        var ds = _exDragState.startDate <= _exDragState.endDate ? _exDragState.startDate : _exDragState.endDate;
        var de = _exDragState.startDate <= _exDragState.endDate ? _exDragState.endDate   : _exDragState.startDate;
        isPreview = d >= ds && d <= de;
      }
      var isAdj = _exIsAdjacentMonth(d);
      var isWE  = _exIsWeekend(d);
      var cls   = 'ex-gantt-cell'
                + (isFilled  ? ' ex-gantt-filled'  : '')
                + (isPreview ? ' ex-gantt-preview'  : '')
                + (isAdj     ? ' ex-gantt-adj'      : '')
                + (isWE      ? ' ex-gantt-weekend'  : '');
      html += '<td class="' + cls + '"'
            + ' onmousedown="return _exMousedown(' + rowIdx + ',\'' + d + '\')"'
            + ' onmouseover="_exMouseover(' + rowIdx + ',\'' + d + '\')">'
            + '</td>';
    });

    // × ボタン
    html += '<td class="ex-gantt-act-cell">';
    if (period) {
      html += '<button class="ex-clear-btn" onclick="_exClearPeriod(' + rowIdx + ')" title="期間を削除">&#215;</button>';
    }
    html += '</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  return html;
}

// ---- 日付ユーティリティ ----

function _exGetDisplayDates() {
  var dates       = [];
  var daysInMonth = new Date(_exYear, _exMonth, 0).getDate();

  // 前月末7日
  for (var d = 7; d >= 1; d--) {
    var dt = new Date(_exYear, _exMonth - 1, 1 - d);
    dates.push(_exFmtDate(dt));
  }
  // 当月全日
  for (var i = 1; i <= daysInMonth; i++) {
    dates.push(_exFmtDate(new Date(_exYear, _exMonth - 1, i)));
  }
  // 翌月頭7日
  for (var j = 1; j <= 7; j++) {
    var dt2 = new Date(_exYear, _exMonth - 1, daysInMonth + j);
    dates.push(_exFmtDate(dt2));
  }
  return dates;
}

function _exFmtDate(dt) {
  var y = dt.getFullYear();
  var m = dt.getMonth() + 1;
  var d = dt.getDate();
  return y + '-' + (m < 10 ? '0' + m : m) + '-' + (d < 10 ? '0' + d : d);
}

function _exIsAdjacentMonth(dateStr) {
  var parts = dateStr.split('-');
  return parseInt(parts[1], 10) !== _exMonth;
}

function _exIsWeekend(dateStr) {
  var dow = new Date(dateStr).getDay();
  return dow === 0 || dow === 6;
}

// ---- タブ切り替え・月ナビ ----

function _exSelectTab(termTestId) {
  _exActiveTab = termTestId;
  _exRerender(window.masterData);
}

function _exChangeYear() {
  var sel = document.getElementById('ex-year-sel');
  if (sel) _exYear = parseInt(sel.value, 10);
  _exRerender(window.masterData);
}

function _exPrevMonth() {
  _exMonth--;
  if (_exMonth < 1) { _exMonth = 12; _exYear--; }
  _exRerender(window.masterData);
}

function _exNextMonth() {
  _exMonth++;
  if (_exMonth > 12) { _exMonth = 1; _exYear++; }
  _exRerender(window.masterData);
}

// ---- ドラッグ操作 ----

function _exMousedown(rowIdx, dateStr) {
  _exDragState = { rowIdx: rowIdx, startDate: dateStr, endDate: dateStr };
  _exUpdatePreview();
  return false; // テキスト選択を防止
}

function _exMouseover(rowIdx, dateStr) {
  if (!_exDragState || _exDragState.rowIdx !== rowIdx) return;
  _exDragState.endDate = dateStr;
  _exUpdatePreview();
}

function _exMouseup() {
  if (!_exDragState) return;
  var ds     = _exDragState.startDate <= _exDragState.endDate ? _exDragState.startDate : _exDragState.endDate;
  var de     = _exDragState.startDate <= _exDragState.endDate ? _exDragState.endDate   : _exDragState.startDate;
  var rowIdx = _exDragState.rowIdx;
  _exDragState = null;
  _exSavePeriod(rowIdx, ds, de);
}

function _exUpdatePreview() {
  if (!_exDragState) return;
  var rowIdx = _exDragState.rowIdx;
  var ds = _exDragState.startDate <= _exDragState.endDate ? _exDragState.startDate : _exDragState.endDate;
  var de = _exDragState.startDate <= _exDragState.endDate ? _exDragState.endDate   : _exDragState.startDate;

  var row = document.getElementById('ex-row-' + rowIdx);
  if (!row) return;

  row.querySelectorAll('.ex-gantt-cell').forEach(function(cell) {
    var onmd = cell.getAttribute('onmousedown') || '';
    var m    = onmd.match(/'(\d{4}-\d{2}-\d{2})'/);
    if (!m) return;
    var d = m[1];
    if (d >= ds && d <= de) {
      cell.classList.add('ex-gantt-preview');
    } else {
      cell.classList.remove('ex-gantt-preview');
    }
  });
}

// ---- 保存 ----

function _exSavePeriod(rowIdx, startDate, endDate) {
  var row = _exRowStore[rowIdx];
  if (!row) return;
  _exDoSave(row.school, startDate, endDate);
}

function _exClearPeriod(rowIdx) {
  var row = _exRowStore[rowIdx];
  if (!row) return;
  _exDoSave(row.school, null, null);
}

function _exDoSave(school, startDate, endDate) {
  var ind = document.getElementById('ex-save-ind');
  if (ind) ind.textContent = '　保存中...';

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        if (ind) ind.textContent = '　保存済み';
        window.refreshMasterData(function() {
          _exBuildPeriodMap(window.masterData);
          _exRerender(window.masterData);
        });
      } else {
        if (ind) ind.textContent = '　保存失敗';
        showMessage((res && res.error) || '保存に失敗しました。', 'error');
      }
    })
    .withFailureHandler(function(err) {
      if (ind) ind.textContent = '　保存失敗';
      showMessage('エラー: ' + (err && err.message ? err.message : JSON.stringify(err)), 'error');
    })
    .saveSchoolExamPeriod(window.selectedCramId || '', {
      schoolName: school,
      termTestId: _exActiveTab,
      year:       _exYear,
      startDate:  startDate || null,
      endDate:    endDate   || null
    });
}
</script>

<style>
  /* タブ */
  .ex-tab-bar { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
  .ex-tab {
    padding: 5px 14px; border: 1px solid #b0bfda; border-radius: 4px;
    background: #f5f7fa; color: #3a5a8c; cursor: pointer; font-size: 0.88em;
  }
  .ex-tab:hover    { background: #e8eef6; }
  .ex-tab-active   { background: #4a7fc1; color: #fff; border-color: #4a7fc1; font-weight: bold; }

  /* 月ナビ */
  .ex-month-nav {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 12px; font-size: 0.95em;
  }
  .ex-nav-btn {
    padding: 4px 10px; border: 1px solid #b0bfda; border-radius: 4px;
    background: #f5f7fa; cursor: pointer; font-size: 1em;
  }
  .ex-nav-btn:hover { background: #e8eef6; }
  .ex-month-label { font-weight: bold; min-width: 80px; text-align: center; }

  /* 保存インジケーター */
  .ex-save-ind { font-size: 0.85em; color: #888; }

  /* ガントスクロールエリア */
  .ex-gantt-scroll {
    overflow-x: auto;
    border: 1px solid #dde3ec;
    border-radius: 6px;
    max-height: 70vh;
    overflow-y: auto;
  }
  .ex-gantt-table {
    border-collapse: collapse;
    white-space: nowrap;
  }

  /* 固定列（学校名） */
  .ex-gantt-label {
    position: sticky;
    left: 0;
    background: #fff;
    z-index: 2;
    min-width: 130px;
    max-width: 180px;
    border-right: 2px solid #c8d4e8;
    padding: 4px 8px;
    font-size: 0.88em;
  }
  .ex-gantt-header-label { background: #f0f4f9; font-weight: bold; }
  .ex-gantt-school-label { font-weight: 600; color: #2c4a7c; }

  /* ヘッダーセル（日付・曜日） */
  .ex-gantt-hd-cell, .ex-gantt-dow-cell {
    min-width: 24px; width: 24px;
    text-align: center;
    font-size: 0.75em;
    padding: 2px 0;
    border: 1px solid #e4e8f0;
    background: #f0f4f9;
    user-select: none;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .ex-gantt-dow-cell { top: 22px; }

  /* データセル */
  .ex-gantt-cell {
    min-width: 24px; width: 24px; height: 26px;
    border: 1px solid #e8eaf0;
    cursor: crosshair;
    user-select: none;
  }
  .ex-gantt-cell:hover { background: #dce6f4 !important; }

  /* 状態クラス */
  .ex-gantt-filled  { background: #4a7fc1; }
  .ex-gantt-preview { background: #90b8e8; }
  .ex-gantt-adj     { background: #f2f2f2; }
  .ex-gantt-adj.ex-gantt-filled  { background: #7aaad8; }
  .ex-gantt-adj.ex-gantt-preview { background: #a8c8ec; }
  .ex-gantt-weekend { opacity: 0.7; }

  /* × ボタン列（右端固定） */
  .ex-gantt-act-header, .ex-gantt-act-cell {
    position: sticky; right: 0; background: #fff; z-index: 2;
    min-width: 32px; text-align: center;
    border-left: 1px solid #dde3ec;
  }
  .ex-gantt-act-header { background: #f0f4f9; }
  .ex-clear-btn {
    background: none; border: none; color: #c00; cursor: pointer;
    font-size: 1.1em; padding: 0 4px; line-height: 1;
  }
  .ex-clear-btn:hover { color: #900; }

  .ex-gantt-row:hover .ex-gantt-school-label { background: #f5f8ff; }

  .ex-empty { color: #888; padding: 24px 0; }
</style>
