<script>
/**
 * 保存ボタンがクリックされたときの処理
 * @param {string} studentId  - 生徒ID
 * @param {string} examId     - 試験ID（未設定の場合は空文字）
 * @param {string} patternId  - パターンID（examId がない場合に使用）
 * @param {string} displayKey - input 要素の ID プレフィックスキー
 */
function handleSave(studentId, examId, patternId, displayKey, btn) {
  const button = btn || document.getElementById('submitBtn');
  const panel  = button ? button.closest('.tab-panel') : document;
  const scores = [];
  const scorePrefix = `s_${displayKey}_`;

  // 得点・順位を収集しながらバリデーション
  let validationError = null;

  panel.querySelectorAll(`input[id^="${scorePrefix}"]`).forEach(el => {
    if (validationError) return;

    const subId        = el.id.slice(scorePrefix.length);
    const scoreVal     = el.value.trim();
    const gradeRankVal = (panel.querySelector(`#gr_${displayKey}_${subId}`)?.value || '').trim();
    const classRankVal = (panel.querySelector(`#cr_${displayKey}_${subId}`)?.value || '').trim();

    // 点数：0〜200 の整数（空欄は未入力として許可）
    if (scoreVal !== '') {
      const n = Number(scoreVal);
      if (!Number.isInteger(n) || n < 0 || n > 200) {
        validationError = '点数は 0〜200 の整数で入力してください。';
        return;
      }
    }

    // 学年順位・クラス順位：1 以上の整数（空欄は未入力として許可）
    if (gradeRankVal !== '') {
      const n = Number(gradeRankVal);
      if (!Number.isInteger(n) || n < 1) {
        validationError = '学年順位は 1 以上の整数で入力してください。';
        return;
      }
    }
    if (classRankVal !== '') {
      const n = Number(classRankVal);
      if (!Number.isInteger(n) || n < 1) {
        validationError = 'クラス順位は 1 以上の整数で入力してください。';
        return;
      }
    }

    scores.push({
      subject_id: subId,
      score:      scoreVal,
      grade_rank: gradeRankVal,
      class_rank: classRankVal
    });
  });

  if (validationError) {
    showMessage(validationError, 'error');
    return;
  }

  button.disabled = true;
  setLoading(true, ['得点データを保存中...', 'シートに書き込み中...', 'もうしばらくお待ちください...']);

  google.script.run
    .withSuccessHandler(function(responseString) {
      const response = JSON.parse(responseString);
      setLoading(false);
      btn.disabled = false;
      if (response.success) {
        showMessage("正常に保存されました！", "success");
      } else {
        showMessage("保存エラー: " + response.error, "error");
      }
    })
    .withFailureHandler(function(err) {
      setLoading(false);
      btn.disabled = false;
      showMessage("通信エラーが発生しました: " + err.message, "error");
    })
    .saveAllScores({
      student_id: studentId,
      exam_id:    examId    || null,
      pattern_id: patternId || null,
      scores:     scores
    });
}

// ---- ファイルアップロード ----

var MAX_FILE_SIZE_MB = 10;

/**
 * ファイルが選択されたときに圧縮・アップロードを行う。
 * @param {HTMLInputElement} input
 */
function handleFileSelected(input) {
  var file = input.files && input.files[0];
  if (!file) return;

  var studentId = input.dataset.studentId;
  var examId    = input.dataset.examId;
  var fileType  = input.dataset.fileType;
  var typeBlock = input.closest('.file-type-block');

  if (file.size > MAX_FILE_SIZE_MB * 1024 * 1024) {
    showMessage(MAX_FILE_SIZE_MB + 'MB を超えるファイルはアップロードできません。', 'error');
    input.value = '';
    return;
  }

  setLoading(true, ['ファイルを準備中...', 'アップロード中...', 'もうしばらくお待ちください...']);

  var processFile = file.type.startsWith('image/')
    ? compressImage(file)
    : readAsDataURL(file);

  processFile.then(function(dataUrl) {
    var base64 = dataUrl.split(',')[1];
    var mime   = dataUrl.split(';')[0].split(':')[1];
    google.script.run
      .withSuccessHandler(function(responseStr) {
        var res = JSON.parse(responseStr);
        setLoading(false);
        input.value = '';
        if (res.success) {
          showMessage('アップロードしました。', 'success');
          _addFileItemToDOM(typeBlock, res.drive_file_id, res.file_id, file.name, studentId);
        } else {
          showMessage('アップロードエラー: ' + res.error, 'error');
        }
      })
      .withFailureHandler(function(err) {
        setLoading(false);
        input.value = '';
        showMessage('通信エラー: ' + (err.message || err), 'error');
      })
      .uploadStudentFile({
        student_id: studentId,
        exam_id:    examId,
        file_type:  fileType,
        file_name:  file.name,
        base64_data: base64,
        mime_type:   mime
      });
  }).catch(function(e) {
    setLoading(false);
    input.value = '';
    showMessage('ファイルの読み込みに失敗しました: ' + e, 'error');
  });
}

function _addFileItemToDOM(typeBlock, driveFileId, fileId, fileName, studentId) {
  var empty = typeBlock && typeBlock.querySelector('.file-empty');
  if (empty) empty.remove();

  var today = new Date().toISOString().substring(0, 10);
  var item  = document.createElement('div');
  item.className = 'file-item';
  item.innerHTML =
    '<a href="https://drive.google.com/file/d/' + driveFileId + '/view" target="_blank" class="file-link">' +
      '<span class="file-icon">📄</span>' +
      '<span class="file-name">' + escapeHtml(fileName) + '</span>' +
      '<span class="file-date">' + today + '</span>' +
    '</a>' +
    '<button class="btn-file-delete" onclick="handleFileDelete(\'' + studentId + '\', \'' + fileId + '\', this)">削除</button>';

  var uploadLabel = typeBlock && typeBlock.querySelector('.btn-file-upload-label');
  if (uploadLabel) {
    typeBlock.insertBefore(item, uploadLabel);
  } else if (typeBlock) {
    typeBlock.appendChild(item);
  }
}

/**
 * ファイル削除ボタン押下時の処理。
 */
function handleFileDelete(studentId, fileId, btn) {
  if (!confirm('このファイルを削除しますか？')) return;

  btn.disabled = true;
  setLoading(true, 'ファイルを削除中...');

  google.script.run
    .withSuccessHandler(function(responseStr) {
      var res = JSON.parse(responseStr);
      setLoading(false);
      if (res.success) {
        var item = btn.closest('.file-item');
        if (item) item.remove();
        showMessage('削除しました。', 'success');
      } else {
        btn.disabled = false;
        showMessage('削除エラー: ' + res.error, 'error');
      }
    })
    .withFailureHandler(function(err) {
      setLoading(false);
      btn.disabled = false;
      showMessage('通信エラー: ' + (err.message || err), 'error');
    })
    .deleteStudentFile({ student_id: studentId, file_id: fileId });
}

// Canvas API で画像を圧縮して data URL を返す
function compressImage(file) {
  return new Promise(function(resolve, reject) {
    var maxDim = 1280;
    var quality = 0.8;
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          var ratio = Math.min(maxDim / w, maxDim / h);
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);
        }
        var canvas = document.createElement('canvas');
        canvas.width  = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// PDF・その他ファイルをそのまま data URL で読む
function readAsDataURL(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload  = function(e) { resolve(e.target.result); };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
</script>
