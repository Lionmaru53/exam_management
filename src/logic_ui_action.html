<script>
/**
 * 保存ボタンがクリックされたときの処理
 * @param {string} studentId  - 生徒ID
 * @param {string} examId     - 試験ID（未設定の場合は空文字）
 * @param {string} patternId  - パターンID（examId がない場合に使用）
 * @param {string} displayKey - input 要素の ID プレフィックスキー
 */
function handleSave(studentId, examId, patternId, displayKey, btn) {
  const button = btn || document.getElementById('submitBtn');
  const panel  = button ? button.closest('.tab-panel') : document;
  const scores = [];
  const selectPrefix = `s_${displayKey}_`;

  panel.querySelectorAll(`select[id^="${selectPrefix}"]`).forEach(el => {
    const subId       = el.id.slice(selectPrefix.length);
    const gradeRankVal = panel.querySelector(`#gr_${displayKey}_${subId}`)?.value || '';
    const classRankVal = panel.querySelector(`#cr_${displayKey}_${subId}`)?.value || '';

    scores.push({
      subject_id: subId,
      score:      el.value,
      grade_rank: gradeRankVal,
      class_rank: classRankVal
    });
  });

  button.disabled = true;
  setLoading(true, ['得点データを保存中...', 'シートに書き込み中...', 'もうしばらくお待ちください...']);

  google.script.run
    .withSuccessHandler(function(responseString) {
      const response = JSON.parse(responseString);
      setLoading(false);
      btn.disabled = false;
      if (response.success) {
        showMessage("正常に保存されました！", "success");
      } else {
        showMessage("保存エラー: " + response.error, "error");
      }
    })
    .withFailureHandler(function(err) {
      setLoading(false);
      btn.disabled = false;
      showMessage("通信エラーが発生しました: " + err.message, "error");
    })
    .saveAllScores({
      student_id: studentId,
      exam_id:    examId    || null,
      pattern_id: patternId || null,
      scores:     scores
    });
}

</script>
