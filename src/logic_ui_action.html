<script>
/**
 * 保存ボタンがクリックされたときの処理
 * @param {string} studentId   - 生徒ID
 * @param {string} examId      - 試験ID（未設定の場合は空文字）
 * @param {string} patternId   - パターンID
 * @param {string} termTestId  - 試験区分ID
 * @param {string} year        - 学年暦年度（例: "2025"）
 * @param {string} displayKey  - input 要素の ID プレフィックスキー
 */
function handleSave(studentId, examId, patternId, termTestId, year, displayKey, btn) {
  const button = btn || document.getElementById('submitBtn');
  const panel  = button ? button.closest('.tab-panel-app') : document;
  const scores = [];
  const scorePrefix = 's_' + displayKey + '_';

  let validationError = null;

  panel.querySelectorAll('input[id^="' + scorePrefix + '"]').forEach(function(el) {
    if (validationError) return;

    const subId    = el.id.slice(scorePrefix.length);
    const ntEl     = panel.querySelector('#nt_' + displayKey + '_' + subId);
    const notTaken = ntEl ? ntEl.checked : false;

    if (notTaken) {
      scores.push({ subject_id: subId, score: '', grade_rank: '', class_rank: '', not_taken: true });
      return;
    }

    const scoreVal     = el.value.trim();
    const grEl         = panel.querySelector('#gr_' + displayKey + '_' + subId);
    const crEl         = panel.querySelector('#cr_' + displayKey + '_' + subId);
    const gaEl         = panel.querySelector('#ga_' + displayKey + '_' + subId);
    const gradeRankVal = (grEl ? grEl.value : '').trim();
    const classRankVal = (crEl ? crEl.value : '').trim();
    const gradeAvgVal  = (gaEl ? gaEl.value : '').trim();

    if (scoreVal !== '') {
      const n        = Number(scoreVal);
      const cellEl   = el.closest('.ios-cell');
      const genre    = cellEl ? (cellEl.dataset.genre || '') : '';
      const maxScore = genre === '合計' ? 2000 : 200;
      if (!Number.isInteger(n) || n < 0 || n > maxScore) {
        validationError = genre === '合計'
          ? '合計の点数は 0〜2000 の整数で入力してください。'
          : '点数は 0〜200 の整数で入力してください。';
        return;
      }
    }

    if (gradeRankVal !== '') {
      const n = Number(gradeRankVal);
      if (!Number.isInteger(n) || n < 1) {
        validationError = '学年順位は 1 以上の整数で入力してください。';
        return;
      }
    }
    if (classRankVal !== '') {
      const n = Number(classRankVal);
      if (!Number.isInteger(n) || n < 1) {
        validationError = 'クラス順位は 1 以上の整数で入力してください。';
        return;
      }
    }
    if (gradeAvgVal !== '') {
      const n = Number(gradeAvgVal);
      if (isNaN(n) || n < 0 || n > 999) {
        validationError = '学年均は 0〜999 の数値で入力してください。';
        return;
      }
    }

    const entry = {
      subject_id: subId,
      score:      scoreVal,
      grade_rank: gradeRankVal,
      class_rank: classRankVal,
      grade_avg:  gradeAvgVal,
      not_taken:  false
    };
    if (subId === 'OTHER') {
      const rnEl = panel.querySelector('#rn_' + displayKey + '_OTHER');
      entry.raw_subject_name = rnEl ? rnEl.value : '';
      const gnEl = panel.querySelector('#gn_' + displayKey + '_OTHER');
      entry.genre_name = gnEl ? gnEl.value : '';
    }
    scores.push(entry);
  });

  if (validationError) {
    showMessage(validationError, 'error');
    return;
  }

  if (window._appData && window._appData.demo) {
    showMessage('デモモードのため、保存されません。', 'info');
    return;
  }

  button.disabled = true;
  setLoading(true, ['得点データを保存中...', 'シートに書き込み中...', 'もうしばらくお待ちください...']);

  google.script.run
    .withSuccessHandler(function(responseString) {
      const response = JSON.parse(responseString);
      setLoading(false);
      btn.disabled = false;
      if (response.success) {
        showMessage("正常に保存されました！", "success");
        var savedPanel = document.querySelector('.tab-panel-app[data-tab-id="' + termTestId + '"]');
        if (savedPanel) {
          savedPanel.querySelectorAll('.score-input, .rank-input, .avg-input').forEach(function(el) {
            _originalValues[el.id] = el.value;
          });
          savedPanel.querySelectorAll('[id^="nt_"]').forEach(function(el) {
            _originalValues[el.id] = el.checked;
          });
        }
        _inputCache = {};
        _hideDirtyBar();
      } else {
        showMessage("保存エラー: " + response.error, "error");
      }
    })
    .withFailureHandler(function(err) {
      setLoading(false);
      btn.disabled = false;
      showMessage("通信エラーが発生しました: " + err.message, "error");
    })
    .saveAllScores({
      student_id:   studentId,
      year:         year       || '',
      term_test_id: termTestId || null,
      scores:       scores
    });
}

/**
 * 不具合報告フォームで「確認する」を押したときの処理
 * データ収集・バリデーションを行い、確認画面を表示する
 */
function showBugConfirm(btn) {
  const s = window._currentStudent || {};
  const typeEl   = document.querySelector('input[name="bug_type"]:checked');
  const detailEl = document.getElementById('bug-detail');

  const reportType = typeEl   ? typeEl.value   : 'その他';
  const rawDetail  = detailEl ? detailEl.value.trim() : '';

  let prefix = '';
  if (reportType === '表示名が違う') {
    const wrong   = (document.getElementById('bug-name-wrong')?.value   || '').trim();
    const correct = (document.getElementById('bug-name-correct')?.value || '').trim();
    if (wrong || correct)
      prefix = '「' + (wrong || '?') + '」→「' + (correct || '?') + '」が正しい';

  } else if (reportType === '科目が足りない') {
    const genre   = (document.getElementById('bug-subject-genre')?.value || '').trim();
    const subName = (document.getElementById('bug-subject-name')?.value  || '').trim();
    const parts   = [genre, subName].filter(Boolean);
    if (parts.length) prefix = parts.join(' ') + ' が足りない';

  } else if (reportType === '保存した点数が消えた') {
    const exam = (document.getElementById('bug-score-exam')?.value    || '').trim();
    const sub  = (document.getElementById('bug-score-subject')?.value || '').trim();
    if (exam || sub) prefix = (exam || '?') + ' / ' + (sub || '?');

  } else if (reportType === 'テスト名・試験区分がおかしい') {
    const tw = (document.getElementById('bug-testname-wrong')?.value   || '').trim();
    const tc = (document.getElementById('bug-testname-correct')?.value || '').trim();
    if (tw || tc)
      prefix = '「' + (tw || '?') + '」→「' + (tc || '?') + '」が正しい';
  }

  if (reportType === 'その他' && !rawDetail) {
    showMessage('「その他」の場合は詳細を入力してください。', 'error');
    return;
  }

  let detail = rawDetail;
  if (prefix) detail = prefix + (detail ? '\n' + detail : '');

  window._bugConfirmData = {
    reportType: reportType,
    prefix:     prefix,
    rawDetail:  rawDetail,
    payload: {
      student_id:   s.student_id   || '',
      student_name: s.name         || '',
      school_name:  s.school_name  || '',
      grade:        s.grade        || '',
      report_type:  reportType,
      detail:       detail,
    }
  };

  _renderMenuContent();
}

/**
 * 確認画面で「送信する」を押したときの処理
 */
function submitBugConfirm(btn) {
  if (!window._bugConfirmData) return;
  if (window._appData && window._appData.demo) {
    showMessage('デモモードのため、送信されません。', 'info');
    return;
  }
  if (btn) btn.disabled = true;
  setLoading(true, '送信中...');

  google.script.run
    .withSuccessHandler(function(responseString) {
      setLoading(false);
      if (btn) btn.disabled = false;
      const res = JSON.parse(responseString);
      if (res.success) {
        window._bugConfirmData = null;
        window._bugReportOpen  = false;
        var el = document.getElementById('menu-panel-content');
        if (el) el.innerHTML = '<div style="padding:24px 20px;text-align:center;"><p class="bug-report-sent" style="font-size:1rem;color:#1c1c1e;">ご報告ありがとうございました。<br>内容を確認いたします。</p></div>';
        setTimeout(closeMenuPanel, 2000);
      } else {
        showMessage('送信エラー: ' + (res.error || ''), 'error');
      }
    })
    .withFailureHandler(function(err) {
      setLoading(false);
      if (btn) btn.disabled = false;
      showMessage('通信エラー: ' + ((err && err.message) || ''), 'error');
    })
    .submitBugReport(window._bugConfirmData.payload);
}

/**
 * patternSubjectIds（サーバーから返された配列）で _appData を部分更新する。
 * pattern subjects のみ差し替え、extra/other subjects（scores_data 由来）は保持。
 */
function _applyPatternSubjectIds(newPatternSubjectIds) {
  if (!_appData || !_appData.examTabs) return;
  var subjectMap = {};
  (_appData.availableSubjects || []).forEach(function(s) { subjectMap[s.subject_id] = s; });

  _appData.examTabs.forEach(function(tab) {
    var patternSubjects = newPatternSubjectIds.map(function(sid) {
      var s = subjectMap[sid];
      return s ? Object.assign({}, s, { excluded: false }) : null;
    }).filter(Boolean);

    var extras = (tab.subjects || []).filter(function(s) {
      return s.extra && newPatternSubjectIds.indexOf(s.subject_id) === -1;
    });
    tab.subjects = patternSubjects.concat(extras);
  });

  if (_appData.currentExam) {
    var cur = _appData.examTabs.find(function(t) {
      return t.term_test_id === _appData.currentExam.term_test_id;
    });
    if (cur) { _appData.currentExam = cur; _appData.subjects = cur.subjects; }
  }
}

/**
 * 科目選択ドロップダウンの変更時。「その他」選択時にテキスト入力を表示する。
 */
function onSubjSelectChange(selectEl) {
  var row = selectEl.closest('.ios-subject-edit-row');
  var inp = row ? row.querySelector('.subj-other-name-input') : null;
  if (inp) inp.style.display = selectEl.value === 'OTHER' ? 'inline-block' : 'none';
}

var _inputCache = {};

function _cacheInput(el) {
  var id = el.id;
  var type, prefixLen;
  if (id.indexOf('s_') === 0)       { type = 'score';      prefixLen = 2; }
  else if (id.indexOf('gr_') === 0) { type = 'grade_rank'; prefixLen = 3; }
  else if (id.indexOf('cr_') === 0) { type = 'class_rank'; prefixLen = 3; }
  else return;
  var key = id.slice(prefixLen);
  if (!_inputCache[key]) _inputCache[key] = {};
  _inputCache[key][type] = el.value;
  _refreshDirtyState();
}

function _cacheCheckbox(dk, sid, checked) {
  var key = dk + '_' + sid;
  if (!_inputCache[key]) _inputCache[key] = {};
  _inputCache[key].not_taken = checked;
}

function startSubjectEdit(btn) {
  var tabId     = btn.dataset.tabid;
  var genreName = btn.dataset.genre;
  var subjectId = btn.dataset.subjectid !== undefined ? btn.dataset.subjectid : '';
  _editSubjectInfo = { tabId: tabId, genreName: genreName, subjectId: subjectId };
  renderApp(_appData);
  switchExamTab(tabId);
}

/**
 * 科目1件変更の保存。ドロップダウンの値を読み取ってGASに送信。
 * replacePatternSubject の戻り値で _appData を部分更新し、getInitialData の再呼び出しを省略する。
 */
function saveSubjectEdit(tabId, genreName, oldSubjectId) {
  var selectEl = document.querySelector('.subj-replace-select');
  if (!selectEl) { showMessage('選択フォームが見つかりません', 'error'); return; }
  var newSubjectId = selectEl.value;
  if (!newSubjectId) { showMessage('科目を選択してください', 'error'); return; }

  var rawSubjName = '';
  if (newSubjectId === 'OTHER') {
    var otherInp = document.querySelector('.subj-other-name-input');
    rawSubjName = otherInp ? otherInp.value.trim() : '';
    if (!rawSubjName) { showMessage('科目名を入力してください', 'error'); return; }
  }

  var exam = (_appData && _appData.examTabs || []).find(function(t) { return t.term_test_id === tabId; });
  var patternId = exam ? exam.pattern_id : null;
  if (!patternId) { showMessage('パターンIDが見つかりません', 'error'); return; }

  if (window._appData && window._appData.demo) {
    showMessage('デモモードのため、科目変更は保存されません。', 'info');
    _editSubjectInfo = null;
    renderApp(_appData);
    switchExamTab(tabId);
    return;
  }

  _editSubjectInfo = null;
  setLoading(true, '科目を保存中...');

  google.script.run
    .withSuccessHandler(function(responseString) {
      var res = JSON.parse(responseString);
      if (!res.success) {
        setLoading(false);
        showMessage('保存エラー: ' + (res.error || ''), 'error');
        return;
      }
      if (res.newSubject) {
        _appData.availableSubjects = (_appData.availableSubjects || []).concat([res.newSubject]);
        _currentAvailableSubjects  = _appData.availableSubjects;
      }
      _applyPatternSubjectIds(res.patternSubjectIds);
      setLoading(false);
      renderApp(_appData);
      switchExamTab(tabId);
    })
    .withFailureHandler(function(err) {
      setLoading(false);
      showMessage('通信エラー: ' + (err && err.message ? err.message : ''), 'error');
    })
    .replacePatternSubject({
      student_id:       (_currentStudent && _currentStudent.student_id) || '',
      pattern_id:       patternId,
      old_subject_id:   oldSubjectId,
      new_subject_id:   newSubjectId,
      raw_subject_name: rawSubjName,
      genre_name:       genreName
    });
}

/**
 * コース・文理の初回設定フローで確定が押されたときの処理
 */
function handleCourseSubmit(lineUserId, schoolCourse, subCourse) {
  if (window._appData && window._appData.demo) {
    var updated = Object.assign({}, window._appData, {
      needsCourse:    false,
      needsSubCourse: false,
      student: Object.assign({}, window._appData.student, {
        school_course:      schoolCourse,
        school_course_name: schoolCourse,
        sub_course:         subCourse || ''
      })
    });
    renderApp(updated);
    return;
  }
  setLoading(true, '設定を保存中...');
  google.script.run
    .withSuccessHandler(function(data) {
      setLoading(false);
      if (data && data.error) { showMessage('エラー: ' + data.error, 'error'); return; }
      renderApp(data);
    })
    .withFailureHandler(function(err) {
      setLoading(false);
      showMessage('エラー: ' + (err && err.message ? err.message : JSON.stringify(err)), 'error');
    })
    .setStudentCourseAndSubCourse(lineUserId, schoolCourse, subCourse);
}

/**
 * 文理選択画面でボタンが押されたときの処理
 */
function handleSubCourseSelect(lineUserId, subCourse) {
  if (window._appData && window._appData.demo) {
    var updated = Object.assign({}, window._appData, {
      needsSubCourse: false,
      student: Object.assign({}, window._appData.student, { sub_course: subCourse })
    });
    renderApp(updated);
    return;
  }
  setLoading(true, '設定を保存中...');
  google.script.run
    .withSuccessHandler(function(data) {
      setLoading(false);
      if (data && data.error) {
        showMessage('エラー: ' + data.error, 'error');
        return;
      }
      renderApp(data);
    })
    .withFailureHandler(function(err) {
      setLoading(false);
      showMessage('エラー: ' + (err && err.message ? err.message : JSON.stringify(err)), 'error');
    })
    .setStudentSubCourse(lineUserId, subCourse);
}

// =====================================================
// 並び替え機能（localStorage 永続化 + タッチドラッグ）
// =====================================================

function _loadOrderPrefs() {
  if (!_appData || !_appData.student) return;
  try {
    var raw = localStorage.getItem('exam_pref_' + _appData.student.student_id);
    if (raw) {
      var p = JSON.parse(raw);
      _genreOrder   = p.genreOrder   || null;
      _subjectOrder = p.subjectOrder || {};
    }
  } catch(e) {}
}

function _saveOrderPrefs() {
  if (!_appData || !_appData.student) return;
  try {
    localStorage.setItem('exam_pref_' + _appData.student.student_id,
      JSON.stringify({ genreOrder: _genreOrder, subjectOrder: _subjectOrder }));
  } catch(e) {}
}

function toggleReorderMode() {
  _reorderMode = !_reorderMode;
  if (_reorderMode && !_genreOrder) {
    _genreOrder = (_appData && _appData.genres || []).map(function(g) { return g.genre_name; });
    var exam = (_appData.examTabs || []).find(function(t) { return t.term_test_id === _currentTabId; });
    if (exam) (exam.subjects || []).forEach(function(s) {
      var gn = s.genre_name || 'その他';
      if (_genreOrder.indexOf(gn) === -1) _genreOrder.push(gn);
    });
    _saveOrderPrefs();
  }
  renderApp(_appData);
  if (_currentTabId) switchExamTab(_currentTabId);
}

function _moveGenreToPosition(fromGenre, toGenre) {
  if (!_genreOrder || fromGenre === toGenre) return;
  var fi = _genreOrder.indexOf(fromGenre), ti = _genreOrder.indexOf(toGenre);
  if (fi === -1 || ti === -1) return;
  _genreOrder.splice(fi, 1);
  _genreOrder.splice(ti, 0, fromGenre);
  _saveOrderPrefs();
  renderApp(_appData);
  if (_currentTabId) switchExamTab(_currentTabId);
  setTimeout(function() { _flashReorderItem('.ios-section[data-genre="' + fromGenre + '"]'); }, 0);
}

function _moveSubjectToPosition(genreName, fromSid, toSid) {
  if (fromSid === toSid) return;
  if (!_subjectOrder[genreName]) {
    var exam = (_appData.examTabs || []).find(function(t) { return t.term_test_id === _currentTabId; });
    _subjectOrder[genreName] = exam
      ? (exam.subjects || []).filter(function(s) { return (s.genre_name || 'その他') === genreName; }).map(function(s) { return s.subject_id; })
      : [];
  }
  var order = _subjectOrder[genreName];
  var fi = order.indexOf(fromSid), ti = order.indexOf(toSid);
  if (fi === -1) { order.push(fromSid); fi = order.length - 1; }
  if (ti === -1 || fi === ti) return;
  order.splice(fi, 1); order.splice(ti, 0, fromSid);
  _saveOrderPrefs();
  renderApp(_appData);
  if (_currentTabId) switchExamTab(_currentTabId);
  setTimeout(function() { _flashReorderItem('.ios-cell[data-sid="' + fromSid + '"]'); }, 0);
}

function _flashReorderItem(selector) {
  var el = document.querySelector(selector);
  if (!el) return;
  el.classList.add('reorder-moved');
  setTimeout(function() { el.classList.remove('reorder-moved'); }, 600);
}

function onDragHandleTouch(event, el) {
  event.preventDefault();
  var touch  = event.touches[0];
  var type   = el.dataset.dragType;
  var genre  = el.dataset.dragGenre;
  var sid    = el.dataset.dragSid || '';
  var origin = type === 'genre' ? el.closest('.ios-section') : el.closest('.ios-cell');
  if (!origin) return;

  var rect  = origin.getBoundingClientRect();
  var ghost = origin.cloneNode(true);
  ghost.className += ' drag-ghost';
  ghost.style.width  = rect.width  + 'px';
  ghost.style.height = rect.height + 'px';
  ghost.style.top    = rect.top    + 'px';
  ghost.style.left   = rect.left   + 'px';
  document.body.appendChild(ghost);
  origin.classList.add('drag-origin');

  _dragState = { type: type, genre: genre, sid: sid, ghost: ghost, origin: origin };
  document.addEventListener('touchmove', _onDragMove, { passive: false });
  document.addEventListener('touchend',  _onDragEnd,  { passive: false });
}

function _onDragMove(event) {
  event.preventDefault();
  var touch = event.touches[0];
  var g = _dragState.ghost;
  g.style.top = (touch.clientY - g.offsetHeight / 2) + 'px';

  g.style.visibility = 'hidden';
  var under = document.elementFromPoint(touch.clientX, touch.clientY);
  g.style.visibility = '';
  var target = _dragState.type === 'genre'
    ? (under && under.closest('.ios-section'))
    : (under && under.closest('.ios-cell:not(.ios-cell-empty)'));

  document.querySelectorAll('.drag-target').forEach(function(e) { e.classList.remove('drag-target'); });
  if (target && target !== _dragState.origin) target.classList.add('drag-target');
}

function _onDragEnd(event) {
  event.preventDefault();
  document.removeEventListener('touchmove', _onDragMove);
  document.removeEventListener('touchend',  _onDragEnd);

  var touch = event.changedTouches[0];
  var g = _dragState.ghost;
  g.style.visibility = 'hidden';
  var under = document.elementFromPoint(touch.clientX, touch.clientY);
  g.remove();
  _dragState.origin.classList.remove('drag-origin');
  document.querySelectorAll('.drag-target').forEach(function(e) { e.classList.remove('drag-target'); });

  var target = _dragState.type === 'genre'
    ? (under && under.closest('.ios-section'))
    : (under && under.closest('.ios-cell:not(.ios-cell-empty)'));

  if (target && target !== _dragState.origin) {
    if (_dragState.type === 'genre') {
      _moveGenreToPosition(_dragState.genre, target.dataset.genre);
    } else if (target.dataset.genre === _dragState.genre) {
      _moveSubjectToPosition(_dragState.genre, _dragState.sid, target.dataset.sid);
    }
  }
  _dragState = null;
}

// ---- お知らせパネル開閉 ----

var _annPanelOpen = false;

function toggleAnnouncementPanel() {
  if (_annPanelOpen) {
    closeAnnouncementPanel();
  } else {
    openAnnouncementPanel();
  }
}

function openAnnouncementPanel() {
  var panel   = document.getElementById('ann-panel');
  var overlay = document.getElementById('ann-overlay');
  if (!panel) return;
  _annPanelOpen = true;
  panel.classList.add('ann-panel--open');
  if (overlay) overlay.classList.add('ann-overlay--active');
  // 開いた時点で全件既読にしてバッジを消す
  if (_appData && _appData.announcements) {
    _markAllAsRead(_appData.announcements);
    var badge = document.querySelector('#bnav-ann .ann-badge');
    if (badge) badge.remove();
  }
}

function closeAnnouncementPanel() {
  var panel   = document.getElementById('ann-panel');
  var overlay = document.getElementById('ann-overlay');
  if (!panel) return;
  _annPanelOpen = false;
  panel.classList.remove('ann-panel--open');
  if (overlay) overlay.classList.remove('ann-overlay--active');
}

// ---- メニューパネル開閉 ----

var _menuPanelOpen = false;

function toggleMenuPanel() {
  if (_menuPanelOpen) {
    closeMenuPanel();
  } else {
    openMenuPanel();
  }
}

function openMenuPanel() {
  _menuPanelOpen = true;
  _bugReportOpen = false;
  _bugConfirmData = null;
  _renderMenuContent();
  var panel   = document.getElementById('menu-panel');
  var overlay = document.getElementById('menu-overlay');
  if (panel)   panel.classList.add('menu-panel--open');
  if (overlay) overlay.classList.add('menu-overlay--active');
}

function closeMenuPanel() {
  _menuPanelOpen = false;
  var panel   = document.getElementById('menu-panel');
  var overlay = document.getElementById('menu-overlay');
  if (panel)   panel.classList.remove('menu-panel--open');
  if (overlay) overlay.classList.remove('menu-overlay--active');
}

function openBugReportFromMenu() {
  _bugReportOpen = true;
  _bugConfirmData = null;
  _renderMenuContent();
}

function onAnnDismissChange(annId, checked) {
  try {
    var key = _annDismissLsKey();
    var ids = _getDismissedIds();
    if (checked) {
      if (ids.indexOf(annId) === -1) ids.push(annId);
      if (_appData && _appData.announcements) _markAllAsRead(_appData.announcements);
      var badge = document.querySelector('#bnav-ann .ann-badge');
      if (badge) badge.remove();
    } else {
      ids = ids.filter(function(id) { return id !== annId; });
    }
    localStorage.setItem(key, JSON.stringify(ids));
  } catch(e) {}
}

function cancelEdits() {
  document.querySelectorAll('.score-input, .rank-input, .avg-input').forEach(function(el) {
    if (_originalValues.hasOwnProperty(el.id)) {
      el.value = _originalValues[el.id];
      el.disabled = false;
      el.style.opacity = '';
    }
  });
  document.querySelectorAll('[id^="nt_"]').forEach(function(el) {
    if (_originalValues.hasOwnProperty(el.id)) {
      el.checked = _originalValues[el.id];
      var suffix = el.id.slice(3);
      ['s_', 'gr_', 'cr_'].forEach(function(prefix) {
        var inp = document.getElementById(prefix + suffix);
        if (!inp) return;
        inp.disabled = el.checked;
        inp.style.opacity = el.checked ? '0.4' : '';
      });
    }
  });
  _inputCache = {};
  _hideDirtyBar();
}

function saveCurrentTab() {
  var panel = document.querySelector('.tab-panel-app[data-tab-id="' + _currentTabId + '"]');
  if (!panel) return;
  var btn = panel.querySelector('.btn-save-app');
  if (btn) btn.click();
}
</script>
