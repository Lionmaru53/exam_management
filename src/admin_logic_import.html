<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
function renderImportManager() {
  var content    = document.getElementById('admin-content');
  var cramId     = window.selectedCramId || '';
  var branchName = _impGetBranchName(cramId);

  if (!cramId) {
    content.innerHTML = '<h3>生徒データインポート</h3>'
      + '<p class="imp-no-branch">画面上部のセレクターから校舎を選択してください。</p>';
    return;
  }

  content.innerHTML = '<h3>生徒データインポート</h3>'
    + '<p>対象校舎: <strong>' + branchName + '</strong></p>'
    + '<p class="imp-desc">「015_名簿作成」からエクスポートした校舎別の Excel ファイル（.xlsx）をアップロードしてください。<br>'
    + '同じ管理番号の生徒は上書き更新、新規の生徒は追加されます。</p>'
    + '<div class="imp-hint">'
    + '<strong>必須列（1行目のヘッダー名）:</strong> 管理番号 / 姓 / 名 / 姓かな / 名かな / 学校 / 学年'
    + '</div>'
    + '<div class="imp-upload-row">'
    + '<input type="file" id="import-file" accept=".xlsx" onchange="_onFileChange()" />'
    + '<button id="import-btn" onclick="_doImport()" class="btn-save-admin imp-btn" disabled>インポート実行</button>'
    + '</div>'
    + '<div id="import-preview"></div>'
    + '<div id="import-result"></div>';
}

function _impGetBranchName(cramId) {
  if (!cramId || !window.masterData || !Array.isArray(window.masterData.branches)) return cramId;
  var branch = window.masterData.branches.find(function (b) {
    return String(b.cram_id) === String(cramId);
  });
  return branch ? (branch.branch_name || cramId) : cramId;
}

// ファイル選択時: SheetJS でプレビュー
function _onFileChange() {
  var fileInput = document.getElementById('import-file');
  var btn       = document.getElementById('import-btn');
  var preview   = document.getElementById('import-preview');
  var result    = document.getElementById('import-result');
  result.innerHTML  = '';
  preview.innerHTML = '';
  if (btn) btn.disabled = true;

  if (!fileInput || !fileInput.files.length) return;
  var file = fileInput.files[0];

  var reader = new FileReader();
  reader.onload = function (e) {
    try {
      var data     = new Uint8Array(e.target.result);
      var workbook = XLSX.read(data, { type: 'array' });
      var sheet    = workbook.Sheets[workbook.SheetNames[0]];
      var rows     = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

      if (!rows || rows.length < 2) {
        preview.innerHTML = '<p class="imp-warn">データが空です（ヘッダー行のみ）。</p>';
        return;
      }

      var headers  = rows[0].map(function (h) { return String(h).trim(); });
      var dataRows = rows.slice(1).filter(function (r) {
        return r.some(function (c) { return String(c || '').trim() !== ''; });
      });

      // 必須列チェック
      var required = ['管理番号', '姓', '名', '学年'];
      var missing  = required.filter(function (col) { return headers.indexOf(col) === -1; });
      if (missing.length > 0) {
        preview.innerHTML = '<p class="imp-warn">必須列が見つかりません: ' + missing.join('、') + '</p>';
        return;
      }

      var idIdx = headers.indexOf('管理番号');
      var valid = dataRows.filter(function (r) { return String(r[idIdx] || '').trim() !== ''; });

      preview.innerHTML = '<div class="imp-preview">'
        + '<strong>プレビュー:</strong> 有効な生徒 <strong>' + valid.length + '</strong> 件 / 全 ' + dataRows.length + ' 行'
        + '</div>';

      // 有効データがあればボタンを有効化
      if (valid.length > 0 && btn) btn.disabled = false;

      // 解析済みデータをボタンが参照できるように保持
      window._importRows = rows;

    } catch (err) {
      preview.innerHTML = '<p class="imp-warn">ファイルの解析に失敗しました: ' + (err.message || err) + '</p>';
    }
  };
  reader.onerror = function () {
    preview.innerHTML = '<p class="imp-warn">ファイルの読み込みに失敗しました。</p>';
  };
  reader.readAsArrayBuffer(file);
}

function _doImport() {
  var cramId = window.selectedCramId || '';
  if (!cramId)               { showMessage('校舎を選択してください。', 'error'); return; }
  if (!window._importRows)   { showMessage('ファイルを選択してください。', 'error'); return; }

  document.getElementById('import-result').innerHTML = '';

  setLoading(true, ['データを送信中...', '生徒データを書き込み中...', 'もうしばらくお待ちください...']);
  google.script.run
    .withSuccessHandler(function (res) {
      setLoading(false);
      if (res && res.success) {
        var resultHtml = '<div class="imp-result">'
          + '<p class="imp-result-title">インポート完了</p>'
          + '<ul>'
          + '<li>追加: <strong>' + res.added + '</strong> 件</li>'
          + '<li>更新: <strong>' + res.updated + '</strong> 件</li>'
          + '</ul>'
          + '</div>';
        document.getElementById('import-result').innerHTML = resultHtml;
        showMessage('インポートが完了しました。', 'success');
        window._importRows = null;
        var btn = document.getElementById('import-btn');
        if (btn) btn.disabled = true;
      } else {
        showMessage((res && res.error) || 'インポートに失敗しました。', 'error');
      }
    })
    .withFailureHandler(function (err) {
      setLoading(false);
      var msg = (err && err.message) ? err.message : '通信エラーが発生しました。';
      showMessage('エラー: ' + msg, 'error');
    })
    .importStudentData(cramId, window._importRows);
}

window.renderImportManager = renderImportManager;
</script>
