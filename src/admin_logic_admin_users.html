<script>
let _auStore       = [];
let _auAddMode     = false;
let _auEditEmail   = null;
let _auCachedUsers = [];

function _auPush(obj) {
  _auStore.push(obj);
  return _auStore.length - 1;
}

// ---- 外部から呼ばれるエントリーポイント ----

function renderAdminUserManager() {
  _auAddMode   = false;
  _auEditEmail = null;
  _auFetchAndRender();
}

// ---- 内部関数 ----

function _auFetchAndRender() {
  const content = document.getElementById('admin-content');
  content.innerHTML = '<h3>管理者管理</h3><p>読み込み中...</p>';
  setLoading(true, '管理者一覧を取得中...');
  google.script.run
    .withSuccessHandler(function (res) {
      setLoading(false);
      if (res && res.success) {
        _auCachedUsers = res.adminUsers || [];
        _auRerender();
      } else {
        showMessage((res && res.error) || '管理者一覧の取得に失敗しました。', 'error');
        content.innerHTML = '<h3>管理者管理</h3>';
      }
    })
    .withFailureHandler(function (err) {
      var m = err && err.message ? err.message : JSON.stringify(err);
      console.error('[getAdminUsers] failure:', err);
      setLoading(false);
      showMessage('エラー: ' + m, 'error');
    })
    .getAdminUsers();
}

/**
 * ユーザーオブジェクトから担当校舎バッジ HTML を生成する。
 * admin_users シートの固定列以外の列名を cram_id とみなし、
 * masterData.branches と照合して TRUE のものをバッジ表示する。
 */
function _auBranchBadges(user) {
  if (user.role === 'master') return '—（全校舎）';
  const branches = (window.masterData && window.masterData.branches) || [];
  const assigned = branches.filter(b => {
    const cramId = String(b.cram_id || '').trim();
    if (!cramId) return false;
    const val = user[cramId];
    return val === true || String(val || '').trim().toUpperCase() === 'TRUE' || String(val || '').trim() === '1';
  });
  if (assigned.length === 0) return '—';
  return assigned.map(b =>
    `<span style="display:inline-block; background:#e8f4fd; border:1px solid #b3d4f0;
                  border-radius:3px; padding:1px 6px; margin:1px; font-size:0.85em;">${b.cram_id}</span>`
  ).join('');
}

// キャッシュを使って再描画（API 呼び出しなし）
function _auRerender() {
  _auStore = [];
  const content    = document.getElementById('admin-content');
  const adminUsers = _auCachedUsers;

  let html = '<h3>管理者管理</h3>'
           + '<p class="tab-desc">'
           + '管理者アカウントの追加・ロール変更・無効化を行います。<br>'
           + '<span class="step">▶ <strong>master</strong> ： 全機能・全校舎にアクセス可能。</span><br>'
           + '<span class="step">▶ <strong>校舎管理者（branch_admin）</strong> ： admin_users シートの担当校舎列が TRUE の校舎のみ操作できます。</span>'
           + '</p>';

  if (_auAddMode) {
    html += `
      <div class="admin-genre-container" style="margin-bottom:16px;">
        <h4 class="admin-genre-title">管理者を追加</h4>
        <div style="display:flex; flex-direction:column; gap:10px; max-width:420px;">
          <label>メールアドレス<br>
            <input type="email" id="au_email" placeholder="example@gmail.com" class="admin-input" style="width:100%;" />
          </label>
          <label>ロール<br>
            <select id="au_role" class="admin-select" style="width:100%;">
              <option value="branch_admin">校舎管理者</option>
              <option value="master">マスター管理者</option>
            </select>
          </label>
          <p style="font-size:0.85em; color:#888; margin:0;">
            ※ 担当校舎の割り当ては admin_users シートに cram_id 列を追加し TRUE を入力してください。
          </p>
          <div style="display:flex; gap:8px;">
            <button class="btn-save-admin" onclick="_auSubmitAdd()">追加</button>
            <button class="btn-cancel-admin" onclick="_auCancelAdd()">キャンセル</button>
          </div>
        </div>
      </div>`;
  } else {
    html += `<button onclick="_auStartAdd()" style="margin-bottom:16px;">＋ 管理者を追加</button>`;
  }

  html += `<table class="admin-table">
    <thead><tr>
      <th>メールアドレス</th>
      <th>ロール</th>
      <th>担当校舎</th>
      <th>状態</th>
      <th style="width:200px;">操作</th>
    </tr></thead><tbody>`;

  adminUsers.forEach(user => {
    const isActive   = user.is_active === true || String(user.is_active) === '1' || String(user.is_active) === 'true';
    const roleLabel  = user.role === 'master' ? 'マスター' : '校舎管理者';
    const stateLabel = isActive ? '<span style="color:#2a9d2a;">有効</span>' : '<span style="color:#999;">無効</span>';
    const isEditing  = _auEditEmail === user.email;

    if (isEditing) {
      const editIdx = _auPush({ email: user.email });
      html += `<tr style="background:#fffde7;">
        <td>${user.email}</td>
        <td><select id="au_edit_role_${editIdx}" class="admin-select" style="width:auto;">
          <option value="branch_admin" ${user.role !== 'master' ? 'selected' : ''}>校舎管理者</option>
          <option value="master" ${user.role === 'master' ? 'selected' : ''}>マスター管理者</option>
        </select></td>
        <td>${_auBranchBadges(user)}</td>
        <td>${stateLabel}</td>
        <td>
          <button class="btn-save-admin" onclick="_auSubmitEdit(${editIdx})">保存</button>
          <button class="btn-cancel-admin" onclick="_auCancelEdit()">キャンセル</button>
        </td>
      </tr>`;
    } else {
      const idx = _auPush({ email: user.email, is_active: isActive });
      html += `<tr>
        <td>${user.email}</td>
        <td>${roleLabel}</td>
        <td>${_auBranchBadges(user)}</td>
        <td>${stateLabel}</td>
        <td>`;
      if (user.email !== adminContext.email) {
        html += `<button onclick="_auStartEdit(${idx})" style="margin-right:4px;">変更</button>`;
        if (isActive) {
          html += `<button class="btn-cancel-admin" onclick="_auDeactivate(${idx})">無効化</button>`;
        }
      } else {
        html += '<span style="color:#aaa; font-size:0.85em;">（自分）</span>';
      }
      html += `</td></tr>`;
    }
  });

  html += '</tbody></table>';
  content.innerHTML = html;
}

// ---- 追加フォーム ----

function _auStartAdd() {
  _auAddMode   = true;
  _auEditEmail = null;
  _auRerender();
}

function _auCancelAdd() {
  _auAddMode = false;
  _auRerender();
}

function _auSubmitAdd() {
  const email = document.getElementById('au_email')?.value.trim();
  const role  = document.getElementById('au_role')?.value;

  if (!email) { showMessage('メールアドレスを入力してください。', 'error'); return; }

  setLoading(true, '管理者を追加中...');
  google.script.run
    .withSuccessHandler(function (res) {
      setLoading(false);
      if (res && res.success) {
        _auAddMode = false;
        showMessage('管理者を追加しました。', 'success');
        _auFetchAndRender();
      } else {
        showMessage((res && res.error) || '追加に失敗しました。', 'error');
      }
    })
    .withFailureHandler(function (err) { var m = err && err.message ? err.message : JSON.stringify(err); console.error(m, err); setLoading(false); showMessage('エラー: ' + m, 'error'); })
    .addAdminUser({ email, role });
}

// ---- 編集 ----

function _auStartEdit(idx) {
  _auEditEmail = _auStore[idx].email;
  _auAddMode   = false;
  _auRerender();
}

function _auCancelEdit() {
  _auEditEmail = null;
  _auRerender();
}

function _auSubmitEdit(idx) {
  const { email } = _auStore[idx];
  const role      = document.getElementById(`au_edit_role_${idx}`)?.value;

  setLoading(true, '管理者情報を更新中...');
  google.script.run
    .withSuccessHandler(function (res) {
      setLoading(false);
      if (res && res.success) {
        _auEditEmail = null;
        showMessage('管理者情報を更新しました。', 'success');
        _auFetchAndRender();
      } else {
        showMessage((res && res.error) || '更新に失敗しました。', 'error');
      }
    })
    .withFailureHandler(function (err) { var m = err && err.message ? err.message : JSON.stringify(err); console.error(m, err); setLoading(false); showMessage('エラー: ' + m, 'error'); })
    .updateAdminUser({ email, role });
}

// ---- 無効化 ----

function _auDeactivate(idx) {
  const { email } = _auStore[idx];
  if (!confirm(`${email} を無効化しますか？\nこの管理者はログインできなくなります。`)) return;

  setLoading(true, '管理者を無効化中...');
  google.script.run
    .withSuccessHandler(function (res) {
      setLoading(false);
      if (res && res.success) {
        showMessage('管理者を無効化しました。', 'success');
        _auFetchAndRender();
      } else {
        showMessage((res && res.error) || '無効化に失敗しました。', 'error');
      }
    })
    .withFailureHandler(function (err) { var m = err && err.message ? err.message : JSON.stringify(err); console.error(m, err); setLoading(false); showMessage('エラー: ' + m, 'error'); })
    .deactivateAdminUser(email);
}

window.renderAdminUserManager = renderAdminUserManager;
</script>
