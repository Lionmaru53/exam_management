<script>
// =====================================================================
// 得点一覧タブ  (admin_logic_scores.html)
// =====================================================================
// 状態変数（プレフィックス _sc_ で他タブと衝突回避）
var _scSelectedTermTestId = '';
var _scSelectedYear       = '';     // 選択中の年度（空=全年度）
var _scFilterSchoolCourses = [];    // 選択中の「学校/コース」ラベルの配列
var _scFilterGradeSubs     = [];    // 選択中の「学年/文理」の配列
var _scSortField           = null;   // null=デフォルト多段 | 'name' | 'score_<subject_id>'
var _scSortAsc             = true;
var _scDisplayMode        = 'score'; // 'score' | 'class_rank' | 'grade_rank'
var _scScoreData          = null;   // { scores, students }
var _scLastCramId         = null;   // キャッシュ有効性チェック用
var _scCellStore          = [];     // [{scoreId,studentName,...}] クリック参照用
var _scCurrentDetailIdx   = -1;     // モーダル用（XSS回避のため HTML 非埋め込み）
var _scSearchQuery   = '';
var _scComposing     = false;
var _scUploadsMap    = {};
var _scActiveSubjects = [];

// =====================================================================
// エントリーポイント
// =====================================================================
window.renderScoreManager = function () {
  var content = document.getElementById('admin-content');
  if (!content) return;

  var termTests = (window.masterData && window.masterData.termTests) || [];
  if (termTests.length === 0) {
    content.innerHTML = '<h3>④得点一覧</h3><p class="sc-empty-msg">試験区分が登録されていません。</p>';
    return;
  }

  if (!_scSelectedTermTestId) {
    _scSelectedTermTestId = String(termTests[0].term_test_id || '').trim();
  }

  // 校舎が変わった場合のみフィルター・ソート・キャッシュをリセット
  var _cramId = window.selectedCramId || '';
  if (_scLastCramId !== _cramId) {
    _scFilterSchoolCourses = [];
    _scFilterGradeSubs     = [];
    _scSortField           = null;
    _scSortAsc             = true;
    _scLastCramId          = _cramId;
    _scScoreData           = null;
  }

  // 年度リストを examPeriods から構築（新しい年度を先頭に）
  var examPeriods = (window.masterData && window.masterData.examPeriods) || [];
  var _yearSet = {};
  var availableYears = [];
  examPeriods.forEach(function (p) {
    var y = String(p.year || '').trim();
    if (y && !_yearSet[y]) { _yearSet[y] = true; availableYears.push(y); }
  });
  availableYears.sort(function (a, b) { return Number(b) - Number(a); });

  // デフォルト年度: 現在の学年暦年度
  if (!_scSelectedYear) {
    var _now = new Date();
    _scSelectedYear = String(_now.getMonth() >= 3 ? _now.getFullYear() : _now.getFullYear() - 1);
  }

  var toolbarHtml = '<div class="sc-toolbar">';
  if (availableYears.length > 0) {
    toolbarHtml += '<label class="sc-label">年度：</label>'
      + '<select id="sc-year-sel" class="sc-sel" onchange="_scOnYearChange(this.value)">';
    availableYears.forEach(function (y) {
      var sel = y === _scSelectedYear ? ' selected' : '';
      toolbarHtml += '<option value="' + _esc(y) + '"' + sel + '>' + _esc(y) + '年度</option>';
    });
    toolbarHtml += '</select>';
  }
  toolbarHtml += '<label class="sc-label">試験区分：</label>'
    + '<select id="sc-termtest-sel" class="sc-sel" onchange="_scOnTermTestChange(this.value)">';
  termTests.forEach(function (tt) {
    var tid   = String(tt.term_test_id || '').trim();
    var label = String(tt.test_name   || tid);
    var sel   = tid === _scSelectedTermTestId ? ' selected' : '';
    toolbarHtml += '<option value="' + _esc(tid) + '"' + sel + '>' + _esc(label) + '</option>';
  });
  toolbarHtml += '</select>';
  toolbarHtml += '<label class="sc-label">表示：</label>'
    + '<select id="sc-mode-sel" class="sc-sel" onchange="_scOnDisplayModeChange(this.value)">'
    + '<option value="score"'      + (_scDisplayMode === 'score'      ? ' selected' : '') + '>得点</option>'
    + '<option value="class_rank"' + (_scDisplayMode === 'class_rank' ? ' selected' : '') + '>クラス順位</option>'
    + '<option value="grade_rank"' + (_scDisplayMode === 'grade_rank' ? ' selected' : '') + '>学年順位</option>'
    + '</select>';
  toolbarHtml += '<input type="search" placeholder="氏名・読み・学校名で検索" value="' + _esc(_scSearchQuery) + '"'
    + ' oncompositionstart="_scComposing=true" oncompositionend="_scComposing=false"'
    + ' oninput="if(!_scComposing)_scOnSearch(this.value)" class="admin-input" style="width:220px;margin-left:4px;">';
  toolbarHtml += '</div>';

  content.innerHTML = '<h3>④得点一覧</h3>' + toolbarHtml
    + '<div id="sc-table-area">'
    + (_scScoreData ? '' : '<p class="sc-empty-msg">読み込み中...</p>')
    + '</div>'
    + '<div id="sc-unresolved-area"></div>';

  if (_scScoreData) {
    _scRerender();  // キャッシュがあれば即時描画
  }
  _scFetchAndRender();  // 常にバックグラウンドで最新取得
  _scLoadUnresolved();
};

function _scOnTermTestChange(termTestId) {
  _scSelectedTermTestId = termTestId;
  _scFetchAndRender();
}

function _scOnYearChange(year) {
  _scSelectedYear = year;
  _scFetchAndRender();
}

function _scOnDisplayModeChange(mode) {
  _scDisplayMode = mode;
  _scRerender();
}

// =====================================================================
// データ取得
// =====================================================================
function _scFetchAndRender() {
  var area = document.getElementById('sc-table-area');
  if (area && !_scScoreData) area.innerHTML = '<p class="sc-empty-msg">読み込み中...</p>';

  google.script.run
    .withSuccessHandler(function (res) {
      if (!res || !res.success) {
        if (area) area.innerHTML = '<p class="sc-error-msg">エラー: ' + _esc((res && res.error) || '取得失敗') + '</p>';
        return;
      }
      _scScoreData = res;
      // uploadsMap を構築
      _scUploadsMap = {};
      (res.uploads || []).forEach(function(u) {
        _scUploadsMap[u.student_id] = u;
      });

      _scRerender();
    })
    .withFailureHandler(function (err) {
      if (area) area.innerHTML = '<p class="sc-error-msg">エラー: ' + _esc(err && err.message ? err.message : String(err)) + '</p>';
    })
    .getAdminScores(window.selectedCramId, _scSelectedTermTestId, _scSelectedYear);
}

// =====================================================================
// フラットテーブルの描画（スライサー付き）
// =====================================================================
function _scRerender() {
  var area = document.getElementById('sc-table-area');
  if (!area || !_scScoreData) return;

  var students        = _scScoreData.students        || [];
  var scores          = _scScoreData.scores           || [];
  var schoolAverages  = _scScoreData.schoolAverages   || [];
  var patterns        = (window.masterData && window.masterData.patterns)        || [];
  var patternSubjects = (window.masterData && window.masterData.patternSubjects) || [];
  var subjects        = (window.masterData && window.masterData.subjects)        || [];

  if (students.length === 0) {
    area.innerHTML = '<p class="sc-empty-msg">対象の生徒が見つかりません。</p>';
    return;
  }

  // ── スコアマップ構築（サーバー側で term_test_id フィルタ済み）──────
  // キー: "studentId||subjectId"
  var scoreMap = {};
  scores.forEach(function (sc) {
    var key = sc.student_id + '||' + sc.subject_id;
    var existing = scoreMap[key];
    if (!existing || sc.update_at >= existing.update_at) {
      scoreMap[key] = sc;
    }
  });

  // ── 学校平均マップ構築 ────────────────────────────────────────────
  // キー: "school_name||school_course||grade||sub_course" → subject_id → grade_avg
  var schoolAvgMap = {};
  schoolAverages.forEach(function(r) {
    var gk = [r.school_name, r.school_course, r.grade, r.sub_course].join('||');
    if (!schoolAvgMap[gk]) schoolAvgMap[gk] = {};
    var existing = schoolAvgMap[gk][r.subject_id];
    if (!existing || r.updated_at >= existing.updated_at) {
      schoolAvgMap[gk][r.subject_id] = r;
    }
  });

  // ── 得点が1件以上ある生徒セット ───────────────────────────────────
  var studentHasAnyScore = {};
  scores.forEach(function (sc) {
    studentHasAnyScore[sc.student_id] = true;
  });

  // ── (学校, 学年) ごとの科目セット（パターンの union）────────────
  // 値: true=パターン内, 'orphaned'=パターン外
  var sgSubjectMap = {};
  patterns.forEach(function (p) {
    var sn  = String(p.school_name || '').trim();
    var gr  = String(p.grade       || '').trim();
    if (!sn) return;
    var key = sn + '||' + gr;
    if (!sgSubjectMap[key]) sgSubjectMap[key] = {};
    patternSubjects.forEach(function (ps) {
      if (String(ps.pattern_id || '').trim() === String(p.pattern_id || '').trim()) {
        if (!sgSubjectMap[key][ps.subject_id]) {
          sgSubjectMap[key][ps.subject_id] = true;
        }
      }
    });
  });

  // scores に含まれる教科のうちパターンにないものも列として追加（孤立教科）
  var studentById = {};
  students.forEach(function (s) { studentById[s.student_id] = s; });
  scores.forEach(function (sc) {
    var st = studentById[sc.student_id];
    if (!st) return;
    var sn  = st.school_name || '（学校名未設定）';
    var gr  = st.grade       || '（学年未設定）';
    var key = sn + '||' + gr;
    if (!sgSubjectMap[key]) sgSubjectMap[key] = {};
    if (!sgSubjectMap[key][sc.subject_id]) {
      sgSubjectMap[key][sc.subject_id] = 'orphaned';
    }
  });

  // (学校, 学年) ごとの科目リスト
  var subjectById = {};
  subjects.forEach(function (s) { subjectById[s.subject_id] = s; });

  // ── ジャンル順マップ（subjects_master の順序を使用）────────────────────
  var genreOrderMap = {};
  var _gOrdIdx = 0;
  subjects.forEach(function(s) {
    var gn = String(s.genre_name || 'その他').trim();
    if (!(gn in genreOrderMap)) genreOrderMap[gn] = _gOrdIdx++;
  });

  // ── 未解決アイテムから補完教科情報を構築（ページロード後に作成された OTHER_NNN 対応）──
  var tempSubjSupplement = {};
  (_scAllUnresolvedItems || []).forEach(function(item) {
    if (item.temp_subject_id) {
      tempSubjSupplement[item.temp_subject_id] = {
        subject_id:   item.temp_subject_id,
        subject_name: item.display_name,
        genre_name:   item.genre_name || 'その他'
      };
    }
  });

  // ── A. スライサー HTML 生成 ───────────────────────────────────

  // 「学校/コース」チップ収集
  var scLabelSet = {};
  var scLabelList = [];
  students.forEach(function (s) {
    var sn = _shortSchoolName(s.school_name  || '');
    var sc = s.school_course || '';
    var label = sc ? (sn + '/' + sc) : sn;
    if (label && !scLabelSet[label]) {
      scLabelSet[label] = true;
      scLabelList.push(label);
    }
  });
  scLabelList.sort(function (a, b) { return a.localeCompare(b, 'ja'); });

  // 「学年/文理」チップ収集
  var gsLabelSet = {};
  var gsLabelList = [];
  students.forEach(function (s) {
    var grade = s.grade      || '';
    var sub   = s.sub_course || '';
    var gs    = sub ? (grade + '/' + sub) : grade;
    if (gs && !gsLabelSet[gs]) {
      gsLabelSet[gs] = true;
      gsLabelList.push(gs);
    }
  });
  var _gsOrder = ['高1', '高2/文系', '高2/理系', '高3/文系', '高3/理系', '高1/文系', '高1/理系', '中1', '中2', '中3'];
  gsLabelList.sort(function (a, b) {
    var ai = _gsOrder.indexOf(a);
    var bi = _gsOrder.indexOf(b);
    if (ai < 0 && bi < 0) return a.localeCompare(b, 'ja');
    if (ai < 0) return 1;
    if (bi < 0) return -1;
    return ai - bi;
  });

  var slicerHtml = '<div class="sc-slicer-bar">';

  // 学校/コース行
  slicerHtml += '<div class="sc-slicer-group">';
  slicerHtml += '<span class="sc-slicer-label">学校/コース：</span>';
  scLabelList.forEach(function (label) {
    var active = _scFilterSchoolCourses.indexOf(label) >= 0 ? ' sc-slicer-active' : '';
    slicerHtml += '<button class="sc-slicer-chip' + active + '"'
      + ' onclick="_scToggleSchoolCourse(\'' + _esc(label) + '\')">'
      + _esc(label) + '</button>';
  });
  slicerHtml += '</div>';

  // 学年/文理行
  slicerHtml += '<div class="sc-slicer-group">';
  slicerHtml += '<span class="sc-slicer-label">学年/文理：</span>';
  gsLabelList.forEach(function (gs) {
    var active = _scFilterGradeSubs.indexOf(gs) >= 0 ? ' sc-slicer-active' : '';
    slicerHtml += '<button class="sc-slicer-chip' + active + '"'
      + ' onclick="_scToggleGradeSub(\'' + _esc(gs) + '\')">'
      + _esc(gs) + '</button>';
  });
  slicerHtml += '</div>';

  slicerHtml += '</div>'; // sc-slicer-bar

  // ── B. フィルタリング ──────────────────────────────────────────
  var filteredStudents = students.filter(function (s) {
    if (_scFilterSchoolCourses.length > 0) {
      var sn    = _shortSchoolName(s.school_name  || '');
      var sc    = s.school_course || '';
      var label = sc ? (sn + '/' + sc) : sn;
      if (_scFilterSchoolCourses.indexOf(label) < 0) return false;
    }
    if (_scFilterGradeSubs.length > 0) {
      var grade = s.grade      || '';
      var sub   = s.sub_course || '';
      var gs    = sub ? (grade + '/' + sub) : grade;
      if (_scFilterGradeSubs.indexOf(gs) < 0) return false;
    }
    return true;
  });

  // 検索クエリフィルタ
  if (_scSearchQuery) {
    var q = _scSearchQuery.toLowerCase();
    filteredStudents = filteredStudents.filter(function(s) {
      return (s.name         || '').toLowerCase().includes(q)
          || (s.pronunciation || '').toLowerCase().includes(q)
          || (s.school_name   || '').toLowerCase().includes(q);
    });
  }

  // 件数表示
  var countHtml = '<p class="sc-count-msg">全 ' + students.length + ' 名中 ' + filteredStudents.length + ' 名表示</p>';

  // ── C. 科目列の決定（フィルタ後生徒の (school_name, grade) ペアの union）──
  // フィルタ後の (school_name, grade) ペアを収集
  var filteredSgPairSet = {};
  filteredStudents.forEach(function (s) {
    var sn  = s.school_name || '（学校名未設定）';
    var gr  = s.grade       || '（学年未設定）';
    var key = sn + '||' + gr;
    filteredSgPairSet[key] = true;
  });

  // フィルタ後ペアに対応する科目を union で収集
  var unionSubjectMap = {};
  Object.keys(filteredSgPairSet).forEach(function (key) {
    var subMap = sgSubjectMap[key] || {};
    Object.keys(subMap).forEach(function (sid) {
      if (!unionSubjectMap[sid] || unionSubjectMap[sid] === 'orphaned') {
        unionSubjectMap[sid] = subMap[sid];
      }
    });
  });

  // フィルタ後生徒のスコアも孤立教科として追加
  filteredStudents.forEach(function (s) {
    var sn  = s.school_name || '（学校名未設定）';
    var gr  = s.grade       || '（学年未設定）';
    scores.forEach(function (sc) {
      if (sc.student_id !== s.student_id) return;
      if (!unionSubjectMap[sc.subject_id]) {
        unionSubjectMap[sc.subject_id] = 'orphaned';
      }
    });
  });

  var unionSubjectList = Object.keys(unionSubjectMap).map(function (sid) {
    var s    = subjectById[sid];
    var supp = !s ? (tempSubjSupplement[sid] || null) : null;
    return {
      subject_id:  sid,
      displayName: s ? s.subject_name : (supp ? supp.subject_name : sid),
      genre_name:  s ? (s.genre_name || 'その他') : (supp ? (supp.genre_name || 'その他') : 'その他'),
      orphaned:    unionSubjectMap[sid] === 'orphaned'
    };
  }).sort(function (a, b) {
    var ag = genreOrderMap[a.genre_name] !== undefined ? genreOrderMap[a.genre_name] : 9998;
    var bg = genreOrderMap[b.genre_name] !== undefined ? genreOrderMap[b.genre_name] : 9998;
    if (ag !== bg) return ag - bg;
    if (a.orphaned !== b.orphaned) return a.orphaned ? 1 : -1;
    var ai = subjects.findIndex(function (s) { return s.subject_id === a.subject_id; });
    var bi = subjects.findIndex(function (s) { return s.subject_id === b.subject_id; });
    return (ai < 0 ? 9999 : ai) - (bi < 0 ? 9999 : bi);
  });

  // 現在の試験区分の科目一覧を保存（モーダル用）
  _scActiveSubjects = unionSubjectList;

  // ── D. ソート ─────────────────────────────────────────────────
  var sortedStudents = _scSortStudents(filteredStudents, scoreMap);

  // ── セルストアをリセット ───────────────────────────────────────
  _scCellStore = [];

  // ── E. テーブル描画（フラット形式） ──────────────────────────────
  var html = slicerHtml + countHtml;

  if (sortedStudents.length === 0) {
    html += '<p class="sc-empty-msg">条件に一致する生徒がいません。</p>';
    area.innerHTML = html;
    return;
  }

  html += '<div class="sc-table-wrap"><table class="sc-table">';

  // thead
  html += '<thead><tr>';
  html += '<th class="sc-th-fixed">学校名</th>';
  html += '<th class="sc-th-fixed">コース</th>';
  html += '<th class="sc-th-fixed">学年</th>';
  html += '<th class="sc-th-fixed">文理</th>';
  html += '<th class="sc-th-name sc-th-sort" onclick="_scSetSort(\'name\')">'
        + '氏名' + _scSortIcon('name') + '</th>';
  html += '<th class="sc-th-fixed" title="成績表画像の提出">成績表</th>';
  unionSubjectList.forEach(function (subj) {
    var headerBg    = _scGetGenreHeaderColor(subj.genre_name);
    var orphanClass = subj.orphaned ? ' sc-th-orphaned' : '';
    var sortKey     = 'score_' + subj.subject_id;
    html += '<th class="sc-th-sort' + orphanClass + '"'
          + ' style="background-color:' + headerBg + '; color:#fff;"'
          + ' onclick="_scSetSort(\'' + _esc(sortKey) + '\')">'
          + _esc(subj.displayName) + _scSortIcon(sortKey) + '</th>';
  });
  html += '</tr></thead>';

  // tbody
  html += '<tbody>';

  var showAvgRows = (_scSortField === null);
  var prevGroupKey = null;
  var groupBuf = [];

  // グループ平均行を html に追記する内部ヘルパー
  function _scRenderGroupAvgRow(groupStudents) {
    if (groupStudents.length === 0) return;
    var first = groupStudents[0];
    html += '<tr class="sc-avg-row">';
    html += '<td class="sc-td-fixed sc-avg-fixed">' + _esc(_shortSchoolName(first.school_name) || '') + '</td>';
    html += '<td class="sc-td-fixed sc-avg-fixed">' + _esc(first.school_course || '') + '</td>';
    html += '<td class="sc-td-fixed sc-avg-fixed">' + _esc(first.grade         || '') + '</td>';
    html += '<td class="sc-td-fixed sc-avg-fixed">' + _esc(first.sub_course    || '') + '</td>';
    html += '<td class="sc-td-name sc-avg-label">' + groupStudents.length + '名 平均</td>';
    html += '<td class="sc-td-fixed sc-avg-fixed"></td>';
    unionSubjectList.forEach(function (subj) {
      var vals = [];
      groupStudents.forEach(function (stu) {
        var sc = scoreMap[stu.student_id + '||' + subj.subject_id] || null;
        var v  = sc ? _scGetCellValue(sc, _scDisplayMode) : null;
        if (v !== null && v !== 'absent' && v !== '' && v !== undefined) {
          var n = Number(v);
          if (!isNaN(n)) vals.push(n);
        }
      });
      var cellBg = _scGetGenreColor(subj.genre_name);
      if (vals.length === 0) {
        html += '<td class="sc-cell sc-avg-cell" style="background-color:' + cellBg + '">—</td>';
      } else {
        var avg = vals.reduce(function (a, b) { return a + b; }, 0) / vals.length;
        html += '<td class="sc-cell sc-avg-cell" style="background-color:' + cellBg + '">'
              + avg.toFixed(1) + '</td>';
      }
    });
    html += '</tr>';
  }

  // 学校平均行を html に追記する内部ヘルパー
  function _scRenderSchoolAvgRow(first) {
    var gk = [first.school_name||'', first.school_course||'', first.grade||'', first.sub_course||''].join('||');
    var avgBySubject = schoolAvgMap[gk] || {};
    var hasAny = unionSubjectList.some(function(subj) {
      return avgBySubject[subj.subject_id] && avgBySubject[subj.subject_id].grade_avg != null;
    });
    if (!hasAny) return;
    html += '<tr class="sc-school-avg-row">';
    html += '<td class="sc-td-fixed sc-school-avg-fixed">' + _esc(_shortSchoolName(first.school_name) || '') + '</td>';
    html += '<td class="sc-td-fixed sc-school-avg-fixed">' + _esc(first.school_course || '') + '</td>';
    html += '<td class="sc-td-fixed sc-school-avg-fixed">' + _esc(first.grade         || '') + '</td>';
    html += '<td class="sc-td-fixed sc-school-avg-fixed">' + _esc(first.sub_course    || '') + '</td>';
    html += '<td class="sc-td-name sc-school-avg-label">学校平均</td>';
    html += '<td class="sc-td-fixed sc-school-avg-fixed"></td>';
    unionSubjectList.forEach(function(subj) {
      var cellBg = _scGetGenreColor(subj.genre_name);
      var rec = avgBySubject[subj.subject_id];
      if (rec && rec.grade_avg != null) {
        html += '<td class="sc-cell sc-school-avg-cell" style="background-color:' + cellBg + '">'
              + Number(rec.grade_avg).toFixed(1) + '</td>';
      } else {
        html += '<td class="sc-cell sc-school-avg-cell" style="background-color:' + cellBg + '">—</td>';
      }
    });
    html += '</tr>';
  }

  sortedStudents.forEach(function (student) {
    if (showAvgRows) {
      var gKey = [student.school_name||'', student.school_course||'', student.grade||'', student.sub_course||''].join('||');
      if (prevGroupKey !== null && gKey !== prevGroupKey) {
        _scRenderGroupAvgRow(groupBuf);
        _scRenderSchoolAvgRow(groupBuf[0]);
        groupBuf = [];
      }
      prevGroupKey = gKey;
      groupBuf.push(student);
    }

    var hasScore    = !!studentHasAnyScore[student.student_id];
    var hasPhoto    = !!_scUploadsMap[student.student_id];
    var rowClickable = hasScore || hasPhoto;
    html += '<tr' + (rowClickable ? ' style="cursor:pointer;" onclick="_scOpenStudentModal(\'' + _esc(student.student_id) + '\')"' : '') + '>';
    html += '<td class="sc-td-fixed">' + _esc(_shortSchoolName(student.school_name) || '') + '</td>';
    html += '<td class="sc-td-fixed">' + _esc(student.school_course || '') + '</td>';
    html += '<td class="sc-td-fixed">' + _esc(student.grade        || '') + '</td>';
    html += '<td class="sc-td-fixed">' + _esc(student.sub_course   || '') + '</td>';
    html += '<td class="sc-td-name">'  + _esc(student.name         || '') + '</td>';
    html += '<td class="sc-td-fixed" style="text-align:center;color:#34c759;">'
          + (hasPhoto ? '✔' : '') + '</td>';

    unionSubjectList.forEach(function (subj) {
      var key      = student.student_id + '||' + subj.subject_id;
      var scoreObj = scoreMap[key] || null;
      var cellBg   = _scGetGenreColor(subj.genre_name);
      var cellVal  = _scGetCellValue(scoreObj, _scDisplayMode);

      if (scoreObj && (scoreObj.score !== null || scoreObj.not_taken)) {
        if (scoreObj.not_taken) {
          html += '<td class="sc-cell sc-cell-filled" style="background-color:' + cellBg + '">'
                + '<span class="sc-badge-absent">欠</span></td>';
        } else {
          html += '<td class="sc-cell sc-cell-filled" style="background-color:' + cellBg + '">'
                + _esc(cellVal !== null && cellVal !== undefined && cellVal !== '' ? String(cellVal) : '—')
                + '</td>';
        }
      } else if (hasScore || rowClickable) {
        html += '<td class="sc-cell sc-cell-editable" style="background-color:' + cellBg + '">—</td>';
      } else {
        html += '<td class="sc-cell sc-cell-empty" style="background-color:' + cellBg + '">—</td>';
      }
    });

    html += '</tr>';
  });

  // 最後のグループをフラッシュ
  if (showAvgRows && groupBuf.length > 0) {
    _scRenderGroupAvgRow(groupBuf);
    _scRenderSchoolAvgRow(groupBuf[0]);
  }

  html += '</tbody></table></div>';

  area.innerHTML = html;
}

function _scOnSearch(val) {

/**
 * 「学校/コース」チップのトグル
 * @param {string} label - 「学校名/コース名」または「学校名」
 */
function _scToggleSchoolCourse(label) {
  var i = _scFilterSchoolCourses.indexOf(label);
  if (i >= 0) _scFilterSchoolCourses.splice(i, 1);
  else _scFilterSchoolCourses.push(label);
  _scRerender();
}

/**
 * 「学年/文理」チップのトグル
 * @param {string} gs - 「学年/文理」または「学年」
 */
function _scToggleGradeSub(gs) {
  var i = _scFilterGradeSubs.indexOf(gs);
  if (i >= 0) _scFilterGradeSubs.splice(i, 1);
  else _scFilterGradeSubs.push(gs);
  _scRerender();
}

/**
 * ソートフィールドの設定（同じフィールドなら昇降切替）
 * @param {string} field - 'name' | 'score_<subject_id>'
 */
function _scSetSort(field) {
  if (_scSortField === field) {
    _scSortAsc = !_scSortAsc;
  } else {
    _scSortField = field;
    // 氏名列は昇順スタート、得点列は降順スタート
    _scSortAsc = (field === 'name');
  }
  _scRerender();
}

/**
 * ソートアイコン HTML を返す
 * @param {string} field - 'name' | 'score_<subject_id>'
 * @returns {string} HTML文字列
 */
function _scSortIcon(field) {
  if (_scSortField !== field) return '<span class="sc-sort-icon">⇅</span>';
  return _scSortAsc
    ? '<span class="sc-sort-icon sc-sort-active">▲</span>'
    : '<span class="sc-sort-icon sc-sort-active">▼</span>';
}

const _SC_GRADE_ORDER = ['中1','中2','中3','高1','高2','高3'];
function _scGradeRank(g) {
  var i = _SC_GRADE_ORDER.indexOf(g);
  return i >= 0 ? i : 99;
}

/**
 * 生徒配列をソートして返す
 * @param {Array} arr - 生徒オブジェクト配列
 * @param {Object} scoreMap - キー "studentId||subjectId" のスコアマップ
 * @returns {Array} ソート済み配列
 */
function _scSortStudents(arr, scoreMap) {
  // デフォルト多段ソート用のコース登録順マップを1回だけ構築
  var courseOrderMap = {};
  var _settings = (window.masterData && window.masterData.schoolSettings) || [];
  _settings.forEach(function(s, i) {
    var c = s.school_course || '';
    if (!(c in courseOrderMap)) courseOrderMap[c] = i;
  });

  return arr.slice().sort(function (a, b) {
    // ── デフォルト多段ソート（学年→学校名→コース登録順→氏名）
    if (_scSortField === null) {
      var cmp = _scGradeRank(a.grade || '') - _scGradeRank(b.grade || '');
      if (cmp !== 0) return cmp;
      cmp = (a.school_name || '').localeCompare(b.school_name || '', 'ja');
      if (cmp !== 0) return cmp;
      var ca = courseOrderMap[a.school_course || ''];
      var cb = courseOrderMap[b.school_course || ''];
      if (ca === undefined) ca = 9999;
      if (cb === undefined) cb = 9999;
      cmp = ca - cb;
      if (cmp !== 0) return cmp;
      var va = a.pronunciation || a.name || '';
      var vb = b.pronunciation || b.name || '';
      return va.localeCompare(vb, 'ja');
    }

    // ── 氏名ソート
    if (_scSortField === 'name') {
      var va = a.pronunciation || a.name || '';
      var vb = b.pronunciation || b.name || '';
      var cmp = va.localeCompare(vb, 'ja');
      return _scSortAsc ? cmp : -cmp;
    }

    // ── 得点ソート
    if (_scSortField && _scSortField.indexOf('score_') === 0) {
      var sid = _scSortField.slice(6);
      var sa  = scoreMap[a.student_id + '||' + sid];
      var sb  = scoreMap[b.student_id + '||' + sid];
      var _va = sa ? _scGetCellValue(sa, _scDisplayMode) : null;
      var _vb = sb ? _scGetCellValue(sb, _scDisplayMode) : null;
      var na  = (_va === null || _va === 'absent') ? null : _va;
      var nb  = (_vb === null || _vb === 'absent') ? null : _vb;
      // ランク: 0=数値あり, 1=NULLデータ(エントリあり・値なし), 2=データIDなし(エントリ自体なし)
      var rankA = (sa == null) ? 2 : (na === null ? 1 : 0);
      var rankB = (sb == null) ? 2 : (nb === null ? 1 : 0);
      if (rankA !== rankB) return rankA - rankB;  // null系は方向不変で常に末尾
      if (rankA === 0) {
        var numCmp = Number(na) - Number(nb);
        return _scSortAsc ? numCmp : -numCmp;
      }
      return 0;
    }

    return 0;
  });
}

// セルストアエントリ生成ヘルパー
function _scMakeCellEntry(scoreObj, student, subj) {
  return {
    scoreId:     scoreObj ? (scoreObj.score_id || '') : '',
    studentId:   student.student_id,
    studentName: student.name || '',
    subjectId:   subj.subject_id,
    displayName: subj.displayName,
    score:       scoreObj ? scoreObj.score      : null,
    gradeRank:   scoreObj ? scoreObj.grade_rank : null,
    classRank:   scoreObj ? scoreObj.class_rank : null,
    notTaken:    scoreObj ? !!scoreObj.not_taken : false,
    // 新規作成用
    termTestId:  _scSelectedTermTestId,
    year:        (_scScoreData && _scScoreData.year) || _scSelectedYear,
    grade:       student.grade || '',
  };
}

// 表示モードに応じたセル値
function _scGetCellValue(scoreObj, mode) {
  if (!scoreObj) return null;
  if (scoreObj.not_taken) return 'absent';
  if (mode === 'class_rank') return scoreObj.class_rank;
  if (mode === 'grade_rank') return scoreObj.grade_rank;
  return scoreObj.score;
}

var _scModalStudentId = null;
var _scModalRows      = [];   // [{subjectId, scoreId, origSubjectId, ...}]
var _scPhotoExpanded  = false;

window._scOpenStudentModal = function(studentId) {
  if (!_scScoreData) return;
  _scModalStudentId = studentId;
  _scPhotoExpanded  = false;
  _scModalRows      = [];

  var students = _scScoreData.students || [];
  var scores   = _scScoreData.scores   || [];
  var student  = students.find(function(s) { return s.student_id === studentId; });
  if (!student) return;

  var termTestId = _scSelectedTermTestId;
  var year       = (_scScoreData && _scScoreData.year) || _scSelectedYear;
  var allSubjects = (window.masterData && window.masterData.subjects) || [];

  // 当該生徒のスコアマップ（subject_id → score）
  var studentScores = {};
  scores.forEach(function(sc) {
    if (sc.student_id === studentId && sc.term_test_id === termTestId) {
      studentScores[sc.subject_id] = sc;
    }
  });

  // _scActiveSubjects をベースに行を作成（モーダルの科目リスト）
  var activeSubjIds = {};
  _scActiveSubjects.forEach(function(subj) { activeSubjIds[subj.subject_id] = subj; });

  // 追加: 当該生徒のスコアにある教科で activeSubjects にないもの
  Object.keys(studentScores).forEach(function(sid) {
    if (!activeSubjIds[sid]) {
      activeSubjIds[sid] = { subject_id: sid, displayName: sid, genre_name: 'その他' };
    }
  });

  Object.keys(activeSubjIds).forEach(function(sid) {
    var subj = activeSubjIds[sid];
    var sc   = studentScores[sid] || null;
    _scModalRows.push({
      subjectId:     sid,
      origSubjectId: sid,
      displayName:   subj.displayName,
      genre_name:    subj.genre_name || 'その他',
      scoreId:       sc ? (sc.score_id || '')       : '',
      score:         sc ? (sc.score      !== null ? String(sc.score)      : '') : '',
      gradeRank:     sc ? (sc.grade_rank !== null ? String(sc.grade_rank) : '') : '',
      classRank:     sc ? (sc.class_rank !== null ? String(sc.class_rank) : '') : '',
      notTaken:      sc ? !!sc.not_taken : false,
      termTestId:    termTestId,
      year:          year,
      grade:         student.grade || '',
    });
  });

  // タイトル
  var termTest = ((window.masterData && window.masterData.termTests) || []).find(function(t) {
    return t.term_test_id === termTestId;
  });
  var testName = termTest ? (termTest.test_name || termTestId) : termTestId;
  var titleEl  = document.getElementById('sc-student-modal-title');
  if (titleEl) titleEl.textContent = student.name + '　' + testName;

  // 左列: 科目 × 得点フォーム（ジャンルごとにセクション分割）
  var leftEl = document.getElementById('sc-student-modal-left');
  if (leftEl) {
    var studentGrade = student.grade || '';

    // ジャンル順を masterData の subjects 順序から構築
    var genreOrder = {};
    var _gIdx = 0;
    allSubjects.forEach(function(s) {
      var gn = s.genre_name || 'その他';
      if (!(gn in genreOrder)) genreOrder[gn] = _gIdx++;
    });

    // _scModalRows をジャンル順でソート
    var sortedRows = _scModalRows.slice().sort(function(a, b) {
      var ag = genreOrder[a.genre_name] !== undefined ? genreOrder[a.genre_name] : 9999;
      var bg = genreOrder[b.genre_name] !== undefined ? genreOrder[b.genre_name] : 9999;
      return ag - bg;
    });

    // index を元の _scModalRows に対応させるため Map を作成
    var rowIndexBySubjectId = {};
    _scModalRows.forEach(function(row, i) { rowIndexBySubjectId[row.subjectId] = i; });

    var tableHtml = '<table style="width:100%;border-collapse:collapse;font-size:0.88rem;">';
    tableHtml += '<thead><tr style="background:#f2f2f7;">'
      + '<th style="padding:6px 8px;text-align:left;">科目</th>'
      + '<th style="padding:6px 8px;text-align:center;width:70px;">得点</th>'
      + '<th style="padding:6px 8px;text-align:center;width:70px;">学年順位</th>'
      + '<th style="padding:6px 8px;text-align:center;width:70px;">ｸﾗｽ順位</th>'
      + '<th style="padding:6px 8px;text-align:center;width:48px;">欠試</th>'
      + '</tr></thead><tbody>';

    var prevGenre = null;
    sortedRows.forEach(function(row) {
      var i        = rowIndexBySubjectId[row.subjectId];
      var genre    = row.genre_name || 'その他';
      var genreBg  = _scGetGenreHeaderColor(genre);

      // ジャンルが変わったらセクションヘッダーを挿入
      if (genre !== prevGenre) {
        prevGenre = genre;
        tableHtml += '<tr style="background:' + genreBg + ';">'
          + '<td colspan="5" style="padding:5px 8px;font-size:0.82em;font-weight:700;color:#fff;">'
          + _esc(genre) + '</td></tr>';
      }

      // 科目変更ドロップダウン: 同ジャンルかつ生徒の学年に対応する科目のみ
      var subjectOptions = '<option value="">（変更しない）</option>';
      var sameGenreSubjects = allSubjects.filter(function(s) {
        var sGenre = s.genre_name || 'その他';
        var sGrade = s.grade || '';
        return sGenre === genre
          && (!sGrade || sGrade === studentGrade);
      });
      sameGenreSubjects.forEach(function(s) {
        subjectOptions += '<option value="' + _esc(s.subject_id) + '">' + _esc(s.subject_name) + '</option>';
      });

      tableHtml += '<tr style="border-bottom:1px solid #f0f0f0;">'
        + '<td style="padding:6px 4px;">'
        +   '<div style="font-size:0.82em;font-weight:600;margin-bottom:2px;">' + _esc(row.displayName) + '</div>'
        +   '<select data-row="' + i + '" data-field="subjectId" onchange="_scModalRowChange(this)"'
        +   ' style="font-size:0.78em;width:100%;padding:2px;">'
        +   subjectOptions
        +   '</select>'
        + '</td>'
        + '<td style="padding:4px;"><input type="number" data-row="' + i + '" data-field="score"'
        +   ' value="' + _esc(row.score) + '" min="0" max="2000"'
        +   ' style="width:64px;text-align:right;" onchange="_scModalRowChange(this)"></td>'
        + '<td style="padding:4px;"><input type="number" data-row="' + i + '" data-field="gradeRank"'
        +   ' value="' + _esc(row.gradeRank) + '" min="1"'
        +   ' style="width:64px;text-align:right;" onchange="_scModalRowChange(this)"></td>'
        + '<td style="padding:4px;"><input type="number" data-row="' + i + '" data-field="classRank"'
        +   ' value="' + _esc(row.classRank) + '" min="1"'
        +   ' style="width:64px;text-align:right;" onchange="_scModalRowChange(this)"></td>'
        + '<td style="padding:4px;text-align:center;"><input type="checkbox" data-row="' + i + '" data-field="notTaken"'
        +   (row.notTaken ? ' checked' : '') + ' onchange="_scModalRowChange(this)"></td>'
        + '</tr>';
    });

    tableHtml += '</tbody></table>';
    leftEl.innerHTML = tableHtml;
  }

  // 右列: 写真
  var rightEl = document.getElementById('sc-student-modal-right');
  if (rightEl) {
    var upload = _scUploadsMap[studentId];
    if (upload && upload.thumbnail_b64) {
      var imgSrc = upload.thumbnail_b64.startsWith('data:')
        ? upload.thumbnail_b64
        : 'data:image/jpeg;base64,' + upload.thumbnail_b64;
      rightEl.innerHTML = '<p style="margin:0;font-size:0.82rem;color:#8e8e93;">成績表画像</p>'
        + '<img id="sc-modal-photo-img" src="' + imgSrc + '" alt="成績表" '
        +   'style="max-width:100%;max-height:200px;object-fit:contain;border-radius:8px;cursor:pointer;border:1px solid #e5e5ea;"'
        +   ' onclick="_scTogglePhotoExpand()" title="クリックで拡大">'
        + '<button onclick="_scTogglePhotoExpand()" style="font-size:0.78rem;background:none;border:none;cursor:pointer;color:#4a7fc1;">拡大表示</button>';
    } else {
      rightEl.innerHTML = '<p style="color:#aaa;font-size:0.85rem;text-align:center;margin-top:24px;">成績表の提出なし</p>';
    }
  }

  var modal = document.getElementById('sc-student-modal');
  if (modal) modal.style.display = 'flex';
};

window._scCloseStudentModal = function() {
  var modal = document.getElementById('sc-student-modal');
  if (modal) modal.style.display = 'none';
  _scModalStudentId = null;
  _scModalRows = [];
};

window._scModalRowChange = function(el) {
  var rowIdx = parseInt(el.dataset.row, 10);
  var field  = el.dataset.field;
  if (!_scModalRows[rowIdx]) return;
  if (field === 'notTaken') {
    _scModalRows[rowIdx].notTaken = el.checked;
  } else if (field === 'subjectId') {
    if (el.value) _scModalRows[rowIdx].subjectId = el.value;
  } else {
    _scModalRows[rowIdx][field] = el.value;
  }
};

window._scTogglePhotoExpand = function() {
  _scPhotoExpanded = !_scPhotoExpanded;
  var img = document.getElementById('sc-modal-photo-img');
  var right = document.getElementById('sc-student-modal-right');
  if (img) {
    img.style.maxHeight = _scPhotoExpanded ? '65vh' : '200px';
    img.style.maxWidth  = _scPhotoExpanded ? '100%' : '100%';
  }
  if (right) {
    right.style.width = _scPhotoExpanded ? '420px' : '280px';
  }
};

window._scSaveStudentModal = function() {
  if (!_scModalStudentId) return;
  var cramId = window.selectedCramId;
  if (!cramId) { showMessage('校舎を選択してください', 'error'); return; }

  var rows = _scModalRows;
  if (rows.length === 0) { _scCloseStudentModal(); return; }

  setLoading(true, '得点を保存中...');

  var total    = rows.length;
  var done     = 0;
  var hasError = false;

  rows.forEach(function(row) {
    var actualSubjectId = row.subjectId;  // 変更後 or 元のsubjectId
    var subjectChanged  = actualSubjectId !== row.origSubjectId;

    var afterScoreSave = function() {
      done++;
      if (done >= total) {
        setLoading(false);
        if (!hasError) {
          showMessage('保存しました', 'success');
          _scCloseStudentModal();
          _scFetchAndRender();
        }
      }
    };

    var doScoreSave = function(subjectIdToUse) {
      var payload = {
        cramId:     cramId,
        scoreId:    row.scoreId,
        studentId:  _scModalStudentId,
        subjectId:  subjectIdToUse,
        termTestId: row.termTestId,
        year:       row.year,
        grade:      row.grade,
        score:      row.score,
        gradeRank:  row.gradeRank || null,
        classRank:  row.classRank || null,
        notTaken:   row.notTaken,
      };
      var fn = row.scoreId ? 'updateAdminScore' : 'createAdminScore';
      google.script.run
        .withSuccessHandler(function(res) {
          if (!res || !res.success) {
            hasError = true;
            showMessage((res && res.error) || '保存エラー', 'error');
          }
          afterScoreSave();
        })
        .withFailureHandler(function(err) {
          hasError = true;
          showMessage('エラー: ' + (err && err.message ? err.message : String(err)), 'error');
          afterScoreSave();
        })
        [fn](payload);
    };

    if (subjectChanged && row.scoreId) {
      // 科目変更あり → まず科目を変更してからスコアを更新
      google.script.run
        .withSuccessHandler(function(res) {
          if (res && res.success) {
            row.scoreId = res.new_score_id || row.scoreId;
          }
          doScoreSave(actualSubjectId);
        })
        .withFailureHandler(function() {
          doScoreSave(actualSubjectId);
        })
        .changeScoreSubject({ cramId: cramId, scoreId: row.scoreId, newSubjectId: actualSubjectId });
    } else {
      doScoreSave(actualSubjectId);
    }
  });
};

    termTestId: cell.termTestId,
    year:       cell.year,
    grade:      cell.grade,
    score:      scoreVal.value,
    gradeRank:  gradeRankVal ? (gradeRankVal.value || null) : null,
    classRank:  classRankVal ? (classRankVal.value || null) : null,
    notTaken:   notTakenVal  ? notTakenVal.checked : false,
  };

  var fn = cell.scoreId ? 'updateAdminScore' : 'createAdminScore';

  setLoading(true, 'スコアを保存中...');
  google.script.run
    .withSuccessHandler(function (res) {
      setLoading(false);
      if (res && res.success) {
        showMessage('保存しました。', 'success');
        _scCloseDetail();
        _scFetchAndRender();
      } else {
        showMessage((res && res.error) || '保存に失敗しました。', 'error');
      }
    })
    .withFailureHandler(function (err) {
      setLoading(false);
      showMessage('エラー: ' + (err && err.message ? err.message : String(err)), 'error');
    })
    [fn](payload);
};

// =====================================================================
// 補助：ジャンル色（ユーザー画面の logic_ui_render.html と同じパレット）
// =====================================================================
function _scGetGenreColor(genreName) {
  var gc  = (window.GENRE_COLORS || {})[genreName] || (window.GENRE_COLORS || {})['その他'] || {};
  var hex = gc.light || '#f8fafc';
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',0.15)';
}
function _scGetGenreHeaderColor(genreName) {
  var gc = (window.GENRE_COLORS || {})[genreName] || (window.GENRE_COLORS || {})['その他'] || {};
  return gc.dark || '#475569';
}

// =====================================================================
// 未解決教科（その他）セクション
// =====================================================================
var _scUnresolvedGrade    = '';   // 選択中の学年フィルター
var _scAllUnresolvedItems = [];   // ロード済み全 items（フィルター再利用）

function _scLoadUnresolved() {
  var area = document.getElementById('sc-unresolved-area');
  if (!area || !window.selectedCramId) return;

  google.script.run
    .withSuccessHandler(function (res) {
      if (!res || !res.success || !res.items || res.items.length === 0) {
        area.innerHTML = '';
        _scAllUnresolvedItems = [];
        if (_scScoreData) _scRerender();
        return;
      }
      _scAllUnresolvedItems = res.items;
      _scRenderUnresolvedList(res.items);
      if (_scScoreData) _scRerender();
    })
    .withFailureHandler(function () {
      area.innerHTML = '';
      _scAllUnresolvedItems = [];
    })
    .getUnresolvedOtherSubjects(window.selectedCramId);
}

function _scRenderUnresolvedList(items) {
  var area = document.getElementById('sc-unresolved-area');
  if (!area) return;

  // 学年一覧を items から収集
  var gradeSet = {};
  items.forEach(function(item) {
    (item.grades || []).forEach(function(g) { if (g) gradeSet[g] = true; });
  });
  var allGrades = Object.keys(gradeSet).sort();

  var grade = _scUnresolvedGrade;
  var filtered = grade
    ? items.filter(function(item) { return (item.grades || []).indexOf(grade) !== -1; })
    : items;

  if (filtered.length === 0) {
    area.innerHTML = '';
    return;
  }

  var allSubjects = (window.masterData && window.masterData.subjects) || [];

  var gradeSelHtml = '<select id="sc-unresolved-grade-sel" class="sc-sel" onchange="_scOnUnresolvedGradeChange(this.value)">'
    + '<option value="">全学年</option>';
  allGrades.forEach(function(g) {
    gradeSelHtml += '<option value="' + _esc(g) + '"' + (grade === g ? ' selected' : '') + '>' + _esc(g) + '</option>';
  });
  gradeSelHtml += '</select>';

  var html = '<div class="sc-unresolved-section">';
  html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">';
  html += '<h4 class="sc-unresolved-title" style="margin:0;">未解決教科（その他）</h4>';
  html += '<label class="sc-label">学年：</label>' + gradeSelHtml;
  html += '</div>';
  html += '<p class="sc-unresolved-desc">生徒が「その他」で入力した教科名です。下記の2つの方法で解決してください。</p>';
  html += '<table class="sc-unresolved-table">';
  html += '<thead><tr>'
    + '<th>入力名</th>'
    + '<th>件数</th>'
    + '<th>生徒</th>'
    + '<th class="sc-action-col sc-action-col-approve">① このまま新しい科目として登録</th>'
    + '<th class="sc-action-col sc-action-col-merge">② 既存の科目に統合（スコア引き継ぎ）</th>'
    + '</tr></thead>';
  html += '<tbody>';

  filtered.forEach(function(item, idx) {
    var selectId = 'sc-unresolved-sel-' + idx;

    // 生徒情報を「名前（学校・学年・コース）」形式でフォーマット
    var studentTexts = (item.students || []).map(function(s) {
      var detail = [_shortSchoolName(s.school_name), s.grade, s.school_course].filter(Boolean).join('・');
      return s.name + (detail ? '（' + detail + '）' : '');
    });

    // 教科ドロップダウン：仮教科（is_temp='1'）は選択肢から除外、grade と genre で絞り込む
    var _tempSubjectIds = new Set((_scAllUnresolvedItems || []).map(function(i) { return i.temp_subject_id; }).filter(Boolean));
    var itemGrades    = item.grades    || [];
    var itemGenreName = item.genre_name || '';
    var rowSubjects = allSubjects.filter(function(s) {
      if (_tempSubjectIds.has(String(s.subject_id || '').trim())) return false;
      var sg = String(s.grade      || '').trim();
      var gn = String(s.genre_name || '').trim();
      var gradeOk = itemGrades.length === 0 || !sg || itemGrades.some(function(g) { return g === sg; });
      var genreOk = !itemGenreName || !gn || gn === itemGenreName;
      return gradeOk && genreOk;
    });

    var resolveIdentifier = item.temp_subject_id || item.raw_subject_name || '';

    html += '<tr>';

    // 入力名・件数・生徒
    html += '<td><strong>' + _esc(item.display_name || item.raw_subject_name || '') + '</strong>';
    if (itemGenreName) html += '<br><small style="color:#888;">' + _esc(itemGenreName) + '</small>';
    html += '</td>';
    html += '<td style="text-align:center;">' + _esc(String(item.count)) + '</td>';
    html += '<td style="font-size:0.85em;">' + studentTexts.map(_scEsc).join('<br>') + '</td>';

    // ① 新規登録
    var approveHtml = '';
    if (item.temp_subject_id) {
      approveHtml = '<div class="sc-action-box sc-action-box-approve">'
        + '<p class="sc-action-desc">入力されたこの名称を<br>新しい科目として登録します</p>'
        + '<button class="sc-btn-approve" onclick="_scApproveNewSubject(\'' + _esc(item.temp_subject_id) + '\')">このまま登録</button>'
        + '</div>';
    } else {
      approveHtml = '<div class="sc-action-box sc-action-box-disabled"><p class="sc-action-desc">旧形式データのため<br>この操作は使用できません</p></div>';
    }
    html += '<td>' + approveHtml + '</td>';

    // ② 既存科目に統合
    var mergeHtml = '<div class="sc-action-box sc-action-box-merge">'
      + '<p class="sc-action-desc">既存の科目を選択すると<br>スコアが引き継がれます</p>'
      + '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">'
      + '<select id="' + selectId + '" class="sc-sel">'
      + '<option value="">-- 科目を選ぶ --</option>';
    rowSubjects.forEach(function(s) {
      mergeHtml += '<option value="' + _esc(s.subject_id) + '">' + _esc(s.subject_name) + '</option>';
    });
    mergeHtml += '</select>'
      + '<button class="sc-btn-save" onclick="_scResolveOther(\'' + _esc(resolveIdentifier) + '\', \'' + _esc(selectId) + '\')">統合する</button>'
      + '</div></div>';
    html += '<td>' + mergeHtml + '</td>';

    html += '</tr>';
  });

  html += '</tbody></table></div>';
  area.innerHTML = html;
}

function _scOnUnresolvedGradeChange(grade) {
  _scUnresolvedGrade = grade;
  _scRenderUnresolvedList(_scAllUnresolvedItems);
}

function _scApproveNewSubject(tempSubjectId) {
  setLoading(true, '登録中...');
  google.script.run
    .withSuccessHandler(function(resStr) {
      setLoading(false);
      var res = JSON.parse(resStr);
      if (res.success) {
        showMessage('新しい科目として登録しました。', 'success');
        _scLoadUnresolved();
        _scFetchAndRender();
      } else {
        showMessage(res.error || '失敗しました。', 'error');
      }
    })
    .withFailureHandler(function(err) {
      setLoading(false);
      showMessage('エラー: ' + (err && err.message ? err.message : String(err)), 'error');
    })
    .approveNewSubject(tempSubjectId);
}

function _scResolveOther(rawName, selectId) {
  var sel = document.getElementById(selectId);
  if (!sel || !sel.value) { showMessage('紐づける教科を選んでください。', 'error'); return; }

  var realSubjectId = sel.value;
  setLoading(true, '教科を紐づけ中...');
  google.script.run
    .withSuccessHandler(function (resStr) {
      setLoading(false);
      var res = JSON.parse(resStr);
      if (res.success) {
        showMessage(res.updated + ' 件を紐づけました。', 'success');
        _scLoadUnresolved();
        _scFetchAndRender();
      } else {
        showMessage(res.error || '失敗しました。', 'error');
      }
    })
    .withFailureHandler(function (err) {
      setLoading(false);
      showMessage('エラー: ' + (err && err.message ? err.message : String(err)), 'error');
    })
    .resolveOtherSubject(window.selectedCramId, rawName, realSubjectId);
}
</script>
