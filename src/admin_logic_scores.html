<script>
// =====================================================================
// 得点一覧タブ  (admin_logic_scores.html)
// =====================================================================
// 状態変数（プレフィックス _sc_ で他タブと衝突回避）
var _scSelectedTermTestId   = '';
var _scScoreData             = null;   // { exams, scores, students }
var _scCellStore             = [];     // [{scoreId,studentName,displayName,...}] クリック参照用
var _scCurrentDetailScoreId = '';     // モーダル用（HTML非埋め込みでXSS回避）

// =====================================================================
// エントリーポイント
// =====================================================================
window.renderScoreManager = function () {
  var content = document.getElementById('admin-content');
  if (!content) return;

  var termTests = (window.masterData && window.masterData.termTests) || [];
  if (termTests.length === 0) {
    content.innerHTML = '<h3>④得点一覧</h3><p class="sc-empty-msg">試験区分が登録されていません。</p>';
    return;
  }

  if (!_scSelectedTermTestId) {
    _scSelectedTermTestId = String(termTests[0].term_test_id || '').trim();
  }

  var toolbarHtml = '<div class="sc-toolbar">'
    + '<label class="sc-label">試験区分：</label>'
    + '<select id="sc-termtest-sel" class="sc-sel" onchange="_scOnTermTestChange(this.value)">';
  termTests.forEach(function (tt) {
    var tid     = String(tt.term_test_id || '').trim();
    var label   = String(tt.test_name   || tid);
    var sel     = tid === _scSelectedTermTestId ? ' selected' : '';
    toolbarHtml += '<option value="' + _scEsc(tid) + '"' + sel + '>' + _scEsc(label) + '</option>';
  });
  toolbarHtml += '</select></div>';

  content.innerHTML = '<h3>④得点一覧</h3>' + toolbarHtml
    + '<div id="sc-table-area"><p class="sc-empty-msg">読み込み中...</p></div>';

  _scFetchAndRender();
};

function _scOnTermTestChange(termTestId) {
  _scSelectedTermTestId = termTestId;
  _scFetchAndRender();
}

// =====================================================================
// データ取得
// =====================================================================
function _scFetchAndRender() {
  var area = document.getElementById('sc-table-area');
  if (area) area.innerHTML = '<p class="sc-empty-msg">読み込み中...</p>';

  google.script.run
    .withSuccessHandler(function (res) {
      if (!res || !res.success) {
        if (area) area.innerHTML = '<p class="sc-error-msg">エラー: ' + _scEsc((res && res.error) || '取得失敗') + '</p>';
        return;
      }
      _scScoreData = res;
      _scRerender();
    })
    .withFailureHandler(function (err) {
      if (area) area.innerHTML = '<p class="sc-error-msg">エラー: ' + _scEsc(err && err.message ? err.message : String(err)) + '</p>';
    })
    .getAdminScores(window.selectedCramId, _scSelectedTermTestId);
}

// =====================================================================
// クロス表の描画
// =====================================================================
function _scRerender() {
  var area = document.getElementById('sc-table-area');
  if (!area || !_scScoreData) return;

  var students       = _scScoreData.students      || [];
  var scores         = _scScoreData.scores         || [];
  var patterns       = (window.masterData && window.masterData.patterns)        || [];
  var patternSubjects= (window.masterData && window.masterData.patternSubjects) || [];
  var subjects       = (window.masterData && window.masterData.subjects)        || [];

  if (students.length === 0) {
    area.innerHTML = '<p class="sc-empty-msg">対象の生徒が見つかりません。</p>';
    return;
  }

  // ── スコアマップ構築（サーバー側で term_test_id フィルタ済み）──────
  // キー: "studentId||subjectId"
  var scoreMap = {};
  scores.forEach(function (sc) {
    var key = sc.student_id + '||' + sc.subject_id;
    var existing = scoreMap[key];
    if (!existing || sc.update_at >= existing.update_at) {
      scoreMap[key] = sc;
    }
  });

  // ── (学校, 学年) ごとの科目セット（同一学年の全パターンの union）──
  // key: "schoolName||grade" → { subject_id: true }
  var sgSubjectMap = {};
  patterns.forEach(function (p) {
    var sn  = String(p.school_name || '').trim();
    var gr  = String(p.grade       || '').trim();
    if (!sn) return;
    var key = sn + '||' + gr;
    if (!sgSubjectMap[key]) sgSubjectMap[key] = {};
    patternSubjects.forEach(function (ps) {
      if (String(ps.pattern_id || '').trim() === String(p.pattern_id || '').trim()) {
        sgSubjectMap[key][ps.subject_id] = true;
      }
    });
  });

  // (学校, 学年) ごとの科目リスト（subjects_master の登録順でソート）
  var sgSubjectList = {};
  Object.keys(sgSubjectMap).forEach(function (key) {
    var sn  = key.split('||')[0];
    var ids = sgSubjectMap[key];
    sgSubjectList[key] = subjects
      .filter(function (s) { return ids[s.subject_id]; })
      .map(function (s) {
        return {
          subject_id:  s.subject_id,
          displayName: window._resolveDisplayName(sn, s.subject_id),
          genre_name:  s.genre_name || 'その他'
        };
      });
  });

  // ── 学校 → 学年 → 生徒 の2段階グループ化 ──────────────────────
  var schoolMap = {};
  students.forEach(function (s) {
    var sn = s.school_name || '（学校名未設定）';
    var gr = s.grade       || '（学年未設定）';
    if (!schoolMap[sn])     schoolMap[sn]     = {};
    if (!schoolMap[sn][gr]) schoolMap[sn][gr] = [];
    schoolMap[sn][gr].push(s);
  });

  // 並び順（生徒一覧と同じ localStorage キーを利用）
  var sortedSchools = _scGetSortedSchools(Object.keys(schoolMap));

  // ── セルストアをリセット ───────────────────────────────────────
  _scCellStore = [];

  var html = '';

  // ── 学校ジャンプタブ（2校以上で表示）────────────────────────────
  if (sortedSchools.length >= 2) {
    html += '<div class="st-jump-nav">';
    sortedSchools.forEach(function (sn, i) {
      html += '<a class="st-jump-chip" href="javascript:void(0)"'
            + ' onclick="document.getElementById(\'sc-sg-' + i + '\').scrollIntoView({behavior:\'smooth\',block:\'start\'})">'
            + _scEsc(sn) + '</a>';
    });
    html += '</div>';
  }

  // ── 学校 → 学年 の2段階テーブル ───────────────────────────────
  sortedSchools.forEach(function (sn, groupIdx) {
    var gradeMap     = schoolMap[sn] || {};
    var sortedGrades = _scSortGrades(Object.keys(gradeMap));

    html += '<div id="sc-sg-' + groupIdx + '" class="sc-school-block">';
    html += '<div class="sc-school-header">' + _scEsc(sn) + '</div>';

    sortedGrades.forEach(function (grade) {
      var gradeStudents = (gradeMap[grade] || []).slice().sort(function (a, b) {
        return (a.pronunciation || a.name || '').localeCompare(b.pronunciation || b.name || '', 'ja');
      });
      var sgKey       = sn + '||' + grade;
      var subjectList = sgSubjectList[sgKey] || [];

      html += '<div class="sc-grade-block">';
      html += '<div class="sc-grade-header">' + _scEsc(grade) + '</div>';

      if (subjectList.length === 0) {
        html += '<p class="sc-empty-msg" style="padding:6px 12px;">教科パターンが設定されていません。</p>';
        html += '</div>';
        return;
      }

      html += '<div class="sc-table-wrap"><table class="sc-table">';

      // thead
      html += '<thead><tr>';
      html += '<th class="sc-th-name">氏名</th>';
      subjectList.forEach(function (subj) {
        var bg = _scGetGenreColor(subj.genre_name);
        html += '<th style="background-color:' + bg + '">' + _scEsc(subj.displayName) + '</th>';
      });
      html += '</tr></thead>';

      // tbody
      html += '<tbody>';
      gradeStudents.forEach(function (student) {
        html += '<tr>';
        html += '<td class="sc-td-name">' + _scEsc(student.name || '') + '</td>';

        subjectList.forEach(function (subj) {
          var key      = student.student_id + '||' + subj.subject_id;
          var scoreObj = scoreMap[key] || null;

          var cellBg = _scGetGenreColor(subj.genre_name);
          if (scoreObj && (scoreObj.score !== null || scoreObj.not_taken)) {
            var idx = _scCellStore.length;
            _scCellStore.push({
              scoreId:     scoreObj.score_id,
              examId:      scoreObj.exam_id,
              studentId:   student.student_id,
              studentName: student.name,
              subjectId:   subj.subject_id,
              displayName: subj.displayName,
              score:       scoreObj.score,
              gradeRank:   scoreObj.grade_rank,
              classRank:   scoreObj.class_rank,
              notTaken:    scoreObj.not_taken,
            });

            if (scoreObj.not_taken) {
              html += '<td class="sc-cell sc-cell-filled" style="background-color:' + cellBg + '"'
                    + ' onclick="_scOpenDetail(' + idx + ')" title="クリックで詳細・編集">'
                    + '<span class="sc-badge-absent">欠</span></td>';
            } else {
              html += '<td class="sc-cell sc-cell-filled" style="background-color:' + cellBg + '"'
                    + ' onclick="_scOpenDetail(' + idx + ')" title="クリックで詳細・編集">'
                    + _scEsc(scoreObj.score !== null ? scoreObj.score : '—') + '</td>';
            }
          } else {
            html += '<td class="sc-cell sc-cell-empty" style="background-color:' + cellBg + '">—</td>';
          }
        });

        html += '</tr>';
      });
      html += '</tbody></table></div>';
      html += '</div>'; // sc-grade-block
    });

    html += '</div>'; // sc-school-block
  });

  area.innerHTML = html;
}

// =====================================================================
// 補助：学年を高1→高2→高3 順にソート
// =====================================================================
function _scSortGrades(grades) {
  var order = { '高1': 1, '高2': 2, '高3': 3 };
  return grades.slice().sort(function (a, b) {
    var ao = order[a] !== undefined ? order[a] : 99;
    var bo = order[b] !== undefined ? order[b] : 99;
    if (ao !== bo) return ao - bo;
    return a.localeCompare(b, 'ja');
  });
}

// =====================================================================
// 補助：学校の並び順（生徒一覧と共用の localStorage キー）
// =====================================================================
function _scGetSortedSchools(schools) {
  try {
    var key       = 'st_school_order_' + (window.selectedCramId || '');
    var savedJson = localStorage.getItem(key);
    if (savedJson) {
      var saved = JSON.parse(savedJson);
      var ordered = saved.filter(function (s) { return schools.indexOf(s) >= 0; });
      schools.forEach(function (s) { if (ordered.indexOf(s) < 0) ordered.push(s); });
      return ordered;
    }
  } catch (e) { /* localStorage 利用不可の場合は無視 */ }
  return schools.slice().sort(function (a, b) { return a.localeCompare(b, 'ja'); });
}

// =====================================================================
// スコア詳細モーダル
// =====================================================================
window._scOpenDetail = function (idx) {
  var cell = _scCellStore[idx];
  if (!cell) return;
  _scCurrentDetailScoreId = cell.scoreId;

  var card = document.querySelector('#score-detail-modal .modal-card');
  if (!card) return;

  card.innerHTML = ''
    + '<h4 style="margin:0 0 8px;">得点詳細</h4>'
    + '<p style="margin:0 0 16px; color:#555;">'
    +   '<strong>' + _scEsc(cell.studentName) + '</strong>'
    +   ' <span style="color:#888;">/</span> '
    +   _scEsc(cell.displayName)
    + '</p>'
    + '<div class="sc-form-group">'
    +   '<label class="sc-form-label">得点</label>'
    +   '<input type="number" id="sc-inp-score" class="sc-form-input" min="0" max="200"'
    +   ' value="' + (cell.score !== null && cell.score !== undefined ? _scEsc(String(cell.score)) : '') + '">'
    + '</div>'
    + '<div class="sc-form-group">'
    +   '<label class="sc-form-label">学年順位</label>'
    +   '<input type="number" id="sc-inp-grade-rank" class="sc-form-input" min="1"'
    +   ' value="' + (cell.gradeRank !== null && cell.gradeRank !== undefined ? _scEsc(String(cell.gradeRank)) : '') + '">'
    + '</div>'
    + '<div class="sc-form-group">'
    +   '<label class="sc-form-label">クラス順位</label>'
    +   '<input type="number" id="sc-inp-class-rank" class="sc-form-input" min="1"'
    +   ' value="' + (cell.classRank !== null && cell.classRank !== undefined ? _scEsc(String(cell.classRank)) : '') + '">'
    + '</div>'
    + '<div class="sc-form-group" style="align-items:center;">'
    +   '<label class="sc-form-label">欠試</label>'
    +   '<input type="checkbox" id="sc-inp-not-taken"' + (cell.notTaken ? ' checked' : '') + '>'
    + '</div>'
    + '<div style="display:flex; gap:8px; margin-top:20px; justify-content:flex-end;">'
    +   '<button class="sc-btn-cancel" onclick="_scCloseDetail()">キャンセル</button>'
    +   '<button class="sc-btn-save" onclick="_scSaveDetail()">保存</button>'
    + '</div>';

  var modal = document.getElementById('score-detail-modal');
  if (modal) modal.style.display = 'flex';
};

window._scCloseDetail = function () {
  var modal = document.getElementById('score-detail-modal');
  if (modal) modal.style.display = 'none';
  _scCurrentDetailScoreId = '';
};

window._scSaveDetail = function () {
  var scoreId = _scCurrentDetailScoreId;
  if (!scoreId) return;

  var scoreVal     = document.getElementById('sc-inp-score');
  var gradeRankVal = document.getElementById('sc-inp-grade-rank');
  var classRankVal = document.getElementById('sc-inp-class-rank');
  var notTakenVal  = document.getElementById('sc-inp-not-taken');
  if (!scoreVal) return;

  var payload = {
    cramId:    window.selectedCramId,
    scoreId:   scoreId,
    score:     scoreVal.value,
    gradeRank: gradeRankVal ? (gradeRankVal.value || null) : null,
    classRank: classRankVal ? (classRankVal.value || null) : null,
    notTaken:  notTakenVal  ? notTakenVal.checked : false,
  };

  setLoading(true, 'スコアを保存中...');
  google.script.run
    .withSuccessHandler(function (res) {
      setLoading(false);
      if (res && res.success) {
        showMessage('保存しました。', 'success');
        _scCloseDetail();
        _scFetchAndRender();
      } else {
        showMessage((res && res.error) || '保存に失敗しました。', 'error');
      }
    })
    .withFailureHandler(function (err) {
      setLoading(false);
      showMessage('エラー: ' + (err && err.message ? err.message : String(err)), 'error');
    })
    .updateAdminScore(payload);
};

// =====================================================================
// 補助：ジャンル色（ユーザー画面の logic_ui_render.html と同じパレット）
// =====================================================================
var _scGenrePalette = {
  '数学': '#dbeafe',
  '英語': '#fed7aa',
  '国語': '#bbf7d0',
  '理科': '#fbcfe8',
  '社会': '#fde68a',
  'その他': '#f8fafc'
};
function _scGetGenreColor(genreName) {
  var hex = _scGenrePalette[genreName] || _scGenrePalette['その他'];
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',0.15)';
}

// =====================================================================
// 補助：HTML エスケープ
// =====================================================================
function _scEsc(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
</script>

<style>

  margin-bottom: 16px;

  font-weight: bold;
  white-space: nowrap;
}

  padding: 5px 10px;
  border: 1px solid #c8d4e8;
  border-radius: 4px;
  font-size: 0.95em;
}

/* ── メッセージ ──────────────────────────────────────────── */
.sc-empty-msg { color: #888; padding: 16px 0; }

/* ── 学校グループ ────────────────────────────────────────── */
.sc-school-block { margin-bottom: 36px; }
.sc-school-header {
  padding: 8px 14px;
  margin-bottom: 8px;
  background: #e8eef6;
  border-left: 4px solid #4a7fc1;
  border-radius: 0 4px 4px 0;
  font-weight: bold;
  font-size: 1.05em;
  color: #2c4a7c;
}

/* ── 学年サブヘッダー ────────────────────────────────────── */
.sc-grade-block { margin-bottom: 20px; }

  padding: 4px 12px 4px 24px;
  margin-bottom: 6px;
  font-weight: 600;
  font-size: 0.95em;
  color: #3a5d9c;
  border-left: 3px solid #a8bcdf;
  background: #f4f7fc;
}

.sc-table-wrap {
  overflow-x: auto;
  border: 1px solid #dde3ec;
  border-radius: 6px;
}

  border-collapse: collapse;

  min-width: 100%;
}

.sc-table td {
  border: 1px solid #e0e4ea;

  text-align: center;
}

}

</style>
