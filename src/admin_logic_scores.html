<script>
// =====================================================================
// 得点一覧タブ  (admin_logic_scores.html)
// =====================================================================
// 状態変数（プレフィックス _sc_ で他タブと衝突回避）
var _scSelectedTermTestId = '';
var _scSelectedYear       = '';     // 選択中の年度（空=全年度）
var _scFilterSchoolCourses = [];    // 選択中の「学校/コース」ラベルの配列
var _scFilterGradeSubs     = [];    // 選択中の「学年/文理」の配列
var _scSortField           = 'name'; // 'name' | 'score_<subject_id>'
var _scSortAsc             = true;
var _scDisplayMode        = 'score'; // 'score' | 'class_rank' | 'grade_rank'
var _scScoreData          = null;   // { scores, students }
var _scLastCramId         = null;   // キャッシュ有効性チェック用
var _scCellStore          = [];     // [{scoreId,studentName,...}] クリック参照用
var _scCurrentDetailIdx   = -1;     // モーダル用（XSS回避のため HTML 非埋め込み）

// =====================================================================
// エントリーポイント
// =====================================================================
window.renderScoreManager = function () {
  var content = document.getElementById('admin-content');
  if (!content) return;

  var termTests = (window.masterData && window.masterData.termTests) || [];
  if (termTests.length === 0) {
    content.innerHTML = '<h3>④得点一覧</h3><p class="sc-empty-msg">試験区分が登録されていません。</p>';
    return;
  }

  if (!_scSelectedTermTestId) {
    _scSelectedTermTestId = String(termTests[0].term_test_id || '').trim();
  }

  // 校舎が変わった場合のみフィルター・ソート・キャッシュをリセット
  var _cramId = window.selectedCramId || '';
  if (_scLastCramId !== _cramId) {
    _scFilterSchoolCourses = [];
    _scFilterGradeSubs     = [];
    _scSortField           = 'name';
    _scSortAsc             = true;
    _scLastCramId          = _cramId;
    _scScoreData           = null;
  }

  // 年度リストを examPeriods から構築（新しい年度を先頭に）
  var examPeriods = (window.masterData && window.masterData.examPeriods) || [];
  var _yearSet = {};
  var availableYears = [];
  examPeriods.forEach(function (p) {
    var y = String(p.year || '').trim();
    if (y && !_yearSet[y]) { _yearSet[y] = true; availableYears.push(y); }
  });
  availableYears.sort(function (a, b) { return Number(b) - Number(a); });

  // デフォルト年度: 現在の学年暦年度
  if (!_scSelectedYear) {
    var _now = new Date();
    _scSelectedYear = String(_now.getMonth() >= 3 ? _now.getFullYear() : _now.getFullYear() - 1);
  }

  var toolbarHtml = '<div class="sc-toolbar">';
  if (availableYears.length > 0) {
    toolbarHtml += '<label class="sc-label">年度：</label>'
      + '<select id="sc-year-sel" class="sc-sel" onchange="_scOnYearChange(this.value)">';
    availableYears.forEach(function (y) {
      var sel = y === _scSelectedYear ? ' selected' : '';
      toolbarHtml += '<option value="' + _scEsc(y) + '"' + sel + '>' + _scEsc(y) + '年度</option>';
    });
    toolbarHtml += '</select>';
  }
  toolbarHtml += '<label class="sc-label">試験区分：</label>'
    + '<select id="sc-termtest-sel" class="sc-sel" onchange="_scOnTermTestChange(this.value)">';
  termTests.forEach(function (tt) {
    var tid   = String(tt.term_test_id || '').trim();
    var label = String(tt.test_name   || tid);
    var sel   = tid === _scSelectedTermTestId ? ' selected' : '';
    toolbarHtml += '<option value="' + _scEsc(tid) + '"' + sel + '>' + _scEsc(label) + '</option>';
  });
  toolbarHtml += '</select>';
  toolbarHtml += '<label class="sc-label">表示：</label>'
    + '<select id="sc-mode-sel" class="sc-sel" onchange="_scOnDisplayModeChange(this.value)">'
    + '<option value="score"'      + (_scDisplayMode === 'score'      ? ' selected' : '') + '>得点</option>'
    + '<option value="class_rank"' + (_scDisplayMode === 'class_rank' ? ' selected' : '') + '>クラス順位</option>'
    + '<option value="grade_rank"' + (_scDisplayMode === 'grade_rank' ? ' selected' : '') + '>学年順位</option>'
    + '</select>';
  toolbarHtml += '</div>';

  content.innerHTML = '<h3>④得点一覧</h3>' + toolbarHtml
    + '<div id="sc-table-area">'
    + (_scScoreData ? '' : '<p class="sc-empty-msg">読み込み中...</p>')
    + '</div>'
    + '<div id="sc-unresolved-area"></div>';

  if (_scScoreData) {
    _scRerender();  // キャッシュがあれば即時描画
  }
  _scFetchAndRender();  // 常にバックグラウンドで最新取得
  _scLoadUnresolved();
};

function _scOnTermTestChange(termTestId) {
  _scSelectedTermTestId = termTestId;
  _scFetchAndRender();
}

function _scOnYearChange(year) {
  _scSelectedYear = year;
  _scFetchAndRender();
}

function _scOnDisplayModeChange(mode) {
  _scDisplayMode = mode;
  _scRerender();
}

// =====================================================================
// データ取得
// =====================================================================
function _scFetchAndRender() {
  var area = document.getElementById('sc-table-area');
  if (area && !_scScoreData) area.innerHTML = '<p class="sc-empty-msg">読み込み中...</p>';

  google.script.run
    .withSuccessHandler(function (res) {
      if (!res || !res.success) {
        if (area) area.innerHTML = '<p class="sc-error-msg">エラー: ' + _scEsc((res && res.error) || '取得失敗') + '</p>';
        return;
      }
      _scScoreData = res;

      _scRerender();
    })
    .withFailureHandler(function (err) {
      if (area) area.innerHTML = '<p class="sc-error-msg">エラー: ' + _scEsc(err && err.message ? err.message : String(err)) + '</p>';
    })
    .getAdminScores(window.selectedCramId, _scSelectedTermTestId, _scSelectedYear);
}

// =====================================================================
// フラットテーブルの描画（スライサー付き）
// =====================================================================
function _scRerender() {
  var area = document.getElementById('sc-table-area');
  if (!area || !_scScoreData) return;

  var students        = _scScoreData.students       || [];
  var scores          = _scScoreData.scores          || [];
  var patterns        = (window.masterData && window.masterData.patterns)        || [];
  var patternSubjects = (window.masterData && window.masterData.patternSubjects) || [];
  var subjects        = (window.masterData && window.masterData.subjects)        || [];

  if (students.length === 0) {
    area.innerHTML = '<p class="sc-empty-msg">対象の生徒が見つかりません。</p>';
    return;
  }

  // ── スコアマップ構築（サーバー側で term_test_id フィルタ済み）──────
  // キー: "studentId||subjectId"
  var scoreMap = {};
  scores.forEach(function (sc) {
    var key = sc.student_id + '||' + sc.subject_id;
    var existing = scoreMap[key];
    if (!existing || sc.update_at >= existing.update_at) {
      scoreMap[key] = sc;
    }
  });

  // ── 得点が1件以上ある生徒セット ───────────────────────────────────
  var studentHasAnyScore = {};
  scores.forEach(function (sc) {
    studentHasAnyScore[sc.student_id] = true;
  });

  // ── (学校, 学年) ごとの科目セット（パターンの union）────────────
  // 値: true=パターン内, 'orphaned'=パターン外
  var sgSubjectMap = {};
  patterns.forEach(function (p) {
    var sn  = String(p.school_name || '').trim();
    var gr  = String(p.grade       || '').trim();
    if (!sn) return;
    var key = sn + '||' + gr;
    if (!sgSubjectMap[key]) sgSubjectMap[key] = {};
    patternSubjects.forEach(function (ps) {
      if (String(ps.pattern_id || '').trim() === String(p.pattern_id || '').trim()) {
        if (!sgSubjectMap[key][ps.subject_id]) {
          sgSubjectMap[key][ps.subject_id] = true;
        }
      }
    });
  });

  // scores に含まれる教科のうちパターンにないものも列として追加（孤立教科）
  var studentById = {};
  students.forEach(function (s) { studentById[s.student_id] = s; });
  scores.forEach(function (sc) {
    var st = studentById[sc.student_id];
    if (!st) return;
    var sn  = st.school_name || '（学校名未設定）';
    var gr  = st.grade       || '（学年未設定）';
    var key = sn + '||' + gr;
    if (!sgSubjectMap[key]) sgSubjectMap[key] = {};
    if (!sgSubjectMap[key][sc.subject_id]) {
      sgSubjectMap[key][sc.subject_id] = 'orphaned';
    }
  });

  // (学校, 学年) ごとの科目リスト
  var subjectById = {};
  subjects.forEach(function (s) { subjectById[s.subject_id] = s; });

  // ── ジャンル順マップ（subjects_master の順序を使用）────────────────────
  var genreOrderMap = {};
  var _gOrdIdx = 0;
  subjects.forEach(function(s) {
    var gn = String(s.genre_name || 'その他').trim();
    if (!(gn in genreOrderMap)) genreOrderMap[gn] = _gOrdIdx++;
  });

  // ── 未解決アイテムから補完教科情報を構築（ページロード後に作成された OTHER_NNN 対応）──
  var tempSubjSupplement = {};
  (_scAllUnresolvedItems || []).forEach(function(item) {
    if (item.temp_subject_id) {
      tempSubjSupplement[item.temp_subject_id] = {
        subject_id:   item.temp_subject_id,
        subject_name: item.display_name,
        genre_name:   item.genre_name || 'その他'
      };
    }
  });

  // ── A. スライサー HTML 生成 ───────────────────────────────────

  // 「学校/コース」チップ収集
  var scLabelSet = {};
  var scLabelList = [];
  students.forEach(function (s) {
    var sn = s.school_name  || '';
    var sc = s.school_course || '';
    var label = sc ? (sn + '/' + sc) : sn;
    if (label && !scLabelSet[label]) {
      scLabelSet[label] = true;
      scLabelList.push(label);
    }
  });
  scLabelList.sort(function (a, b) { return a.localeCompare(b, 'ja'); });

  // 「学年/文理」チップ収集
  var gsLabelSet = {};
  var gsLabelList = [];
  students.forEach(function (s) {
    var grade = s.grade      || '';
    var sub   = s.sub_course || '';
    var gs    = sub ? (grade + '/' + sub) : grade;
    if (gs && !gsLabelSet[gs]) {
      gsLabelSet[gs] = true;
      gsLabelList.push(gs);
    }
  });
  var _gsOrder = ['高1', '高2/文系', '高2/理系', '高3/文系', '高3/理系', '高1/文系', '高1/理系', '中1', '中2', '中3'];
  gsLabelList.sort(function (a, b) {
    var ai = _gsOrder.indexOf(a);
    var bi = _gsOrder.indexOf(b);
    if (ai < 0 && bi < 0) return a.localeCompare(b, 'ja');
    if (ai < 0) return 1;
    if (bi < 0) return -1;
    return ai - bi;
  });

  var slicerHtml = '<div class="sc-slicer-bar">';

  // 学校/コース行
  slicerHtml += '<div class="sc-slicer-group">';
  slicerHtml += '<span class="sc-slicer-label">学校/コース：</span>';
  scLabelList.forEach(function (label) {
    var active = _scFilterSchoolCourses.indexOf(label) >= 0 ? ' sc-slicer-active' : '';
    slicerHtml += '<button class="sc-slicer-chip' + active + '"'
      + ' onclick="_scToggleSchoolCourse(\'' + _scEscAttr(label) + '\')">'
      + _scEsc(label) + '</button>';
  });
  slicerHtml += '</div>';

  // 学年/文理行
  slicerHtml += '<div class="sc-slicer-group">';
  slicerHtml += '<span class="sc-slicer-label">学年/文理：</span>';
  gsLabelList.forEach(function (gs) {
    var active = _scFilterGradeSubs.indexOf(gs) >= 0 ? ' sc-slicer-active' : '';
    slicerHtml += '<button class="sc-slicer-chip' + active + '"'
      + ' onclick="_scToggleGradeSub(\'' + _scEscAttr(gs) + '\')">'
      + _scEsc(gs) + '</button>';
  });
  slicerHtml += '</div>';

  slicerHtml += '</div>'; // sc-slicer-bar

  // ── B. フィルタリング ──────────────────────────────────────────
  var filteredStudents = students.filter(function (s) {
    if (_scFilterSchoolCourses.length > 0) {
      var sn    = s.school_name  || '';
      var sc    = s.school_course || '';
      var label = sc ? (sn + '/' + sc) : sn;
      if (_scFilterSchoolCourses.indexOf(label) < 0) return false;
    }
    if (_scFilterGradeSubs.length > 0) {
      var grade = s.grade      || '';
      var sub   = s.sub_course || '';
      var gs    = sub ? (grade + '/' + sub) : grade;
      if (_scFilterGradeSubs.indexOf(gs) < 0) return false;
    }
    return true;
  });

  // 件数表示
  var countHtml = '<p class="sc-count-msg">全 ' + students.length + ' 名中 ' + filteredStudents.length + ' 名表示</p>';

  // ── C. 科目列の決定（フィルタ後生徒の (school_name, grade) ペアの union）──
  // フィルタ後の (school_name, grade) ペアを収集
  var filteredSgPairSet = {};
  filteredStudents.forEach(function (s) {
    var sn  = s.school_name || '（学校名未設定）';
    var gr  = s.grade       || '（学年未設定）';
    var key = sn + '||' + gr;
    filteredSgPairSet[key] = true;
  });

  // フィルタ後ペアに対応する科目を union で収集
  var unionSubjectMap = {};
  Object.keys(filteredSgPairSet).forEach(function (key) {
    var subMap = sgSubjectMap[key] || {};
    Object.keys(subMap).forEach(function (sid) {
      if (!unionSubjectMap[sid] || unionSubjectMap[sid] === 'orphaned') {
        unionSubjectMap[sid] = subMap[sid];
      }
    });
  });

  // フィルタ後生徒のスコアも孤立教科として追加
  filteredStudents.forEach(function (s) {
    var sn  = s.school_name || '（学校名未設定）';
    var gr  = s.grade       || '（学年未設定）';
    scores.forEach(function (sc) {
      if (sc.student_id !== s.student_id) return;
      if (!unionSubjectMap[sc.subject_id]) {
        unionSubjectMap[sc.subject_id] = 'orphaned';
      }
    });
  });

  var unionSubjectList = Object.keys(unionSubjectMap).map(function (sid) {
    var s    = subjectById[sid];
    var supp = !s ? (tempSubjSupplement[sid] || null) : null;
    return {
      subject_id:  sid,
      displayName: s ? s.subject_name : (supp ? supp.subject_name : sid),
      genre_name:  s ? (s.genre_name || 'その他') : (supp ? (supp.genre_name || 'その他') : 'その他'),
      orphaned:    unionSubjectMap[sid] === 'orphaned'
    };
  }).sort(function (a, b) {
    var ag = genreOrderMap[a.genre_name] !== undefined ? genreOrderMap[a.genre_name] : 9998;
    var bg = genreOrderMap[b.genre_name] !== undefined ? genreOrderMap[b.genre_name] : 9998;
    if (ag !== bg) return ag - bg;
    if (a.orphaned !== b.orphaned) return a.orphaned ? 1 : -1;
    var ai = subjects.findIndex(function (s) { return s.subject_id === a.subject_id; });
    var bi = subjects.findIndex(function (s) { return s.subject_id === b.subject_id; });
    return (ai < 0 ? 9999 : ai) - (bi < 0 ? 9999 : bi);
  });

  // ── D. ソート ─────────────────────────────────────────────────
  var sortedStudents = _scSortStudents(filteredStudents, scoreMap);

  // ── セルストアをリセット ───────────────────────────────────────
  _scCellStore = [];

  // ── E. テーブル描画（フラット形式） ──────────────────────────────
  var html = slicerHtml + countHtml;

  if (sortedStudents.length === 0) {
    html += '<p class="sc-empty-msg">条件に一致する生徒がいません。</p>';
    area.innerHTML = html;
    return;
  }

  html += '<div class="sc-table-wrap"><table class="sc-table">';

  // thead
  html += '<thead><tr>';
  html += '<th class="sc-th-fixed">学校名</th>';
  html += '<th class="sc-th-fixed">コース</th>';
  html += '<th class="sc-th-fixed">学年</th>';
  html += '<th class="sc-th-fixed">文理</th>';
  html += '<th class="sc-th-name sc-th-sort" onclick="_scSetSort(\'name\')">'
        + '氏名' + _scSortIcon('name') + '</th>';
  unionSubjectList.forEach(function (subj) {
    var headerBg    = _scGetGenreHeaderColor(subj.genre_name);
    var orphanClass = subj.orphaned ? ' sc-th-orphaned' : '';
    var sortKey     = 'score_' + subj.subject_id;
    html += '<th class="sc-th-sort' + orphanClass + '"'
          + ' style="background-color:' + headerBg + '; color:#fff;"'
          + ' onclick="_scSetSort(\'' + _scEscAttr(sortKey) + '\')">'
          + _scEsc(subj.displayName) + _scSortIcon(sortKey) + '</th>';
  });
  html += '</tr></thead>';

  // tbody
  html += '<tbody>';
  sortedStudents.forEach(function (student) {
    html += '<tr>';
    html += '<td class="sc-td-fixed">' + _scEsc(student.school_name  || '') + '</td>';
    html += '<td class="sc-td-fixed">' + _scEsc(student.school_course || '') + '</td>';
    html += '<td class="sc-td-fixed">' + _scEsc(student.grade        || '') + '</td>';
    html += '<td class="sc-td-fixed">' + _scEsc(student.sub_course   || '') + '</td>';
    html += '<td class="sc-td-name">'  + _scEsc(student.name         || '') + '</td>';

    var hasScore = !!studentHasAnyScore[student.student_id];

    unionSubjectList.forEach(function (subj) {
      var key      = student.student_id + '||' + subj.subject_id;
      var scoreObj = scoreMap[key] || null;
      var cellBg   = _scGetGenreColor(subj.genre_name);
      var cellVal  = _scGetCellValue(scoreObj, _scDisplayMode);

      if (scoreObj && (scoreObj.score !== null || scoreObj.not_taken)) {
        var idx = _scCellStore.length;
        _scCellStore.push(_scMakeCellEntry(scoreObj, student, subj));
        if (scoreObj.not_taken) {
          html += '<td class="sc-cell sc-cell-filled" style="background-color:' + cellBg + '"'
                + ' onclick="_scOpenDetail(' + idx + ')" title="クリックで詳細・編集">'
                + '<span class="sc-badge-absent">欠</span></td>';
        } else {
          html += '<td class="sc-cell sc-cell-filled" style="background-color:' + cellBg + '"'
                + ' onclick="_scOpenDetail(' + idx + ')" title="クリックで詳細・編集">'
                + _scEsc(cellVal !== null && cellVal !== undefined && cellVal !== '' ? String(cellVal) : '—')
                + '</td>';
        }
      } else if (hasScore) {
        var idx = _scCellStore.length;
        _scCellStore.push(_scMakeCellEntry(null, student, subj));
        html += '<td class="sc-cell sc-cell-editable" style="background-color:' + cellBg + '"'
              + ' onclick="_scOpenDetail(' + idx + ')" title="クリックして登録">—</td>';
      } else {
        html += '<td class="sc-cell sc-cell-empty" style="background-color:' + cellBg + '">—</td>';
      }
    });

    html += '</tr>';
  });
  html += '</tbody></table></div>';

  area.innerHTML = html;
}

// =====================================================================
// スライサー・ソート補助関数
// =====================================================================

/**
 * 「学校/コース」チップのトグル
 * @param {string} label - 「学校名/コース名」または「学校名」
 */
function _scToggleSchoolCourse(label) {
  var i = _scFilterSchoolCourses.indexOf(label);
  if (i >= 0) _scFilterSchoolCourses.splice(i, 1);
  else _scFilterSchoolCourses.push(label);
  _scRerender();
}

/**
 * 「学年/文理」チップのトグル
 * @param {string} gs - 「学年/文理」または「学年」
 */
function _scToggleGradeSub(gs) {
  var i = _scFilterGradeSubs.indexOf(gs);
  if (i >= 0) _scFilterGradeSubs.splice(i, 1);
  else _scFilterGradeSubs.push(gs);
  _scRerender();
}

/**
 * ソートフィールドの設定（同じフィールドなら昇降切替）
 * @param {string} field - 'name' | 'score_<subject_id>'
 */
function _scSetSort(field) {
  if (_scSortField === field) { _scSortAsc = !_scSortAsc; }
  else { _scSortField = field; _scSortAsc = true; }
  _scRerender();
}

/**
 * ソートアイコン HTML を返す
 * @param {string} field - 'name' | 'score_<subject_id>'
 * @returns {string} HTML文字列
 */
function _scSortIcon(field) {
  if (_scSortField !== field) return '<span class="sc-sort-icon">⇅</span>';
  return _scSortAsc
    ? '<span class="sc-sort-icon sc-sort-active">▲</span>'
    : '<span class="sc-sort-icon sc-sort-active">▼</span>';
}

/**
 * 生徒配列をソートして返す
 * @param {Array} arr - 生徒オブジェクト配列
 * @param {Object} scoreMap - キー "studentId||subjectId" のスコアマップ
 * @returns {Array} ソート済み配列
 */
function _scSortStudents(arr, scoreMap) {
  return arr.slice().sort(function (a, b) {
    var cmp;
    if (_scSortField === 'name') {
      var va = a.pronunciation || a.name || '';
      var vb = b.pronunciation || b.name || '';
      cmp = va.localeCompare(vb, 'ja');
    } else if (_scSortField && _scSortField.indexOf('score_') === 0) {
      var sid = _scSortField.slice(6);
      var sa  = scoreMap[a.student_id + '||' + sid];
      var sb  = scoreMap[b.student_id + '||' + sid];
      var _va = sa ? _scGetCellValue(sa, _scDisplayMode) : null;
      var _vb = sb ? _scGetCellValue(sb, _scDisplayMode) : null;
      var va  = (_va === null || _va === 'absent') ? null : _va;
      var vb  = (_vb === null || _vb === 'absent') ? null : _vb;
      if (va === null && vb === null) cmp = 0;
      else if (va === null)           cmp = 1;
      else if (vb === null)           cmp = -1;
      else                            cmp = Number(va) - Number(vb);
    } else {
      cmp = 0;
    }
    return _scSortAsc ? cmp : -cmp;
  });
}

// セルストアエントリ生成ヘルパー
function _scMakeCellEntry(scoreObj, student, subj) {
  return {
    scoreId:     scoreObj ? (scoreObj.score_id || '') : '',
    studentId:   student.student_id,
    studentName: student.name || '',
    subjectId:   subj.subject_id,
    displayName: subj.displayName,
    score:       scoreObj ? scoreObj.score      : null,
    gradeRank:   scoreObj ? scoreObj.grade_rank : null,
    classRank:   scoreObj ? scoreObj.class_rank : null,
    notTaken:    scoreObj ? !!scoreObj.not_taken : false,
    // 新規作成用
    termTestId:  _scSelectedTermTestId,
    year:        (_scScoreData && _scScoreData.year) || _scSelectedYear,
    grade:       student.grade || '',
  };
}

// 表示モードに応じたセル値
function _scGetCellValue(scoreObj, mode) {
  if (!scoreObj) return null;
  if (scoreObj.not_taken) return 'absent';
  if (mode === 'class_rank') return scoreObj.class_rank;
  if (mode === 'grade_rank') return scoreObj.grade_rank;
  return scoreObj.score;
}

// =====================================================================
// スコア詳細モーダル
// =====================================================================
window._scOpenDetail = function (idx) {
  var cell = _scCellStore[idx];
  if (!cell) return;
  _scCurrentDetailIdx = idx;

  var card = document.querySelector('#score-detail-modal .modal-card');
  if (!card) return;

  var isNew = !cell.scoreId;

  card.innerHTML = ''
    + '<h4 style="margin:0 0 8px;">' + (isNew ? '得点登録' : '得点詳細') + '</h4>'
    + '<p style="margin:0 0 16px; color:#555;">'
    +   '<strong>' + _scEsc(cell.studentName) + '</strong>'
    +   ' <span style="color:#888;">/</span> '
    +   _scEsc(cell.displayName)
    + '</p>'
    + '<div class="sc-form-group">'
    +   '<label class="sc-form-label">得点</label>'
    +   '<input type="number" id="sc-inp-score" class="sc-form-input" min="0" max="200"'
    +   ' value="' + (cell.score !== null && cell.score !== undefined ? _scEsc(String(cell.score)) : '') + '">'
    + '</div>'
    + '<div class="sc-form-group">'
    +   '<label class="sc-form-label">学年順位</label>'
    +   '<input type="number" id="sc-inp-grade-rank" class="sc-form-input" min="1"'
    +   ' value="' + (cell.gradeRank !== null && cell.gradeRank !== undefined ? _scEsc(String(cell.gradeRank)) : '') + '">'
    + '</div>'
    + '<div class="sc-form-group">'
    +   '<label class="sc-form-label">クラス順位</label>'
    +   '<input type="number" id="sc-inp-class-rank" class="sc-form-input" min="1"'
    +   ' value="' + (cell.classRank !== null && cell.classRank !== undefined ? _scEsc(String(cell.classRank)) : '') + '">'
    + '</div>'
    + '<div class="sc-form-group" style="align-items:center;">'
    +   '<label class="sc-form-label">欠試</label>'
    +   '<input type="checkbox" id="sc-inp-not-taken"' + (cell.notTaken ? ' checked' : '') + '>'
    + '</div>'
    + '<div style="display:flex; gap:8px; margin-top:20px; justify-content:flex-end;">'
    +   '<button class="sc-btn-cancel" onclick="_scCloseDetail()">キャンセル</button>'
    +   '<button class="sc-btn-save" onclick="_scSaveDetail()">保存</button>'
    + '</div>';

  var modal = document.getElementById('score-detail-modal');
  if (modal) modal.style.display = 'flex';
};

window._scCloseDetail = function () {
  var modal = document.getElementById('score-detail-modal');
  if (modal) modal.style.display = 'none';
  _scCurrentDetailIdx = -1;
};

window._scSaveDetail = function () {
  var cell = _scCellStore[_scCurrentDetailIdx];
  if (!cell) return;

  var scoreVal     = document.getElementById('sc-inp-score');
  var gradeRankVal = document.getElementById('sc-inp-grade-rank');
  var classRankVal = document.getElementById('sc-inp-class-rank');
  var notTakenVal  = document.getElementById('sc-inp-not-taken');
  if (!scoreVal) return;

  var payload = {
    cramId:     window.selectedCramId,
    scoreId:    cell.scoreId,
    studentId:  cell.studentId,
    subjectId:  cell.subjectId,
    termTestId: cell.termTestId,
    year:       cell.year,
    grade:      cell.grade,
    score:      scoreVal.value,
    gradeRank:  gradeRankVal ? (gradeRankVal.value || null) : null,
    classRank:  classRankVal ? (classRankVal.value || null) : null,
    notTaken:   notTakenVal  ? notTakenVal.checked : false,
  };

  var fn = cell.scoreId ? 'updateAdminScore' : 'createAdminScore';

  setLoading(true, 'スコアを保存中...');
  google.script.run
    .withSuccessHandler(function (res) {
      setLoading(false);
      if (res && res.success) {
        showMessage('保存しました。', 'success');
        _scCloseDetail();
        _scFetchAndRender();
      } else {
        showMessage((res && res.error) || '保存に失敗しました。', 'error');
      }
    })
    .withFailureHandler(function (err) {
      setLoading(false);
      showMessage('エラー: ' + (err && err.message ? err.message : String(err)), 'error');
    })
    [fn](payload);
};

// =====================================================================
// 補助：ジャンル色（ユーザー画面の logic_ui_render.html と同じパレット）
// =====================================================================
var _scGenrePalette = {
  '数学': '#dbeafe',
  '英語': '#fed7aa',
  '国語': '#bbf7d0',
  '理科': '#fbcfe8',
  '社会': '#fde68a',
  '副教科': '#f3f4f6',
  '合計': '#ede9fe',
  'その他': '#f8fafc'
};
var _scGenreHeaderPalette = {
  '数学': '#1d4ed8',
  '英語': '#c2410c',
  '国語': '#15803d',
  '理科': '#be185d',
  '社会': '#a16207',
  '副教科': '#374151',
  '合計': '#5b21b6',
  'その他': '#475569'
};
function _scGetGenreColor(genreName) {
  var hex = _scGenrePalette[genreName] || _scGenrePalette['その他'];
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',0.15)';
}
function _scGetGenreHeaderColor(genreName) {
  return _scGenreHeaderPalette[genreName] || _scGenreHeaderPalette['その他'];
}

// =====================================================================
// 補助：HTML エスケープ
// =====================================================================
function _scEsc(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
// onclick 属性内のシングルクォート用（文字列引数をシングルクォートで括る場合）
function _scEscAttr(str) {
  return String(str || '')
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'");
}

// =====================================================================
// 未解決教科（その他）セクション
// =====================================================================
var _scUnresolvedGrade    = '';   // 選択中の学年フィルター
var _scAllUnresolvedItems = [];   // ロード済み全 items（フィルター再利用）

function _scLoadUnresolved() {
  var area = document.getElementById('sc-unresolved-area');
  if (!area || !window.selectedCramId) return;

  google.script.run
    .withSuccessHandler(function (res) {
      if (!res || !res.success || !res.items || res.items.length === 0) {
        area.innerHTML = '';
        _scAllUnresolvedItems = [];
        if (_scScoreData) _scRerender();
        return;
      }
      _scAllUnresolvedItems = res.items;
      _scRenderUnresolvedList(res.items);
      if (_scScoreData) _scRerender();
    })
    .withFailureHandler(function () {
      area.innerHTML = '';
      _scAllUnresolvedItems = [];
    })
    .getUnresolvedOtherSubjects(window.selectedCramId);
}

function _scRenderUnresolvedList(items) {
  var area = document.getElementById('sc-unresolved-area');
  if (!area) return;

  // 学年一覧を items から収集
  var gradeSet = {};
  items.forEach(function(item) {
    (item.grades || []).forEach(function(g) { if (g) gradeSet[g] = true; });
  });
  var allGrades = Object.keys(gradeSet).sort();

  var grade = _scUnresolvedGrade;
  var filtered = grade
    ? items.filter(function(item) { return (item.grades || []).indexOf(grade) !== -1; })
    : items;

  if (filtered.length === 0) {
    area.innerHTML = '';
    return;
  }

  var allSubjects = (window.masterData && window.masterData.subjects) || [];

  var gradeSelHtml = '<select id="sc-unresolved-grade-sel" class="sc-sel" onchange="_scOnUnresolvedGradeChange(this.value)">'
    + '<option value="">全学年</option>';
  allGrades.forEach(function(g) {
    gradeSelHtml += '<option value="' + _scEsc(g) + '"' + (grade === g ? ' selected' : '') + '>' + _scEsc(g) + '</option>';
  });
  gradeSelHtml += '</select>';

  var html = '<div class="sc-unresolved-section">';
  html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">';
  html += '<h4 class="sc-unresolved-title" style="margin:0;">未解決教科（その他）</h4>';
  html += '<label class="sc-label">学年：</label>' + gradeSelHtml;
  html += '</div>';
  html += '<p class="sc-unresolved-desc">生徒が「その他」で入力した教科名です。下記の2つの方法で解決してください。</p>';
  html += '<table class="sc-unresolved-table">';
  html += '<thead><tr>'
    + '<th>入力名</th>'
    + '<th>件数</th>'
    + '<th>生徒</th>'
    + '<th class="sc-action-col sc-action-col-approve">① このまま新しい科目として登録</th>'
    + '<th class="sc-action-col sc-action-col-merge">② 既存の科目に統合（スコア引き継ぎ）</th>'
    + '</tr></thead>';
  html += '<tbody>';

  filtered.forEach(function(item, idx) {
    var selectId = 'sc-unresolved-sel-' + idx;

    // 生徒情報を「名前（学校・学年・コース）」形式でフォーマット
    var studentTexts = (item.students || []).map(function(s) {
      var detail = [s.school_name, s.grade, s.school_course].filter(Boolean).join('・');
      return s.name + (detail ? '（' + detail + '）' : '');
    });

    // 教科ドロップダウン：仮教科（is_temp='1'）は選択肢から除外、grade と genre で絞り込む
    var _tempSubjectIds = new Set((_scAllUnresolvedItems || []).map(function(i) { return i.temp_subject_id; }).filter(Boolean));
    var itemGrades    = item.grades    || [];
    var itemGenreName = item.genre_name || '';
    var rowSubjects = allSubjects.filter(function(s) {
      if (_tempSubjectIds.has(String(s.subject_id || '').trim())) return false;
      var sg = String(s.grade      || '').trim();
      var gn = String(s.genre_name || '').trim();
      var gradeOk = itemGrades.length === 0 || !sg || itemGrades.some(function(g) { return g === sg; });
      var genreOk = !itemGenreName || !gn || gn === itemGenreName;
      return gradeOk && genreOk;
    });

    var resolveIdentifier = item.temp_subject_id || item.raw_subject_name || '';

    html += '<tr>';

    // 入力名・件数・生徒
    html += '<td><strong>' + _scEsc(item.display_name || item.raw_subject_name || '') + '</strong>';
    if (itemGenreName) html += '<br><small style="color:#888;">' + _scEsc(itemGenreName) + '</small>';
    html += '</td>';
    html += '<td style="text-align:center;">' + _scEsc(String(item.count)) + '</td>';
    html += '<td style="font-size:0.85em;">' + studentTexts.map(_scEsc).join('<br>') + '</td>';

    // ① 新規登録
    var approveHtml = '';
    if (item.temp_subject_id) {
      approveHtml = '<div class="sc-action-box sc-action-box-approve">'
        + '<p class="sc-action-desc">入力されたこの名称を<br>新しい科目として登録します</p>'
        + '<button class="sc-btn-approve" onclick="_scApproveNewSubject(\'' + _scEscAttr(item.temp_subject_id) + '\')">このまま登録</button>'
        + '</div>';
    } else {
      approveHtml = '<div class="sc-action-box sc-action-box-disabled"><p class="sc-action-desc">旧形式データのため<br>この操作は使用できません</p></div>';
    }
    html += '<td>' + approveHtml + '</td>';

    // ② 既存科目に統合
    var mergeHtml = '<div class="sc-action-box sc-action-box-merge">'
      + '<p class="sc-action-desc">既存の科目を選択すると<br>スコアが引き継がれます</p>'
      + '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">'
      + '<select id="' + selectId + '" class="sc-sel">'
      + '<option value="">-- 科目を選ぶ --</option>';
    rowSubjects.forEach(function(s) {
      mergeHtml += '<option value="' + _scEsc(s.subject_id) + '">' + _scEsc(s.subject_name) + '</option>';
    });
    mergeHtml += '</select>'
      + '<button class="sc-btn-save" onclick="_scResolveOther(\'' + _scEscAttr(resolveIdentifier) + '\', \'' + _scEscAttr(selectId) + '\')">統合する</button>'
      + '</div></div>';
    html += '<td>' + mergeHtml + '</td>';

    html += '</tr>';
  });

  html += '</tbody></table></div>';
  area.innerHTML = html;
}

function _scOnUnresolvedGradeChange(grade) {
  _scUnresolvedGrade = grade;
  _scRenderUnresolvedList(_scAllUnresolvedItems);
}

function _scApproveNewSubject(tempSubjectId) {
  setLoading(true, '登録中...');
  google.script.run
    .withSuccessHandler(function(resStr) {
      setLoading(false);
      var res = JSON.parse(resStr);
      if (res.success) {
        showMessage('新しい科目として登録しました。', 'success');
        _scLoadUnresolved();
        _scFetchAndRender();
      } else {
        showMessage(res.error || '失敗しました。', 'error');
      }
    })
    .withFailureHandler(function(err) {
      setLoading(false);
      showMessage('エラー: ' + (err && err.message ? err.message : String(err)), 'error');
    })
    .approveNewSubject(tempSubjectId);
}

function _scResolveOther(rawName, selectId) {
  var sel = document.getElementById(selectId);
  if (!sel || !sel.value) { showMessage('紐づける教科を選んでください。', 'error'); return; }

  var realSubjectId = sel.value;
  setLoading(true, '教科を紐づけ中...');
  google.script.run
    .withSuccessHandler(function (resStr) {
      setLoading(false);
      var res = JSON.parse(resStr);
      if (res.success) {
        showMessage(res.updated + ' 件を紐づけました。', 'success');
        _scLoadUnresolved();
        _scFetchAndRender();
      } else {
        showMessage(res.error || '失敗しました。', 'error');
      }
    })
    .withFailureHandler(function (err) {
      setLoading(false);
      showMessage('エラー: ' + (err && err.message ? err.message : String(err)), 'error');
    })
    .resolveOtherSubject(window.selectedCramId, rawName, realSubjectId);
}
</script>
