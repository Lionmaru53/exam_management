<script>
let _mdStore          = [];
let _mdTab            = 'termTests';
let _mdEditId         = null;
let _mdAddMode        = false;
let _mdAliasSchool    = '';   // 表示名編集中の学校名
let _mdAliasEditSubId = null; // 表示名インライン編集中の subject_id

function _mdPush(obj) {
  _mdStore.push(obj);
  return _mdStore.length - 1;
}

function renderMasterDataManager(data) {
  _mdStore   = [];
  const content = document.getElementById('admin-content');

  const tabs = [
    { key: 'termTests', label: '試験区分' },
    { key: 'genres',    label: '教科ジャンル' },
    { key: 'subjects',  label: '教科一覧' }
  ];

  let html = `<h3>共通マスターデータ管理</h3>`;
  html += `<div style="display:flex; gap:8px; margin-bottom:16px;">`;
  tabs.forEach(t => {
    const active = _mdTab === t.key ? 'background:#4a90d9; color:#fff;' : 'background:#eee;';
    html += `<button style="${active} border:none; padding:6px 14px; border-radius:4px; cursor:pointer;" onclick="_mdSwitchTab('${t.key}')">${t.label}</button>`;
  });
  html += `</div>`;

  if (_mdTab === 'termTests') {
    html += _renderTermTests(data);
  } else if (_mdTab === 'genres') {
    html += _renderGenres(data);
  } else {
    html += _renderSubjects(data);
  }

  content.innerHTML = html;
}

function _mdSwitchTab(tab) {
  _mdTab    = tab;
  _mdEditId = null;
  _mdAddMode = false;
  _mdStore  = [];
  renderMasterDataManager(window.masterData);
}

// ---- 試験区分 ----

function _renderTermTests(data) {
  const termTests = Array.isArray(data.termTests) ? data.termTests : [];
  let html = '';

  if (_mdAddMode) {
    html += `<div class="admin-genre-container" style="margin-bottom:12px;">
      <h4 class="admin-genre-title">試験区分を追加</h4>
      <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
        <input type="text" id="md_tt_name" placeholder="試験名（例: 1学期中間）" class="admin-input" style="width:200px;" />
        <label style="display:flex; align-items:center; gap:6px;">
          <input type="checkbox" id="md_tt_two_terms" /> 2学期制
        </label>
        <button class="btn-save-admin" onclick="_mdAddTermTest()">追加</button>
        <button class="btn-cancel-admin" onclick="_mdCancelAdd()">キャンセル</button>
      </div>
    </div>`;
  } else {
    html += `<button onclick="_mdStartAdd()" style="margin-bottom:12px;">＋ 試験区分を追加</button>`;
  }

  html += `<table class="admin-table">
    <thead><tr><th>ID</th><th>試験名</th><th>学期制</th><th style="width:120px;">操作</th></tr></thead>
    <tbody>`;

  termTests.forEach(tt => {
    const isTwoTerms = String(tt.is_two_terms).trim() === '1';
    const termLabel  = isTwoTerms ? '2学期制' : '3学期制';

    if (_mdEditId === tt.term_test_id) {
      const idx = _mdPush({ term_test_id: tt.term_test_id });
      html += `<tr style="background:#fffde7;">
        <td style="font-size:0.8em; color:#888;">${tt.term_test_id}</td>
        <td><input type="text" id="md_tt_edit_name_${idx}" value="${tt.test_name}" class="admin-input" style="width:160px;" /></td>
        <td><label><input type="checkbox" id="md_tt_edit_two_${idx}" ${isTwoTerms ? 'checked' : ''} /> 2学期制</label></td>
        <td>
          <button class="btn-save-admin" onclick="_mdSaveTermTest(${idx})">保存</button>
          <button class="btn-cancel-admin" onclick="_mdCancelEdit()">取消</button>
        </td>
      </tr>`;
    } else {
      const idx = _mdPush({ term_test_id: tt.term_test_id });
      html += `<tr>
        <td style="font-size:0.8em; color:#888;">${tt.term_test_id}</td>
        <td>${tt.test_name}</td>
        <td>${termLabel}</td>
        <td><button onclick="_mdStartEdit('${tt.term_test_id}')">編集</button></td>
      </tr>`;
    }
  });

  html += '</tbody></table>';
  return html;
}

function _mdStartAdd()   { _mdAddMode = true;  _mdEditId = null; renderMasterDataManager(window.masterData); }
function _mdCancelAdd()  { _mdAddMode = false; renderMasterDataManager(window.masterData); }
function _mdStartEdit(id){ _mdEditId = id; _mdAddMode = false; renderMasterDataManager(window.masterData); }
function _mdCancelEdit() { _mdEditId = null; renderMasterDataManager(window.masterData); }

function _mdAddTermTest() {
  const name       = document.getElementById('md_tt_name')?.value.trim();
  const isTwoTerms = document.getElementById('md_tt_two_terms')?.checked ? '1' : '0';
  if (!name) { showMessage('試験名を入力してください。', 'error'); return; }

  setLoading(true, '試験区分を追加中...');
  google.script.run
    .withSuccessHandler(function (res) {
      setLoading(false);
      if (res && res.success) {
        _mdAddMode = false;
        showMessage('試験区分を追加しました。', 'success');
        refreshMasterData(() => renderMasterDataManager(window.masterData));
      } else {
        showMessage((res && res.error) || '追加に失敗しました。', 'error');
      }
    })
    .withFailureHandler(function (err) { var m = err && err.message ? err.message : JSON.stringify(err); console.error(m, err); setLoading(false); showMessage('エラー: ' + m, 'error'); })
    .upsertTermTest({ test_name: name, is_two_terms: isTwoTerms });
}

function _mdSaveTermTest(idx) {
  const { term_test_id } = _mdStore[idx];
  const name       = document.getElementById(`md_tt_edit_name_${idx}`)?.value.trim();
  const isTwoTerms = document.getElementById(`md_tt_edit_two_${idx}`)?.checked ? '1' : '0';
  if (!name) { showMessage('試験名を入力してください。', 'error'); return; }

  setLoading(true, '試験区分を更新中...');
  google.script.run
    .withSuccessHandler(function (res) {
      setLoading(false);
      if (res && res.success) {
        _mdEditId = null;
        showMessage('試験区分を更新しました。', 'success');
        refreshMasterData(() => renderMasterDataManager(window.masterData));
      } else {
        showMessage((res && res.error) || '更新に失敗しました。', 'error');
      }
    })
    .withFailureHandler(function (err) { var m = err && err.message ? err.message : JSON.stringify(err); console.error(m, err); setLoading(false); showMessage('エラー: ' + m, 'error'); })
    .upsertTermTest({ term_test_id, test_name: name, is_two_terms: isTwoTerms });
}

// ---- 教科ジャンル ----

function _renderGenres(data) {
  const genres = Array.isArray(data.genres) ? data.genres : [];
  let html = '';

  if (_mdAddMode) {
    html += `<div class="admin-genre-container" style="margin-bottom:12px;">
      <h4 class="admin-genre-title">ジャンルを追加</h4>
      <div style="display:flex; gap:10px; align-items:center;">
        <input type="text" id="md_g_name" placeholder="ジャンル名（例: 文系）" class="admin-input" style="width:200px;" />
        <button class="btn-save-admin" onclick="_mdAddGenre()">追加</button>
        <button class="btn-cancel-admin" onclick="_mdCancelAdd()">キャンセル</button>
      </div>
    </div>`;
  } else {
    html += `<button onclick="_mdStartAdd()" style="margin-bottom:12px;">＋ ジャンルを追加</button>`;
  }

  html += `<table class="admin-table">
    <thead><tr><th>ID</th><th>ジャンル名</th><th style="width:120px;">操作</th></tr></thead>
    <tbody>`;

  genres.forEach(g => {
    if (_mdEditId === g.genre_id) {
      const idx = _mdPush({ genre_id: g.genre_id });
      html += `<tr style="background:#fffde7;">
        <td style="font-size:0.8em; color:#888;">${g.genre_id}</td>
        <td><input type="text" id="md_g_edit_${idx}" value="${g.genre_name}" class="admin-input" style="width:160px;" /></td>
        <td>
          <button class="btn-save-admin" onclick="_mdSaveGenre(${idx})">保存</button>
          <button class="btn-cancel-admin" onclick="_mdCancelEdit()">取消</button>
        </td>
      </tr>`;
    } else {
      html += `<tr>
        <td style="font-size:0.8em; color:#888;">${g.genre_id}</td>
        <td>${g.genre_name}</td>
        <td><button onclick="_mdStartEdit('${g.genre_id}')">編集</button></td>
      </tr>`;
    }
  });

  html += '</tbody></table>';
  return html;
}

function _mdAddGenre() {
  const name = document.getElementById('md_g_name')?.value.trim();
  if (!name) { showMessage('ジャンル名を入力してください。', 'error'); return; }

  setLoading(true, 'ジャンルを追加中...');
  google.script.run
    .withSuccessHandler(function (res) {
      setLoading(false);
      if (res && res.success) {
        _mdAddMode = false;
        showMessage('ジャンルを追加しました。', 'success');
        refreshMasterData(() => renderMasterDataManager(window.masterData));
      } else {
        showMessage((res && res.error) || '追加に失敗しました。', 'error');
      }
    })
    .withFailureHandler(function (err) { var m = err && err.message ? err.message : JSON.stringify(err); console.error(m, err); setLoading(false); showMessage('エラー: ' + m, 'error'); })
    .upsertGenre({ genre_name: name });
}

function _mdSaveGenre(idx) {
  const { genre_id } = _mdStore[idx];
  const name = document.getElementById(`md_g_edit_${idx}`)?.value.trim();
  if (!name) { showMessage('ジャンル名を入力してください。', 'error'); return; }

  setLoading(true, 'ジャンルを更新中...');
  google.script.run
    .withSuccessHandler(function (res) {
      setLoading(false);
      if (res && res.success) {
        _mdEditId = null;
        showMessage('ジャンルを更新しました。', 'success');
        refreshMasterData(() => renderMasterDataManager(window.masterData));
      } else {
        showMessage((res && res.error) || '更新に失敗しました。', 'error');
      }
    })
    .withFailureHandler(function (err) { var m = err && err.message ? err.message : JSON.stringify(err); console.error(m, err); setLoading(false); showMessage('エラー: ' + m, 'error'); })
    .upsertGenre({ genre_id, genre_name: name });
}

// ---- 教科一覧 + 学校別表示名 ----

function _renderSubjects(data) {
  const subjects = Array.isArray(data.subjects) ? data.subjects : [];
  const aliases  = Array.isArray(data.schoolSubjectAliases) ? data.schoolSubjectAliases : [];

  // 学校名リスト（alias 登録済み + 現在の branch の school_course_master）
  const schoolsFromAliases  = aliases.map(a => a.school_name).filter(Boolean);
  const schoolsFromSettings = (data.schoolSettings || []).map(s => s.school_name).filter(Boolean);
  const schoolNames = [...new Set([...schoolsFromAliases, ...schoolsFromSettings])].sort();

  let html = `<p style="color:#666; font-size:0.9em; margin-bottom:12px;">
    教科の追加・編集は「教科パターン管理」タブから行ってください。<br>
    学校を選択すると、その学校での表示名を設定できます。
  </p>`;

  // 学校選択プルダウン
  html += `<div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
    <label style="font-weight:bold; white-space:nowrap;">学校を選択:</label>
    <select id="md_alias_school" class="admin-select" style="width:auto;" onchange="_mdSelectAliasSchool()">
      <option value="">— 学校を選択 —</option>`;
  schoolNames.forEach(sn => {
    const sel = _mdAliasSchool === sn ? 'selected' : '';
    html += `<option value="${_mdEsc(sn)}" ${sel}>${_mdEsc(sn)}</option>`;
  });
  html += `</select>`;
  if (schoolNames.length === 0) {
    html += `<span style="font-size:0.85em; color:#999;">（生徒インポートまたはコースを編集すると学校が登録されます）</span>`;
  }
  html += `</div>`;

  // 表示名 alias マップ（選択中の学校）
  const aliasMap = {};
  if (_mdAliasSchool) {
    aliases.filter(a => a.school_name === _mdAliasSchool).forEach(a => {
      aliasMap[a.subject_id] = { display_name: a.display_name, updated_at: a.updated_at || '' };
    });
  }

  const hasSchool   = !!_mdAliasSchool;
  const schoolLabel = hasSchool ? _mdEsc(_mdAliasSchool) : '';

  html += `<table class="admin-table">
    <thead><tr>
      <th>ID</th><th>教科名（正式）</th><th>ジャンル</th><th>学年</th>`;
  if (hasSchool) {
    html += `<th>${schoolLabel} での表示名</th>`;
  }
  html += `</tr></thead><tbody>`;

  subjects.forEach(s => {
    const alias  = aliasMap[s.subject_id];
    const dispNm = alias ? alias.display_name : '';
    const updAt  = alias ? alias.updated_at   : '';
    const isEdit = hasSchool && _mdAliasEditSubId === s.subject_id;

    html += `<tr>
      <td style="font-size:0.8em; color:#888;">${_mdEsc(s.subject_id)}</td>
      <td>${_mdEsc(s.subject_name)}</td>
      <td>${_mdEsc(s.genre_name || '—')}</td>
      <td>${_mdEsc(s.grade || '—')}</td>`;

    if (hasSchool) {
      if (isEdit) {
        html += `<td>
          <input type="text" id="md_alias_input" class="admin-input"
            value="${_mdEsc(dispNm)}" placeholder="空欄 = 正式名を使用" style="width:150px;" />
          <button class="btn-save-admin" style="margin-left:4px;"
            onclick="_mdSaveAlias('${_mdEsc(s.subject_id)}','${_mdEsc(updAt)}')">保存</button>
          <button class="btn-cancel-admin"
            onclick="_mdCancelAliasEdit()">取消</button>
        </td>`;
      } else {
        const displayCell = dispNm
          ? `<span style="color:#2c4a7c;">${_mdEsc(dispNm)}</span>`
          : `<span style="color:#aaa; font-size:0.85em;">（正式名を使用）</span>`;
        html += `<td>
          ${displayCell}
          <button style="margin-left:6px; padding:1px 8px; font-size:0.8em;"
            onclick="_mdStartAliasEdit('${_mdEsc(s.subject_id)}')">✏</button>
        </td>`;
      }
    }

    html += `</tr>`;
  });

  html += '</tbody></table>';
  return html;
}

function _mdEsc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function _mdSelectAliasSchool() {
  const sel = document.getElementById('md_alias_school');
  _mdAliasSchool    = sel ? sel.value : '';
  _mdAliasEditSubId = null;
  renderMasterDataManager(window.masterData);
}

function _mdStartAliasEdit(subjectId) {
  _mdAliasEditSubId = subjectId;
  renderMasterDataManager(window.masterData);
  // フォーカスを input に当てる
  setTimeout(function () {
    const inp = document.getElementById('md_alias_input');
    if (inp) inp.focus();
  }, 50);
}

function _mdCancelAliasEdit() {
  _mdAliasEditSubId = null;
  renderMasterDataManager(window.masterData);
}

function _mdSaveAlias(subjectId, prevUpdatedAt) {
  const inp   = document.getElementById('md_alias_input');
  const value = inp ? inp.value : '';

  setLoading(true, '表示名を保存中...');
  google.script.run
    .withSuccessHandler(function (res) {
      setLoading(false);
      if (res && res.conflict) {
        showMessage('別校舎により変更がありました。画面を更新します。', 'warning');
        refreshMasterData(function () {
          _mdAliasEditSubId = null;
          renderMasterDataManager(window.masterData);
        });
        return;
      }
      if (res && res.success) {
        _mdAliasEditSubId = null;
        showMessage('表示名を保存しました。', 'success');
        refreshMasterData(function () { renderMasterDataManager(window.masterData); });
      } else {
        showMessage((res && res.error) || '保存に失敗しました。', 'error');
      }
    })
    .withFailureHandler(function (err) {
      setLoading(false);
      showMessage('エラー: ' + (err && err.message ? err.message : JSON.stringify(err)), 'error');
    })
    .upsertSubjectAlias(_mdAliasSchool, subjectId, value, prevUpdatedAt);
}

window.renderMasterDataManager = renderMasterDataManager;
</script>
