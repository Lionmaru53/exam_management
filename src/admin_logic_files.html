<script>
var ADMIN_FILE_TYPE_LABELS = {
  score_proof: '証拠写真',
  evaluation:  '評定・通知表',
  other:       'その他'
};

window.renderFileManager = function() {
  var content = document.getElementById('admin-content');
  if (!content) return;

  var cramId = window.selectedCramId;
  if (!cramId) {
    content.innerHTML = '<p style="padding:24px; color:#888;">校舎を選択してください。</p>';
    return;
  }

  content.innerHTML = '<div style="padding:16px;"><p>ファイル一覧を読み込み中...</p></div>';
  setLoading(true, 'ファイル一覧を取得中...');

  google.script.run
    .withSuccessHandler(function(res) {
      setLoading(false);
      if (!res.success) {
        content.innerHTML = '<p style="padding:24px; color:#c00;">エラー: ' + res.error + '</p>';
        return;
      }
      _renderFileManagerContent(content, res.files || []);
    })
    .withFailureHandler(function(err) {
      setLoading(false);
      content.innerHTML = '<p style="padding:24px; color:#c00;">通信エラー: ' + (err.message || err) + '</p>';
    })
    .getStudentFilesForAdmin(cramId);
};

function _renderFileManagerContent(content, files) {
  var filterHtml =
    '<div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px;">' +
      '<input id="file-search" type="text" placeholder="生徒名・ファイル名で絞り込み"' +
        ' style="padding:6px 10px; border:1px solid #ccc; border-radius:4px; flex:1; min-width:180px;"' +
        ' oninput="_filterFileTable()">' +
      '<select id="file-type-filter" onchange="_filterFileTable()"' +
        ' style="padding:6px 10px; border:1px solid #ccc; border-radius:4px;">' +
        '<option value="">すべての種別</option>' +
        Object.keys(ADMIN_FILE_TYPE_LABELS).map(function(k) {
          return '<option value="' + k + '">' + ADMIN_FILE_TYPE_LABELS[k] + '</option>';
        }).join('') +
      '</select>' +
    '</div>';

  var tableHtml =
    '<div style="overflow-x:auto;">' +
    '<table id="file-table" style="width:100%; border-collapse:collapse; font-size:0.88rem;">' +
      '<thead>' +
        '<tr style="background:#f1f3f5;">' +
          '<th style="padding:8px 10px; text-align:left; border-bottom:2px solid #dee2e6;">生徒名</th>' +
          '<th style="padding:8px 10px; text-align:left; border-bottom:2px solid #dee2e6;">種別</th>' +
          '<th style="padding:8px 10px; text-align:left; border-bottom:2px solid #dee2e6;">ファイル名</th>' +
          '<th style="padding:8px 10px; text-align:left; border-bottom:2px solid #dee2e6;">日時</th>' +
          '<th style="padding:8px 10px; text-align:left; border-bottom:2px solid #dee2e6;">操作</th>' +
        '</tr>' +
      '</thead>' +
      '<tbody id="file-table-body">' +
        _renderFileRows(files) +
      '</tbody>' +
    '</table>' +
    (files.length === 0 ? '<p style="padding:16px; color:#888; text-align:center;">アップロードされたファイルはありません。</p>' : '') +
    '</div>';

  content.innerHTML =
    '<div style="padding:16px;">' +
      '<h3 style="margin-top:0;">ファイル管理</h3>' +
      filterHtml +
      tableHtml +
    '</div>';

  content._allFiles = files;
}

function _renderFileRows(files) {
  if (files.length === 0) return '<tr><td colspan="5" style="text-align:center; color:#aaa; padding:16px;">該当ファイルなし</td></tr>';
  return files.map(function(f) {
    var typeLabel = ADMIN_FILE_TYPE_LABELS[f.file_type] || f.file_type || '—';
    var date      = (f.uploaded_at || '').substring(0, 16);
    var driveUrl  = 'https://drive.google.com/file/d/' + f.drive_file_id + '/view';
    return '<tr data-student-name="' + _escapeAttr(f.student_name || '') + '"' +
               ' data-file-name="' + _escapeAttr(f.file_name || '') + '"' +
               ' data-file-type="' + _escapeAttr(f.file_type || '') + '"' +
               ' style="border-bottom:1px solid #dee2e6;">' +
      '<td style="padding:8px 10px;">' + _esc(f.student_name || f.student_id || '—') + '</td>' +
      '<td style="padding:8px 10px;">' + _esc(typeLabel) + '</td>' +
      '<td style="padding:8px 10px;">' +
        '<a href="' + driveUrl + '" target="_blank" style="color:#0d6efd;">' +
          _esc(f.file_name || 'ファイル') +
        '</a>' +
      '</td>' +
      '<td style="padding:8px 10px; white-space:nowrap; color:#6c757d;">' + date + '</td>' +
      '<td style="padding:8px 10px;">' +
        '<button onclick="adminDeleteFile(\'' + f.file_id + '\', \'' + f.student_id + '\', this)"' +
          ' style="padding:3px 8px; font-size:0.78rem; color:#dc3545; border:1px solid #dc3545; background:none; border-radius:4px; cursor:pointer;">' +
          '削除' +
        '</button>' +
      '</td>' +
    '</tr>';
  }).join('');
}

window._filterFileTable = function() {
  var content  = document.getElementById('admin-content');
  var files    = content && content._allFiles || [];
  var keyword  = (document.getElementById('file-search')    || {value: ''}).value.toLowerCase();
  var typeFilter = (document.getElementById('file-type-filter') || {value: ''}).value;

  var filtered = files.filter(function(f) {
    var matchKeyword = !keyword ||
      (f.student_name || '').toLowerCase().includes(keyword) ||
      (f.file_name || '').toLowerCase().includes(keyword);
    var matchType = !typeFilter || f.file_type === typeFilter;
    return matchKeyword && matchType;
  });

  var tbody = document.getElementById('file-table-body');
  if (tbody) tbody.innerHTML = _renderFileRows(filtered);
};

window.adminDeleteFile = function(fileId, studentId, btn) {
  if (!confirm('このファイルを削除しますか？この操作は元に戻せません。')) return;
  btn.disabled = true;
  setLoading(true, 'ファイルを削除中...');

  google.script.run
    .withSuccessHandler(function(responseStr) {
      setLoading(false);
      var res = JSON.parse(responseStr);
      if (res.success) {
        var row = btn.closest('tr');
        if (row) row.remove();
        showMessage('削除しました。', 'success');
      } else {
        btn.disabled = false;
        showMessage('削除エラー: ' + res.error, 'error');
      }
    })
    .withFailureHandler(function(err) {
      setLoading(false);
      btn.disabled = false;
      showMessage('通信エラー: ' + (err.message || err), 'error');
    })
    .deleteStudentFile({ student_id: studentId, file_id: fileId });
};

function _esc(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function _escapeAttr(str) {
  return String(str).replace(/"/g, '&quot;');
}
</script>
