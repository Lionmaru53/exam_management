<script>
let _patStore         = [];
let _patDndStore      = [];    // DnD インデックス → 学校名
let _patDragSrcIdx    = -1;    // ドラッグ中のインデックス
let _patDndSrcEl      = null;
let _patDndPlaceholder = null;
let _patDndLastInsert = null;
let editingGroupKey = null;

let _collapseSchools = new Set();
let _collapseCourses = new Set();  // school||course
let _collapseGrades  = new Set();  // school||course||grade
let _hierInitialized = false;
let _allGroups       = [];         // [{ school_name, school_course }] 一意のコースペア
let _showAddCoursePanel = false;   // コース追加パネル表示フラグ

function _patPush(obj) {
  _patStore.push(obj);
  return _patStore.length - 1;
}

function sanitizePat(str) {
  return String(str).replace(/[^a-zA-Z0-9]/g, '_');
}

function makeGroupKey(sn, sc, grade, sub) {
  return sn + '||' + sc + '||' + grade + '||' + sub;
}

function renderPatternManager(data) {
  _patStore = [];

  const content         = document.getElementById('admin-content');
  const patterns        = Array.isArray(data.patterns)        ? data.patterns        : [];
  const subjects        = Array.isArray(data.subjects)        ? data.subjects        : [];
  const patternSubjects = Array.isArray(data.patternSubjects) ? data.patternSubjects : [];
  const schoolSettings  = Array.isArray(data.schoolSettings)  ? data.schoolSettings  : [];

  const genreNames = Array.from(new Set(subjects.map(function(s) { return s.genre_name || 'その他'; })));
  const gradeOrder = { '高1': 1, '高2': 2, '高3': 3 };

  const subjectByPattern = patternSubjects.reduce(function(acc, ps) {
    if (!acc[ps.pattern_id]) acc[ps.pattern_id] = [];
    acc[ps.pattern_id].push(ps.subject_id);
    return acc;
  }, {});

  // グループキー: school||course||grade||sub_course（空コースはスキップ）
  const groupKeySet = new Set();
  schoolSettings.forEach(function(setting) {
    const sn = String(setting.school_name   || '').trim();
    const sc = String(setting.school_course || '').trim();
    if (!sc) return;
    groupKeySet.add(makeGroupKey(sn, sc, '高1', ''));
    groupKeySet.add(makeGroupKey(sn, sc, '高2', '文系'));
    groupKeySet.add(makeGroupKey(sn, sc, '高2', '理系'));
    groupKeySet.add(makeGroupKey(sn, sc, '高3', '文系'));
    groupKeySet.add(makeGroupKey(sn, sc, '高3', '理系'));
  });
  patterns.forEach(function(p) {
    const sc = String(p.school_course || '').trim();
    if (!sc) return;
    groupKeySet.add(makeGroupKey(
      String(p.school_name || '').trim(), sc,
      String(p.grade       || '').trim(),
      String(p.sub_course  || '').trim()
    ));
  });

  const patternGroups = Array.from(groupKeySet)
    .sort(function(a, b) {
      const pa = a.split('||'), pb = b.split('||');
      if (pa[0] !== pb[0]) return pa[0].localeCompare(pb[0], 'ja');
      if (pa[1] !== pb[1]) return pa[1].localeCompare(pb[1], 'ja');
      const agi = gradeOrder[pa[2]] || 99, bgi = gradeOrder[pb[2]] || 99;
      if (agi !== bgi) return agi - bgi;
      return pa[3].localeCompare(pb[3], 'ja');
    })
    .map(function(key) {
      const parts = key.split('||');
      const school_name = parts[0], school_course = parts[1], grade = parts[2], sub_course = parts[3];
      const pattern = patterns.find(function(p) {
        return String(p.school_name   || '').trim() === school_name   &&
               String(p.school_course || '').trim() === school_course &&
               String(p.grade         || '').trim() === grade         &&
               String(p.sub_course    || '').trim() === sub_course;
      });
      const subjectIds = pattern ? (subjectByPattern[pattern.pattern_id] || []) : [];
      return { school_name, school_course, grade, sub_course, pattern, subjectIds };
    });

  // _allGroups: 一意の school+course ペア（デフォルト初期化用）
  const seenSC = new Set();
  _allGroups = [];
  patternGroups.forEach(function(g) {
    const k = g.school_name + '||' + g.school_course;
    if (!seenSC.has(k)) {
      seenSC.add(k);
      _allGroups.push({ school_name: g.school_name, school_course: g.school_course });
    }
  });

  // 学校名一覧（チェックリスト用）
  const schoolNameSet = new Set();
  schoolSettings.forEach(function(s) {
    const sn = String(s.school_name || '').trim();
    if (sn) schoolNameSet.add(sn);
  });
  patterns.forEach(function(p) {
    const sn = String(p.school_name || '').trim();
    if (sn) schoolNameSet.add(sn);
  });
  const allSchoolNames = Array.from(schoolNameSet).sort(function(a, b) { return a.localeCompare(b, 'ja'); });

  let html = '<h3>学校別教科名・教科パターン管理</h3>' +
    '<p class="tab-desc">' +
    '学校・コース・学年ごとの年間共通教科セットを管理します。<br>' +
    '<span class="step">▶ <strong>教科を編集</strong> ： 年間を通して受験する教科を選択できます。学校別の表示名（例: 数学① → 数学ⅠA）も設定可能です。</span><br>' +
    '<span class="step">▶ <strong>コース追加</strong> ： 学校・コースを選択して5パターン（高1・高2文理・高3文理）を自動生成します。' +
    '<button onclick="_openAddCoursePanel()" style="margin-left:8px; padding:3px 10px; vertical-align:middle;">コースを追加する</button>' +
    '</span></p>';

  // コース追加パネル
  if (_showAddCoursePanel) {
    html += '<div class="add-course-panel">';
    html += '<div class="add-course-panel-title">コース追加</div>';

    // 学校名チェックリスト
    html += '<div class="add-course-row">';
    html += '<div class="add-course-label">学校名</div>';
    html += '<div class="add-course-school-list">';
    html += '<label class="add-course-school-item add-course-all-label">' +
      '<input type="checkbox" id="pat-school-all" onchange="toggleAllSchools(this.checked)" />' +
      '<span>全選択</span></label>';
    allSchoolNames.forEach(function(sn) {
      const snEsc = sn.replace(/"/g, '&quot;');
      html += '<label class="add-course-school-item">' +
        '<input type="checkbox" class="pat-school-cb" value="' + snEsc + '" />' +
        '<span>' + sn + '</span></label>';
    });
    if (allSchoolNames.length === 0) {
      html += '<span style="color:#aaa; font-size:0.85em;">学校名が登録されていません（生徒インポート後に表示されます）</span>';
    }
    html += '</div></div>';

    // 科・コース入力
    html += '<div class="add-course-row" style="margin-top:12px; align-items:center;">';
    html += '<div class="add-course-label">科・コース</div>';
    html += '<input type="text" id="pat-new-course" placeholder="例: 普通、理数、特進" class="admin-input" style="width:200px;" />';
    html += '</div>';

    // ボタン
    html += '<div class="add-course-row" style="margin-top:14px; gap:8px;">';
    html += '<button class="btn-save-admin" id="pat-add-course-btn" onclick="submitAddCourse()">追加する</button>';
    html += '<button class="btn-cancel-admin" onclick="_closeAddCoursePanel()">キャンセル</button>';
    html += '<span id="pat-add-progress" style="display:none; font-size:0.9em; color:#3a4f80; font-weight:600;"></span>';
    html += '</div>';
    html += '</div>'; // add-course-panel
  }

  if (patternGroups.length === 0 && !_showAddCoursePanel) {
    html += '<p>登録された学校・コースがありません。生徒インポートを実行すると学校名が自動登録されます。</p>';
    content.innerHTML = html;
    return;
  }
  if (patternGroups.length === 0) {
    content.innerHTML = html;
    return;
  }

  // 階層構造を構築: school → course → grade → [sub_course groups]
  const schoolOrder = [];
  const hier = {};
  patternGroups.forEach(function(g) {
    const sn = g.school_name, sc = g.school_course, gr = g.grade;
    if (!hier[sn]) {
      schoolOrder.push(sn);
      hier[sn] = { courseOrder: [], courses: {} };
    }
    if (!hier[sn].courses[sc]) {
      hier[sn].courseOrder.push(sc);
      hier[sn].courses[sc] = { gradeOrder: [], grades: {} };
    }
    const cd = hier[sn].courses[sc];
    if (!cd.grades[gr]) {
      cd.gradeOrder.push(gr);
      cd.grades[gr] = [];
    }
    cd.grades[gr].push(g);
  });

  // 初回レンダリング時はすべて閉じた状態にする
  if (!_hierInitialized) {
    _hierInitialized = true;
    schoolOrder.forEach(function(sn) {
      _collapseSchools.add(sn);
      Object.keys(hier[sn].courses).forEach(function(sc) {
        _collapseCourses.add(sn + '||' + sc);
        Object.keys(hier[sn].courses[sc].grades).forEach(function(gr) {
          _collapseGrades.add(sn + '||' + sc + '||' + gr);
        });
      });
    });
  }

  const cramIdForOrder   = window.selectedCramId || '';
  const sortedSchoolOrder = _patGetSortedSchools(schoolOrder, cramIdForOrder);
  _patDndStore = [];

  // ジャンプナビゲーション
  if (sortedSchoolOrder.length >= 2) {
    html += '<div class="st-jump-nav">';
    sortedSchoolOrder.forEach(function(sn, i) {
      html += '<a class="st-jump-chip" href="javascript:void(0)"' +
        ' onclick="document.getElementById(\'pat-sg-' + i + '\').scrollIntoView({behavior:\'smooth\',block:\'start\'})">' +
        sn + '</a>';
    });
    html += '</div>';
  }

  sortedSchoolOrder.forEach(function(schoolName) {
    const dndIdx       = _patDndStore.push(schoolName) - 1;
    const isSchoolOpen = !_collapseSchools.has(schoolName);
    const schoolIdx    = _patPush({ schoolName });

    html += '<div class="hier-school" id="pat-sg-' + dndIdx + '" data-dnd-idx="' + dndIdx + '"' +
      ' ondragover="_patDragOver(event,' + dndIdx + ')"' +
      ' ondrop="_patDragDrop(event,' + dndIdx + ')">';
    html += '<div class="hier-school-header"' +
      ' draggable="true"' +
      ' ondragstart="_patDragStart(event,' + dndIdx + ')"' +
      ' ondragend="_patDragEnd()"' +
      ' onclick="toggleSchool(' + schoolIdx + ')">' +
      '<span class="st-drag-handle" title="ドラッグして並び替え">⠿</span>' +
      '<span class="hier-arrow">' + (isSchoolOpen ? '▼' : '▶') + '</span>' + schoolName +
      '</div>';

    if (isSchoolOpen) {
      html += '<div class="hier-school-body">';

      hier[schoolName].courseOrder.forEach(function(courseName) {
        const courseKey    = schoolName + '||' + courseName;
        const isCourseOpen = !_collapseCourses.has(courseKey);
        const courseIdx    = _patPush({ courseKey });

        html += '<div class="hier-course">';
        html += '<div class="hier-course-header" onclick="toggleCourse(' + courseIdx + ')">' +
          '<span class="hier-arrow">' + (isCourseOpen ? '▼' : '▶') + '</span>' + courseName +
          '</div>';

        if (isCourseOpen) {
          html += '<div class="hier-course-body">';
          const cd = hier[schoolName].courses[courseName];

          cd.gradeOrder.forEach(function(grade) {
            const gradeKey    = schoolName + '||' + courseName + '||' + grade;
            const isGradeOpen = !_collapseGrades.has(gradeKey);
            const gradeIdx    = _patPush({ gradeKey });

            html += '<div class="hier-grade">';
            html += '<div class="hier-grade-header" onclick="toggleGrade(' + gradeIdx + ')">' +
              '<span class="hier-arrow">' + (isGradeOpen ? '▼' : '▶') + '</span>' + grade +
              '</div>';

            if (isGradeOpen) {
              html += '<div class="hier-grade-body">';
              const groups = cd.grades[grade];

              if (grade === '高1') {
                // 高1: 文理なし → 単一グループ
                const g = groups.find(function(g) { return g.sub_course === ''; }) || groups[0];
                if (g) html += _renderGroupPanel(g, subjects, genreNames);
              } else {
                // 高2/高3: 文系・理系をそれぞれ表示
                groups.forEach(function(g) {
                  html += '<div class="hier-subcourse">';
                  html += '<div class="hier-subcourse-label">' + (g.sub_course || '(文理指定なし)') + '</div>';
                  html += _renderGroupPanel(g, subjects, genreNames);
                  html += '</div>';
                });
              }

              html += '</div>';  // hier-grade-body
            }

            html += '</div>';  // hier-grade
          });

          html += '</div>';  // hier-course-body
        }

        html += '</div>';  // hier-course
      });

      html += '</div>';  // hier-school-body
    }

    html += '</div>';  // hier-school
  });

  content.innerHTML = html;
}

function _renderGroupPanel(group, subjects, genreNames) {
  const sn = group.school_name, sc = group.school_course,
        gr = group.grade, sub = group.sub_course,
        subjectIds = group.subjectIds;
  const groupKey = makeGroupKey(sn, sc, gr, sub);
  const safeKey  = sanitizePat(groupKey);
  const isEdit   = editingGroupKey === groupKey;

  let html = '<div class="admin-genre-container">';

  if (isEdit) {
    html += '<div class="shared-subjects-panel">';
    html += '<p style="margin:0 0 10px; font-weight:bold;">年間共通教科を設定します</p>';
    html += '<div class="subjects-grid">';
    genreNames.forEach(function(genreName) {
      const genreSubjects = subjects.filter(function(s) {
        return (s.genre_name || 'その他') === genreName &&
               String(s.grade || '').trim() === gr;
      });
      html += '<div class="genre-col">';
      html += '<div class="genre-col-title">' + genreName + '</div>';
      genreSubjects.forEach(function(s) {
        const chk      = subjectIds.includes(s.subject_id) ? 'checked' : '';
        const aliasVal = _getAliasValue(sn, s.subject_id);
        const snAttr   = sn.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        html += '<div class="alias-subject-row">' +
          '<label><input type="checkbox" name="group_subject_' + safeKey + '" value="' + s.subject_id + '" ' + chk + '></label>' +
          '<span class="alias-canon-name" title="正式名">' + s.subject_name + '</span>' +
          '<input type="text" class="alias-display-input admin-input"' +
          ' placeholder="表示名（空欄=正式名）"' +
          ' value="' + aliasVal.replace(/"/g,'&quot;') + '"' +
          ' onblur="_patSaveAlias(\'' + snAttr + '\',\'' + s.subject_id + '\',this.value)" />' +
          '</div>';
      });
      if (genreSubjects.length === 0) {
        html += '<span style="color:#aaa; font-size:0.85em;">この学年の教科なし</span>';
      }
      html += '</div>';
    });
    html += '</div></div>';  // subjects-grid, shared-subjects-panel

    const saveIdx = _patPush({ school_name: sn, school_course: sc, grade: gr, sub_course: sub, safeKey });
    html += '<div class="pattern-actions">' +
      '<button class="btn-save-admin" onclick="saveGroupSubjectsById(' + saveIdx + ')">保存</button>' +
      '<button class="btn-cancel-admin" onclick="cancelGroupEdit()">キャンセル</button>' +
      '</div>';
  } else {
    // 表示モード: 選択済み教科が存在するジャンルのみ列表示
    const activeGenres = genreNames.filter(function(genreName) {
      return subjectIds.some(function(id) {
        const s = subjects.find(function(s) { return s.subject_id === id; });
        return s && (s.genre_name || 'その他') === genreName;
      });
    });
    if (activeGenres.length === 0) {
      html += '<p style="color:#aaa; font-size:0.9em; padding:4px 0;">教科が設定されていません</p>';
    } else {
      html += '<table class="admin-table"><thead><tr>';
      activeGenres.forEach(function(name) { html += '<th>' + name + '</th>'; });
      html += '</tr></thead><tbody><tr>';
      activeGenres.forEach(function(genreName) {
        const names = subjectIds.map(function(id) {
          const s = subjects.find(function(s) { return s.subject_id === id; });
          if (!s || (s.genre_name || 'その他') !== genreName) return null;
          return _getAliasValue(sn, id) || s.subject_name;
        }).filter(Boolean);
        html += '<td>' + names.join('<br>') + '</td>';
      });
      html += '</tr></tbody></table>';
    }

    const editIdx = _patPush({ school_name: sn, school_course: sc, grade: gr, sub_course: sub, groupKey });
    html += '<div class="pattern-actions">' +
      '<button onclick="startGroupEdit(' + editIdx + ')">教科を編集</button>' +
      '</div>';
  }

  html += '</div>';  // admin-genre-container
  return html;
}

// ---- 学校並び順（localStorage 連携・生徒一覧と同一キー） ----

function _patGetSortedSchools(schools, cramId) {
  var saved = null;
  try {
    var raw = localStorage.getItem('st_school_order_' + cramId);
    if (raw) saved = JSON.parse(raw);
  } catch {}
  if (!saved || !Array.isArray(saved)) return schools;
  var existing = saved.filter(function(s) { return schools.indexOf(s) !== -1; });
  var newOnes  = schools.filter(function(s) { return existing.indexOf(s) === -1; });
  return existing.concat(newOnes);
}

function _patSaveSchoolOrder(cramId, schools) {
  try { localStorage.setItem('st_school_order_' + cramId, JSON.stringify(schools)); } catch {}
}

// ---- ドラッグ&ドロップ（FLIP アニメーション） ----

function _patDragStart(event, idx) {
  _patDragSrcIdx = idx;
  _patDndSrcEl   = document.querySelector('.hier-school[data-dnd-idx="' + idx + '"]');
  if (!_patDndSrcEl) return;

  var cs = window.getComputedStyle(_patDndSrcEl);
  _patDndPlaceholder = document.createElement('div');
  _patDndPlaceholder.className          = 'dnd-placeholder';
  _patDndPlaceholder.style.height       = _patDndSrcEl.offsetHeight + 'px';
  _patDndPlaceholder.style.marginBottom = cs.marginBottom;
  _patDndPlaceholder.addEventListener('dragover', function(e) { e.preventDefault(); });
  _patDndPlaceholder.addEventListener('drop',     function(e) { _patCommitDrop(e); });
  _patDndSrcEl.parentNode.insertBefore(_patDndPlaceholder, _patDndSrcEl.nextSibling);
  _patDndLastInsert = null;

  setTimeout(function() { if (_patDndSrcEl) _patDndSrcEl.classList.add('pat-dragging'); }, 0);
}

function _patDragOver(event, idx) {
  event.preventDefault();
  if (!_patDndPlaceholder || !_patDndSrcEl) return;

  var target = document.querySelector('.hier-school[data-dnd-idx="' + idx + '"]');
  if (!target || target === _patDndSrcEl) return;

  var rect           = target.getBoundingClientRect();
  var insertBeforeEl = event.clientY < rect.top + rect.height / 2
    ? target : target.nextSibling;

  if (insertBeforeEl === _patDndLastInsert || insertBeforeEl === _patDndPlaceholder) return;
  _patDndLastInsert = insertBeforeEl;

  var els  = Array.from(document.querySelectorAll('.hier-school'));
  var prev = els.map(function(el) { return el.getBoundingClientRect().top; });
  _patDndSrcEl.parentNode.insertBefore(_patDndPlaceholder, insertBeforeEl);
  els.forEach(function(el, i) {
    var delta = prev[i] - el.getBoundingClientRect().top;
    if (Math.abs(delta) < 1) return;
    el.style.transition = 'none';
    el.style.transform  = 'translateY(' + delta + 'px)';
    requestAnimationFrame(function() {
      el.style.transition = 'transform 0.18s ease';
      el.style.transform  = '';
    });
  });
}

function _patDragEnd() {
  if (_patDndSrcEl) _patDndSrcEl.classList.remove('pat-dragging');
  document.querySelectorAll('.hier-school').forEach(function(el) {
    el.style.transition = '';
    el.style.transform  = '';
  });
  if (_patDndPlaceholder && _patDndPlaceholder.parentNode) {
    _patDndPlaceholder.parentNode.removeChild(_patDndPlaceholder);
  }
  _patDndSrcEl = _patDndPlaceholder = _patDndLastInsert = null;
  _patDragSrcIdx = -1;
}

function _patCommitDrop(event) {
  event.preventDefault();
  if (_patDragSrcIdx < 0 || !_patDndPlaceholder || !_patDndPlaceholder.parentNode) {
    _patDragEnd(); return;
  }
  var parent   = _patDndPlaceholder.parentNode;
  var children = Array.from(parent.children).filter(function(el) {
    return el.classList.contains('hier-school') || el === _patDndPlaceholder;
  });
  var srcName  = _patDndStore[_patDragSrcIdx];
  var newOrder = [];
  children.forEach(function(el) {
    if (el === _patDndPlaceholder) {
      newOrder.push(srcName);
    } else if (el !== _patDndSrcEl) {
      var i = parseInt(el.dataset.dndIdx, 10);
      if (!isNaN(i) && _patDndStore[i]) newOrder.push(_patDndStore[i]);
    }
  });
  if (newOrder.length > 0) _patSaveSchoolOrder(window.selectedCramId || '', newOrder);
  _patDragEnd();
  renderPatternManager(masterData);
}

function _patDragDrop(event, targetIdx) {
  _patCommitDrop(event);
}

// ---- 階層トグル ----

function toggleSchool(idx) {
  const sn = _patStore[idx].schoolName;
  if (_collapseSchools.has(sn)) _collapseSchools.delete(sn);
  else _collapseSchools.add(sn);
  renderPatternManager(masterData);
}

function toggleCourse(idx) {
  const ck = _patStore[idx].courseKey;
  if (_collapseCourses.has(ck)) _collapseCourses.delete(ck);
  else _collapseCourses.add(ck);
  renderPatternManager(masterData);
}

function toggleGrade(idx) {
  const gk = _patStore[idx].gradeKey;
  if (_collapseGrades.has(gk)) _collapseGrades.delete(gk);
  else _collapseGrades.add(gk);
  renderPatternManager(masterData);
}

// ---- グループ編集 ----

function startGroupEdit(idx) {
  editingGroupKey = _patStore[idx].groupKey;
  renderPatternManager(masterData);
}

function cancelGroupEdit() {
  editingGroupKey = null;
  renderPatternManager(masterData);
}

function saveGroupSubjectsById(idx) {
  const { school_name, school_course, grade, sub_course, safeKey } = _patStore[idx];
  const selectedIds = Array.from(
    document.querySelectorAll('input[name="group_subject_' + safeKey + '"]:checked')
  ).map(function(cb) { return cb.value; });

  setLoading(true, ['教科データを確認中...', '教科を登録中...', 'シートに書き込み中...']);
  google.script.run
    .withSuccessHandler(function(response) {
      if (response && response.success) {
        editingGroupKey = null;
        showMessage('教科設定を保存しました', 'success');
        refreshMasterData(function() { loadSection('patterns'); });
      } else {
        showMessage(response.error || '保存に失敗しました。', 'error');
        setLoading(false);
      }
    })
    .withFailureHandler(function() {
      showMessage('通信エラーが発生しました。', 'error');
      setLoading(false);
    })
    .batchSetGroupSubjects(window.selectedCramId, { school_name, school_course, grade, sub_course, selected_subject_ids: selectedIds });
}

// ---- 表示名エイリアス ----

function _getAliasValue(schoolName, subjectId) {
  const aliases = (window.masterData && window.masterData.schoolSubjectAliases) || [];
  const hit = aliases.find(function(a) {
    return a.school_name === schoolName && a.subject_id === subjectId;
  });
  return hit ? (hit.display_name || '') : '';
}

function _patSaveAlias(schoolName, subjectId, newValue) {
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.conflict) {
        showMessage('別ユーザーにより変更がありました。表示名を更新します。', 'warning');
        refreshMasterData(function() {});
        return;
      }
      if (res && res.success) {
        const aliases = window.masterData.schoolSubjectAliases || [];
        const idx = aliases.findIndex(function(a) {
          return a.school_name === schoolName && a.subject_id === subjectId;
        });
        if (String(newValue || '').trim()) {
          if (idx >= 0) aliases[idx].display_name = newValue;
          else aliases.push({ school_name: schoolName, subject_id: subjectId, display_name: newValue, updated_at: '' });
        } else {
          if (idx >= 0) aliases.splice(idx, 1);
        }
        window.masterData.schoolSubjectAliases = aliases;
      } else if (res && res.error) {
        showMessage('表示名保存失敗: ' + res.error, 'error');
      }
    })
    .withFailureHandler(function(err) {
      showMessage('表示名保存エラー: ' + ((err && err.message) || ''), 'error');
    })
    .upsertSubjectAlias(schoolName, subjectId, newValue, '');
}

// ---- コース追加パネル ----

function _openAddCoursePanel() {
  _showAddCoursePanel = true;
  renderPatternManager(masterData);
}

function _closeAddCoursePanel() {
  _showAddCoursePanel = false;
  renderPatternManager(masterData);
}

function toggleAllSchools(checked) {
  document.querySelectorAll('.pat-school-cb').forEach(function(cb) { cb.checked = checked; });
}

function submitAddCourse() {
  const cramId = window.selectedCramId || '';
  if (!cramId) { showMessage('校舎を選択してください。', 'error'); return; }

  const course = (document.getElementById('pat-new-course').value || '').trim();
  if (!course) { showMessage('科・コース名を入力してください。', 'error'); return; }

  const checked = Array.from(document.querySelectorAll('.pat-school-cb:checked')).map(function(cb) { return cb.value; });
  if (checked.length === 0) { showMessage('学校名を1つ以上選択してください。', 'error'); return; }

  const btn  = document.getElementById('pat-add-course-btn');
  const prog = document.getElementById('pat-add-progress');
  if (btn)  btn.disabled = true;
  if (prog) { prog.style.display = ''; prog.textContent = checked.length + '校中 0校完了'; }

  let done = 0;
  const total = checked.length;

  function processNext() {
    if (done >= total) {
      if (prog) prog.textContent = total + '校中 ' + total + '校完了';
      showMessage(total + '校・' + course + ' のパターンを追加しました。', 'success');
      _showAddCoursePanel = false;
      refreshMasterData(function() { loadSection('patterns'); });
      return;
    }
    if (prog) prog.textContent = total + '校中 ' + done + '校完了';
    const schoolName = checked[done];
    google.script.run
      .withSuccessHandler(function(res) {
        if (res && !res.success && res.error) {
          showMessage(schoolName + ': ' + res.error, 'error');
        }
        done++;
        processNext();
      })
      .withFailureHandler(function(err) {
        showMessage(schoolName + ': ' + ((err && err.message) || '通信エラー'), 'error');
        done++;
        processNext();
      })
      .initializeDefaultPatterns(cramId, { school_name: schoolName, school_course: course });
  }
  processNext();
}
