<style>
/* ---- 学年ツールバー ---- */
.pt-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0 14px;
  flex-wrap: wrap;
}
.pt-grade-btn {
  padding: 5px 16px;
  border: 1px solid #3a4f80;
  border-radius: 20px;
  background: #fff;
  color: #3a4f80;
  cursor: pointer;
  font-size: 0.9em;
  transition: background 0.15s, color 0.15s;
}
.pt-grade-btn:hover { background: #e8edf7; }
.pt-grade-active {
  background: #3a4f80;
  color: #fff;
}

/* ---- クロス表 ---- */
.pt-cross-table-wrap {
  overflow-x: auto;
  margin-bottom: 24px;
}
.pt-cross-table {
  border-collapse: collapse;
  min-width: 600px;
  width: 100%;
  font-size: 0.88em;
}
.pt-cross-table th,
.pt-cross-table td {
  border: 1px solid #ddd;
  padding: 4px 6px;
  vertical-align: top;
}
.pt-row-label-th {
  background: #f0f4fb;
  font-weight: bold;
  white-space: nowrap;
  min-width: 120px;
}
.pt-genre-th {
  font-weight: bold;
  text-align: center;
  white-space: nowrap;
  min-width: 90px;
  color: #fff;
}
/* 学校名セル（rowspan, ドラッグ可） */
.pt-school-label {
  background: #e8edf7;
  font-weight: bold;
  white-space: nowrap;
  cursor: grab;
  vertical-align: middle;
  padding: 6px 10px;
  min-width: 120px;
  border-right: 2px solid #b0bcdc;
}
.pt-school-label:active { cursor: grabbing; }
.pt-school-label-over { background: #bbd0ff !important; }
.pt-row-label {
  background: #f8f9fd;
  white-space: nowrap;
  font-weight: 500;
}
.pt-cell {
  padding: 0;
  transition: background 0.1s;
  vertical-align: top;
}
.pt-cell-inner {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-content: flex-start;
  min-height: 36px;
  padding: 4px;
}
.pt-cell-hover {
  background: #dce8ff !important;
}
.pt-cell-nopattern {
  background: #f5f5f5;
}
.pt-cell-nopattern .pt-cell-inner {
  opacity: 0.5;
}

/* ---- 教科チップ ---- */
.pt-chip {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  /* background / border-color はジャンル色を inline style で設定 */
  border: 1px solid #b0bcdc;
  border-radius: 12px;
  padding: 2px 7px;
  font-size: 0.85em;
  cursor: grab;
  user-select: none;
  white-space: nowrap;
}
.pt-chip:active { cursor: grabbing; }
.pt-chip-dragging { opacity: 0.4; }
.pt-chip-editing {
  background: #fffbdd;
  border-color: #e6c800;
  cursor: default;
  padding: 2px 4px;
}
.pt-chip-close {
  background: none;
  border: none;
  padding: 0 0 0 2px;
  cursor: pointer;
  color: #888;
  font-size: 1em;
  line-height: 1;
}
.pt-chip-close:hover { color: #c00; }
.pt-alias-input {
  width: 90px;
  font-size: 0.85em;
  border: 1px solid #aaa;
  border-radius: 4px;
  padding: 1px 4px;
}

/* ---- 教科プール sticky ラッパー ---- */
.pt-sticky-pool {
  position: sticky;
  z-index: 100;
  background: #fff;
  padding-bottom: 8px;
  border-bottom: 2px solid #e0e0e0;
  margin-bottom: 14px;
}

/* ---- 教科プール ---- */
.pt-pool-area {
  border: 2px dashed #b0bcdc;
  border-radius: 8px;
  padding: 10px 14px 8px;
  min-height: 60px;
  background: #fafbff;
}
.pt-pool-area.pt-cell-hover {
  background: #dce8ff;
  border-color: #3a4f80;
}
.pt-page-hint {
  font-size: 0.87rem;
  color: #1e3a5f;
  line-height: 1.65;
  margin: -4px 0 14px;
  padding: 8px 14px;
  background: #e8f0fb;
  border-left: 4px solid #3a6bc8;
  border-radius: 0 4px 4px 0;
}
.pt-pool-title {
  font-weight: bold;
  color: #3a4f80;
  margin-bottom: 6px;
  font-size: 0.9em;
}
.pt-pool-genres-row {
  display: flex;
  flex-wrap: nowrap;
  overflow-x: auto;
  gap: 8px;
  align-items: flex-start;
  padding-bottom: 2px;
}
.pt-pool-genre-section {
  flex-shrink: 0;
  border: 1px solid #ccc;
  border-radius: 6px;
  padding: 7px 10px;
}
.pt-pool-genre-label {
  font-size: 0.8em;
  margin-bottom: 5px;
  font-weight: 700;
  white-space: nowrap;
}
.pt-pool-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  max-width: 180px;
}
</style>

<script>
/* ========== 状態変数 ========== */
var _ptSelectedGrade    = '高1';
var _ptSubjectMap       = {};   // patternId → [subjectId, ...]
var _ptDragPayload      = null; // { subjectId, fromPatternId } | null
var _ptSaving           = {};   // patternId → bool
var _ptPatterns         = [];
var _ptSubjects         = [];
var _ptSchoolSettings   = [];
var _ptGenreOrder       = [];   // ジャンル名の表示順
var _ptSchoolNames      = [];   // ソート済み学校名リスト
var _ptSubjectInfoMap   = {};   // String(subject_id) → subject オブジェクト
var _ptSubjectGenreMap  = {};   // String(subject_id) → genre_name
var _ptGenreColorMap    = {};   // genreName → { header, border, chip }
var _ptDragSrcSchool    = null;
var _showAddCoursePanel = false;

/* ジャンル名ベースの色定義（LIFF 画面の getGenreColor と統一） */
var _PT_GENRE_COLOR_DEF = {
  '数学': { header: '#1d4ed8', border: '#93c5fd', chip: '#dbeafe' },
  '英語': { header: '#c2410c', border: '#fdba74', chip: '#fed7aa' },
  '国語': { header: '#15803d', border: '#6ee7b7', chip: '#bbf7d0' },
  '理科': { header: '#be185d', border: '#f9a8d4', chip: '#fbcfe8' },
  '社会': { header: '#a16207', border: '#fcd34d', chip: '#fde68a' },
  'その他': { header: '#475569', border: '#cbd5e1', chip: '#f8fafc' },
};
/* 上記以外のジャンル名への fallback パレット */
var _PT_GENRE_PALETTE = [
  { header: '#6A1B9A', border: '#ce93d8', chip: '#f3e5f5' },
  { header: '#00695C', border: '#80cbc4', chip: '#e0f2f1' },
  { header: '#283593', border: '#9fa8da', chip: '#e8eaf6' },
  { header: '#4E342E', border: '#bcaaa4', chip: '#efebe9' },
];

/* ========== エントリーポイント ========== */
function renderPatternManager(data) {
  var content         = document.getElementById('admin-content');
  var patterns        = Array.isArray(data.patterns)        ? data.patterns        : [];
  var subjects        = Array.isArray(data.subjects)        ? data.subjects        : [];
  var patternSubjects = Array.isArray(data.patternSubjects) ? data.patternSubjects : [];
  var schoolSettings  = Array.isArray(data.schoolSettings)  ? data.schoolSettings  : [];

  _ptPatterns       = patterns;
  _ptSubjects       = subjects;
  _ptSchoolSettings = schoolSettings;

  // subject_id → subject の高速ルックアップ用 Map を構築（String 変換で型の揺れを吸収）
  _ptSubjectInfoMap  = {};
  _ptSubjectGenreMap = {};
  subjects.forEach(function(s) {
    var key = String(s.subject_id).trim();
    _ptSubjectInfoMap[key]  = s;
    _ptSubjectGenreMap[key] = String(s.genre_name || 'その他').trim();
  });

  // ジャンル順を構築（全教科、学年問わず）
  var genreSet = [];
  subjects.forEach(function(s) {
    var g = String(s.genre_name || 'その他').trim();
    if (genreSet.indexOf(g) < 0) genreSet.push(g);
  });
  _ptGenreOrder = genreSet.filter(function(g) { return g !== '未設定'; });

  // ジャンルごとにカラーを割り当て（名前定義を優先、未定義は fallback パレット）
  _ptGenreColorMap = {};
  var _fallbackIdx = 0;
  _ptGenreOrder.forEach(function(g) {
    if (_PT_GENRE_COLOR_DEF[g]) {
      _ptGenreColorMap[g] = _PT_GENRE_COLOR_DEF[g];
    } else {
      _ptGenreColorMap[g] = _PT_GENRE_PALETTE[_fallbackIdx % _PT_GENRE_PALETTE.length];
      _fallbackIdx++;
    }
  });

  // patternSubjects から _ptSubjectMap を構築
  var freshMap = {};
  patternSubjects.forEach(function(ps) {
    var pid = String(ps.pattern_id).trim();
    var sid = String(ps.subject_id).trim();
    if (!freshMap[pid]) freshMap[pid] = [];
    if (freshMap[pid].indexOf(sid) < 0) freshMap[pid].push(sid);
  });
  // 保存中のパターンは楽観的状態を保持、それ以外は新鮮なデータで上書き
  Object.keys(freshMap).forEach(function(pid) {
    if (!_ptSaving[pid]) _ptSubjectMap[pid] = freshMap[pid];
  });
  Object.keys(freshMap).forEach(function(pid) {
    if (!_ptSubjectMap[pid]) _ptSubjectMap[pid] = freshMap[pid];
  });


  // 学校名一覧
  var schoolNameSet = {};
  schoolSettings.forEach(function(s) {
    var sn = String(s.school_name || '').trim();
    if (sn) schoolNameSet[sn] = true;
  });
  patterns.forEach(function(p) {
    var sn = String(p.school_name || '').trim();
    if (sn) schoolNameSet[sn] = true;
  });
  var allSchoolNames = Object.keys(schoolNameSet).sort(function(a, b) { return a.localeCompare(b, 'ja'); });
  _ptSchoolNames = _patGetSortedSchools(allSchoolNames, window.selectedCramId || '');

  var isMaster = window.adminContext && window.adminContext.role === 'master';

  var html = '<h3>学校別教科名・教科パターン管理</h3>';
  html += '<p class="pt-page-hint">'
    + '<b>学校に配置されたチップをダブルクリックすると、学校ごとの表示名（例：「英語」→「英I」）に変更できます。</b><br>'
    + 'できるだけ各学校の実際の教科名に合わせて設定してください。'
    + '</p>';

  // ツールバー
  html += '<div class="pt-toolbar">';
  ['高1', '高2', '高3'].forEach(function(g) {
    var cls = 'pt-grade-btn' + (_ptSelectedGrade === g ? ' pt-grade-active' : '');
    html += '<button class="' + cls + '" onclick="_ptOnGradeChange(\'' + g + '\')">' + g + '</button>';
  });
  if (isMaster) {
    html += '<button onclick="_openAddCoursePanel()" style="margin-left:auto; padding:5px 14px;">コースを追加する</button>';
  }
  html += '</div>';

  if (_showAddCoursePanel && isMaster) html += _ptRenderAddCoursePanel(allSchoolNames);

  // 教科プールを上部に配置（sticky 固定）
  html += '<div class="pt-sticky-pool" id="pt-sticky-pool">';
  html += '<div class="pt-pool-area" id="pt-pool-area"';
  html += ' ondragover="_ptPoolDragOver(event)" ondrop="_ptPoolDrop(event)">';
  html += '<div class="pt-pool-title">教科プール（ドラッグしてセルに追加 / セルから引き戻す）</div>';
  html += _ptRenderPool();
  html += '</div></div>';

  html += '<div id="pt-table-area">' + _ptRenderCrossTable() + '</div>';

  content.innerHTML = html;

  // sticky pool の top = admin-top-bar の高さ
  setTimeout(function() {
    var topBar = document.getElementById('admin-top-bar');
    var pool   = document.getElementById('pt-sticky-pool');
    if (topBar && pool) pool.style.top = topBar.offsetHeight + 'px';
  }, 0);
}

/* ========== クロス表描画 ========== */
function _ptRenderCrossTable() {
  var grade = _ptSelectedGrade;

  // ジャンル列は全教科から生成（学年フィルタなし）
  var sortedGenres = _ptGenreOrder.slice();

  // 行データを構築: schoolName → [{ school_course, sub_course, pattern }]
  var subCourses = grade === '高1' ? [''] : ['文系', '理系'];
  var rowMap = {};

  _ptPatterns.forEach(function(p) {
    if (String(p.grade || '').trim() !== grade) return;
    var sn  = String(p.school_name   || '').trim();
    var sc  = String(p.school_course || '').trim();
    var sub = String(p.sub_course    || '').trim();
    if (!sn || !sc) return;
    if (grade === '高1' && sub !== '') return;
    if (grade !== '高1' && sub !== '文系' && sub !== '理系') return;
    if (!rowMap[sn]) rowMap[sn] = [];
    var key = sc + '||' + sub;
    if (!rowMap[sn].find(function(r) { return r.school_course + '||' + r.sub_course === key; })) {
      rowMap[sn].push({ school_course: sc, sub_course: sub, pattern: p });
    }
  });

  _ptSchoolSettings.forEach(function(s) {
    var sn = String(s.school_name   || '').trim();
    var sc = String(s.school_course || '').trim();
    if (!sn || !sc) return;
    if (!rowMap[sn]) rowMap[sn] = [];
    subCourses.forEach(function(sub) {
      var key = sc + '||' + sub;
      if (!rowMap[sn].find(function(r) { return r.school_course + '||' + r.sub_course === key; })) {
        rowMap[sn].push({ school_course: sc, sub_course: sub, pattern: null });
      }
    });
  });

  var schoolsWithRows = _ptSchoolNames.filter(function(sn) { return rowMap[sn] && rowMap[sn].length > 0; });

  if (schoolsWithRows.length === 0) {
    return '<p style="color:#888; padding:8px 0;">選択中の学年（' + grade + '）に対応するパターンがありません。<br>' +
      'コースを追加するか、他の学年を選択してください。</p>';
  }

  var html = '<div class="pt-cross-table-wrap"><table class="pt-cross-table"><thead><tr>';
  html += '<th class="pt-row-label-th">学校名</th>';
  html += '<th class="pt-row-label-th">コース' + (grade !== '高1' ? '・文理' : '') + '</th>';
  if (sortedGenres.length > 0) {
    sortedGenres.forEach(function(g) {
      var col = _ptGenreColorMap[g] || {};
      var bg  = col.header ? 'background:' + col.header + ';' : 'background:#555;';
      html += '<th class="pt-genre-th" style="' + bg + '">' + g + '</th>';
    });
  } else {
    html += '<th class="pt-genre-th" style="color:#aaa;">（教科未登録）</th>';
  }
  html += '</tr></thead><tbody>';

  schoolsWithRows.forEach(function(sn) {
    var rows = rowMap[sn] || [];
    rows.sort(function(a, b) {
      if (a.school_course !== b.school_course) return a.school_course.localeCompare(b.school_course, 'ja');
      var order = { '': 0, '文系': 1, '理系': 2 };
      return (order[a.sub_course] || 0) - (order[b.sub_course] || 0);
    });

    var snEsc    = _ptEscAttr(sn);
    var rowCount = rows.length;

    rows.forEach(function(row, rowIdx) {
      var courseLabel = row.school_course + (row.sub_course ? ' ' + row.sub_course : '');
      var pid         = row.pattern ? String(row.pattern.pattern_id).trim() : null;

      html += '<tr class="pt-data-row">';

      // 学校名セル: 最初の行だけ rowspan で描画（ドラッグハンドル付き）
      if (rowIdx === 0) {
        html += '<td class="pt-school-label" rowspan="' + rowCount + '"' +
          ' draggable="true"' +
          ' ondragstart="_ptSchoolDragStart(event,\'' + snEsc + '\')"' +
          ' ondragend="_ptSchoolDragEnd()"' +
          ' ondragover="_ptSchoolDragOver(event,\'' + snEsc + '\')"' +
          ' ondrop="_ptSchoolDrop(event,\'' + snEsc + '\')">' +
          '<span class="st-drag-handle" title="ドラッグして並び替え">⠿</span> ' + sn + '</td>';
      }

      html += '<td class="pt-row-label">' + courseLabel + '</td>';

      if (sortedGenres.length === 0) {
        html += '<td class="pt-cell' + (pid ? '' : ' pt-cell-nopattern') + '"></td>';
      } else {
        sortedGenres.forEach(function(genreName) {
          html += _ptRenderCell(sn, genreName, pid);
        });
      }

      html += '</tr>';
    });
  });

  html += '</tbody></table></div>';
  return html;
}

function _ptRenderCell(schoolName, genreName, patternId) {
  // _ptSubjectGenreMap を使い String 比較で確実にジャンルを判定
  var assignedIds = patternId ? (_ptSubjectMap[patternId] || []) : [];
  var inGenre = assignedIds.filter(function(id) {
    return _ptSubjectGenreMap[String(id).trim()] === genreName;
  });

  var cellCls   = 'pt-cell' + (patternId ? '' : ' pt-cell-nopattern');
  var cellAttrs = patternId
    ? ' ondragover="_ptCellDragOver(event)" ondrop="_ptCellDrop(event,\'' + patternId + '\')"'
    : '';

  var html = '<td class="' + cellCls + '"' + cellAttrs + '><div class="pt-cell-inner">';

  inGenre.forEach(function(sid) {
    var s = _ptSubjectInfoMap[String(sid).trim()];
    if (!s) return;
    var displayName = _getAliasValue(schoolName, sid) || s.subject_name;
    var snEsc    = _ptEscAttr(schoolName);
    var pidEsc   = patternId || '';
    var col      = _ptGenreColorMap[genreName] || {};
    var chipStyle = col.chip
      ? 'background:' + col.chip + '; border-color:' + col.border + ';'
      : 'background:#e8edf7;';
    html += '<span class="pt-chip" style="' + chipStyle + '"' +
      ' draggable="true"' +
      ' ondragstart="_ptChipDragStart(event,\'' + sid + '\',\'' + pidEsc + '\')"' +
      ' ondragend="_ptChipDragEnd()"' +
      ' ondblclick="_ptStartAliasEdit(this,\'' + snEsc + '\',\'' + sid + '\');event.stopPropagation();">' +
      displayName +
      '<button class="pt-chip-close" onclick="_ptRemoveSubject(\'' + pidEsc + '\',\'' + sid + '\');event.stopPropagation();">×</button>' +
      '</span>';
  });

  html += '</div></td>';
  return html;
}

/* ========== 教科プール描画 ========== */
function _ptRenderPool() {
  var grade = _ptSelectedGrade;
  var gradeSubjects = _ptSubjects.filter(function(s) {
    return String(s.grade || '').trim() === grade;
  });
  // 対象学年の教科がなければ全教科を表示（grade 列の値形式が異なる場合の fallback）
  if (gradeSubjects.length === 0) gradeSubjects = _ptSubjects;

  var genreGroups = {};
  gradeSubjects.forEach(function(s) {
    var g = String(s.genre_name || 'その他').trim();
    if (!genreGroups[g]) genreGroups[g] = [];
    genreGroups[g].push(s);
  });

  var sections = '';
  _ptGenreOrder.forEach(function(genreName) {
    var subs = genreGroups[genreName];
    if (!subs || subs.length === 0) return;
    var col         = _ptGenreColorMap[genreName] || {};
    var borderColor = col.border || '#ccc';
    var bgColor     = col.chip   || '#fafbff';
    var labelColor  = col.header || '#666';
    var chipStyle   = col.chip
      ? 'background:' + col.chip + '; border-color:' + col.border + ';'
      : 'background:#e8edf7;';
    sections += '<div class="pt-pool-genre-section" style="border-color:' + borderColor + '; background:' + bgColor + ';">';
    sections += '<div class="pt-pool-genre-label" style="color:' + labelColor + ';">' + genreName + '</div>';
    sections += '<div class="pt-pool-chips">';
    subs.forEach(function(s) {
      sections += '<span class="pt-chip" style="' + chipStyle + '"' +
        ' draggable="true"' +
        ' ondragstart="_ptChipDragStart(event,\'' + s.subject_id + '\',null)"' +
        ' ondragend="_ptChipDragEnd()">' +
        s.subject_name + '</span>';
    });
    sections += '</div></div>';
  });

  var html = sections
    ? '<div class="pt-pool-genres-row">' + sections + '</div>'
    : '<p style="color:#aaa; font-size:0.9em;">教科が登録されていません</p>';
  return html;
}

/* ========== 学年切り替え ========== */
function _ptOnGradeChange(grade) {
  _ptSelectedGrade = grade;
  renderPatternManager(window.masterData);
}

/* ========== 教科チップ DnD ========== */
function _ptChipDragStart(event, subjectId, fromPatternId) {
  _ptDragPayload = { subjectId: subjectId, fromPatternId: fromPatternId || null };
  event.dataTransfer.effectAllowed = 'move';
  event.dataTransfer.setData('text/plain', subjectId);
  event.stopPropagation();
  var chip = event.currentTarget;
  setTimeout(function() { if (chip) chip.classList.add('pt-chip-dragging'); }, 0);
}

function _ptChipDragEnd() {
  _ptDragPayload = null;
  document.querySelectorAll('.pt-chip-dragging').forEach(function(el) { el.classList.remove('pt-chip-dragging'); });
  document.querySelectorAll('.pt-cell-hover').forEach(function(el) { el.classList.remove('pt-cell-hover'); });
}

function _ptCellDragOver(event) {
  if (!_ptDragPayload) return;
  event.preventDefault();
  event.stopPropagation();
  document.querySelectorAll('.pt-cell-hover').forEach(function(el) { el.classList.remove('pt-cell-hover'); });
  event.currentTarget.classList.add('pt-cell-hover');
}

function _ptCellDrop(event, patternId) {
  event.preventDefault();
  event.stopPropagation();
  document.querySelectorAll('.pt-cell-hover').forEach(function(el) { el.classList.remove('pt-cell-hover'); });
  if (!_ptDragPayload) return;
  var subjectId     = _ptDragPayload.subjectId;
  var fromPatternId = _ptDragPayload.fromPatternId;
  _ptDragPayload = null;
  if (fromPatternId === patternId) return;
  _ptAddSubject(patternId, subjectId);
  if (fromPatternId) _ptRemoveSubject(fromPatternId, subjectId);
}

function _ptPoolDragOver(event) {
  if (!_ptDragPayload) return;
  event.preventDefault();
  event.stopPropagation();
  document.querySelectorAll('.pt-cell-hover').forEach(function(el) { el.classList.remove('pt-cell-hover'); });
  var pool = document.getElementById('pt-pool-area');
  if (pool) pool.classList.add('pt-cell-hover');
}

function _ptPoolDrop(event) {
  event.preventDefault();
  event.stopPropagation();
  var pool = document.getElementById('pt-pool-area');
  if (pool) pool.classList.remove('pt-cell-hover');
  if (!_ptDragPayload) return;
  var fromPatternId = _ptDragPayload.fromPatternId;
  var subjectId     = _ptDragPayload.subjectId;
  _ptDragPayload = null;
  if (fromPatternId) _ptRemoveSubject(fromPatternId, subjectId);
}

/* ========== 教科追加・削除 ========== */
function _ptAddSubject(patternId, subjectId) {
  if (!patternId) return;
  var sid = String(subjectId).trim();
  if (!_ptSubjectMap[patternId]) _ptSubjectMap[patternId] = [];
  if (_ptSubjectMap[patternId].indexOf(sid) >= 0) return;
  _ptSubjectMap[patternId] = _ptSubjectMap[patternId].concat([sid]);
  _ptRerenderTableArea();
  _ptSavePattern(patternId);
}

function _ptRemoveSubject(patternId, subjectId) {
  if (!patternId || !_ptSubjectMap[patternId]) return;
  var sid = String(subjectId).trim();
  _ptSubjectMap[patternId] = _ptSubjectMap[patternId].filter(function(id) { return id !== sid; });
  _ptRerenderTableArea();
  _ptSavePattern(patternId);
}

function _ptRerenderTableArea() {
  var area = document.getElementById('pt-table-area');
  if (area) area.innerHTML = _ptRenderCrossTable();
}

function _ptSavePattern(patternId) {
  if (_ptSaving[patternId]) return;
  var pattern = _ptPatterns.find(function(p) { return String(p.pattern_id).trim() === patternId; });
  if (!pattern) return;
  _ptSaving[patternId] = true;

  var selectedIds = (_ptSubjectMap[patternId] || []).slice();
  google.script.run
    .withSuccessHandler(function(res) {
      _ptSaving[patternId] = false;
      if (!res || !res.success) {
        showMessage((res && res.error) || '保存に失敗しました', 'error');
        refreshMasterData(function() { loadSection('patterns'); });
      } else {
        if (window.masterData && window.masterData.patternSubjects) {
          window.masterData.patternSubjects = window.masterData.patternSubjects
            .filter(function(ps) { return String(ps.pattern_id).trim() !== patternId; })
            .concat(selectedIds.map(function(sid) { return { pattern_id: patternId, subject_id: sid }; }));
        }
      }
    })
    .withFailureHandler(function(err) {
      _ptSaving[patternId] = false;
      showMessage('通信エラー: ' + ((err && err.message) || ''), 'error');
      refreshMasterData(function() { loadSection('patterns'); });
    })
    .batchSetGroupSubjects(window.selectedCramId, {
      school_name:          pattern.school_name,
      school_course:        pattern.school_course,
      grade:                pattern.grade,
      sub_course:           pattern.sub_course || '',
      selected_subject_ids: selectedIds
    });
}

/* ========== インラインエイリアス編集 ========== */
function _ptStartAliasEdit(chipEl, schoolName, subjectId) {
  var inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'pt-alias-input';
  inp.value = _getAliasValue(schoolName, subjectId) || '';
  inp.placeholder = '表示名（空=正式名）';
  inp.onclick = function(e) { e.stopPropagation(); };
  inp.onkeydown = function(e) {
    if (e.key === 'Enter')  { _ptCommitAliasEdit(inp, schoolName, subjectId); }
    if (e.key === 'Escape') { renderPatternManager(window.masterData); }
  };
  inp.onblur = function() { _ptCommitAliasEdit(inp, schoolName, subjectId); };
  chipEl.classList.add('pt-chip-editing');
  while (chipEl.firstChild) chipEl.removeChild(chipEl.firstChild);
  chipEl.appendChild(inp);
  setTimeout(function() { inp.focus(); inp.select(); }, 0);
}

function _ptCommitAliasEdit(inp, schoolName, subjectId) {
  if (inp._committed) return;
  inp._committed = true;
  _patSaveAlias(schoolName, subjectId, inp.value);
  setTimeout(function() { renderPatternManager(window.masterData); }, 200);
}

/* ========== 学校名セル DnD（並び替え） ========== */
function _ptSchoolDragStart(event, schoolName) {
  if (_ptDragPayload) return; // チップDnD中は学校DnDを起動しない
  _ptDragSrcSchool = schoolName;
  event.dataTransfer.effectAllowed = 'move';
  event.dataTransfer.setData('text/plain', 'school:' + schoolName);
  // chipDnDと区別するため stopPropagation しない
}

function _ptSchoolDragEnd() {
  _ptDragSrcSchool = null;
  document.querySelectorAll('.pt-school-label-over').forEach(function(el) { el.classList.remove('pt-school-label-over'); });
}

function _ptSchoolDragOver(event, targetSchool) {
  if (!_ptDragSrcSchool || _ptDragSrcSchool === targetSchool || _ptDragPayload) return;
  event.preventDefault();
  event.stopPropagation();
  document.querySelectorAll('.pt-school-label-over').forEach(function(el) { el.classList.remove('pt-school-label-over'); });
  event.currentTarget.classList.add('pt-school-label-over');
}

function _ptSchoolDrop(event, targetSchool) {
  event.preventDefault();
  event.stopPropagation();
  document.querySelectorAll('.pt-school-label-over').forEach(function(el) { el.classList.remove('pt-school-label-over'); });
  if (!_ptDragSrcSchool || _ptDragSrcSchool === targetSchool) { _ptDragSrcSchool = null; return; }
  var schools = _ptSchoolNames.slice();
  var srcIdx  = schools.indexOf(_ptDragSrcSchool);
  var tgtIdx  = schools.indexOf(targetSchool);
  if (srcIdx < 0 || tgtIdx < 0) { _ptDragSrcSchool = null; return; }
  schools.splice(srcIdx, 1);
  schools.splice(tgtIdx, 0, _ptDragSrcSchool);
  _ptSchoolNames = schools;
  _patSaveSchoolOrder(window.selectedCramId || '', schools);
  _ptDragSrcSchool = null;
  renderPatternManager(window.masterData);
}

/* ========== 学校並び順（localStorage 連携） ========== */
function _patGetSortedSchools(schools, cramId) {
  var saved = null;
  try {
    var raw = localStorage.getItem('st_school_order_' + cramId);
    if (raw) saved = JSON.parse(raw);
  } catch (e) {}
  if (!saved || !Array.isArray(saved)) return schools;
  var existing = saved.filter(function(s) { return schools.indexOf(s) !== -1; });
  var newOnes  = schools.filter(function(s) { return existing.indexOf(s) === -1; });
  return existing.concat(newOnes);
}

function _patSaveSchoolOrder(cramId, schools) {
  try { localStorage.setItem('st_school_order_' + cramId, JSON.stringify(schools)); } catch (e) {}
}

/* ========== 表示名エイリアス ========== */
function _getAliasValue(schoolName, subjectId) {
  var aliases = (window.masterData && window.masterData.schoolSubjectAliases) || [];
  var hit = aliases.find(function(a) {
    return a.school_name === schoolName && String(a.subject_id).trim() === String(subjectId).trim();
  });
  return hit ? (hit.display_name || '') : '';
}

function _patSaveAlias(schoolName, subjectId, newValue) {
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.conflict) {
        showMessage('別ユーザーにより変更がありました。更新します。', 'warning');
        refreshMasterData(function() {});
        return;
      }
      if (res && res.success) {
        var aliases = window.masterData.schoolSubjectAliases || [];
        var idx = aliases.findIndex(function(a) {
          return a.school_name === schoolName && String(a.subject_id).trim() === String(subjectId).trim();
        });
        if (String(newValue || '').trim()) {
          if (idx >= 0) aliases[idx].display_name = newValue;
          else aliases.push({ school_name: schoolName, subject_id: subjectId, display_name: newValue, updated_at: '' });
        } else {
          if (idx >= 0) aliases.splice(idx, 1);
        }
        window.masterData.schoolSubjectAliases = aliases;
      } else if (res && res.error) {
        showMessage('表示名保存失敗: ' + res.error, 'error');
      }
    })
    .withFailureHandler(function(err) {
      showMessage('表示名保存エラー: ' + ((err && err.message) || ''), 'error');
    })
    .upsertSubjectAlias(schoolName, subjectId, newValue, '');
}

/* ========== コース追加パネル ========== */
function _ptRenderAddCoursePanel(allSchoolNames) {
  var html = '<div class="add-course-panel">';
  html += '<div class="add-course-panel-title">コース追加</div>';
  html += '<div class="add-course-row"><div class="add-course-label">学校名</div>';
  html += '<div class="add-course-school-list">';
  html += '<label class="add-course-school-item add-course-all-label">' +
    '<input type="checkbox" id="pat-school-all" onchange="toggleAllSchools(this.checked)" />' +
    '<span>全選択</span></label>';
  allSchoolNames.forEach(function(sn) {
    var snEsc = sn.replace(/"/g, '&quot;');
    html += '<label class="add-course-school-item">' +
      '<input type="checkbox" class="pat-school-cb" value="' + snEsc + '" />' +
      '<span>' + sn + '</span></label>';
  });
  if (allSchoolNames.length === 0) {
    html += '<span style="color:#aaa; font-size:0.85em;">学校名が登録されていません</span>';
  }
  html += '</div></div>';
  html += '<div class="add-course-row" style="margin-top:12px; align-items:center;">';
  html += '<div class="add-course-label">科・コース</div>';
  html += '<input type="text" id="pat-new-course" placeholder="例: 普通、理数、特進" class="admin-input" style="width:200px;" />';
  html += '</div>';
  html += '<div class="add-course-row" style="margin-top:14px; gap:8px;">';
  html += '<button class="btn-save-admin" id="pat-add-course-btn" onclick="submitAddCourse()">追加する</button>';
  html += '<button class="btn-cancel-admin" onclick="_closeAddCoursePanel()">キャンセル</button>';
  html += '<span id="pat-add-progress" style="display:none; font-size:0.9em; color:#3a4f80; font-weight:600;"></span>';
  html += '</div></div>';
  return html;
}

function _openAddCoursePanel() {
  _showAddCoursePanel = true;
  renderPatternManager(window.masterData);
}

function _closeAddCoursePanel() {
  _showAddCoursePanel = false;
  renderPatternManager(window.masterData);
}

function toggleAllSchools(checked) {
  document.querySelectorAll('.pat-school-cb').forEach(function(cb) { cb.checked = checked; });
}

function submitAddCourse() {
  var cramId = window.selectedCramId || '';
  if (!cramId) { showMessage('校舎を選択してください。', 'error'); return; }
  var course = (document.getElementById('pat-new-course').value || '').trim();
  if (!course) { showMessage('科・コース名を入力してください。', 'error'); return; }
  var checked = Array.from(document.querySelectorAll('.pat-school-cb:checked')).map(function(cb) { return cb.value; });
  if (checked.length === 0) { showMessage('学校名を1つ以上選択してください。', 'error'); return; }

  var btn  = document.getElementById('pat-add-course-btn');
  var prog = document.getElementById('pat-add-progress');
  if (btn)  btn.disabled = true;
  if (prog) { prog.style.display = ''; prog.textContent = checked.length + '校中 0校完了'; }

  var done = 0, total = checked.length;
  function processNext() {
    if (done >= total) {
      showMessage(total + '校・' + course + ' のパターンを追加しました。', 'success');
      _showAddCoursePanel = false;
      refreshMasterData(function() { loadSection('patterns'); });
      return;
    }
    if (prog) prog.textContent = total + '校中 ' + done + '校完了';
    var schoolName = checked[done];
    google.script.run
      .withSuccessHandler(function(res) {
        if (res && !res.success && res.error) showMessage(schoolName + ': ' + res.error, 'error');
        done++;
        processNext();
      })
      .withFailureHandler(function(err) {
        showMessage(schoolName + ': ' + ((err && err.message) || '通信エラー'), 'error');
        done++;
        processNext();
      })
      .initializeDefaultPatterns(cramId, { school_name: schoolName, school_course: course });
  }
  processNext();
}

/* ========== ユーティリティ ========== */
function _ptEscAttr(str) {
  return String(str).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

/* ========== グローバル公開 ========== */
window.renderPatternManager = renderPatternManager;
window._ptOnGradeChange     = _ptOnGradeChange;
window._ptChipDragStart     = _ptChipDragStart;
window._ptChipDragEnd       = _ptChipDragEnd;
window._ptCellDragOver      = _ptCellDragOver;
window._ptCellDrop          = _ptCellDrop;
window._ptPoolDragOver      = _ptPoolDragOver;
window._ptPoolDrop          = _ptPoolDrop;
window._ptAddSubject        = _ptAddSubject;
window._ptRemoveSubject     = _ptRemoveSubject;
window._ptStartAliasEdit    = _ptStartAliasEdit;
window._ptSchoolDragStart   = _ptSchoolDragStart;
window._ptSchoolDragEnd     = _ptSchoolDragEnd;
window._ptSchoolDragOver    = _ptSchoolDragOver;
window._ptSchoolDrop        = _ptSchoolDrop;
window._openAddCoursePanel  = _openAddCoursePanel;
window._closeAddCoursePanel = _closeAddCoursePanel;
window.toggleAllSchools     = toggleAllSchools;
window.submitAddCourse      = submitAddCourse;
</script>
