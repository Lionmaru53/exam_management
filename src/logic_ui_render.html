<script>
function hexToRgba(hex, alpha = 0.1) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function getGenreColor(genreName, alpha = 0.08) {
  const palette = {
    '数学': '#dbeafe',
    '英語': '#fed7aa',
    '国語': '#bbf7d0',
    '理科': '#fbcfe8',
    '社会': '#fde68a',
    'その他': '#f8fafc'
  };
  const hex = palette[genreName] || '#f8fafc';
  return hexToRgba(hex, alpha);
}

// ---- ローディングオーバーレイ ----

var _loadingMsgTimer = null;

window.setLoading = function(active, messages, intervalMs) {
  const overlay = document.getElementById('loading-overlay');
  const label   = document.getElementById('loading-label');
  if (!overlay) return;

  if (_loadingMsgTimer) {
    clearInterval(_loadingMsgTimer);
    _loadingMsgTimer = null;
  }

  if (active) {
    const msgs = Array.isArray(messages) ? messages : [messages || '処理中...'];
    if (label) label.textContent = msgs[0];
    overlay.classList.add('active');

    if (msgs.length > 1) {
      var idx = 0;
      _loadingMsgTimer = setInterval(function() {
        idx = Math.min(idx + 1, msgs.length - 1);
        if (label) label.textContent = msgs[idx];
      }, intervalMs || 2500);
    }
  } else {
    overlay.classList.remove('active');
  }
};

// ---- メイン描画 ----

function renderApp(data) {
  setLoading(false);

  if (data.error) {
    document.getElementById('app').style.display = 'block';
    document.getElementById('header').innerHTML =
      `<p style="color:#dc3545;">エラー: ${data.error}</p>`;
    return;
  }

  document.getElementById('app').style.display = 'block';

  // ヘッダー：タイトル＋生徒情報
  const s = data.student;
  const infoItems = [s.school_name, s.school_course_name, s.grade, s.sub_course].filter(Boolean);
  const infoText  = infoItems.join('　');

  document.getElementById('header').innerHTML = `
    <div class="exam-header-container">
      <h2 class="app-title">定期テスト得点入力フォーム</h2>
      <p class="student-name">${s.name} さん <span class="student-info">(${infoText})</span></p>
    </div>
  `;

  const examTabs = data.examTabs || [];

  if (examTabs.length === 0) {
    document.getElementById('subject-list').innerHTML =
      `<p style="color:#888;">表示できる試験区分がありません。</p>`;
    return;
  }

  let listHtml = `
    <p class="usage-hint">テストの点数と学年・クラスの順位を入力して、「一括保存する」を押してください。タブで試験区分を切り替えられます。</p>
    <div class="subject-tab-wrap">
      <div class="tab-nav">
  `;

  examTabs.forEach((exam, index) => {
    const tabId = exam.term_test_id;
    listHtml += `
      <button type="button" class="tab-button${index === 0 ? ' active' : ''}"
        data-tab-id="${tabId}" onclick="switchExamTab('${tabId}')">
        ${exam.test_name}
      </button>
    `;
  });

  listHtml += `</div><div class="tab-content">`;

  examTabs.forEach((exam, examIndex) => {
    const tabId      = exam.term_test_id;
    const displayKey = exam.exam_id || ('p_' + exam.pattern_id);
    const groupedSubjects = (exam.subjects || []).reduce((acc, sub) => {
      const genre = sub.genre_name || 'その他';
      if (!acc[genre]) acc[genre] = [];
      acc[genre].push(sub);
      return acc;
    }, {});

    listHtml += `
      <div class="tab-panel" data-tab-id="${tabId}" style="display:${examIndex === 0 ? 'block' : 'none'};">
        <div class="subject-table-container">
          <table class="subject-table">
            <thead>
              <tr><th colspan="5" class="test-name-header">${exam.test_name}</th></tr>
              <tr>
                <th>教科</th><th>科目</th><th>点数</th><th>学年順位</th><th>クラス順位</th>
              </tr>
            </thead>
            <tbody>
    `;

    if (Object.keys(groupedSubjects).length === 0) {
      listHtml += `
        <tr>
          <td colspan="5" style="text-align:center; color:#aaa; padding:20px;">
            ${exam.hasExam ? '教科が未登録です' : '教科パターンが未登録です'}
          </td>
        </tr>
      `;
    } else {
      Object.keys(groupedSubjects).forEach(genreName => {
        const rows = groupedSubjects[genreName];
        const rowBackground = getGenreColor(genreName, 0.12);
        rows.forEach((sub, index) => {
          const sc = (exam.scores || []).find(x => x.subject_id === sub.subject_id) || {};
          const scoreVal = (sc.score !== undefined && sc.score !== null) ? sc.score : '';
          const grVal    = (sc.grade_rank !== undefined && sc.grade_rank !== null) ? sc.grade_rank : '';
          const crVal    = (sc.class_rank !== undefined && sc.class_rank !== null) ? sc.class_rank : '';
          listHtml += `
            <tr style="background-color:${rowBackground};">
              ${index === 0 ? `<td class="genre-cell" rowspan="${rows.length}" style="background-color:${rowBackground};">${genreName}</td>` : ''}
              <td>${sub.display_name || sub.subject_name}</td>
              <td><input type="text" inputmode="numeric" class="score-input"
                id="s_${displayKey}_${sub.subject_id}" value="${scoreVal}"
                placeholder="点数" maxlength="3"
                oninput="this.value=this.value.replace(/[^0-9]/g,'')" /></td>
              <td><input type="text" inputmode="numeric" class="rank-input"
                id="gr_${displayKey}_${sub.subject_id}" value="${grVal}"
                placeholder="順位" maxlength="4"
                oninput="this.value=this.value.replace(/[^0-9]/g,'')" /></td>
              <td><input type="text" inputmode="numeric" class="rank-input"
                id="cr_${displayKey}_${sub.subject_id}" value="${crVal}"
                placeholder="順位" maxlength="4"
                oninput="this.value=this.value.replace(/[^0-9]/g,'')" /></td>
            </tr>
          `;
        });
      });
    }

    listHtml += `</tbody></table>`;

    if (Object.keys(groupedSubjects).length > 0) {
      listHtml += `
        <div class="tab-footer">
          <button type="button" class="btn-save"
            onclick="handleSave('${s.student_id}', '${exam.exam_id || ''}', '${exam.pattern_id || ''}', '${displayKey}', this)">
            一括保存する
          </button>
        </div>
      `;
    }

    listHtml += `</div></div>`;
  });

  listHtml += `</div></div>`;

  document.getElementById('subject-list').innerHTML = listHtml;
  document.getElementById('footer').innerHTML = '';
}

function switchExamTab(tabId) {
  document.querySelectorAll('.tab-button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tabId === tabId);
  });
  document.querySelectorAll('.tab-panel').forEach(panel => {
    panel.style.display = panel.dataset.tabId === tabId ? 'block' : 'none';
  });
}
</script>
