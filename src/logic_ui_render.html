<script>
// ユーザー登録フォームの URL（LINE未紐づけ時に表示）
// TODO: 実際の登録フォーム URL に変更してください
var REGISTRATION_URL = 'https://liff.line.me/2008067898-LnyPJ1ra';

var _currentStudent  = null;
var _currentExamTabs = [];
var _bugReportOpen   = false;
var _bugConfirmData  = null;
var _appData         = null;
var _originalValues  = {};
var _currentTabId    = null;
var _currentAvailableSubjects = [];

var _PENCIL_ICON_HTML = '<svg xmlns="http://www.w3.org/2000/svg" width="1.1em" height="1.1em"  vertical-align="-0.125em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="icon-edit"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>';

var _editMode  = false;
var _editTabId = null;
var _editRows  = [];  // [{subject_id, raw_subject_name}]
var _editGenre       = null;   // 編集中の教科名
var _collapsedGenres = {};     // { genreName: true } 折りたたみ状態
var _editSubjectInfo = null;   // { tabId, genreName, subjectId } 1件編集中の科目情報

var _currentView      = 'scores'; // 'scores' | 'photos'

var _reorderMode      = false; // 並び替えモード ON/OFF
var _genreOrder       = null;  // string[] | null。null = masterGenreOrder を使用
var _subjectOrder     = {};    // { [genreName]: subject_id[] } ユーザー定義順
var _orderPrefsLoaded = false; // localStorage ロード済みフラグ

function getGenreColor(genreName, alpha = 0.08) {
  const gc  = (window.GENRE_COLORS || {})[genreName] || (window.GENRE_COLORS || {})['その他'] || {};
  const hex = gc.light || '#f8fafc';
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

// ---- ローディングオーバーレイ ----

var _loadingMsgTimer = null;

window.setLoading = function(active, messages, intervalMs) {
  const overlay = document.getElementById('loading-overlay');
  const label   = document.getElementById('loading-label');
  if (!overlay) return;

  if (_loadingMsgTimer) {
    clearInterval(_loadingMsgTimer);
    _loadingMsgTimer = null;
  }

  if (active) {
    const msgs = Array.isArray(messages) ? messages : [messages || '処理中...'];
    if (label) label.textContent = msgs[0];
    overlay.classList.add('active');

    if (msgs.length > 1) {
      var idx = 0;
      _loadingMsgTimer = setInterval(function() {
        idx = Math.min(idx + 1, msgs.length - 1);
        if (label) label.textContent = msgs[idx];
      }, intervalMs || 2500);
    }
  } else {
    overlay.classList.remove('active');
  }
};

// ---- メイン描画 ----

function renderApp(data) {
  setLoading(false);

  if (data.error) {
    document.getElementById('app').style.display = 'flex';
    document.getElementById('header').innerHTML = _renderErrorHtml(data);
    return;
  }

  document.getElementById('app').style.display = 'flex';

  // コース未設定の場合はコース入力フローを表示
  if (data.needsCourse) {
    renderCourseInput(data);
    return;
  }

  // 高2・高3 で文理未設定の場合は選択画面を表示
  if (data.needsSubCourse) {
    renderSubCourseSelect(data);
    return;
  }

  // ヘッダー：タイトル＋生徒情報
  const s = data.student;
  _currentStudent  = s;
  _currentExamTabs = data.examTabs || [];
  _appData = data;
  if (!_orderPrefsLoaded && data.student) {
    _loadOrderPrefs();
    _orderPrefsLoaded = true;
  }
  _currentAvailableSubjects = data.availableSubjects || [];
  const infoItems = [s.school_name, s.school_course_name, s.grade, s.sub_course].filter(Boolean);
  const infoText  = infoItems.join('　');

  document.getElementById('header').innerHTML = `
    <div class="exam-header-container-app">
      <div class="header-top-row">
        <h2 class="app-title">定期テスト得点入力フォーム</h2>
      </div>
      <p class="student-name-app">${s.name} さん <span class="student-info-app">(${infoText})</span></p>
    </div>
  `;

  const examTabs = data.examTabs || [];

  if (examTabs.length === 0) {
    document.getElementById('subject-list').innerHTML =
      `<p style="color:#888;">表示できる試験区分がありません。</p>`;
    return;
  }

  let listHtml = `
    <ul class="usage-hint">
      <li>点数と学年・クラス順位を入力して「保存する」を押してください（分かる部分だけでOK）</li>
      <li>受けていない・未実施の科目は「未実施・未受験」にチェック</li>
      <li>${_PENCIL_ICON_HTML}で科目の追加・変更ができます</li>
    </ul>
    <div class="subject-tab-wrap">
      <div class="exam-select-row">
        <div class="exam-select-wrap">
          <select class="exam-select" onchange="switchExamTab(this.value)">
  `;

  examTabs.forEach(exam => {
    const tabId = exam.term_test_id;
    listHtml += `<option value="${tabId}">${exam.test_name}</option>`;
  });

  listHtml += '</select></div>'
    + '<button class="upload-shortcut-btn" id="upload-shortcut-btn" onclick="_uploadFromScores()" title="成績表画像をアップロード">'
    + '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'
    + '<path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>'
    + '<circle cx="12" cy="13" r="4"/></svg>'
    + '</button>'
    + '</div><div class="tab-content">';

  examTabs.forEach((exam, examIndex) => {
    const tabId      = exam.term_test_id;
    const displayKey = exam.exam_id || ('p_' + exam.pattern_id);

    listHtml += '<div class="tab-panel-app" data-tab-id="' + tabId + '" style="display:' + (examIndex === 0 ? 'block' : 'none') + ';">';
    listHtml += '<div class="ios-section-list">';
    listHtml += '<div class="reorder-toggle-wrap">';
    listHtml += '<button class="reorder-toggle-btn" onclick="toggleReorderMode()">'
      + (_reorderMode ? '✓ 完了' : '⇅ 並び替え') + '</button>';
    listHtml += '</div>';

    const groupedSubjects = (exam.subjects || []).reduce(function(acc, sub) {
      const genre = sub.genre_name || 'その他';
      if (!acc[genre]) acc[genre] = [];
      acc[genre].push(sub);
      return acc;
    }, {});

    // availableSubjectsからも教科一覧を補完（初回ログイン時など科目未設定でもセクションを表示）
    (_currentAvailableSubjects || []).forEach(function(sub) {
      const genre = sub.genre_name || 'その他';
      if (!groupedSubjects[genre]) groupedSubjects[genre] = [];
    });

    const genreNames = Object.keys(groupedSubjects);

    // ユーザー定義順 → masterGenreOrder の優先度でソート
    var orderRef = _genreOrder || (_appData && _appData.genres || []).map(function(g) { return g.genre_name; });
    genreNames.sort(function(a, b) {
      var ia = orderRef.indexOf(a), ib = orderRef.indexOf(b);
      if (ia === -1) ia = orderRef.length;
      if (ib === -1) ib = orderRef.length;
      return ia - ib;
    });

    if (genreNames.length === 0) {
      listHtml += '<p style="color:#aaa;text-align:center;padding:20px;">'
        + '教科パターンが未登録です'
        + '</p>';
    } else {
      genreNames.forEach(function(genreName) {
        var rows = groupedSubjects[genreName];
        if (_subjectOrder[genreName] && _subjectOrder[genreName].length > 0) {
          var userSOrder = _subjectOrder[genreName];
          rows = rows.slice().sort(function(a, b) {
            var ia = userSOrder.indexOf(a.subject_id), ib = userSOrder.indexOf(b.subject_id);
            if (ia === -1) ia = userSOrder.length;
            if (ib === -1) ib = userSOrder.length;
            return ia - ib;
          });
        }
        const noKebab = genreName === '合計';

        // この教科に編集中の科目があれば折りたたみを強制解除
        const isContainingEdit = _editSubjectInfo
          && _editSubjectInfo.tabId === tabId
          && _editSubjectInfo.genreName === genreName;
        const isCollapsed = !isContainingEdit && !!_collapsedGenres[genreName];

        // ---- セクションヘッダー ----
        const genreHeaderBg = getGenreColor(genreName, 0.35);
        listHtml += '<div class="ios-section" data-genre="' + _esc(genreName) + '">';
        listHtml += '<div class="ios-section-header" style="background:' + genreHeaderBg + ';"'
          + (_reorderMode ? '' : ' onclick="toggleGenreCollapse(\'' + _esc(genreName) + '\')"') + '>';
        if (_reorderMode && !noKebab) {
          listHtml += '<span class="drag-handle"'
            + ' data-drag-type="genre"'
            + ' data-drag-genre="' + _esc(genreName) + '"'
            + ' ontouchstart="onDragHandleTouch(event,this)">≡</span>';
        }
        listHtml += '<span class="ios-section-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>';
        listHtml += '<span class="ios-section-title">' + _esc(genreName) + '</span>';
        listHtml += '</div>'; // ios-section-header

        // ---- セクションボディ ----
        listHtml += '<div class="ios-section-body"' + (isCollapsed ? ' style="display:none;"' : '') + '>';

        // ==== 通常モード（科目ごとに編集チェック） ====
        rows.forEach(function(sub) {
          const sc         = (exam.scores || []).find(function(x) { return x.subject_id === sub.subject_id; }) || {};
          const sa         = (exam.schoolAverages || []).find(function(x) { return x.subject_id === sub.subject_id; }) || {};
          const isExcluded = !!sub.excluded;
          const sid        = sub.subject_id;
          const dk         = displayKey;
          const cached     = _inputCache[dk + '_' + sid] || {};
          const isNotTaken = !isExcluded && (cached.not_taken !== undefined ? cached.not_taken : sc.not_taken === true);
          const scoreVal   = isExcluded ? '' : (cached.score      !== undefined ? cached.score      : (sc.score      != null ? sc.score      : ''));
          const grVal      = isExcluded ? '' : (cached.grade_rank !== undefined ? cached.grade_rank : (sc.grade_rank != null ? sc.grade_rank : ''));
          const crVal      = isExcluded ? '' : (cached.class_rank !== undefined ? cached.class_rank : (sc.class_rank != null ? sc.class_rank : ''));
          const gaVal      = isExcluded ? '' : (cached.grade_avg  !== undefined ? cached.grade_avg  : (sa.grade_avg  != null ? sa.grade_avg  : ''));
          const disabledAttr = isNotTaken ? ' disabled style="opacity:0.4;"' : '';

          const subDisplayName = sid === 'OTHER'
            ? _esc(sub.raw_subject_name || 'その他')
            : _esc(sub.display_name || sub.subject_name || '');
          const cellBg = getGenreColor(genreName, 0.07);

          // この科目が単独編集中か
          const isSubjectEditing = _editSubjectInfo
            && _editSubjectInfo.tabId === tabId
            && _editSubjectInfo.subjectId === sid;

          if (isSubjectEditing) {
            // ---- 単独科目編集セル ----
            const filteredSubs = _getFilteredSubjectsForGenre(tabId, genreName);
            var sel = '<select class="subj-replace-select" onchange="onSubjSelectChange(this)">';
            sel += '<option value="" disabled' + (!sid ? ' selected' : '') + '>-- 選択 --</option>';
            filteredSubs.forEach(function(s) {
              sel += '<option value="' + _esc(s.subject_id) + '"'
                + (s.subject_id === sid ? ' selected' : '') + '>'
                + _esc(s.subject_name || s.subject_id) + '</option>';
            });
            sel += '<option value="OTHER">その他（名称を入力）</option>';
            sel += '</select>';
            sel += '<input type="text" class="subj-other-name-input" placeholder="科目名を入力" maxlength="50" style="display:none">';

            listHtml += '<div class="ios-cell" style="background:' + cellBg + ';">';
            listHtml += '<div class="ios-subject-edit-row">';
            listHtml += sel;
            listHtml += '<button class="subj-edit-save-btn" onclick="saveSubjectEdit(\''
              + _esc(tabId) + '\',\'' + _esc(genreName) + '\',\'' + _esc(sid) + '\')">保存</button>';
            listHtml += '<button class="subj-edit-cancel-btn" onclick="cancelSubjectEdit()">×</button>';
            listHtml += '</div>';
            listHtml += '</div>';

          } else {
            // ---- 通常セル ----
            listHtml += '<div class="ios-cell' + (isExcluded ? ' excluded' : '') + '"'
              + ' data-sid="' + _esc(sid) + '"'
              + ' data-genre="' + _esc(genreName) + '"'
              + ' style="background:' + cellBg + ';">';
            listHtml += '<div class="ios-cell-label-row">';
            if (_reorderMode && !noKebab && !isExcluded) {
              listHtml += '<span class="drag-handle"'
                + ' data-drag-type="subject"'
                + ' data-drag-genre="' + _esc(genreName) + '"'
                + ' data-drag-sid="' + _esc(sid) + '"'
                + ' ontouchstart="onDragHandleTouch(event,this)">≡</span>';
            }
            listHtml += '<span class="ios-cell-label' + (isNotTaken ? ' ios-cell-label--muted' : '') + '">' + subDisplayName;
            if (sid === 'OTHER') {
              listHtml += '<input type="hidden" id="rn_' + dk + '_OTHER" value="' + _esc(sub.raw_subject_name || '') + '">';
              listHtml += '<input type="hidden" id="gn_' + dk + '_OTHER" value="' + _esc(sub.genre_name || '') + '">';
            }
            listHtml += '</span>';
            if (!isExcluded && !noKebab && !_reorderMode) {
              listHtml += '<button class="ios-cell-pencil-btn"'
                + ' data-tabid="' + _esc(tabId) + '"'
                + ' data-genre="' + _esc(genreName) + '"'
                + ' data-subjectid="' + _esc(sid) + '"'
                + ' onclick="startSubjectEdit(this)" title="科目を変更">' + _PENCIL_ICON_HTML + '<span class="pencil-btn-label">編集する</span></button>';
            }
            if (!isExcluded) {
              listHtml += '<label class="ios-nt-wrap">'
                + '<input type="checkbox" id="nt_' + dk + '_' + sid + '"'
                + (isNotTaken ? ' checked' : '')
                + ' onchange="toggleNotTaken(\'' + dk + '\',\'' + sid + '\',this.checked)">'
                + ' <span>未実施・未受験</span></label>';
            }
            listHtml += '</div>';

            if (isExcluded) {
              listHtml += '<div class="ios-cell-inputs"><span class="badge-excluded" style="grid-column:span 4;">未実施</span></div>';
            } else {
              listHtml += '<div class="ios-cell-inputs">';
              listHtml += '<label class="ios-input-wrap"><span>点数</span>'
                + '<input type="text" inputmode="numeric" class="score-input"'
                + ' id="s_' + dk + '_' + sid + '" value="' + scoreVal + '"'
                + ' placeholder="点数" maxlength="3"'
                + ' oninput="this.value=this.value.replace(/[^0-9]/g,\'\');_cacheInput(this)"'
                + disabledAttr + '></label>';
              listHtml += '<label class="ios-input-wrap"><span>学年順位</span>'
                + '<input type="text" inputmode="numeric" class="rank-input"'
                + ' id="gr_' + dk + '_' + sid + '" value="' + grVal + '"'
                + ' placeholder="順位" maxlength="4"'
                + ' oninput="this.value=this.value.replace(/[^0-9]/g,\'\');_cacheInput(this)"'
                + disabledAttr + '></label>';
              listHtml += '<label class="ios-input-wrap"><span>クラス順位</span>'
                + '<input type="text" inputmode="numeric" class="rank-input"'
                + ' id="cr_' + dk + '_' + sid + '" value="' + crVal + '"'
                + ' placeholder="順位" maxlength="4"'
                + ' oninput="this.value=this.value.replace(/[^0-9]/g,\'\');_cacheInput(this)"'
                + disabledAttr + '></label>';
              listHtml += '<label class="ios-input-wrap ios-input-avg"><span>学年平均</span>'
                + '<input type="text" inputmode="decimal" class="avg-input"'
                + ' id="ga_' + dk + '_' + sid + '" value="' + gaVal + '"'
                + ' placeholder="平均" maxlength="5"'
                + ' oninput="this.value=this.value.replace(/[^0-9.]/g,\'\');_cacheInput(this)"'
                + disabledAttr + '></label>';
              listHtml += '</div>';
            }
            listHtml += '</div>'; // ios-cell
          }
        });

        // 科目ゼロ時
        // 置換モード中（同教科で科目を1件差し替え中）は追加行を非表示
        const isReplacingInThisGenre = _editSubjectInfo
          && _editSubjectInfo.tabId === tabId
          && _editSubjectInfo.genreName === genreName
          && _editSubjectInfo.subjectId !== '';

        if (!isReplacingInThisGenre && !noKebab) {
          const isAddEditing = isContainingEdit && _editSubjectInfo.subjectId === '';
          if (isAddEditing) {
            const filteredSubs = _getFilteredSubjectsForGenre(tabId, genreName);
            var sel = '<select class="subj-replace-select" onchange="onSubjSelectChange(this)">';
            sel += '<option value="" disabled selected>-- 科目を選択 --</option>';
            filteredSubs.forEach(function(s) {
              sel += '<option value="' + _esc(s.subject_id) + '">'
                + _esc(s.subject_name || s.subject_id) + '</option>';
            });
            sel += '<option value="OTHER">その他（名称を入力）</option>';
            sel += '</select>';
            sel += '<input type="text" class="subj-other-name-input" placeholder="科目名を入力" maxlength="50" style="display:none">';
            listHtml += '<div class="ios-cell"><div class="ios-subject-edit-row">';
            listHtml += sel;
            listHtml += '<button class="subj-edit-save-btn" onclick="saveSubjectEdit(\''
              + _esc(tabId) + '\',\'' + _esc(genreName) + '\',\'\')">追加</button>';
            listHtml += '<button class="subj-edit-cancel-btn" onclick="cancelSubjectEdit()">×</button>';
            listHtml += '</div></div>';
          } else {
            listHtml += '<div class="ios-cell ios-cell-empty"><div class="ios-cell-label-row">';
            listHtml += '<button class="ios-cell-pencil-btn ios-cell-add-btn"'
              + ' data-tabid="' + _esc(tabId) + '"'
              + ' data-genre="' + _esc(genreName) + '"'
              + ' data-subjectid=""'
              + ' onclick="startSubjectEdit(this)" title="科目を追加">' + _PENCIL_ICON_HTML + '<span class="ios-cell-empty-text">タップして科目を追加</span></button>';
            listHtml += '</div></div>';
          }
        }

        listHtml += '</div>'; // ios-section-body
        listHtml += '</div>'; // ios-section
      });
    }

    listHtml += '</div>'; // ios-section-list

    // 保存ボタン（ダーティーバーから saveCurrentTab() で呼ばれるため DOM に残す）
    if ((exam.subjects || []).length > 0 || (exam.scores || []).length > 0) {
      listHtml += '<button type="button" class="btn-save-app" style="display:none"'
        + ' onclick="handleSave(\'' + s.student_id + '\',\'' + (exam.exam_id || '') + '\',\'' + (exam.pattern_id || '') + '\',\'' + (exam.term_test_id || '') + '\',\'' + (exam.year || '') + '\',\'' + displayKey + '\',this)">'
        + '保存する</button>';
    }

    listHtml += '</div>'; // tab-panel
  });

  listHtml += '</div></div>';

  document.getElementById('subject-list').innerHTML = listHtml;

  if (examTabs.length > 0 && !_currentTabId) {
    switchExamTab(examTabs[0].term_test_id);
  }

  var isFirstRender = Object.keys(_originalValues).length === 0;
  if (isFirstRender) {
    _captureOriginalValues();
    _hideDirtyBar();
  }
  _initBottomNavScroll();

  _renderAnnouncementPanel(data.announcements || []);
  _updateAnnBadge(data.announcements || []);
  _updatePhotoNavBadge();
  // お知らせの自動開封は初回ロード時のみ（科目編集などの再レンダーでは開かない）
  if (!isFirstRender) return;
  var annUnreadCount    = _getUnreadCount(data.announcements || []);
  var importantToShow   = (data.announcements || []).filter(function(ann) {
    return ann.category === 'important' && !_isDismissed(ann.id);
  });
  if ((annUnreadCount > 0 || importantToShow.length > 0) && !_annPanelOpen) {
    setTimeout(function() {
      openAnnouncementPanel();
      importantToShow.forEach(function(ann) { _expandAnnCard(ann.id); });
    }, 200);
  }
}

// ---- 不具合報告 ----

function _bugSubjectOptions() {
  var seen = new Set();
  var opts = '<option value="">-- 科目名を選んでください --</option>';
  _currentExamTabs.forEach(function(tab) {
    (tab.subjects || []).forEach(function(s) {
      var name = s.display_name || s.subject_name || '';
      if (name && !seen.has(name)) { seen.add(name); opts += '<option>' + name + '</option>'; }
    });
  });
  return opts;
}

function _bugGenreOptions() {
  var seen = new Set();
  var opts = '<option value="">-- 教科を選んでください --</option>';
  _currentExamTabs.forEach(function(tab) {
    (tab.subjects || []).forEach(function(s) {
      var g = s.genre_name || 'その他';
      if (!seen.has(g)) { seen.add(g); opts += '<option>' + g + '</option>'; }
    });
  });
  return opts;
}

function _bugExamOptions() {
  var opts = '<option value="">-- 試験区分を選んでください --</option>';
  _currentExamTabs.forEach(function(tab) {
    opts += '<option>' + (tab.test_name || tab.term_test_id || '') + '</option>';
  });
  return opts;
}

function _renderMenuContent() {
  var el = document.getElementById('menu-panel-content');
  if (!el) return;
  if (_bugReportOpen) {
    el.innerHTML = _renderBugReportInPanel();
  } else {
    var buildNum = (window._GAS_BUILD || '').replace('v', '');
    var verText  = (window._APP_VERSION || '')
      + (buildNum ? ' (build ' + buildNum + ')' : '');
    el.innerHTML = '<ul class="menu-list">'
      + '<li class="menu-list-item"><button onclick="openBugReportFromMenu()">'
      + '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'
      + '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>'
      + '<line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>'
      + '</svg>'
      + '不具合を報告する</button></li>'
      + '</ul>'
      + '<p style="margin:0;padding:8px 16px 12px;font-size:0.72rem;color:#aaa;text-align:right;">'
      + verText + '</p>';
  }
}

function _renderBugReportInPanel() {
  var html = '<div class="bug-report-form" style="padding:12px 16px 24px;">';
  html += '<button class="bug-confirm-back" style="margin-bottom:12px;" onclick="backFromBugConfirm()">'
        + '&#8592; メニューに戻る</button>';

  if (_bugConfirmData !== null) {

    '保存した点数が消えた':        'bug-aux-score',

function _renderErrorHtml(data) {
  const msg = data.error || '不明なエラーが発生しました。';

  if (data.errorCode === 'NOT_LINKED') {
    const linkHtml = REGISTRATION_URL
      ? `<p class="err-register-link"><a href="${REGISTRATION_URL}" target="_blank" rel="noopener">ユーザー登録はこちら</a></p>`
      : '';
    return `
      <div class="err-box err-not-linked">
        <p class="err-title">未登録のアカウントです</p>
        <p class="err-msg">${msg}</p>
        <p class="err-hint">塾へのご登録がお済みでない方は、下記よりユーザー登録を行ってください。</p>
        ${linkHtml}

  }

  return `
    <div class="err-box">
      <p class="err-title">表示できません</p>
      <p class="err-msg">${msg}</p>
    </div>`;
}

function _captureOriginalValues() {
  _originalValues = {};
  document.querySelectorAll('.score-input, .rank-input, .avg-input').forEach(function(el) {
    _originalValues[el.id] = el.value;
  });
  document.querySelectorAll('[id^="nt_"]').forEach(function(el) {
    _originalValues[el.id] = el.checked;
  });
}

function _refreshDirtyState() {
  var dirty = false;
  var inputs = document.querySelectorAll('.score-input, .rank-input, .avg-input');
  for (var i = 0; i < inputs.length; i++) {
    if (_originalValues.hasOwnProperty(inputs[i].id) && inputs[i].value !== _originalValues[inputs[i].id]) {
      dirty = true; break;
    }
  }
  if (!dirty) {
    var cbs = document.querySelectorAll('[id^="nt_"]');
    for (var i = 0; i < cbs.length; i++) {
      if (_originalValues.hasOwnProperty(cbs[i].id) && cbs[i].checked !== _originalValues[cbs[i].id]) {
        dirty = true; break;
      }
    }
  }
  if (dirty) { _showDirtyBar(); } else { _hideDirtyBar(); }
}

function _showDirtyBar() {
  var bar = document.getElementById('dirty-bar');
  if (!bar || bar.style.display === 'flex') return;
  bar.style.display = 'flex';
  bar.classList.add('dirty-bar--visible');
}

function _hideDirtyBar() {
  var bar = document.getElementById('dirty-bar');
  if (!bar) return;
  bar.classList.remove('dirty-bar--visible');
  bar.style.display = 'none';
}

function toggleNotTaken(displayKey, subjectId, isChecked) {
  _cacheCheckbox(displayKey, subjectId, isChecked);
  var scoreEl = document.getElementById('s_'  + displayKey + '_' + subjectId);
  var grEl    = document.getElementById('gr_' + displayKey + '_' + subjectId);
  var crEl    = document.getElementById('cr_' + displayKey + '_' + subjectId);
  var gaEl    = document.getElementById('ga_' + displayKey + '_' + subjectId);
  [scoreEl, grEl, crEl, gaEl].forEach(function(el) {
    if (!el) return;
    el.disabled      = isChecked;
    el.style.opacity = isChecked ? '0.4' : '';
  });
  var ntEl    = document.getElementById('nt_' + displayKey + '_' + subjectId);
  var cellEl  = ntEl ? ntEl.closest('.ios-cell') : null;
  var labelEl = cellEl ? cellEl.querySelector('.ios-cell-label') : null;
  if (labelEl) labelEl.classList.toggle('ios-cell-label--muted', isChecked);
  _refreshDirtyState();
}

function switchExamTab(tabId) {
  _currentTabId = tabId;
  document.querySelectorAll('.exam-select').forEach(sel => { sel.value = tabId; });
  document.querySelectorAll('.tab-panel-app').forEach(panel => {
    panel.style.display = panel.dataset.tabId === tabId ? 'block' : 'none';
  });
}

var _bottomNavScrollInited = false;

function _initBottomNavScroll() {
  if (_bottomNavScrollInited) return;
  var main = document.getElementById('subject-list');
  var nav  = document.getElementById('bottom-nav');
  if (!main || !nav) return;
  document.documentElement.style.setProperty('--bnav-h', nav.getBoundingClientRect().height + 'px');
  var lastY = 0;
  main.addEventListener('scroll', function() {
    var y = main.scrollTop;
    var goingDown = y > lastY && y > 40;
    if (goingDown) {
      nav.classList.add('bottom-nav-hidden');
    } else {
      nav.classList.remove('bottom-nav-hidden');
    }
    var bar = document.getElementById('dirty-bar');
    if (bar) {
      bar.classList.toggle('dirty-bar--nav-hidden', goingDown);
    }
    lastY = y;
  }, { passive: true });
  _bottomNavScrollInited = true;
}

function _getFilteredSubjectsForEdit(tabId) {
  var exam = (_appData && _appData.examTabs || []).find(function(t) { return t.term_test_id === tabId; });
  var currentSids  = exam ? (exam.subjects || []).map(function(s) { return s.subject_id; }) : [];
  var studentGrade = (_appData && _appData.student && _appData.student.grade) || '';
  return (_currentAvailableSubjects || []).filter(function(sub) {
    var subGrade = String(sub.grade || '').trim();
    return !subGrade || subGrade === studentGrade || currentSids.indexOf(sub.subject_id) !== -1;
  });
}

function _getFilteredSubjectsForGenre(tabId, genreName) {
  var exam = (_appData && _appData.examTabs || []).find(function(t) { return t.term_test_id === tabId; });
  var currentSids  = exam ? (exam.subjects || []).map(function(s) { return s.subject_id; }) : [];
  var studentGrade = (_appData && _appData.student && _appData.student.grade) || '';
  return (_currentAvailableSubjects || []).filter(function(sub) {
    var subGrade = String(sub.grade || '').trim();
    var gradeOk  = !subGrade || subGrade === studentGrade || currentSids.indexOf(sub.subject_id) !== -1;
    var genreOk  = (sub.genre_name || 'その他') === genreName;
    return gradeOk && genreOk;
  });
}

  var divs = document.querySelectorAll('.ios-edit-row.subj-edit-row');
  var newRows = [];
  divs.forEach(function(div) {
    if (div.dataset.isEditable === 'false') {
      newRows.push({
        subject_id:       div.dataset.subjectId   || '',
        subject_name:     div.dataset.subjectName || '',
        raw_subject_name: '',
        isAdded:          false,
        isEditable:       false,
        genre_name:       div.dataset.genre || ''
      });
      return;
    }
    var sel = div.querySelector('.subj-edit-select');
    var inp = div.querySelector('.subj-edit-other-input');
    newRows.push({
      subject_id:       sel ? sel.value : '',
      raw_subject_name: inp ? inp.value.trim() : '',
      isAdded:          div.dataset.isAdded === 'true',
      isEditable:       true,
      genre_name:       div.dataset.genre || ''
    });
  });
  _editRows = newRows;
}

function enterGenreEditMode(tabId, genreName) {
  document.querySelectorAll('.subj-dropdown').forEach(function(d) { d.style.display = 'none'; });
  var exam = (_appData && _appData.examTabs || []).find(function(t) { return t.term_test_id === tabId; });
  if (!exam) return;

  _editMode  = true;
  _editTabId = tabId;
  _editGenre = genreName;
  _collapsedGenres[genreName] = false; // 編集中は展開

  var genreSubjects = (exam.subjects || []).filter(function(s) {
    return (s.genre_name || 'その他') === genreName;
  });

  _editRows = genreSubjects.map(function(s) {
    return {
      subject_id:       s.subject_id,
      raw_subject_name: s.raw_subject_name || '',
      isAdded:          s.subject_id === 'OTHER' || !!s.extra,
      genre_name:       s.genre_name || 'その他',
      subject_name:     s.subject_name || s.display_name || '',
      isEditable:       (s.genre_name || 'その他') !== '合計' // 「合計」は編集不可
    };
  });

  renderApp(_appData);
  switchExamTab(tabId);
}

function cancelSubjectEdit() {
  _editSubjectInfo = null;
  _editMode  = false;
  _editTabId = null;
  _editGenre = null;
  _editRows  = [];
  var savedTabId = _currentTabId;
  renderApp(_appData);
  if (savedTabId) switchExamTab(savedTabId);
}

function onSubjectRowChange(index, value) {
  if (_editRows[index]) _editRows[index].subject_id = value;
  var inp = document.getElementById('subj-edit-other-' + index);
  if (inp) inp.style.display = value === 'OTHER' ? 'inline-block' : 'none';
}


function removeSubjectEditRow(index) {
  _syncEditRowsFromDom();
  _editRows.splice(index, 1);
  var savedTabId = _editTabId;
  renderApp(_appData);
  switchExamTab(savedTabId);
}

function saveGenreSubjectEdit(tabId, genreName) {
  _syncEditRowsFromDom();

  var exam = (_appData && _appData.examTabs || []).find(function(t) { return t.term_test_id === tabId; });
  if (!exam) { cancelSubjectEdit(); return; }

  var otherSubjects = (exam.subjects || []).filter(function(s) {
    return (s.genre_name || 'その他') !== genreName;
  });

  var newGenreSubjects = [];
  _editRows.forEach(function(row) {
    var sid = row.subject_id;
    if (!sid) return;
    if (sid === 'OTHER') {
      var rawName = row.raw_subject_name || '';
      if (rawName) {
        newGenreSubjects.push({
          subject_id:       'OTHER',
          raw_subject_name: rawName,
          subject_name:     rawName,
          display_name:     rawName,
          genre_id:         null,
          genre_name:       genreName,
          excluded:         false,
          extra:            true
        });
      }
      return;
    }
    var sub = (_currentAvailableSubjects || []).find(function(s) { return s.subject_id === sid; });
    if (sub) newGenreSubjects.push(sub);
  });

  // パターンID取得
  var patternId = exam ? exam.pattern_id : null;
  if (!patternId) { showMessage('パターンIDが見つかりません', 'error'); return; }

  var subjectIds = newGenreSubjects
    .filter(function(s) { return s.subject_id && s.subject_id !== 'OTHER'; })
    .map(function(s) { return s.subject_id; });

  _editMode  = false;
  _editTabId = null;
  _editGenre = null;
  _editRows  = [];

  setLoading(true, '科目を保存中...');

  google.script.run
    .withSuccessHandler(function(responseString) {
      var res = JSON.parse(responseString);
      if (!res.success) {
        setLoading(false);
        showMessage('保存エラー: ' + (res.error || ''), 'error');
        return;
      }
      var lineUserId = (_currentStudent && _currentStudent.line_user_id) || '';
      google.script.run
        .withSuccessHandler(function(data) {
          setLoading(false);
          if (data && data.error) { showMessage('エラー: ' + data.error, 'error'); return; }
          renderApp(data);
          switchExamTab(tabId);
        })
        .withFailureHandler(function(err) {
          setLoading(false);
          showMessage('データ更新エラー: ' + (err && err.message ? err.message : ''), 'error');
        })
        .getInitialData(lineUserId);
    })
    .withFailureHandler(function(err) {
      setLoading(false);
      showMessage('通信エラー: ' + (err && err.message ? err.message : ''), 'error');
    })
    .savePatternSubjectsForGenre({
      student_id:  (_currentStudent && _currentStudent.student_id) || '',
      pattern_id:  patternId,
      genre_name:  genreName,
      subject_ids: subjectIds
    });
}

// ---- お知らせ機能 ヘルパー ----

function _annLsKey() {
  var sid = (_currentStudent && _currentStudent.student_id) || 'unknown';
  return 'ann_read_' + sid;
}

function _annDismissLsKey() {
  var sid = (_currentStudent && _currentStudent.student_id) || 'unknown';
  return 'ann_dismissed_' + sid;
}

function _getReadIds() {
  try {
    var raw = localStorage.getItem(_annLsKey());
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}

function _getDismissedIds() {
  try {
    var raw = localStorage.getItem(_annDismissLsKey());
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}

function _isDismissed(id) {
  return _getDismissedIds().indexOf(id) !== -1;
}

function _markAllAsRead(announcements) {
  try {
    var ids = (announcements || []).map(function(a) { return a.id; });
    localStorage.setItem(_annLsKey(), JSON.stringify(ids));
  } catch (e) {}
}

function _getUnreadCount(announcements) {
  var readIds = _getReadIds();
  return (announcements || []).filter(function(a) {
    return readIds.indexOf(a.id) === -1;
  }).length;
}

function _updateAnnBadge(announcements) {
  var btn = document.getElementById('bnav-ann');
  if (!btn) return;
  var wrap = btn.querySelector('.bnav-icon-wrap');
  if (!wrap) return;
  var existing = wrap.querySelector('.ann-badge');
  if (existing) existing.remove();
  var count = _getUnreadCount(announcements || []);
  if (count > 0) {
    var badge = document.createElement('span');
    badge.className = 'ann-badge';
    badge.textContent = count > 9 ? '9+' : String(count);
    wrap.appendChild(badge);
  }
}

function _annCategoryLabel(cat) {
  var map = { important: '重要', info: 'お知らせ', notice: '注意' };
  return map[cat] || 'お知らせ';
}

function _renderAnnouncementPanel(announcements) {
  var list = document.getElementById('ann-list');
  if (!list) return;

  if (!announcements || announcements.length === 0) {
    list.innerHTML = '<p class="ann-empty">現在お知らせはありません。</p>';
    return;
  }

  var readIds = _getReadIds();
  list.innerHTML = announcements.map(function(ann) {
    var isUnread    = readIds.indexOf(ann.id) === -1;
    var isDismissed = _isDismissed(ann.id);
    var catClass    = 'ann-card--' + (ann.category || 'info');
    var bodyHtml    = _esc(ann.body).replace(/\n/g, '<br>');
    var dismissHtml = ann.category === 'important'
      ? '<label class="ann-dismiss-label" onclick="event.stopPropagation()">'
        + '<input type="checkbox" onchange="onAnnDismissChange(\'' + _esc(ann.id) + '\',this.checked)"'
        + (isDismissed ? ' checked' : '') + '>'
        + '次回から表示しない</label>'
      : '';
    return '<div class="ann-card ' + catClass + (isUnread ? ' ann-card--unread' : '') + '"'
      + ' id="ann-card-' + _esc(ann.id) + '"'
      + ' onclick="toggleAnnCard(this)">'
      + '<div class="ann-card-header">'
      + (isUnread ? '<span class="ann-unread-dot"></span>' : '')
      + '<span class="ann-card-category ' + catClass + '-label">' + _annCategoryLabel(ann.category) + '</span>'
      + '<span class="ann-card-chevron">▼</span>'
      + '</div>'
      + '<p class="ann-card-title">' + _esc(ann.title) + '</p>'
      + '<div class="ann-card-detail">'
      + '<p class="ann-card-date">' + _esc(ann.published_at || '') + '</p>'
      + '<p class="ann-card-body">' + bodyHtml + '</p>'
      + dismissHtml
      + '</div>'
      + '</div>';
  }).join('');
}

function toggleAnnCard(cardEl) {
  var detail  = cardEl.querySelector('.ann-card-detail');
  var chevron = cardEl.querySelector('.ann-card-chevron');
  if (!detail) return;
  var isOpen = detail.style.display === 'block';
  detail.style.display = isOpen ? 'none' : 'block';
  if (chevron) chevron.textContent = isOpen ? '▼' : '▲';
}

function _expandAnnCard(annId) {
  var cardEl = document.getElementById('ann-card-' + annId);
  if (!cardEl) return;
  var detail  = cardEl.querySelector('.ann-card-detail');
  var chevron = cardEl.querySelector('.ann-card-chevron');
  if (detail)  detail.style.display = 'block';
  if (chevron) chevron.textContent = '▲';
}
</script>
