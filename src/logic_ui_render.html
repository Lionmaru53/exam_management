<script>
// ユーザー登録フォームの URL（LINE未紐づけ時に表示）
// TODO: 実際の登録フォーム URL に変更してください
var REGISTRATION_URL = 'https://liff.line.me/2008067898-LnyPJ1ra';

var _currentStudent  = null;
var _currentExamTabs = [];
var _bugReportOpen   = false;
var _bugConfirmData  = null;
var _appData         = null;
var _currentTabId    = null;
var _currentAvailableSubjects = [];

var _editMode  = false;
var _editTabId = null;
var _editRows  = [];  // [{subject_id, raw_subject_name}]

function hexToRgba(hex, alpha = 0.1) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function getGenreColor(genreName, alpha = 0.08) {
  const palette = {
    '数学': '#dbeafe',
    '英語': '#fed7aa',
    '国語': '#bbf7d0',
    '理科': '#fbcfe8',
    '社会': '#fde68a',
    'その他': '#f8fafc'
  };
  const hex = palette[genreName] || '#f8fafc';
  return hexToRgba(hex, alpha);
}

// ---- ローディングオーバーレイ ----

var _loadingMsgTimer = null;

window.setLoading = function(active, messages, intervalMs) {
  const overlay = document.getElementById('loading-overlay');
  const label   = document.getElementById('loading-label');
  if (!overlay) return;

  if (_loadingMsgTimer) {
    clearInterval(_loadingMsgTimer);
    _loadingMsgTimer = null;
  }

  if (active) {
    const msgs = Array.isArray(messages) ? messages : [messages || '処理中...'];
    if (label) label.textContent = msgs[0];
    overlay.classList.add('active');

    if (msgs.length > 1) {
      var idx = 0;
      _loadingMsgTimer = setInterval(function() {
        idx = Math.min(idx + 1, msgs.length - 1);
        if (label) label.textContent = msgs[idx];
      }, intervalMs || 2500);
    }
  } else {
    overlay.classList.remove('active');
  }
};

// ---- メイン描画 ----

function renderApp(data) {
  setLoading(false);

  if (data.error) {
    document.getElementById('app').style.display = 'block';
    document.getElementById('header').innerHTML = _renderErrorHtml(data);
    return;
  }

  document.getElementById('app').style.display = 'block';

  // コース未設定の場合はコース入力フローを表示
  if (data.needsCourse) {
    renderCourseInput(data);
    return;
  }

  // 高2・高3 で文理未設定の場合は選択画面を表示
  if (data.needsSubCourse) {
    renderSubCourseSelect(data);
    return;
  }

  // ヘッダー：タイトル＋生徒情報
  const s = data.student;
  _currentStudent  = s;
  _currentExamTabs = data.examTabs || [];
  _appData = data;
  _currentAvailableSubjects = data.availableSubjects || [];
  const infoItems = [s.school_name, s.school_course_name, s.grade, s.sub_course].filter(Boolean);
  const infoText  = infoItems.join('　');

  document.getElementById('header').innerHTML = `
    <div class="exam-header-container">
      <h2 class="app-title">定期テスト得点入力フォーム</h2>
      <p class="student-name">${s.name} さん <span class="student-info">(${infoText})</span></p>
    </div>
  `;

  const examTabs = data.examTabs || [];

  if (examTabs.length === 0) {
    document.getElementById('subject-list').innerHTML =
      `<p style="color:#888;">表示できる試験区分がありません。</p>`;
    return;
  }

  let listHtml = `
    <p class="usage-hint">テストの点数と学年・クラスの順位を入力して、「保存する」を押してください。(分かる部分だけでOK)<br>※受けていない科目には「未受験」にチェックを入れてください。</p>
    <div class="subject-tab-wrap">
      <div class="exam-select-wrap">
        <select class="exam-select" onchange="switchExamTab(this.value)">
  `;

  examTabs.forEach(exam => {
    const tabId = exam.term_test_id;
    listHtml += `<option value="${tabId}">${exam.test_name}</option>`;
  });

  listHtml += `</select></div><div class="tab-content">`;

  examTabs.forEach((exam, examIndex) => {
    const tabId      = exam.term_test_id;
    const displayKey = exam.exam_id || ('p_' + exam.pattern_id);
    const isEditMode = _editMode && _editTabId === tabId;

    listHtml += `
      <div class="tab-panel" data-tab-id="${tabId}" style="display:${examIndex === 0 ? 'block' : 'none'};">
        <div class="subject-table-container">
          <table class="subject-table">
            <thead>
              <tr>
                <th colspan="6" class="test-name-header">${exam.test_name}</th>
              </tr>
              <tr>
                <th>教科</th>
                <th>
                  <div style="display:flex; align-items:center; gap:4px; white-space:nowrap;">
                    科目
                    ${isEditMode ? '' : `
                    <div class="subj-menu-wrap">
                      <button class="subj-menu-btn" onclick="toggleSubjectMenu(this)">⋮</button>
                      <div class="subj-dropdown" style="display:none;">
                        <button class="subj-dropdown-item" onclick="enterSubjectEditMode('${tabId}')">教科を編集</button>
                      </div>
                    </div>`}
                  </div>
                </th>
                <th>点数</th><th>学年順位</th><th>クラス順位</th><th>${isEditMode ? '削除' : '未受験'}</th>
              </tr>
            </thead>
            <tbody class="${isEditMode ? 'subj-edit-tbody' : ''}">
    `;

    if (isEditMode) {
      // ==== 編集モード ====
      const filteredSubs = _getFilteredSubjectsForEdit(tabId);

      // ジャンル別 optgroup を事前構築
      const genreGroupsForSelect = {};
      filteredSubs.forEach(function(sub) {
        const g = sub.genre_name || 'その他';
        if (!genreGroupsForSelect[g]) genreGroupsForSelect[g] = [];
        genreGroupsForSelect[g].push(sub);
      });

      function buildSelectHtml(selectedSid, rowIndex, rowGenre) {
        var isEmptySelected = !selectedSid;
        var sel = '<select class="subj-edit-select" onchange="onSubjectRowChange(' + rowIndex + ', this.value)">';
        sel += '<option value="" disabled' + (isEmptySelected ? ' selected' : '') + '>-- 選択してください --</option>';
        if (rowGenre) {
          // ジャンルで絞り込み：optgroup なしでフラットに表示
          var genreSubs = filteredSubs.filter(function(sub) { return (sub.genre_name || 'その他') === rowGenre; });
          genreSubs.forEach(function(sub) {
            var isSelected = sub.subject_id === selectedSid ? ' selected' : '';
            sel += '<option value="' + sub.subject_id + '"' + isSelected + '>' + (sub.subject_name || sub.subject_id) + '</option>';
          });
        } else {
          // 追加行：全ジャンルをoptgroupで表示
          Object.keys(genreGroupsForSelect).forEach(function(g) {
            sel += '<optgroup label="' + g + '">';
            genreGroupsForSelect[g].forEach(function(sub) {
              var isSelected = sub.subject_id === selectedSid ? ' selected' : '';
              sel += '<option value="' + sub.subject_id + '"' + isSelected + '>' + (sub.subject_name || sub.subject_id) + '</option>';
            });
            sel += '</optgroup>';
          });
        }
        var otherSel = selectedSid === 'OTHER' ? ' selected' : '';
        sel += '<option value="OTHER"' + otherSel + '>その他（新しい名称）</option>';
        sel += '</select>';
        return sel;
      }

      _editRows.forEach(function(row, i) {
        const isOther     = row.subject_id === 'OTHER';
        const isAdded     = !!row.isAdded;
        const isEditable  = row.isEditable !== false;
        const rowGenre    = row.genre_name || '';
        const sc = (exam.scores || []).find(function(x) { return x.subject_id === row.subject_id; }) || {};

        // 合計点ジャンルは読み取り専用行として表示
        if (!isEditable) {
          listHtml += '<tr class="subj-edit-row" data-is-added="false" data-is-editable="false"'
            + ' data-genre="' + _escHtml(rowGenre) + '"'
            + ' data-subject-id="' + _escHtml(row.subject_id) + '"'
            + ' data-subject-name="' + _escHtml(row.subject_name || '') + '">';
          listHtml += '<td class="genre-cell" style="color:#888;">' + _escHtml(rowGenre) + '</td>';
          listHtml += '<td style="color:#888;">' + _escHtml(row.subject_name || row.subject_id) + '</td>';
          listHtml += '<td><input type="text" class="score-input" value="' + _escHtml(String(sc.score != null ? sc.score : '')) + '" disabled style="opacity:0.5;"></td>';
          listHtml += '<td><input type="text" class="rank-input" value="' + _escHtml(String(sc.grade_rank != null ? sc.grade_rank : '')) + '" disabled style="opacity:0.5;"></td>';
          listHtml += '<td><input type="text" class="rank-input" value="' + _escHtml(String(sc.class_rank != null ? sc.class_rank : '')) + '" disabled style="opacity:0.5;"></td>';
          listHtml += '<td></td>';
          listHtml += '</tr>';
          return;
        }

        // isAdded（OTHER含む追加行）はジャンルフィルタなしで全教科を選択可能にする
        const selectGenre = isAdded ? '' : rowGenre;
        listHtml += '<tr class="subj-edit-row" data-is-added="' + isAdded + '" data-is-editable="true" data-genre="' + _escHtml(rowGenre) + '">';
        listHtml += '<td class="genre-cell">' + _escHtml(rowGenre || 'その他') + '</td>';
        listHtml += '<td><div class="subj-edit-cell">';
        listHtml += buildSelectHtml(row.subject_id, i, selectGenre);
        const otherDisp = isOther ? 'inline-block' : 'none';
        listHtml += '<input type="text" id="subj-edit-other-' + i + '" class="subj-edit-other-input" value="' + _escHtml(row.raw_subject_name || '') + '" placeholder="教科名を入力" maxlength="30" style="display:' + otherDisp + ';">';
        listHtml += '</div></td>';
        listHtml += '<td><input type="text" class="score-input" value="' + _escHtml(String(sc.score != null ? sc.score : '')) + '" disabled style="opacity:0.5;"></td>';
        listHtml += '<td><input type="text" class="rank-input" value="' + _escHtml(String(sc.grade_rank != null ? sc.grade_rank : '')) + '" disabled style="opacity:0.5;"></td>';
        listHtml += '<td><input type="text" class="rank-input" value="' + _escHtml(String(sc.class_rank != null ? sc.class_rank : '')) + '" disabled style="opacity:0.5;"></td>';
        // × ボタンは追加行のみ
        if (isAdded) {
          listHtml += '<td style="text-align:center;"><button class="subj-edit-remove-btn" onclick="removeSubjectEditRow(' + i + ')">×</button></td>';
        } else {
          listHtml += '<td></td>';
        }
        listHtml += '</tr>';
      });


    } else {
      // ==== 通常モード ====
      const groupedSubjects = (exam.subjects || []).reduce((acc, sub) => {
        const genre = sub.genre_name || 'その他';
        if (!acc[genre]) acc[genre] = [];
        acc[genre].push(sub);
        return acc;
      }, {});

      if (Object.keys(groupedSubjects).length === 0) {
        listHtml += '<tr><td colspan="6" style="text-align:center; color:#aaa; padding:20px;">'
          + (exam.hasExam ? '教科が未登録です' : '教科パターンが未登録です')
          + '</td></tr>';
      } else {
        Object.keys(groupedSubjects).forEach(function(genreName) {
          const rows = groupedSubjects[genreName];
          const rowBackground = getGenreColor(genreName, 0.12);
          rows.forEach(function(sub, index) {
            const sc         = (exam.scores || []).find(function(x) { return x.subject_id === sub.subject_id; }) || {};
            const isExcluded = !!sub.excluded;
            const isNotTaken = !isExcluded && sc.not_taken === true;
            const scoreVal   = (!isExcluded && !isNotTaken && sc.score      != null) ? sc.score      : '';
            const grVal      = (!isExcluded && !isNotTaken && sc.grade_rank != null) ? sc.grade_rank : '';
            const crVal      = (!isExcluded && !isNotTaken && sc.class_rank != null) ? sc.class_rank : '';
            const sid        = sub.subject_id;
            const dk         = displayKey;
            const rowStyle   = 'background-color:' + rowBackground + ';' + (isExcluded ? ' opacity:0.55;' : '');
            const disabledNT = isNotTaken ? ' disabled style="opacity:0.4;"' : '';

            listHtml += '<tr style="' + rowStyle + '">';
            if (index === 0) {
              listHtml += '<td class="genre-cell" rowspan="' + rows.length + '" style="background-color:' + rowBackground + ';">' + genreName + '</td>';
            }
            const subDisplayName = sub.subject_id === 'OTHER'
              ? _escHtml(sub.raw_subject_name || 'その他')
              : (sub.display_name || sub.subject_name);
            listHtml += '<td>' + subDisplayName;
            if (sub.subject_id === 'OTHER') {
              listHtml += '<input type="hidden" id="rn_' + dk + '_OTHER" value="' + _escHtml(sub.raw_subject_name || '') + '">';
              listHtml += '<input type="hidden" id="gn_' + dk + '_OTHER" value="' + _escHtml(sub.genre_name || '') + '">';
            }
            listHtml += '</td>';

            if (isExcluded) {
              listHtml += '<td><input type="text" class="score-input" disabled placeholder="未実施" /></td>';
              listHtml += '<td><input type="text" class="rank-input" disabled /></td>';
              listHtml += '<td><input type="text" class="rank-input" disabled /></td>';
              listHtml += '<td><span class="badge-excluded">未実施</span></td>';
            } else {
              listHtml += '<td><input type="text" inputmode="numeric" class="score-input"'
                + ' id="s_' + dk + '_' + sid + '" value="' + scoreVal + '"'
                + ' placeholder="点数" maxlength="3"'
                + ' oninput="this.value=this.value.replace(/[^0-9]/g,\'\')"'
                + disabledNT + ' /></td>';
              listHtml += '<td><input type="text" inputmode="numeric" class="rank-input"'
                + ' id="gr_' + dk + '_' + sid + '" value="' + grVal + '"'
                + ' placeholder="順位" maxlength="4"'
                + ' oninput="this.value=this.value.replace(/[^0-9]/g,\'\')"'
                + disabledNT + ' /></td>';
              listHtml += '<td><input type="text" inputmode="numeric" class="rank-input"'
                + ' id="cr_' + dk + '_' + sid + '" value="' + crVal + '"'
                + ' placeholder="順位" maxlength="4"'
                + ' oninput="this.value=this.value.replace(/[^0-9]/g,\'\')"'
                + disabledNT + ' /></td>';
              listHtml += '<td><input type="checkbox" id="nt_' + dk + '_' + sid + '"'
                + (isNotTaken ? ' checked' : '')
                + ' onchange="toggleNotTaken(\'' + dk + '\', \'' + sid + '\', this.checked)"'
                + ' /></td>';
            }
            listHtml += '</tr>';
          });
        });
      }

    }  // end else (通常モード)

    listHtml += `</tbody></table>`;

    // フッター
    if (isEditMode) {
      listHtml += `
        <div class="tab-footer subj-edit-footer">
          <button type="button" class="subj-edit-cancel-btn" onclick="cancelSubjectEdit()">キャンセル</button>
          <button type="button" class="subj-edit-save-btn" onclick="saveSubjectEdit('${tabId}')">保存</button>
        </div>
      `;
    } else {
      if ((exam.subjects || []).length > 0 || (exam.scores || []).length > 0) {
        listHtml += `
          <div class="tab-footer">
            <button type="button" class="btn-save"
              onclick="handleSave('${s.student_id}', '${exam.exam_id || ''}', '${exam.pattern_id || ''}', '${exam.term_test_id || ''}', '${exam.year || ''}', '${displayKey}', this)">
              保存する
            </button>
          </div>
        `;
      }
    }

    listHtml += `</div></div>`;
  });

  listHtml += `</div></div>`;

  document.getElementById('subject-list').innerHTML = listHtml;
  document.getElementById('footer').innerHTML = _renderBugReportSection();
}

// ---- 不具合報告 ----

function _escHtml(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
}

function _bugSubjectOptions() {
  var seen = new Set();
  var opts = '<option value="">-- 科目名を選んでください --</option>';
  _currentExamTabs.forEach(function(tab) {
    (tab.subjects || []).forEach(function(s) {
      var name = s.display_name || s.subject_name || '';
      if (name && !seen.has(name)) { seen.add(name); opts += '<option>' + name + '</option>'; }
    });
  });
  return opts;
}

function _bugGenreOptions() {
  var seen = new Set();
  var opts = '<option value="">-- 教科を選んでください --</option>';
  _currentExamTabs.forEach(function(tab) {
    (tab.subjects || []).forEach(function(s) {
      var g = s.genre_name || 'その他';
      if (!seen.has(g)) { seen.add(g); opts += '<option>' + g + '</option>'; }
    });
  });
  return opts;
}

function _bugExamOptions() {
  var opts = '<option value="">-- 試験区分を選んでください --</option>';
  _currentExamTabs.forEach(function(tab) {
    opts += '<option>' + (tab.test_name || tab.term_test_id || '') + '</option>';
  });
  return opts;
}

function _renderBugReportSection() {
  var html = '<div class="bug-report-section">';
  html += '<button class="bug-report-toggle" onclick="toggleBugReport()">'
        + (_bugReportOpen ? '▲ 不具合報告を閉じる' : '▼ 不具合を報告する')
        + '</button>';

  if (_bugReportOpen) {
    html += '<div class="bug-report-form">';

    if (_bugConfirmData !== null) {
      // ---- 確認画面 ----
      html += '<p class="bug-confirm-title">以下の内容で報告しますか？</p>';
      html += '<dl class="bug-confirm-dl">';
      html += '<dt>種別</dt><dd>' + _escHtml(_bugConfirmData.reportType) + '</dd>';
      if (_bugConfirmData.prefix) {
        html += '<dt>内容</dt><dd>' + _escHtml(_bugConfirmData.prefix) + '</dd>';
      }
      if (_bugConfirmData.rawDetail) {
        html += '<dt>詳細</dt><dd>' + _escHtml(_bugConfirmData.rawDetail) + '</dd>';
      }
      html += '</dl>';
      html += '<div class="bug-confirm-btns">'
            + '<button class="bug-report-submit" onclick="submitBugConfirm(this)">送信する</button>'
            + '<button class="bug-confirm-back" onclick="backFromBugConfirm()">戻る</button>'
            + '</div>';
    } else {
      // ---- 入力フォーム ----
      html += '<p class="bug-report-desc">表示内容に誤りがある場合など、お気づきの点をご報告ください。</p>';

      var bugTypes = [
        '表示名が違う',
        '科目が足りない',
        '保存した点数が消えた',
        'テスト名・試験区分がおかしい',
        'その他',
      ];
      html += '<div class="bug-report-types">';
      bugTypes.forEach(function(type, i) {
        html += '<label class="bug-report-type-label">'
              + '<input type="radio" name="bug_type" value="' + type + '"'
              + (i === 0 ? ' checked' : '')
              + ' onchange="onBugTypeChange(this.value)" /> '
              + type + '</label>';
      });
      html += '</div>';

      // ①表示名が違う（デフォルト表示）
      html += '<div id="bug-aux-name" class="bug-aux-row">'
            + '<select id="bug-name-wrong">' + _bugSubjectOptions() + '</select>'
            + '<span class="bug-aux-sep">は</span>'
            + '<input type="text" id="bug-name-correct" placeholder="正しい表示名" />'
            + '<span class="bug-aux-sep">が正しい</span>'
            + '</div>';

      // ②科目が足りない（初期非表示）
      html += '<div id="bug-aux-subject" class="bug-aux-row" style="display:none;">'
            + '<select id="bug-subject-genre">' + _bugGenreOptions() + '</select>'
            + '<input type="text" id="bug-subject-name" placeholder="科目名（例: 数学ⅠA）" />'
            + '<span class="bug-aux-sep">が足りない</span>'
            + '</div>';

      // ③保存した点数が消えた（初期非表示）
      html += '<div id="bug-aux-score" class="bug-aux-row" style="display:none;">'
            + '<select id="bug-score-exam">' + _bugExamOptions() + '</select>'
            + '<select id="bug-score-subject">' + _bugSubjectOptions() + '</select>'
            + '</div>';

      // ④テスト名・試験区分がおかしい（初期非表示）
      html += '<div id="bug-aux-testname" class="bug-aux-row" style="display:none;">'
            + '<input type="text" id="bug-testname-wrong" placeholder="表示されているテスト名" />'
            + '<span class="bug-aux-sep">は</span>'
            + '<input type="text" id="bug-testname-correct" placeholder="正しいテスト名（わかれば）" />'
            + '<span class="bug-aux-sep">が正しい</span>'
            + '</div>';

      html += '<textarea id="bug-detail" class="bug-report-textarea"'
            + ' placeholder="詳しい内容があれば入力してください（任意）" rows="3"></textarea>';

      html += '<button class="bug-report-submit" id="bug-submit-btn" onclick="showBugConfirm(this)">確認する</button>';
    }

    html += '</div>';
  }

  html += '</div>';
  return html;
}

function onBugTypeChange(type) {
  var auxIds = ['bug-aux-name', 'bug-aux-subject', 'bug-aux-score', 'bug-aux-testname'];
  auxIds.forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
  var map = {
    '表示名が違う':                'bug-aux-name',
    '科目が足りない':              'bug-aux-subject',
    '保存した点数が消えた':        'bug-aux-score',
    'テスト名・試験区分がおかしい': 'bug-aux-testname',
  };
  var target = map[type];
  if (target) {
    var el = document.getElementById(target);
    if (el) el.style.display = '';
  }
}

function backFromBugConfirm() {
  _bugConfirmData = null;
  var footer = document.getElementById('footer');
  if (footer) footer.innerHTML = _renderBugReportSection();
}

function toggleBugReport() {
  _bugReportOpen = !_bugReportOpen;
  _bugConfirmData = null;
  var footer = document.getElementById('footer');
  if (footer) footer.innerHTML = _renderBugReportSection();
}

function _renderErrorHtml(data) {
  const msg = data.error || '不明なエラーが発生しました。';

  if (data.errorCode === 'NOT_LINKED') {
    const linkHtml = REGISTRATION_URL
      ? `<p class="err-register-link"><a href="${REGISTRATION_URL}" target="_blank" rel="noopener">ユーザー登録はこちら</a></p>`
      : '';
    return `
      <div class="err-box err-not-linked">
        <p class="err-title">未登録のアカウントです</p>
        <p class="err-msg">${msg}</p>
        <p class="err-hint">塾へのご登録がお済みでない方は、下記よりユーザー登録を行ってください。</p>
        ${linkHtml}
        <p class="err-contact">ご不明な点は塾スタッフにお声がけください。</p>
      </div>`;
  }

  return `
    <div class="err-box">
      <p class="err-title">表示できません</p>
      <p class="err-msg">${msg}</p>
    </div>`;
}

// ---- コース未設定フロー ----
var _courseFlowData       = null;
var _courseFlowCourse     = '';
var _courseFlowSubCourse  = '';

// 入力禁止文字（全角丸括弧・半角括弧・中点・読点・句点など）
var _COURSE_BANNED_RE = /[（）()｛｝「」【】『』・。、，．！？　]/;

function _escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderCourseInput(data) {
  _courseFlowData = data;
  const s       = data.student;
  const courses = Array.isArray(data.availableCourses) ? data.availableCourses : [];

  document.getElementById('header').innerHTML = `
    <div class="exam-header-container">
      <h2 class="app-title">定期テスト得点入力フォーム</h2>
      <p class="student-name">${s.name} さん <span class="student-info">(${s.school_name}　${s.grade})</span></p>
    </div>
  `;

  let radioItems = courses.map(c =>
    `<label class="course-radio-item">` +
    `<input type="radio" name="course-radio" value="${_escHtml(c)}" onchange="_courseOtherToggle()">` +
    `${_escHtml(c)}</label>`
  ).join('');

  radioItems +=
    `<label class="course-radio-item">` +
    `<input type="radio" name="course-radio" value="__other__" onchange="_courseOtherToggle()">` +
    `その他（以下に入力）</label>`;

  document.getElementById('subject-list').innerHTML =
    `<div class="sub-course-select-wrap">` +
    `<p class="sub-course-select-title">科・コースを選択してください</p>` +
    `<div class="course-radio-list">${radioItems}</div>` +
    `<div class="course-other-input-wrap" id="course-other-wrap">` +
    `<input type="text" id="course-other-input" class="course-input-field" placeholder="コース名を入力" maxlength="30" />` +
    `<p class="course-other-note">（ ） ・ などの記号は使用できません</p>` +
    `</div>` +
    `<div class="sub-course-select-btns" style="margin-top:16px;">` +
    `<button class="sub-course-btn sub-course-btn-confirm" onclick="_courseInputNext()">次へ</button>` +
    `</div></div>`;

  document.getElementById('footer').innerHTML = '';
}

function _courseOtherToggle() {
  const wrap     = document.getElementById('course-other-wrap');
  const selected = document.querySelector('input[name="course-radio"]:checked');
  if (wrap) wrap.style.display = (selected && selected.value === '__other__') ? 'block' : 'none';
}

function _courseInputNext() {
  const selected = document.querySelector('input[name="course-radio"]:checked');
  if (!selected) { showMessage('科・コースを選択してください。', 'error'); return; }

  let val;
  if (selected.value === '__other__') {
    val = (document.getElementById('course-other-input').value || '').trim();
    if (!val) { showMessage('コース名を入力してください。', 'error'); return; }
    if (_COURSE_BANNED_RE.test(val)) {
      showMessage('コース名に使用できない記号が含まれています。\n（ ） ・ などの記号は使用できません。', 'error');
      return;
    }
  } else {
    val = selected.value;
  }

  _courseFlowCourse = val;
  const grade = String((_courseFlowData.student || {}).grade || '').trim();
  if (grade === '高2' || grade === '高3') {
    _courseSubCourseStep();
  } else {
    _courseFlowSubCourse = '';
    _courseConfirmStep();
  }
}

function _courseSubCourseStep() {
  document.getElementById('subject-list').innerHTML =
    `<div class="sub-course-select-wrap">` +
    `<p class="sub-course-select-title">文系・理系を選択してください</p>` +
    `<p class="sub-course-select-desc">試験の教科セットを正しく表示するため、あなたの文理を教えてください。</p>` +
    `<div class="course-radio-list">` +
    `<label class="course-radio-item"><input type="radio" name="subcourse-radio" value="文系"> 文系</label>` +
    `<label class="course-radio-item"><input type="radio" name="subcourse-radio" value="理系"> 理系</label>` +
    `</div>` +
    `<div class="sub-course-select-btns" style="margin-top:16px;">` +
    `<button class="sub-course-btn sub-course-btn-confirm" onclick="_courseSubCourseNext()">次へ</button>` +
    `<button class="sub-course-btn sub-course-btn-back" onclick="renderCourseInput(_courseFlowData)">戻る</button>` +
    `</div></div>`;
}

function _courseSubCourseNext() {
  const selected = document.querySelector('input[name="subcourse-radio"]:checked');
  if (!selected) { showMessage('文系・理系を選択してください。', 'error'); return; }
  _courseFlowSubCourse = selected.value;
  _courseConfirmStep();
}

function _courseSubCourseSelect(subCourse) {
  _courseFlowSubCourse = subCourse;
  _courseConfirmStep();
}

function _courseConfirmStep() {
  const hasSubCourse = !!_courseFlowSubCourse;
  const confirmText  = hasSubCourse
    ? `<strong>${_escHtml(_courseFlowCourse)}</strong> ／ <strong>${_escHtml(_courseFlowSubCourse)}</strong> で設定します。よろしいですか？`
    : `<strong>${_escHtml(_courseFlowCourse)}</strong> で設定します。よろしいですか？`;
  const backFn = hasSubCourse ? '_courseSubCourseStep()' : 'renderCourseInput(_courseFlowData)';

  document.getElementById('subject-list').innerHTML =
    `<div class="sub-course-select-wrap">` +
    `<p class="sub-course-select-title">確認</p>` +
    `<p class="sub-course-select-desc">${confirmText}</p>` +
    `<div class="sub-course-select-btns">` +
    `<button class="sub-course-btn sub-course-btn-confirm" onclick="_courseSubmit()">確定</button>` +
    `<button class="sub-course-btn sub-course-btn-back" onclick="${backFn}">戻る</button>` +
    `</div></div>`;
}

function _courseSubmit() {
  handleCourseSubmit(_courseFlowData.lineUserId, _courseFlowCourse, _courseFlowSubCourse);
}

// ---- 文理のみ未設定フロー ----
var _subCourseData = null;

function renderSubCourseSelect(data) {
  _subCourseData = data;
  const s = data.student;
  document.getElementById('header').innerHTML = `
    <div class="exam-header-container">
      <h2 class="app-title">定期テスト得点入力フォーム</h2>
      <p class="student-name">${s.name} さん <span class="student-info">(${s.school_name}　${s.grade})</span></p>
    </div>
  `;
  document.getElementById('subject-list').innerHTML =
    `<div class="sub-course-select-wrap">` +
    `<p class="sub-course-select-title">文系・理系を選択してください</p>` +
    `<p class="sub-course-select-desc">試験の教科セットを正しく表示するため、あなたの文理選択を教えてください。</p>` +
    `<div class="course-radio-list">` +
    `<label class="course-radio-item"><input type="radio" name="subcourse-only-radio" value="文系"> 文系</label>` +
    `<label class="course-radio-item"><input type="radio" name="subcourse-only-radio" value="理系"> 理系</label>` +
    `</div>` +
    `<div class="sub-course-select-btns" style="margin-top:16px;">` +
    `<button class="sub-course-btn sub-course-btn-confirm" onclick="_subCourseNext()">次へ</button>` +
    `</div></div>`;
  document.getElementById('footer').innerHTML = '';
}

function _subCourseNext() {
  const selected = document.querySelector('input[name="subcourse-only-radio"]:checked');
  if (!selected) { showMessage('文系・理系を選択してください。', 'error'); return; }
  _subCourseConfirm(selected.value);
}

function _subCourseConfirm(subCourse) {
  document.getElementById('subject-list').innerHTML =
    `<div class="sub-course-select-wrap">` +
    `<p class="sub-course-select-title">確認</p>` +
    `<p class="sub-course-select-desc"><strong>${_escHtml(subCourse)}</strong> で設定します。よろしいですか？</p>` +
    `<div class="sub-course-select-btns">` +
    `<button class="sub-course-btn sub-course-btn-confirm" onclick="handleSubCourseSelect('${_escHtml(_subCourseData.lineUserId)}', '${_escHtml(subCourse)}')">確定</button>` +
    `<button class="sub-course-btn sub-course-btn-back" onclick="renderSubCourseSelect(_subCourseData)">戻る</button>` +
    `</div></div>`;
}

function toggleNotTaken(displayKey, subjectId, isChecked) {
  var scoreEl = document.getElementById('s_'  + displayKey + '_' + subjectId);
  var grEl    = document.getElementById('gr_' + displayKey + '_' + subjectId);
  var crEl    = document.getElementById('cr_' + displayKey + '_' + subjectId);
  [scoreEl, grEl, crEl].forEach(function(el) {
    if (!el) return;
    el.disabled     = isChecked;
    el.style.opacity = isChecked ? '0.4' : '';
    if (isChecked) el.value = '';
  });
}

function switchExamTab(tabId) {
  _currentTabId = tabId;
  document.querySelectorAll('.exam-select').forEach(sel => { sel.value = tabId; });
  document.querySelectorAll('.tab-panel').forEach(panel => {
    panel.style.display = panel.dataset.tabId === tabId ? 'block' : 'none';
  });
}

// ---- 教科編集 ミートボールメニュー ----

function toggleSubjectMenu(btn) {
  var dropdown = btn.nextElementSibling;
  if (!dropdown) return;
  var isOpen = dropdown.style.display !== 'none';
  document.querySelectorAll('.subj-dropdown').forEach(function(d) { d.style.display = 'none'; });
  if (!isOpen) dropdown.style.display = 'block';
}

// ---- 教科編集（インラインテーブル） ----

function _getFilteredSubjectsForEdit(tabId) {
  var exam = (_appData && _appData.examTabs || []).find(function(t) { return t.term_test_id === tabId; });
  var currentSids  = exam ? (exam.subjects || []).map(function(s) { return s.subject_id; }) : [];
  var studentGrade = (_appData && _appData.student && _appData.student.grade) || '';
  return (_currentAvailableSubjects || []).filter(function(sub) {
    var subGrade = String(sub.grade || '').trim();
    return !subGrade || subGrade === studentGrade || currentSids.indexOf(sub.subject_id) !== -1;
  });
}

function _syncEditRowsFromDom() {
  var tbody = document.querySelector('.subj-edit-tbody');
  if (!tbody) return;
  var trs = tbody.querySelectorAll('tr.subj-edit-row');
  var newRows = [];
  trs.forEach(function(tr) {
    if (tr.dataset.isEditable === 'false') {
      newRows.push({
        subject_id:       tr.dataset.subjectId   || '',
        subject_name:     tr.dataset.subjectName || '',
        raw_subject_name: '',
        isAdded:          false,
        isEditable:       false,
        genre_name:       tr.dataset.genre || ''
      });
      return;
    }
    var sel = tr.querySelector('.subj-edit-select');
    var inp = tr.querySelector('.subj-edit-other-input');
    newRows.push({
      subject_id:       sel ? sel.value : '',
      raw_subject_name: inp ? inp.value.trim() : '',
      isAdded:          tr.dataset.isAdded === 'true',
      isEditable:       true,
      genre_name:       tr.dataset.genre   || ''
    });
  });
  _editRows = newRows;
}

function enterSubjectEditMode(tabId) {
  document.querySelectorAll('.subj-dropdown').forEach(function(d) { d.style.display = 'none'; });
  var exam = (_appData && _appData.examTabs || []).find(function(t) { return t.term_test_id === tabId; });
  if (!exam) return;

  _editMode  = true;
  _editTabId = tabId;
  _editRows  = (exam.subjects || []).map(function(s) {
    var isOther = s.subject_id === 'OTHER';
    var isExtra = !!s.extra;
    return {
      subject_id:       s.subject_id,
      raw_subject_name: s.raw_subject_name || '',
      isAdded:          isOther || isExtra,  // OTHER行・追加教科は×ボタン表示
      genre_name:       s.genre_name || 'その他',
      subject_name:     s.subject_name || s.display_name || '',
      isEditable:       (s.genre_name || 'その他') !== '合計点'
    };
  });

  renderApp(_appData);
  switchExamTab(tabId);
}

function cancelSubjectEdit() {
  _editMode  = false;
  _editTabId = null;
  _editRows  = [];
  var savedTabId = _currentTabId;
  renderApp(_appData);
  if (savedTabId) switchExamTab(savedTabId);
}

function onSubjectRowChange(index, value) {
  if (_editRows[index]) _editRows[index].subject_id = value;
  var inp = document.getElementById('subj-edit-other-' + index);
  if (inp) inp.style.display = value === 'OTHER' ? 'inline-block' : 'none';
}


function removeSubjectEditRow(index) {
  _syncEditRowsFromDom();
  _editRows.splice(index, 1);
  var savedTabId = _editTabId;
  renderApp(_appData);
  switchExamTab(savedTabId);
}

function saveSubjectEdit(tabId) {
  _syncEditRowsFromDom();

  var exam = (_appData && _appData.examTabs || []).find(function(t) { return t.term_test_id === tabId; });
  if (!exam) { cancelSubjectEdit(); return; }

  var newSubjects = [];

  _editRows.forEach(function(row) {
    var sid = row.subject_id;
    if (!sid) return;
    if (sid === 'OTHER') {
      var rawName = row.raw_subject_name || '';
      if (rawName) {
        newSubjects.push({
          subject_id:       'OTHER',
          raw_subject_name: rawName,
          subject_name:     rawName,
          display_name:     rawName,
          genre_id:         null,
          genre_name:       row.genre_name || 'その他',
          excluded:         false,
          extra:            true
        });
      }
      return;
    }
    var sub = (_currentAvailableSubjects || []).find(function(s) { return s.subject_id === sid; });
    if (sub) newSubjects.push(sub);
  });

  exam.subjects = newSubjects;
  delete exam._pendingOther;
  delete exam._pendingOtherGenre;

  if (_appData.currentExam && _appData.currentExam.term_test_id === tabId) {
    _appData.currentExam.subjects = exam.subjects;
  }

  _editMode  = false;
  _editTabId = null;
  _editRows  = [];

  renderApp(_appData);
  switchExamTab(tabId);
}
</script>
