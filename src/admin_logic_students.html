<style>
/* ---- スライサー ---- */
.st-slicer-bar {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 14px;
}
.st-slicer-group {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 5px;
}
.st-slicer-label {
  font-size: 0.82em;
  font-weight: bold;
  color: #555;
  min-width: 36px;
  flex-shrink: 0;
}
.st-slicer-chip {
  padding: 3px 12px;
  border: 1px solid #b0c4de;
  border-radius: 14px;
  background: #fff;
  color: #334;
  font-size: 0.85em;
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
}
.st-slicer-chip:hover { background: #e8edf7; }
.st-slicer-active {
  background: #3a4f80;
  color: #fff;
  border-color: #3a4f80;
}

/* ---- コース削除チップ ---- */
.st-course-del-chip {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  background: #fff0f0;
  border: 1px solid #ffb3b3;
  border-radius: 12px;
  padding: 2px 6px 2px 9px;
  font-size: 0.83em;
}
.st-course-del-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: #c00;
  font-size: 1.05em;
  padding: 0 1px;
  line-height: 1;
}
.st-course-del-btn:hover { color: #f00; }

/* ---- 編集バー ---- */
.st-edit-top-bar {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  padding: 8px 12px;
  background: #f5f7fb;
  border: 1px solid #dde4f0;
  border-radius: 6px;
  margin-bottom: 10px;
  min-height: 40px;
}
.st-edit-field-label { font-weight: bold; color: #3a4f80; }
</style>

<script>
let _stCachedStudents = [];
let _stCachedCramId   = null;
let _stShowInactive   = false;
let _stSortField      = 'grade';
let _stSortAsc        = true;
let _stEditMode       = false;
let _stEditField      = 'school_course';
let _stFilterSchoolCourses = [];   // 「学校名/コース名」または「学校名」の配列
let _stFilterGradeSubs     = [];   // 「学年/文理」または「学年」の配列
var _stSearchQuery = '';
var _stComposing   = false;

const _ST_GRADE_ORDER = ['中1','中2','中3','高1','高2','高3'];
function _stGradeRank(g) {
  const i = _ST_GRADE_ORDER.indexOf(g);
  return i >= 0 ? i : 99;
}

// ---- エントリーポイント ----

function renderStudentManager() {
  _stShowInactive  = false;
  _stEditMode      = false;
  _stFilterSchoolCourses = [];
  _stFilterGradeSubs     = [];
  const cramId = window.selectedCramId || '';
  if (_stCachedCramId === cramId) { _stRerender(); return; }
  _stFetchAndRender();
}

// ---- データ取得 ----

function _stFetchAndRender() {
  const content = document.getElementById('admin-content');
  content.innerHTML = '<h3>生徒一覧</h3><p>読み込み中...</p>';
  setLoading(true, '生徒一覧を取得中...');
  google.script.run
    .withSuccessHandler(function (res) {
      setLoading(false);
      if (res && res.success) {
        _stCachedStudents = res.students || [];
        _stCachedCramId   = window.selectedCramId || '';
        _stRerender();
      } else {
        showMessage((res && res.error) || '生徒一覧の取得に失敗しました。', 'error');
        content.innerHTML = '<h3>生徒一覧</h3>';
      }
    })
    .withFailureHandler(function (err) {
      setLoading(false);
      showMessage('エラー: ' + (err && err.message ? err.message : JSON.stringify(err)), 'error');
    })
    .getStudentList(window.selectedCramId || '');
}

// ---- ソート ----

function _stSetSort(field) {
  if (_stSortField === field) { _stSortAsc = !_stSortAsc; }
  else { _stSortField = field; _stSortAsc = true; }
  _stRerender();
}

function _stSortStudents(arr) {
  return arr.slice().sort(function (a, b) {
    let cmp;
    if (_stSortField === 'grade') {
      cmp = _stGradeRank(a.grade || '') - _stGradeRank(b.grade || '');
      if (cmp === 0) {
        const va = String(a.pronunciation || a.name || '').toLowerCase();
        const vb = String(b.pronunciation || b.name || '').toLowerCase();
        cmp = va.localeCompare(vb, 'ja');
      }
    } else {
      const va = String(a[_stSortField] || '').toLowerCase();
      const vb = String(b[_stSortField] || '').toLowerCase();
      cmp = va.localeCompare(vb, 'ja');
    }
    return _stSortAsc ? cmp : -cmp;
  });
}

function _stSortIcon(field) {
  if (_stSortField !== field) return '<span class="st-sort-icon">⇅</span>';
  return _stSortAsc
    ? '<span class="st-sort-icon st-sort-active">▲</span>'
    : '<span class="st-sort-icon st-sort-active">▼</span>';
}

// ---- フィルター ----

function _stGetFilteredStudents() {
  let s = _stShowInactive ? _stCachedStudents : _stCachedStudents.filter(function(s) { return s.is_active; });
  if (_stFilterSchoolCourses.length > 0) {
    s = s.filter(function(x) {
      var label = x.school_course ? (_shortSchoolName(x.school_name) + '/' + x.school_course) : (_shortSchoolName(x.school_name) || '');
      return _stFilterSchoolCourses.indexOf(label) >= 0;
    });
  }
  if (_stFilterGradeSubs.length > 0) {
    s = s.filter(function(x) {
      var gs = x.sub_course ? (x.grade + '/' + x.sub_course) : (x.grade || '');
      return _stFilterGradeSubs.indexOf(gs) >= 0;
    });
  }
  // 検索フィルタは _stApplySearchFilter() で DOM show/hide により処理する
  return s;
}

function _stToggleSchoolCourse(label) {
  const i = _stFilterSchoolCourses.indexOf(label);
  if (i >= 0) _stFilterSchoolCourses.splice(i, 1); else _stFilterSchoolCourses.push(label);
  _stRerender();
}

function _stToggleGradeSub(gs) {
  const i = _stFilterGradeSubs.indexOf(gs);
  if (i >= 0) _stFilterGradeSubs.splice(i, 1); else _stFilterGradeSubs.push(gs);
  _stRerender();
}

function _stToggleInactive(checked) {
  _stShowInactive = checked;
  _stRerender();
}

function _stOnSearch(val) {
  _stSearchQuery = val;
  _stApplySearchFilter();
}

// ---- メイン描画 ----

function _stRerender() {
  const content  = document.getElementById('admin-content');
  const allBase  = _stShowInactive ? _stCachedStudents : _stCachedStudents.filter(function(s) { return s.is_active; });
  const filtered = _stGetFilteredStudents();

  let html = '<h3>生徒一覧</h3>'
    + '<p class="tab-desc">'
    + '<span class="step">▶ <strong>コース・文理は必ず設定してください。</strong> 試験パターンの照合に使用するため、未設定の場合は試験・得点が表示されません。</span><br>'
    + '<span class="step">▶ <strong>コースを編集 / 文理を編集</strong>：チェックボックスで複数の生徒を選択し一括変更できます。</span>'
    + '</p>';

  // 「学校/コース」チップ収集（あいうえお順）
  const _stScLabelSet = {};
  const _stScLabelList = [];
  allBase.forEach(function(s) {
    const sn = _shortSchoolName(s.school_name  || '');
    const sc = s.school_course || '';
    const label = sc ? (sn + '/' + sc) : sn;
    if (label && !_stScLabelSet[label]) {
      _stScLabelSet[label] = true;
      _stScLabelList.push(label);
    }
  });
  _stScLabelList.sort(function(a, b) { return a.localeCompare(b, 'ja'); });

  // 「学年/文理」チップ収集（指定優先順）
  const _ST_GS_ORDER = ['高1', '高2/文系', '高2/理系', '高3/文系', '高3/理系', '高1/文系', '高1/理系', '中1', '中2', '中3'];
  const _stGsLabelSet = {};
  const _stGsLabelList = [];
  allBase.forEach(function(s) {
    const g  = s.grade      || '';
    const sb = s.sub_course || '';
    const gs = sb ? (g + '/' + sb) : g;
    if (gs && !_stGsLabelSet[gs]) {
      _stGsLabelSet[gs] = true;
      _stGsLabelList.push(gs);
    }
  });
  _stGsLabelList.sort(function(a, b) {
    const ai = _ST_GS_ORDER.indexOf(a);
    const bi = _ST_GS_ORDER.indexOf(b);
    if (ai < 0 && bi < 0) return a.localeCompare(b, 'ja');
    if (ai < 0) return 1;
    if (bi < 0) return -1;
    return ai - bi;
  });

  // ---- スライサー ----
  html += '<div class="st-slicer-bar">';

  if (_stScLabelList.length >= 1) {
    html += '<div class="st-slicer-group"><span class="st-slicer-label">学校/コース</span>';
    _stScLabelList.forEach(function(label) {
      const active = _stFilterSchoolCourses.indexOf(label) >= 0;
      html += '<button class="st-slicer-chip' + (active ? ' st-slicer-active' : '') + '"'
            + ' data-sc="' + _esc(label) + '"'
            + ' onclick="_stToggleSchoolCourse(this.dataset.sc)">' + _esc(label) + '</button>';
    });
    html += '</div>';
  }

  if (_stGsLabelList.length >= 1) {
    html += '<div class="st-slicer-group"><span class="st-slicer-label">学年/文理</span>';
    _stGsLabelList.forEach(function(gs) {
      const active = _stFilterGradeSubs.indexOf(gs) >= 0;
      html += '<button class="st-slicer-chip' + (active ? ' st-slicer-active' : '') + '"'
            + ' data-gs="' + _esc(gs) + '"'
            + ' onclick="_stToggleGradeSub(this.dataset.gs)">' + _esc(gs) + '</button>';
    });
    html += '</div>';
  }

  // 件数・無効表示トグル
  html += '<div class="st-filter-bar">'
        + '<span class="st-count">全 ' + _stCachedStudents.length + ' 名中 ' + filtered.length + ' 名表示</span>'
        + '<input type="search" placeholder="氏名・読み・学校名で検索" value="' + _esc(_stSearchQuery) + '"'
        + ' oncompositionstart="_stComposing=true" oncompositionend="_stComposing=false"'
        + ' oninput="if(!_stComposing)_stOnSearch(this.value)" class="admin-input" style="width:220px;margin-left:auto;">'
        + '<label class="st-toggle"><input type="checkbox" onchange="_stToggleInactive(this.checked)"' + (_stShowInactive ? ' checked' : '') + '> 退塾も表示</label>'
        + '</div>';

  html += '</div>'; // end slicer-bar

  // ---- 編集バー ----
  html += '<div class="st-edit-top-bar">';
  if (_stEditMode) {
    const editLabel  = _stEditField === 'sub_course' ? '文理' : 'コース';
    const courseOpts = _stGetCourseOptionsForEdit();
    html += '<button class="btn-sm" onclick="_stSelectAll()">全選択</button>'
          + '<button class="btn-sm" onclick="_stDeselectAll()">全解除</button>'
          + '&nbsp;<span class="st-edit-field-label">【' + editLabel + '】</span>→&nbsp;'
          + '<select id="st-edit-value" class="admin-select" style="width:auto;">'
          + '<option value="">（空欄にする）</option>'
          + courseOpts
          + '</select>';
    if (_stEditField !== 'sub_course') {
      const selSchoolNames = _stFilterSchoolCourses.map(function(label) {
        return label.indexOf('/') >= 0 ? label.split('/')[0] : label;
      });
      const uniqueSchools = selSchoolNames.filter(function(sn, i) { return selSchoolNames.indexOf(sn) === i; });
      const schoolForAdd = uniqueSchools.length === 1 ? uniqueSchools[0] : null;
      if (schoolForAdd) {
        // 既存コース一覧（削除チップ）
        const settings = (window.masterData && window.masterData.schoolSettings) || [];
        const coursesForSchool = settings
          .filter(function(s) { return s.school_name === schoolForAdd; })
          .map(function(s) { return s.school_course; })
          .filter(Boolean);
        if (coursesForSchool.length > 0) {
          html += '<span style="margin-left:12px; color:#666; font-size:0.85em; flex-shrink:0;">削除:</span>';
          coursesForSchool.forEach(function(c) {
            html += '<span class="st-course-del-chip">'
                  + _esc(c)
                  + '<button class="st-course-del-btn"'
                  + ' data-school="' + _esc(schoolForAdd) + '" data-course="' + _esc(c) + '"'
                  + ' onclick="_stDeleteCourse(this.dataset.school,this.dataset.course)" title="削除">×</button>'
                  + '</span>';
          });
        }
        // 新規追加
        html += '<span id="st-add-course-section" style="margin-left:8px;">'
              + '<span style="color:#666; font-size:0.85em; flex-shrink:0;">追加:</span>'
              + '<input type="text" id="st-new-course" class="admin-input" placeholder="コース名" style="width:100px;" />'
              + '<button class="btn-sm" data-school="' + _esc(schoolForAdd) + '" onclick="_stAddNewCourse(this.dataset.school)">追加</button>'
              + '</span>';
      }
    }
    html += '&nbsp;<button class="btn-save-admin" onclick="_stApplyEdit()">適用</button>'
          + '&nbsp;<button class="btn-cancel-admin" onclick="_stCancelEdit()">編集を終了</button>';
  } else {
    html += '<button class="st-edit-btn" onclick="_stStartEdit(\'school_course\')">コースを編集</button>'
          + '<button class="st-edit-btn st-edit-btn-sub" onclick="_stStartEdit(\'sub_course\')">文理を編集</button>';
  }
  html += '</div>';

  // ---- テーブル ----
  if (filtered.length === 0) {
    html += '<p class="st-empty">条件に一致する生徒がいません。</p>';
    content.innerHTML = html;
    return;
  }

  const sorted    = _stSortStudents(filtered);
  const cbHeader  = _stEditMode
    ? '<th style="width:32px; text-align:center;"><input type="checkbox" onchange="_stToggleAll(this)" title="全選択/解除" /></th>'
    : '';

  html += '<table class="admin-table st-table"><thead><tr>'
        + cbHeader
        + '<th>管理番号</th>'
        + '<th class="st-th-sort" onclick="_stSetSort(\'pronunciation\')">氏名' + _stSortIcon('pronunciation') + '</th>'
        + '<th class="st-th-sort" onclick="_stSetSort(\'school_name\')">学校名' + _stSortIcon('school_name') + '</th>'
        + '<th class="st-th-sort" onclick="_stSetSort(\'grade\')">学年' + _stSortIcon('grade') + '</th>'
        + '<th class="st-th-sort" onclick="_stSetSort(\'school_course\')">コース' + _stSortIcon('school_course') + '</th>'
        + '<th class="st-th-sort" onclick="_stSetSort(\'sub_course\')">文理' + _stSortIcon('sub_course') + '</th>'
        + '<th>状態</th>'
        + '</tr></thead><tbody>';

  sorted.forEach(function(s) {
    const statusBadge = s.is_active
      ? '<span class="st-badge-active">在席</span>'
      : '<span class="st-badge-inactive">退塾</span>';
    const cbCell = _stEditMode
      ? '<td><input type="checkbox" class="st-cb" value="' + _esc(s.student_id) + '" /></td>'
      : '';

    html += '<tr class="' + (s.is_active ? '' : 'st-row-inactive') + '"'
          + ' data-st-name="' + _esc((s.name || '').toLowerCase()) + '"'
          + ' data-st-kana="' + _esc((s.pronunciation || '').toLowerCase()) + '"'
          + ' data-st-school="' + _esc((s.school_name || '').toLowerCase()) + '">'
          + cbCell
          + '<td class="td-mono">' + _esc(s.student_id) + '</td>'
          + '<td><span class="st-name">' + _esc(s.name) + '</span>'
          + (s.pronunciation ? '<span class="st-kana"> （' + _esc(s.pronunciation) + '）</span>' : '') + '</td>'
          + '<td>' + _esc(_shortSchoolName(s.school_name) || '—') + '</td>'
          + '<td>' + _esc(s.grade          || '—') + '</td>'
          + '<td>' + _esc(s.school_course  || '—') + '</td>'
          + '<td>' + _esc(s.sub_course     || '—') + '</td>'
          + '<td>' + statusBadge + '</td>'
          + '</tr>';
  });

  html += '</tbody></table>';
  content.innerHTML = html;
  _stApplySearchFilter();
}

function _stApplySearchFilter() {
  var q = _stSearchQuery.toLowerCase();
  var rows = document.querySelectorAll('.st-table tbody tr');
  var visible = 0;
  rows.forEach(function(row) {
    var show = !q
      || (row.dataset.stName   || '').includes(q)
      || (row.dataset.stKana   || '').includes(q)
      || (row.dataset.stSchool || '').includes(q);
    row.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  var countEl = document.querySelector('.st-count');
  if (countEl) {
    countEl.textContent = '全 ' + _stCachedStudents.length + ' 名中 ' + visible + ' 名表示';
  }
}

// ---- 編集モード ----

function _stStartEdit(field) {
  _stEditMode  = true;
  _stEditField = field || 'school_course';
  _stRerender();
}

function _stCancelEdit() {
  _stEditMode = false;
  _stRerender();
}

function _stSelectAll() {
  document.querySelectorAll('.st-cb').forEach(function(cb) { cb.checked = true; });
}

function _stDeselectAll() {
  document.querySelectorAll('.st-cb').forEach(function(cb) { cb.checked = false; });
}

function _stToggleAll(headerCb) {
  document.querySelectorAll('.st-cb').forEach(function(cb) { cb.checked = headerCb.checked; });
}

function _stGetCourseOptionsForEdit() {
  if (_stEditField === 'sub_course') {
    return '<option value="文系">文系</option><option value="理系">理系</option>';
  }
  const settings = (window.masterData && window.masterData.schoolSettings) || [];
  let src = settings;
  if (_stFilterSchoolCourses.length > 0) {
    const selSchools = _stFilterSchoolCourses.map(function(label) {
      return label.indexOf('/') >= 0 ? label.split('/')[0] : label;
    });
    src = settings.filter(function(s) { return selSchools.indexOf(s.school_name) >= 0; });
  }
  const courses = [];
  src.forEach(function(s) {
    if (s.school_course && courses.indexOf(s.school_course) < 0) courses.push(s.school_course);
  });
  return courses.map(function(c) { return '<option value="' + _esc(c) + '">' + _esc(c) + '</option>'; }).join('');
}

function _stApplyEdit() {
  const field   = _stEditField;
  const value   = (document.getElementById('st-edit-value') || {}).value || '';
  const checked = Array.from(document.querySelectorAll('.st-cb:checked')).map(function(cb) { return cb.value; });

  if (checked.length === 0) { showMessage('生徒を選択してください。', 'error'); return; }
  const label      = field === 'school_course' ? 'コース' : '文理';
  const displayVal = value || '（空欄）';
  if (!confirm(checked.length + ' 名の ' + label + ' を「' + displayVal + '」に変更します。よろしいですか？')) return;

  setLoading(true, '更新中...');
  google.script.run
    .withSuccessHandler(function (res) {
      setLoading(false);
      if (res && res.success) {
        var msg = res.updated + ' 名を更新しました。';
        if (res.autoDeletedCourses > 0) {
          msg += '（在籍0人になったコース ' + res.autoDeletedCourses + ' 件を自動削除しました）';
        }
        showMessage(msg, 'success');
        if (res.autoDeletedCourses > 0) {
          window.refreshMasterData(function() { _stFetchAndRender(); });
        } else {
          _stFetchAndRender();
        }
      } else {
        showMessage((res && res.error) || '更新に失敗しました。', 'error');
      }
    })
    .withFailureHandler(function (err) {
      setLoading(false);
      showMessage('エラー: ' + (err && err.message ? err.message : JSON.stringify(err)), 'error');
    })
    .updateStudentField(window.selectedCramId || '', checked, field, value);
}

function _stDeleteCourse(schoolName, courseName) {
  if (!confirm('コース「' + courseName + '」を削除します。\n使用中の有効な生徒がいる場合は削除できません。')) return;
  setLoading(true, 'コースを削除中...');
  google.script.run
    .withSuccessHandler(function(res) {
      setLoading(false);
      if (res && res.success) {
        showMessage('コース「' + courseName + '」を削除しました。', 'success');
        window.refreshMasterData(function() { _stRerender(); });
      } else {
        showMessage((res && res.error) || '削除に失敗しました。', 'error');
      }
    })
    .withFailureHandler(function(err) {
      setLoading(false);
      showMessage('エラー: ' + (err && err.message ? err.message : JSON.stringify(err)), 'error');
    })
    .deleteCourseFromMaster(window.selectedCramId || '', schoolName, courseName);
}

function _stAddNewCourse(schoolName) {
  const input = document.getElementById('st-new-course');
  const val   = input ? input.value.trim() : '';
  if (!val)       { showMessage('コース名を入力してください。', 'error'); return; }
  if (!schoolName){ showMessage('対象の学校が特定できません。学校フィルターで1校を選択してください。', 'error'); return; }

  setLoading(true, 'コースを追加中...');
  google.script.run
    .withSuccessHandler(function (res) {
      setLoading(false);
      if (res && res.success) {
        showMessage('コース「' + val + '」を追加しました。', 'success');
        window.refreshMasterData(function () { _stRerender(); });
      } else {
        showMessage((res && res.error) || '追加に失敗しました。', 'error');
      }
    })
    .withFailureHandler(function (err) {
      setLoading(false);
      showMessage('エラー: ' + (err && err.message ? err.message : JSON.stringify(err)), 'error');
    })
    .addCourseToMaster(window.selectedCramId || '', schoolName, val);
}

// ---- 学校並び順（localStorage 連携） ----

function _stGetSortedSchoolList(students) {
  const set = {};
  students.forEach(function(s) { if (s.school_name) set[s.school_name] = true; });
  const all    = Object.keys(set);
  const cramId = window.selectedCramId || '';
  var saved = null;
  try {
    var raw = localStorage.getItem('st_school_order_' + cramId);
    if (raw) saved = JSON.parse(raw);
  } catch {}
  if (!saved || !Array.isArray(saved)) return all.sort(function(a,b){ return a.localeCompare(b,'ja'); });
  const existing = saved.filter(function(s) { return set[s]; });
  const newOnes  = all.filter(function(s) { return existing.indexOf(s) < 0; });
  return existing.concat(newOnes);
}

function _esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.renderStudentManager = renderStudentManager;
</script>
