<script>
let _stCachedStudents = [];
let _stShowInactive   = false;   // false = 有効のみ, true = 全員
let _stSortField      = 'pronunciation';  // 'pronunciation' | 'school_course'
let _stSortAsc        = true;
let _stEditSchool     = null;    // 編集モード中の学校名（null = 非編集）

// 学年の表示順
const _ST_GRADE_ORDER = ['中1','中2','中3','高1','高2','高3'];
function _stGradeRank(g) {
  const i = _ST_GRADE_ORDER.indexOf(g);
  return i >= 0 ? i : 99;
}

// ---- 外部から呼ばれるエントリーポイント ----

function renderStudentManager() {
  _stShowInactive = false;
  _stEditSchool   = null;
  _stFetchAndRender();
}

// ---- 内部関数 ----

function _stFetchAndRender() {
  const content = document.getElementById('admin-content');
  content.innerHTML = '<h3>生徒一覧</h3><p>読み込み中...</p>';
  setLoading(true, '生徒一覧を取得中...');

  google.script.run
    .withSuccessHandler(function (res) {
      setLoading(false);
      if (res && res.success) {
        _stCachedStudents = res.students || [];
        _stRerender();
      } else {
        showMessage((res && res.error) || '生徒一覧の取得に失敗しました。', 'error');
        content.innerHTML = '<h3>生徒一覧</h3>';
      }
    })
    .withFailureHandler(function (err) {
      const m = err && err.message ? err.message : JSON.stringify(err);
      console.error('[getStudentList] failure:', err);
      setLoading(false);
      showMessage('エラー: ' + m, 'error');
    })
    .getStudentList(window.selectedCramId || '');
}

function _stSetSort(field) {
  if (_stSortField === field) {
    _stSortAsc = !_stSortAsc;
  } else {
    _stSortField = field;
    _stSortAsc   = true;
  }
  _stRerender();
}

function _stSortStudents(arr) {
  return arr.slice().sort(function (a, b) {
    const va = String(a[_stSortField] || '').toLowerCase();
    const vb = String(b[_stSortField] || '').toLowerCase();
    const cmp = va.localeCompare(vb, 'ja');
    return _stSortAsc ? cmp : -cmp;
  });
}

function _stSortIcon(field) {
  if (_stSortField !== field) return '<span class="st-sort-icon">⇅</span>';
  return _stSortAsc
    ? '<span class="st-sort-icon st-sort-active">▲</span>'
    : '<span class="st-sort-icon st-sort-active">▼</span>';
}

function _stRerender() {
  const content  = document.getElementById('admin-content');
  const students = _stShowInactive
    ? _stCachedStudents
    : _stCachedStudents.filter(s => s.is_active);

  const total   = _stCachedStudents.length;
  const showing = students.length;

  let html = '<h3>生徒一覧</h3>';

  // ---- フィルターバー ----
  html += '<div class="st-filter-bar">'
        + '<span class="st-count">全 ' + total + ' 名中 ' + showing + ' 名表示</span>'
        + '<label class="st-toggle">'
        + '<input type="checkbox" onchange="_stToggleInactive(this.checked)"'
        + (_stShowInactive ? ' checked' : '') + '>'
        + ' 無効な生徒も表示'
        + '</label>'
        + '</div>';

  if (students.length === 0) {
    html += '<p class="st-empty">表示できる生徒がいません。</p>';
    content.innerHTML = html;
    return;
  }

  // ---- 学校名 → 学年 の2段階グループ化 ----
  const schoolMap = {};
  students.forEach(function (s) {
    const school = s.school_name || '（学校名未設定）';
    const grade  = s.grade       || '（学年未設定）';
    if (!schoolMap[school])        schoolMap[school] = {};
    if (!schoolMap[school][grade]) schoolMap[school][grade] = [];
    schoolMap[school][grade].push(s);
  });

  const thName   = '<th class="st-th-sort" onclick="_stSetSort(\'pronunciation\')">氏名' + _stSortIcon('pronunciation') + '</th>';
  const thCourse = '<th class="st-th-sort" onclick="_stSetSort(\'school_course\')">コース' + _stSortIcon('school_course') + '</th>';

  Object.keys(schoolMap).sort().forEach(function (schoolName) {
    const gradeMap    = schoolMap[schoolName];
    const schoolTotal = Object.values(gradeMap).reduce(function (s, a) { return s + a.length; }, 0);
    const isEditing   = _stEditSchool === schoolName;
    const escapedSN   = _esc(schoolName).replace(/'/g, "\\'");

    html += '<div class="st-school-group">'
          + '<div class="st-school-header">'
          + '<span class="st-school-name">' + _esc(schoolName) + '</span>'
          + '<span class="st-school-count">' + schoolTotal + ' 名</span>'
          + (isEditing
              ? '<button class="st-edit-cancel-btn" onclick="_stCancelEdit()">編集を終了</button>'
              : '<button class="st-edit-btn" onclick="_stStartEdit(\'' + escapedSN + '\')">コースを編集</button>')
          + '</div>';

    // 編集モードの操作バー
    if (isEditing) {
      const courseOptions = _stGetCourseOptions(schoolName, 'school_course');
      html += '<div class="st-edit-bar" id="st-edit-bar">'
            + '<button class="btn-sm" onclick="_stSelectAll()">全選択</button>'
            + '<button class="btn-sm" onclick="_stDeselectAll()">全解除</button>'
            + '&nbsp;対象:&nbsp;'
            + '<select id="st-edit-field" class="admin-select" style="width:auto;"'
            + ' data-school="' + escapedSN + '" onchange="_stOnFieldChange()">'
            + '<option value="school_course">コース</option>'
            + '<option value="sub_course">サブ区分</option>'
            + '</select>'
            + '&nbsp;→&nbsp;'
            + '<select id="st-edit-value" class="admin-select" style="width:auto;">'
            + '<option value="">（空欄にする）</option>'
            + courseOptions
            + '</select>'
            + '&nbsp;<button class="btn-save-admin" onclick="_stApplyEdit()">選択中の生徒に適用</button>'
            + '<span style="margin-left:12px; color:#666; font-size:0.85em;">新規追加:</span>'
            + '<input type="text" id="st-new-course" class="admin-input" placeholder="コース名" style="width:100px;" />'
            + '<button class="btn-sm" onclick="_stAddNewCourse(\'' + escapedSN + '\')">追加</button>'
            + '</div>';
    }

    const sortedGrades = Object.keys(gradeMap).sort(function (a, b) {
      return _stGradeRank(a) - _stGradeRank(b);
    });

    sortedGrades.forEach(function (grade) {
      const members = _stSortStudents(gradeMap[grade]);

      const cbHeader = isEditing ? '<th style="width:32px;"></th>' : '';
      const theadHtml = '<thead><tr>' + cbHeader + '<th>管理番号</th>' + thName + thCourse
                      + '<th>サブ区分</th><th class="st-line-col">LINE</th><th>状態</th>'
                      + '</tr></thead>';

      html += '<div class="st-grade-group">'
            + '<div class="st-grade-header">'
            + '<span class="st-grade-name">' + _esc(grade) + '</span>'
            + '<span class="st-grade-count">' + members.length + ' 名</span>'
            + '</div>'
            + '<table class="admin-table st-table">'
            + theadHtml
            + '<tbody>';

      members.forEach(function (s) {
        const lineIcon    = s.line_user_id
          ? '<span class="st-line-ok" title="' + _esc(s.line_user_id) + '">✓</span>'
          : '<span class="st-line-ng">未連携</span>';
        const statusBadge = s.is_active
          ? '<span class="st-badge-active">有効</span>'
          : '<span class="st-badge-inactive">無効</span>';
        const cbCell = isEditing
          ? '<td><input type="checkbox" class="st-cb" value="' + _esc(s.student_id) + '" /></td>'
          : '';

        html += '<tr class="' + (s.is_active ? '' : 'st-row-inactive') + '">'
              + cbCell
              + '<td class="td-mono">'  + _esc(s.student_id) + '</td>'
              + '<td>'
              +   '<span class="st-name">' + _esc(s.name) + '</span>'
              +   (s.pronunciation ? '<span class="st-kana"> （' + _esc(s.pronunciation) + '）</span>' : '')
              + '</td>'
              + '<td>' + _esc(s.school_course || '—') + '</td>'
              + '<td>' + _esc(s.sub_course    || '—') + '</td>'
              + '<td class="st-line-col">' + lineIcon    + '</td>'
              + '<td>'                     + statusBadge + '</td>'
              + '</tr>';
      });

      html += '</tbody></table></div>';
    });

    html += '</div>';
  });

  content.innerHTML = html;
}

// ---- ソート / フィルター ----

function _stToggleInactive(checked) {
  _stShowInactive = checked;
  _stRerender();
}

// ---- 編集モード ----

function _stStartEdit(schoolName) {
  if (_stEditSchool && _stEditSchool !== schoolName) {
    if (!confirm('別の学校の編集を開始します。現在の選択は破棄されます。よろしいですか？')) return;
  }
  _stEditSchool = schoolName;
  _stRerender();
}

function _stCancelEdit() {
  _stEditSchool = null;
  _stRerender();
}

function _stSelectAll() {
  document.querySelectorAll('.st-cb').forEach(cb => { cb.checked = true; });
}

function _stDeselectAll() {
  document.querySelectorAll('.st-cb').forEach(cb => { cb.checked = false; });
}

/** field に応じた選択肢 <option> HTML を返す */
function _stGetCourseOptions(schoolName, field) {
  if (field === 'sub_course') {
    const subs = [...new Set(
      _stCachedStudents
        .filter(function (s) { return s.school_name === schoolName && s.sub_course; })
        .map(function (s) { return s.sub_course; })
    )].sort();
    return subs.map(function (c) {
      return '<option value="' + _esc(c) + '">' + _esc(c) + '</option>';
    }).join('');
  }
  const settings = (window.masterData && window.masterData.schoolSettings) || [];
  const courses  = [...new Set(
    settings.filter(function (s) { return s.school_name === schoolName && s.school_course; })
            .map(function (s) { return s.school_course; })
  )];
  return courses.map(function (c) {
    return '<option value="' + _esc(c) + '">' + _esc(c) + '</option>';
  }).join('');
}

/** 対象フィールド切り替え時に選択肢と placeholder を更新する */
function _stOnFieldChange() {
  const fieldEl    = document.getElementById('st-edit-field');
  const schoolName = (fieldEl && fieldEl.dataset && fieldEl.dataset.school) || '';
  const field      = (fieldEl && fieldEl.value) || 'school_course';
  const sel        = document.getElementById('st-edit-value');
  if (sel) {
    sel.innerHTML = '<option value="">（空欄にする）</option>' + _stGetCourseOptions(schoolName, field);
  }
  const inp = document.getElementById('st-new-course');
  if (inp) inp.placeholder = field === 'sub_course' ? 'サブ区分名' : 'コース名';
}

function _stApplyEdit() {
  const field   = document.getElementById('st-edit-field')?.value;
  const value   = document.getElementById('st-edit-value')?.value || '';
  const checked = Array.from(document.querySelectorAll('.st-cb:checked')).map(cb => cb.value);

  if (checked.length === 0) { showMessage('生徒を選択してください。', 'error'); return; }
  if (!field) return;

  const label = field === 'school_course' ? 'コース' : 'サブ区分';
  const displayVal = value || '（空欄）';
  if (!confirm(checked.length + ' 名の ' + label + ' を「' + displayVal + '」に変更します。よろしいですか？')) return;

  setLoading(true, '更新中...');
  google.script.run
    .withSuccessHandler(function (res) {
      setLoading(false);
      if (res && res.success) {
        showMessage(res.updated + ' 名を更新しました。', 'success');
        _stFetchAndRender();
      } else {
        showMessage((res && res.error) || '更新に失敗しました。', 'error');
      }
    })
    .withFailureHandler(function (err) {
      setLoading(false);
      showMessage('エラー: ' + (err && err.message ? err.message : JSON.stringify(err)), 'error');
    })
    .updateStudentField(window.selectedCramId || '', checked, field, value);
}

function _stAddNewCourse(schoolName) {
  const input = document.getElementById('st-new-course');
  const val   = input ? input.value.trim() : '';
  const field = document.getElementById('st-edit-field') ? document.getElementById('st-edit-field').value : 'school_course';
  if (!val) { showMessage((field === 'sub_course' ? 'サブ区分名' : 'コース名') + 'を入力してください。', 'error'); return; }

  if (field === 'sub_course') {
    // サブ区分はマスター不要 — 選択肢に直接追加して選択状態にする
    const sel = document.getElementById('st-edit-value');
    if (sel) {
      const opt = document.createElement('option');
      opt.value = val; opt.textContent = val; opt.selected = true;
      sel.appendChild(opt);
    }
    if (input) input.value = '';
    return;
  }

  setLoading(true, 'コースを追加中...');
  google.script.run
    .withSuccessHandler(function (res) {
      setLoading(false);
      if (res && res.success) {
        showMessage('コース「' + val + '」を追加しました。', 'success');
        window.refreshMasterData(function () {
          _stEditSchool = schoolName;
          _stRerender();
        });
      } else {
        showMessage((res && res.error) || '追加に失敗しました。', 'error');
      }
    })
    .withFailureHandler(function (err) {
      setLoading(false);
      showMessage('エラー: ' + (err && err.message ? err.message : JSON.stringify(err)), 'error');
    })
    .addCourseToMaster(window.selectedCramId || '', schoolName, val);
}

function _esc(str) {
  return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

window.renderStudentManager = renderStudentManager;
</script>

    display: flex;
    align-items: center;

    margin-bottom: 16px;

    border: 1px solid #e0e4ea;
  }
  .st-count  { color: #555; font-size: 0.9em; }

  /* 学校グループ */
  .st-school-group  { margin-bottom: 32px; }
  .st-school-header {
    display: flex;
    align-items: baseline;

    padding: 8px 12px;
    background: #e8eef6;
    border-left: 4px solid #4a7fc1;

    margin-bottom: 4px;
  }
  .st-school-name  { font-weight: bold; font-size: 1.05em; color: #2c4a7c; }
  .st-school-count { font-size: 0.85em; color: #666; }
  .st-edit-btn     { margin-left: auto; padding: 2px 10px; font-size: 0.82em;
                     background: #fff; border: 1px solid #4a7fc1; color: #4a7fc1;
                     border-radius: 4px; cursor: pointer; }
  .st-edit-btn:hover     { background: #e8eef6; }
  .st-edit-cancel-btn    { margin-left: auto; padding: 2px 10px; font-size: 0.82em;
                           background: #fff3cd; border: 1px solid #f0a500; color: #856404;

  /* 編集操作バー */
  .st-edit-bar {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px 12px;

  }

  /* 学年グループ */
  .st-grade-group  { margin-bottom: 16px; margin-left: 16px; }
  .st-grade-header {

  /* ソートヘッダー */
  .st-th-sort        { cursor: pointer; user-select: none; white-space: nowrap; }

  .st-sort-icon      { margin-left: 4px; font-size: 0.75em; color: #aaa; }

  .st-table    { width: 100%; }

  .st-line-ng  { color: #aaa; font-size: 0.85em; }

  .st-badge-active   { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 0.8em; background: #d4edda; color: #155724; }

</style>
