<!doctype html>
<html>

<head>
  <base target="_top" />
  <?!= include('common_stylesheet'); ?>
  <?!= include('admin_stylesheet'); ?>
</head>

<body>
  <div id="status-message"></div>

  <div id="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-label" id="loading-label">読み込み中...</div>
  </div>

  <!-- ログイン画面 -->
  <div id="login-screen" style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; gap:16px;">
    <h2 style="margin:0;">管理者ログイン</h2>
    <p style="color:#666; margin:0;">登録済みのメールアドレスを入力してください。</p>
    <div style="display:flex; gap:8px; align-items:center;">
      <input type="email" id="login-email" placeholder="admin@example.com"
        style="padding:10px 14px; border:1px solid #ccc; border-radius:4px; width:260px; font-size:1em;"
        onkeydown="if(event.key==='Enter') doLogin()" />
      <button onclick="doLogin()" style="padding:10px 20px;">ログイン</button>
    </div>
  </div>

  <nav class="admin-nav" id="admin-nav" style="display:none;"></nav>

  <div id="admin-content" style="display:none;">
    <h3>管理パネルへようこそ</h3>
    <p>上のメニューから操作を選択してください。</p>
  </div>

  <div id="pattern-modal" class="modal-backdrop" style="display:none; align-items:center; justify-content:center;" onclick="if (event.target === this) closeModal()">
    <div class="modal-card"></div>
  </div>

  <?!= include('common_showMessage'); ?>
  <?!= include('admin_logic_exams'); ?>
  <?!= include('admin_logic_patterns'); ?>
  <?!= include('admin_logic_import'); ?>
  <?!= include('admin_logic_admin_users'); ?>
  <?!= include('admin_logic_branches'); ?>
  <?!= include('admin_logic_master_data'); ?>

  <script>
    window.masterData    = {};
    window.adminContext  = { role: '', cram_id: '', email: '' };
    window.currentSection = 'patterns';
    window.callerEmail   = '';

    var _loadingMsgTimer = null;

    // ---- ローディング ----
    window.setLoading = function (active, messages, intervalMs) {
      const overlay = document.getElementById('loading-overlay');
      const label   = document.getElementById('loading-label');
      if (!overlay) return;

      if (_loadingMsgTimer) {
        clearInterval(_loadingMsgTimer);
        _loadingMsgTimer = null;
      }

      if (active) {
        const msgs = Array.isArray(messages) ? messages : [messages || '処理中...'];
        if (label) label.textContent = msgs[0];
        overlay.classList.add('active');

        if (msgs.length > 1) {
          var idx = 0;
          _loadingMsgTimer = setInterval(function () {
            idx = Math.min(idx + 1, msgs.length - 1);
            if (label) label.textContent = msgs[idx];
          }, intervalMs || 2500);
        }
      } else {
        overlay.classList.remove('active');
      }
    };

    // ---- ナビゲーション ----
    function _renderNav(role) {
      const tabs = [
        { section: 'patterns',   label: '教科パターン管理' },
        { section: 'exams',      label: '試験日程管理' },
        { section: 'import',     label: '生徒インポート' }
      ];
      if (role === 'master') {
        tabs.push(
          { section: 'adminUsers', label: '管理者管理' },
          { section: 'branches',   label: '校舎管理' },
          { section: 'masterData', label: 'マスターデータ' }
        );
      }
      const nav = document.getElementById('admin-nav');
      nav.innerHTML = tabs.map(t =>
        `<button data-section="${t.section}" onclick="loadSection('${t.section}')">${t.label}</button>`
      ).join('');
      nav.style.display = '';
      document.getElementById('admin-content').style.display = '';
    }

    // ---- ログイン ----
    window.doLogin = function () {
      const input = document.getElementById('login-email');
      const email = input ? input.value.trim() : '';
      if (!email) { showMessage('メールアドレスを入力してください。', 'error'); return; }
      window.callerEmail = email;
      document.getElementById('login-screen').style.display = 'none';
      window.refreshMasterData(() => window.loadSection('patterns'));
    };

    // ---- データ取得 ----
    window.refreshMasterData = function (callback) {
      setLoading(true, 'データを読み込み中...');
      google.script.run
        .withSuccessHandler(function (data) {
          if (data && !data.error) {
            window.masterData   = data;
            window.adminContext = data.adminContext || window.adminContext;
            _renderNav(window.adminContext.role);
            if (typeof callback === 'function') callback();
          } else {
            showMessage((data && data.error) || 'データの取得に失敗しました。', 'error');
            // 認証失敗時はログイン画面に戻す
            if (data && data.error && data.error.includes('権限')) {
              document.getElementById('login-screen').style.display = '';
            }
          }
          setLoading(false);
        })
        .withFailureHandler(function (err) {
          const msg = (err && err.message) ? err.message : JSON.stringify(err);
          showMessage('エラー: ' + msg, 'error');
          setLoading(false);
        })
        .getAdminInitialData(window.callerEmail);
    };

    // ---- セクション切り替え ----
    window.loadSection = function (section) {
      const valid = ['patterns', 'exams', 'import', 'adminUsers', 'branches', 'masterData'];
      window.currentSection = valid.includes(section) ? section : 'patterns';

      const overlay = document.getElementById('loading-overlay');
      const content = document.getElementById('admin-content');
      if (overlay && overlay.classList.contains('active')) {
        window.renderSection(window.currentSection);
        return;
      }
      if (content) content.classList.add('section-fading');
      setTimeout(function () {
        window.renderSection(window.currentSection);
        if (content) content.classList.remove('section-fading');
      }, 120);
    };

    window.renderSection = function (section) {
      // アクティブタブを更新
      document.querySelectorAll('.admin-nav button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.section === section);
      });

      const renderers = {
        patterns:   function () { renderPatternManager(window.masterData); },
        exams:      function () { renderExamManager(window.masterData); },
        import:     function () { renderImportManager(); },
        adminUsers: function () { renderAdminUserManager(); },
        branches:   function () { renderBranchManager(); },
        masterData: function () { renderMasterDataManager(window.masterData); }
      };
      (renderers[section] || renderers.patterns)();
    };

    window.closeModal = function () {
      const modal = document.getElementById('pattern-modal');
      if (modal) modal.style.display = 'none';
    };

    // ログインボタン押下後に refreshMasterData を呼ぶため、自動ロードなし
  </script>
</body>

</html>
