<script>
function renderPatternManager(data) {
  const content = document.getElementById('admin-content');
  const patterns = Array.isArray(data.patterns) ? data.patterns : [];
  const termTests = Array.isArray(data.termTests) ? data.termTests : [];
  const subjects = Array.isArray(data.subjects) ? data.subjects : [];
  const patternSubjects = Array.isArray(data.patternSubjects) ? data.patternSubjects : [];

  let html = `<h3>教科パターン管理</h3>`;

  html += `
    <div class="admin-genre-container">
      <h4 class="admin-genre-title">新規試験パターン登録</h4>
      <div style="display:grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap:12px; margin-bottom:16px;">
        <input id="new-pattern-school" type="text" placeholder="学校名" class="admin-input" />
        <input id="new-pattern-course" type="text" placeholder="コース名" class="admin-input" />
        <select id="new-pattern-grade" class="admin-input">
          <option value="">学年を選択</option>
          <option value="高1">高1</option>
          <option value="高2">高2</option>
          <option value="高3">高3</option>
        </select>
        <select id="new-pattern-term" class="admin-input">
          <option value="">試験区分を選択</option>
          ${termTests.map(t => `<option value="${t.term_test_id}">${t.test_name}</option>`).join('')}
        </select>
      </div>
      <button class="btn-save-admin" onclick="createNewPattern()">パターンを追加</button>
    </div>`;

  if (patterns.length === 0) {
    html += `<p>登録されたパターンがありません。</p>`;
    content.innerHTML = html;
    return;
  }

  const grouped = patterns.reduce((acc, p) => {
    const key = `${p.school_name} / ${p.school_course}`;
    if (!acc[key]) acc[key] = [];
    acc[key].push(p);
    return acc;
  }, {});

  Object.keys(grouped).forEach(groupName => {
    const groupPatterns = grouped[groupName];
    html += `<div class="admin-genre-container"><h4 class="admin-genre-title">${groupName}</h4><table class="admin-table"><thead><tr><th style="width:24%">試験区分</th><th style="width:24%">学年</th><th style="width:42%">教科</th><th style="width:10%">操作</th></tr></thead><tbody>`;

    groupPatterns.forEach(p => {
      const test = termTests.find(t => t.term_test_id === p.term_test_id);
      const subjectNames = patternSubjects.filter(ps => ps.pattern_id === p.pattern_id).map(ps => {
        const subject = subjects.find(s => s.subject_id === ps.subject_id);
        return subject ? subject.subject_name : null;
      }).filter(Boolean);

      html += `<tr><td>${test ? test.test_name : '未設定'}</td><td>${p.grade || '未設定'}</td><td>${subjectNames.join('、') || '<span style="color:#888;">教科未設定</span>'}</td><td><button onclick="openPatternSubjectModal('${p.pattern_id}')">教科編集</button></td></tr>`;
    });

    html += `</tbody></table></div>`;
  });

  content.innerHTML = html;
}

function createNewPattern() {
  const schoolName = document.getElementById('new-pattern-school').value.trim();
  const schoolCourse = document.getElementById('new-pattern-course').value.trim();
  const grade = document.getElementById('new-pattern-grade').value;
  const termTestId = document.getElementById('new-pattern-term').value;

  if (!schoolName || !schoolCourse || !grade || !termTestId) {
    showMessage('全ての項目を入力してください。', 'error');
    return;
  }

  const payload = {
    school_name: schoolName,
    school_course: schoolCourse,
    grade: grade,
    term_test_id: termTestId
  };

  google.script.run
    .withSuccessHandler(function (response) {
      if (response && response.success) {
        showMessage('試験パターンを追加しました。', 'success');
        document.getElementById('new-pattern-school').value = '';
        document.getElementById('new-pattern-course').value = '';
        document.getElementById('new-pattern-grade').value = '';
        document.getElementById('new-pattern-term').value = '';
        refreshMasterData(() => loadSection('patterns'));
      } else {
        showMessage(response.error || '追加に失敗しました。', 'error');
      }
    })
    .addNewPattern(payload);
}

function openPatternSubjectModal(patternId) {
  const modal = document.getElementById('pattern-modal');
  const body = modal ? modal.querySelector('.modal-card') : null;
  if (!modal || !body) return;

  const currentSubjectIds = masterData.patternSubjects
    .filter(ps => ps.pattern_id === patternId)
    .map(ps => ps.subject_id);

  const groupedSubs = masterData.subjects.reduce((acc, s) => {
    const gName = s.genre_name || 'その他';
    if (!acc[gName]) acc[gName] = [];
    acc[gName].push(s);
    return acc;
  }, {});

  let subHtml = `<h4>教科の紐付け設定</h4><div style="max-height:360px; overflow-y:auto; margin-bottom:15px;">`;

  Object.keys(groupedSubs).forEach(gName => {
    subHtml += `<p style="font-weight:bold; background:#f0f0f0; padding:5px; margin-top:10px;">${gName}</p>`;
    groupedSubs[gName].forEach(s => {
      const checked = currentSubjectIds.includes(s.subject_id) ? 'checked' : '';
      subHtml += `<label style="display:block; padding:3px 10px;"><input type="checkbox" name="subject_check" value="${s.subject_id}" ${checked}> ${s.subject_name}</label>`;
    });
  });

  subHtml += `</div>
    <div style="display:grid; grid-template-columns: 1fr; gap:10px; margin-bottom:16px;">
      <input type="text" id="new-subject-name" placeholder="新しい教科名を入力" class="admin-input" />
    </div>
    <div style="display:flex; gap:10px; justify-content:flex-end;">
      <button class="btn-save-admin" onclick="savePatternSubjects('${patternId}')">保存</button>
      <button class="btn-cancel-admin" onclick="closeModal()">キャンセル</button>
    </div>`;

  body.innerHTML = subHtml;
  modal.style.display = 'flex';
}

function savePatternSubjects(patternId) {
  const selectedIds = Array.from(document.querySelectorAll('input[name="subject_check"]:checked')).map(cb => cb.value);
  const newSubjectName = document.getElementById('new-subject-name').value.trim();

  google.script.run
    .withSuccessHandler(function (response) {
      if (response && response.success) {
        closeModal();
        showMessage('教科設定を更新しました', 'success');
        refreshMasterData(() => loadSection('patterns'));
      } else {
        showMessage(response.error || '保存に失敗しました。', 'error');
      }
    })
    .updatePatternSubjects(patternId, selectedIds, newSubjectName);
}
</script>
