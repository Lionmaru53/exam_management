<script>
/**
 * 保存ボタンがクリックされたときの処理
 * @param {string} studentId - 生徒ID
 * @param {string} examId - 試験ID
 */
function handleSave(studentId, examId, btn) {
  const button = btn || document.getElementById('submitBtn');
  const panel = button ? button.closest('.tab-panel') : document;
  const scores = [];
  const selectPrefix = `s_${examId}_`;
  
  // データの収集
  panel.querySelectorAll(`select[id^="${selectPrefix}"]`).forEach(el => {
    const subId = el.id.slice(selectPrefix.length);

    const scoreVal = el.value;
    const gradeRankVal = panel.querySelector(`#gr_${examId}_${subId}`)?.value || '';
    const classRankVal = panel.querySelector(`#cr_${examId}_${subId}`)?.value || '';

    scores.push({
      subject_id: subId,
      score: scoreVal,
      grade_rank: gradeRankVal,
      class_rank: classRankVal
    });
  });

  button.disabled = true;
  button.innerText = "保存中...";

  google.script.run
    .withSuccessHandler(function(responseString) {
      const response = JSON.parse(responseString);
      btn.disabled = false;
      btn.innerText = "一括保存する";

      if (response.success) {
        showMessage("正常に保存されました！", "success");
      } else {
        showMessage("保存エラー: ", response.error, "error");
      }
    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      btn.innerText = "一括保存する";
      showMessage("通信エラーが発生しました: " + err.message, "error");
    })
    .saveAllScores({
      student_id: studentId,
      exam_id: examId,
      scores: scores
    });
}

</script>
