<script>
  /**
  * メッセージを表示する関数（alertの代わり）
  */
function showMessage(text, type) {
  const msgEl = document.getElementById('status-message');
  msgEl.innerText = text;
  msgEl.className = type === 'success' ? 'msg-success' : 'msg-error';

  msgEl.classList.add('show');

  // 5秒後に自動で消す（任意）
  setTimeout(() => {
    msgEl.classList.remove('show');
  }, 5000);
}

/**
 * 保存ボタンがクリックされたときの処理
 * @param {string} studentId - 生徒ID
 * @param {string} examId - 試験ID
 */
function handleSave(studentId, examId) {
  const btn = document.getElementById('submitBtn');
  const scores = [];
  
  // データの収集
  document.querySelectorAll('select[id^="s_"]').forEach(el => {
    const subId = el.id.replace('s_', '');

    const scoreVal = el.value;
    const gradeRankVal = document.getElementById(`gr_${subId}`).value;
    const classRankVal = document.getElementById(`cr_${subId}`).value;

    scores.push({
      subject_id: subId,
      score: scoreVal,
      grade_rank: gradeRankVal,
      class_rank: classRankVal
    });
  });

  btn.disabled = true;
  btn.innerText = "保存中...";

  google.script.run
    .withSuccessHandler(function(responseString) {
      const response = JSON.parse(responseString);
      btn.disabled = false;
      btn.innerText = "一括保存する";

      if (response.success) {
        showMessage("正常に保存されました！", "success");
      } else {
        showMessage("保存エラー: ", response.error, "error");
      }
    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      btn.innerText = "一括保存する";
      showMessage("通信エラーが発生しました: " + err.message, "error");
    })
    .saveAllScores({
      student_id: studentId,
      exam_id: examId,
      scores: scores
    });
}

</script>
