<style>
  #admin-content {
    background: #fff;
    padding: 20px;

    gap: 10px;
    margin-bottom: 20px;
    background: #333;
    padding: 10px;
    border-radius: 5px;
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  #pattern-modal { display: none; }

  .branch-selector-wrap {
    display: none;
    padding: 8px 16px;
    background: #f5f5f5;
    border-bottom: 1px solid #ddd;
    gap: 8px;
  }

  .admin-nav button {
    background: none;
    border: 1px solid #fff;
    color: #fff;
    cursor: pointer;
    padding: 5px 10px;
  }

  .admin-nav button:hover {
    background: #555;
  }

  .admin-nav button.active {
    background: #007bff;
    border-color: #007bff;
  }

  /* モーダルの背景 */
  .modal-overlay,
  .modal-backdrop {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: 100000;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .modal-card {
    background: white;

    border-radius: 10px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
  }

  .form-group {
    margin-bottom: 15px;
  }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: bold;
    margin-bottom: 5px;
  }

  .admin-input,
  .admin-select {
    width: 100%;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
  }

  .btn-save-admin {
    flex: 1;
    background: #28a745;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 4px;
    cursor: pointer;
  }

  .btn-cancel-admin {
    flex: 1;
    background: #6c757d;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 4px;
    cursor: pointer;
  }

  /* 管理画面用テーブルスタイル */
  table.admin-table th,
  table.admin-table td {
    padding: 10px;
    text-align: left;
    font-size: 14px;
    border: 1px solid #ddd;
  }

  .admin-genre-container {
    margin-bottom: 30px;
    border: 1px solid #ddd;
    border-radius: 8px;
    overflow: hidden;
  }
  .admin-genre-title {
    background: #f4f4f4;
    margin: 0;
    padding: 10px 15px;
    border-bottom: 1px solid #ddd;
  }

    width: 100%;
    border-collapse: collapse;
    background: #fff;
  }

  .admin-table td {
    padding: 12px;
    border-bottom: 1px solid #eee;
    text-align: left;
  }
  .admin-table th {
    font-size: 0.8rem;
    color: #888;
    text-transform: uppercase;
  }

  .btn-subcourse {

  .btn-subcourse:hover {

  .sub-course-editor {
    padding: 10px 15px;
    background: #f9f9f9;
    border-bottom: 1px solid #ddd;
    font-size: 0.9rem;
  }

  .shared-subjects-panel {
    padding: 14px 15px;
    background: #fff8e1;
    border-bottom: 1px solid #ffe082;
  }

  .subjects-grid {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

    min-width: 110px;
    flex: 1;
  }

  .genre-col-title {

    padding: 2px 0;
    font-size: 0.9rem;
  }

    margin-top: 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

    flex: 1;
    min-width: 0;
    width: auto;
    padding: 5px;
  }

  /* アクションボタン行 */
  .pattern-actions {
    padding: 8px 15px;
    background: #f9f9f9;

    display: flex;
    gap: 8px;
  }

  .pattern-actions .btn-save-admin,
  .pattern-actions .btn-cancel-admin {
    flex: none;
    padding: 6px 16px;
  }

  /* ローディングオーバーレイ */
  #loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255, 255, 255, 0.65);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    z-index: 9000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    animation: overlay-fade-in 0.18s ease forwards;
  }
  #loading-overlay.active {
    display: flex;
  }
  @keyframes overlay-fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* スピナー */
  .loading-spinner {
    width: 46px;
    height: 46px;
    border: 5px solid #e0e0e0;
    border-top-color: #007bff;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-label {
    font-size: 0.88rem;
    font-weight: bold;
    color: #555;
    letter-spacing: 0.04em;
  }

  /* コンテンツのタブ切り替えフェード */
  #admin-content {
    transition: opacity 0.12s ease;
  }
  #admin-content.section-fading {
    opacity: 0;
    pointer-events: none;
  }

  /* 処理中のボタン全般 */
  .admin-loading button,
  .admin-loading input {
    pointer-events: none;
    opacity: 0.55;
  }

  .hier-course { margin-top: 2px; }

    font-weight: 600;

  .hier-course-header:hover { background: #e8eaf6; }
  .hier-grade-header:hover  { background: #f0f0f0; }

    font-size: 0.68rem;
    padding: 2px 7px;
  }

  .hier-school-body { padding-left: 0; }

  .hier-grade-body  { padding-left: 28px; margin-bottom: 10px; }

  .sub-course-label {
    padding: 4px 12px;
    font-size: 0.9rem;
    font-weight: 600;
    color: #555;
    background: #f9f9f9;
    border-left: 3px solid #ccc;
    margin-top: 8px;
    margin-bottom: 2px;
  }
</style>
