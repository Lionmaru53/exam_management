<script>
  let editingExamRowKey = null;
  let editingExamPatternId = null;
  let editingExamId = null;

  function makeExamRowKey(school_name, school_course_id, term_test_id) {
    return encodeURIComponent(`${school_name}||${school_course_id}||${term_test_id}`);
  }

  function startEditExam(rowKey, patternId, examId) {
    editingExamRowKey = rowKey;
    editingExamPatternId = patternId;
    editingExamId = examId || "";
    renderExamManager(masterData);
  }

  function cancelEditExam() {
    editingExamRowKey = null;
    editingExamPatternId = null;
    editingExamId = null;
    renderExamManager(masterData);
  }

  function renderExamManager(data) {
    const content = document.getElementById("admin-content");

    // 1. データを「学校名 / コース」でグループ化
    const groupedPatterns = data.patterns.reduce((acc, p) => {
      const school = data.schools.find((s) => s.school_name === p.school_name);
      const sDisplayName = school
        ? school.abbreviation || school.school_name
        : p.school_name;
      const course = data.schoolCourses.find(
        (c) => c.school_course_id === p.school_course_id,
      );
      const cName = course ? course.school_course_name : "不明コース";
      const groupKey = `${sDisplayName} / ${cName}`;

      if (!acc[groupKey]) {
        acc[groupKey] = {
          info: {
            school_name: p.school_name,
            school_course_id: p.school_course_id,
          },
          items: [],
        };
      }
      acc[groupKey].items.push(p);
      return acc;
    }, {});

    let html = `<h3>試験日程・実施期間の一覧管理</h3>`;

    for (const groupName in groupedPatterns) {
      const group = groupedPatterns[groupName];
      html += `
      <div class="admin-genre-container">
        <h4 class="admin-genre-title">${groupName}</h4>
        <table class="admin-table">
          <thead>
            <tr>
              <th>テスト区分</th><th>実施期間（開始 ～ 終了）</th><th>操作</th>
            </tr>
          </thead>
          <tbody>`;

      data.termTests.forEach((test) => {
        const p = group.items.find(
          (item) => item.term_test_id === test.term_test_id,
        );
        const exam = p
          ? data.exams.find((e) => e.pattern_id === p.pattern_id)
          : null;
        const rowKey = makeExamRowKey(
          group.info.school_name,
          group.info.school_course_id,
          test.term_test_id,
        );
        const isEditing = editingExamRowKey === rowKey;

        html += `
        <tr${isEditing ? ` id="edit-exam-${rowKey}"` : ""}>
          <td><strong>${test.test_name}</strong></td>`;

        if (isEditing) {
          html += `
          <td style="min-width:280px;">
            <input type="date" class="edit-start-date" value="${exam ? exam.start_date : ""}" style="width:45%; margin-right:4%;" />
            <input type="date" class="edit-end-date" value="${exam ? exam.end_date : ""}" style="width:45%;" />
          </td>
          <td>
            <button class="save-btn" onclick="saveEditedExam('${rowKey}')">保存</button>
            <button onclick="cancelEditExam()">キャンセル</button>
          </td>`;
        } else {
          html += `
          <td>
            ${exam ? `${exam.start_date} ～ ${exam.end_date}` : '<span style="color:#ccc;">未設定</span>'}
          </td>
          <td>
            ${p ? `<button onclick="startEditExam('${rowKey}', '${p.pattern_id}', '${exam ? exam.exam_id : ""}')">${exam ? "期間修正" : "期間設定"}</button>` : '<span style="color:#ccc;">設定不可</span>'}
          </td>`;
        }

        html += `
        </tr>`;
      });

      html += `</tbody></table></div>`;
    }

    content.innerHTML = html;
  }

  function saveEditedExam(rowKey) {
    const row = document.getElementById('edit-exam-' + rowKey);
    if (!row) return;

    const start_date = row.querySelector('.edit-start-date').value;
    const end_date = row.querySelector('.edit-end-date').value;

    if (!start_date || !end_date) {
      showMessage('日付を入力してください', 'error');
      return;
    }

    if (!editingExamPatternId) {
      showMessage('保存対象が不明です。', 'error');
      return;
    }

    const btn = row.querySelector('.save-btn');
    if (btn) {
      btn.disabled = true;
      btn.innerText = '保存中...';
    }

    const payload = {
      exam_id: editingExamId,
      pattern_id: editingExamPatternId,
      start_date: start_date,
      end_date: end_date,
    };

    google.script.run
      .withSuccessHandler(function (response) {
        if (btn) {
          btn.disabled = false;
          btn.innerText = '保存';
        }
        if (response.success) {
          const index = masterData.exams.findIndex((e) => e.exam_id === payload.exam_id);
          if (index !== -1) {
            masterData.exams[index] = payload;
          } else {
            masterData.exams.push(payload);
          }
          showMessage('試験日程を保存しました', 'success');
          editingExamRowKey = null;
          editingExamPatternId = null;
          editingExamId = null;
          renderExamManager(masterData);
        } else {
          showMessage(response.error, 'error');
        }
      })
      .updateExamData(payload);
  }
</script>
