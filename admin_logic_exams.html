<script>
    /**
     * 試験日程セクションの描画
     */
    function renderExamManager(data) {
        const content = document.getElementById('admin-content');

        let html = `
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h3>試験日程（実施回）管理</h3>
      <button onclick="openExamModal()" style="background:#28a745; color:white; padding:5px 15px; border:none; border-radius:3px;">+ 新規試験作成</button>
    </div>
    <table border="1" style="width:100%; border-collapse: collapse; margin-top:10px; background:white;">
      <tr style="background:#eee;">
        <th>ID</th><th>学校名</th><th>テスト名</th><th>期間</th><th>操作</th>
      </tr>`;

        data.exams.forEach(ex => {
            // pattern_id から学校名とテスト名を紐付け（事前に用意した masterData を活用）
            const pattern = data.patterns.find(p => p.pattern_id === ex.pattern_id);
            const school = pattern ? data.schools.find(s => s.school_name === pattern.school_name) : null;
            const test = pattern ? data.termTests.find(t => t.term_test_id === pattern.term_test_id) : null;

            html += `
      <tr>
        <td>${ex.exam_id}</td>
        <td>${school ? (school.abbreviation || school.school_name) : '-'}</td>
        <td>${test ? test.test_name : '-'}</td>
        <td>${ex.start_date} ~ ${ex.end_date}</td>
        <td>
          <button onclick="openExamModal('${ex.exam_id}')">編集</button>
          <button onclick="deleteExam('${ex.exam_id}')" style="color:red; margin-left:5px;">削除</button>
        </td>
      </tr>`;
        });

        html += `</table>`;
        content.innerHTML = html;
    }

    /**
     * 試験作成モーダルの表示
     */
    function openExamModal(examId = null) {
        const modal = document.getElementById('student-modal');
        const exam = examId ? masterData.exams.find(e => e.exam_id === examId) : null;

        // モーダル中身を試験用に書き換え
        const body = document.querySelector('.modal-card');
        body.innerHTML = `
    <h4 id="modal-title">${exam ? '試験日程の編集' : '試験日程の新規作成'}</h4>
    <input type="hidden" id="edit-exam-id" value="${exam ? exam.exam_id : ''}" />
    <div class="form-group">
      <label>試験パターン（学校×テスト名）</label>
      <select id="edit-exam-pattern" class="admin-select">
        ${masterData.patterns.map(p => {
            const s = masterData.schools.find(sc => sc.school_name === p.school_name);
            const t = masterData.termTests.find(tt => tt.term_test_id === p.term_test_id);
            const selected = (exam && exam.pattern_id === p.pattern_id) ? 'selected' : '';
            return `<option value="${p.pattern_id}" ${selected}>${s.abbreviation || s.school_name} / ${t.test_name}</option>`;
        }).join('')}
      </select>
    </div>
    <div class="form-group">
      <label>開始日</label>
      <input type="date" id="edit-exam-start" class="admin-input" value="${exam ? exam.start_date : ''}">
    </div>
    <div class="form-group">
      <label>終了日</label>
      <input type="date" id="edit-exam-end" class="admin-input" value="${exam ? exam.end_date : ''}">
    </div>
    <div style="margin-top:20px; display:flex; gap:10px;">
      <button onclick="saveExam()" class="btn-save-admin">保存</button>
      <button onclick="closeModal()" class="btn-cancel-admin">キャンセル</button>
    </div>
    `;
        modal.style.display = "flex";
    }

    function saveExam() {
        const payload = {
            pattern_id: document.getElementById('edit-exam-pattern').value,
            start_date: document.getElementById('edit-exam-start').value,
            end_date: document.getElementById('edit-exam-end').value
        };

        if (!payload.start_date || !payload.end_date) {
            showMessage("日付を入力してください", "error"); return;
        }

        google.script.run.withSuccessHandler(function () {
            closeModal();
            showMessage("試験日程を保存しました", "success");
            loadSection('exams');
        }).updateExamData(payload);
    }

    function deleteExam(examId) {
        if (!confirm("この試験日程を削除しますか？既存のデータとの整合性を確保してください。")) return;

        google.script.run.withSuccessHandler(function () {
            showMessage("試験日程を削除しました", "success");
            loadSection('exams');
        }).deleteExamData(examId);
    }
</script>
