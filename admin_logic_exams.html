<script>
  function renderExamManager(data) {
    const content = document.getElementById("admin-content");

    // 1. データを「学校名 / コース」でグループ化
    const groupedPatterns = data.patterns.reduce((acc, p) => {
      // school_name で直接マスターを検索
      const school = data.schools.find((s) => s.school_name === p.school_name);
      const sDisplayName = school
        ? school.abbreviation || school.school_name
        : p.school_name;
      const course = data.schoolCourses.find(
        (c) => c.school_course_id === p.school_course_id,
      );
      const cName = course ? course.school_course_name : "不明コース";
      const groupKey = `${sDisplayName} / ${cName}`;

      if (!acc[groupKey]) {
        acc[groupKey] = {
          // ボタンに渡すための情報（IDではなく名前を使用）
          info: {
            school_name: p.school_name,
            school_course_id: p.school_course_id,
          },
          items: [],
        };
      }
      acc[groupKey].items.push(p);
      return acc;
    }, {});

    let html = `<h3>試験日程・実施期間の一覧管理</h3>`;

    for (const groupName in groupedPatterns) {
      const group = groupedPatterns[groupName];
      html += `
      <div class="admin-genre-container">
        <h4 class="admin-genre-title">${groupName}</h4>
        <table class="admin-table">
          <thead>
            <tr>
              <th>テスト区分</th><th>実施期間（開始 ～ 終了）</th><th>操作</th>
            </tr>
          </thead>
          <tbody>`;

      data.termTests.forEach((test) => {
        const p = group.items.find(
          (item) => item.term_test_id === test.term_test_id,
        );

        const exam = p
          ? data.exams.find((e) => e.pattern_id === p.pattern_id)
          : null;

        html += `
        <tr>
          <td><strong>${test.test_name}</strong></td>
          <td>
            ${exam ? `${exam.start_date} ～ ${exam.end_date}` : '<span style="color:#ccc;">未設定</span>'}
          </td>
          <td>
          <button onclick="openExamModal({
            pattern_id: '${p ? p.pattern_id : ""}',
            exam_id: '${exam ? exam.exam_id : ""}',
            school_name: '${group.info.school_name}',
            school_course_id: '${group.info.school_course_id}',
            term_test_id: '${test.term_test_id}'
          })">
            ${exam ? "期間修正" : "期間設定"}
          </button>
          </td>
        </tr>`;
      });

      // 最下行に追加ボタン（IDではなくschool_nameを渡す）
      html += `</tbody></table></div>`;
    }
    content.innerHTML = html;
  }

  /**
   * 試験作成モーダルの表示
   */
  function openExamModal(params) {
    const { pattern_id, exam_id, school_name, school_course_id, term_test_id } =
      params;
    const modal = document.getElementById("student-modal");

    // 1. 表示用の情報を取得（既存データがあればそれ、なければマスターから）
    const school = masterData.schools.find(
      (s) => s.school_name === school_name,
    );
    const test = masterData.termTests.find(
      (t) => t.term_test_id === term_test_id,
    );
    const exam = exam_id
      ? masterData.exams.find((e) => e.exam_id === exam_id)
      : null;

    const displayName = school
      ? school.abbreviation || school.school_name
      : school_name;

    // 2. モーダル中身を書き換え
    const body = document.querySelector(".modal-card");
    body.innerHTML = `
    <h4>試験期間の設定</h4>
    <p style="font-size:0.9rem; margin-bottom:15px; color:#666;">
      ${displayName} : ${test ? test.test_name : "不明なテスト"}
    </p>

    <!-- 保存時に必要な情報をhiddenに埋め込む -->
    <input type="hidden" id="edit-exam-id" value="${exam_id || ""}">
    <input type="hidden" id="edit-pattern-id" value="${pattern_id || ""}">
    <input type="hidden" id="edit-school-name" value="${school_name}">
    <input type="hidden" id="edit-course-id" value="${school_course_id}">
    <input type="hidden" id="edit-test-id" value="${term_test_id}">

    <div class="form-group">
      <label>開始日</label>
      <input type="date" id="edit-exam-start" class="admin-input" value="${exam ? exam.start_date : ""}">
    </div>
    <div class="form-group">
      <label>終了日</label>
      <input type="date" id="edit-exam-end" class="admin-input" value="${exam ? exam.end_date : ""}">
    </div>

    <div style="margin-top:20px; display:flex; gap:10px;">
      <button onclick="saveExam()" class="btn-save-admin">保存</button>
      <button onclick="closeModal()" class="btn-cancel-admin">キャンセル</button>
    </div>
  `;
    modal.style.display = "flex";
  }

  function saveExam() {
    const payload = {
      exam_id: document.getElementById("edit-exam-id").value,
      pattern_id: document.getElementById("edit-pattern-id").value,
      start_date: document.getElementById("edit-exam-start").value,
      end_date: document.getElementById("edit-exam-end").value,
    };

    if (!payload.start_date || !payload.end_date) {
      showMessage("日付を入力してください", "error");
      return;
    }

    const btn = event.target;
    btn.disabled = true;
    btn.innerText = "保存中...";

    google.script.run
      .withSuccessHandler(function (response) {
        btn.disabled = false;
        btn.innerText = "保存";
        if (response.success) {
          closeModal();
          const index = masterData.exams.findIndex((e) => e.exam_id === payload.exam_id);
          if (index !== -1) {
            masterData.exams[index] = payload; // 既存データを更新
          } else {
            masterData.exams.push(payload);
          }
          showMessage("試験日程を保存しました", "success");
          loadSection("exams");
        } else {
          showMessage(response.error, "error");
        }
      })
      .updateExamData(payload);
  }
</script>
