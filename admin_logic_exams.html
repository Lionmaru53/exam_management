<script>
let editingExamRowKey = null;
let editingPatternId = null;
let editingExamId = null;

function startEditExam(patternId, examId) {
  editingExamRowKey = patternId;
  editingPatternId = patternId;
  editingExamId = examId || '';
  renderExamManager(masterData);
}

function cancelEditExam() {
  editingExamRowKey = null;
  editingPatternId = null;
  editingExamId = null;
  renderExamManager(masterData);
}

function saveEditedExam(patternId, examId) {
  const startDate = document.getElementById(`start_date_${patternId}`)?.value;
  const endDate = document.getElementById(`end_date_${patternId}`)?.value;

  if (!startDate || !endDate) {
    showMessage('開始日と終了日は両方入力してください。', 'error');
    return;
  }

  const payload = {
    exam_id: examId || '',
    pattern_id: patternId,
    start_date: startDate,
    end_date: endDate
  };

  google.script.run
    .withSuccessHandler(function (response) {
      if (response && response.success) {
        showMessage('試験日程を保存しました。', 'success');
        refreshMasterData(() => loadSection('exams'));
      } else {
        showMessage((response && response.error) || '保存に失敗しました。', 'error');
      }
    })
    .updateExamData(payload);
}

function renderExamManager(data) {
  const content = document.getElementById('admin-content');
  const patterns = Array.isArray(data.patterns) ? data.patterns : [];
  const termTests = Array.isArray(data.termTests) ? data.termTests : [];
  const exams = Array.isArray(data.exams) ? data.exams : [];

  const groupedByTest = patterns.reduce((acc, pattern) => {
    const test = termTests.find(t => t.term_test_id === pattern.term_test_id);
    const testKey = pattern.term_test_id || 'UNKNOWN';
    if (!acc[testKey]) {
      acc[testKey] = {
        test_name: test ? test.test_name : '未設定の試験区分',
        patterns: []
      };
    }
    acc[testKey].patterns.push(pattern);
    return acc;
  }, {});

  let html = `<h3>試験日程管理</h3>`;

  if (Object.keys(groupedByTest).length === 0) {
    html += `<p>登録された試験パターンがありません。</p>`;
    content.innerHTML = html;
    return;
  }

  Object.keys(groupedByTest).forEach(testKey => {
    const group = groupedByTest[testKey];
    html += `\n      <div class="admin-genre-container">\n        <h4 class="admin-genre-title">${group.test_name}</h4>\n        <table class="admin-table">\n          <thead>\n            <tr>\n              <th style="width:18%">学校</th>\n              <th style="width:18%">コース</th>\n              <th style="width:12%">学年</th>\n              <th style="width:34%">実施期間</th>\n              <th style="width:18%">操作</th>\n            </tr>\n          </thead>\n          <tbody>`;

    group.patterns.forEach(pattern => {
      const exam = exams.find(e => e.pattern_id === pattern.pattern_id);
      const isEditing = editingExamRowKey === pattern.pattern_id;
      html += `<tr>`;
      html += `<td>${pattern.school_name || '未設定'}</td>`;
      html += `<td>${pattern.school_course || '未設定'}</td>`;
      html += `<td>${pattern.grade || '未設定'}</td>`;

      if (isEditing) {
        html += `\n          <td style="display:flex; gap:8px; align-items:center;">\n            <input id="start_date_${pattern.pattern_id}" type="date" value="${exam ? exam.start_date : ''}" style="flex:1; padding:5px;" />\n            <span>～</span>\n            <input id="end_date_${pattern.pattern_id}" type="date" value="${exam ? exam.end_date : ''}" style="flex:1; padding:5px;" />\n          </td>\n          <td>\n            <button class="save-btn" onclick="saveEditedExam('${pattern.pattern_id}', '${exam ? exam.exam_id : ''}')">保存</button>\n            <button class="btn-cancel-admin" onclick="cancelEditExam()">キャンセル</button>\n          </td>`;
      } else {
        html += `<td>${exam ? `${exam.start_date} ～ ${exam.end_date}` : '<span style="color:#888;">未設定</span>'}</td>`;
        html += `<td><button onclick="startEditExam('${pattern.pattern_id}', '${exam ? exam.exam_id : ''}')">編集</button></td>`;
      }
      html += `</tr>`;
    });

    html += `\n          </tbody>\n        </table>\n      </div>`;
  });

  content.innerHTML = html;
}
</script>
